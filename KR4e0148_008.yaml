body:
  text: 整菴存稿卷八明羅欽順撰序一十五首玉堂聨句後序南都卿大夫士出自翰林者舊相與為瀛洲㑹或時當休暇禮直送迎則遞主之所以通情愫申綢繆崇文德而永歡好也其或詩與否則顧一時之興何如今嵗春夏之交少宰楊公以㑹興副總裁訖事來還少司徒鄭公當奉慶萬夀表北上太宰林公首徵㑹於其第太常李公翰林吳公繼之諸公復雅志雞鳴山之遊某實躬治具蓋月中凡四㑹㑹凡七人惟玉堂璧水二㑹嘗賦詩焉而玉堂之詩實衍璧水之韻皆聨句也聨句成章又皆即席以和而某以疾不及赴㑹玉堂少宗伯馬公乃稿示俾追和焉司徒公之行也諸公嘗分韻賦詩以贈既成卷因附以二㑹倡和之篇惟公宏才敏識久淹南都羣情屬望謂旦夕當聨八座兹以事入覲或者遂留侍黼座用資謨猷位益尊貴益重欲如今者㑹合遊娛觴咏從容之適殆不可多得矣時一披卷哦其詩而憶其人其能無離合之感乎然諸公方以宿德重望奧學清文重當時雖暫分留務抑亦嵗時間耳行當與公追逐槐棘之下金舂玉應殆未止此獨某狷陋鄙滯用不適時瞻望儀型當日以益逺公倘不疏棄尚幸時賜一言之誨哉永慶堂詩序易曰積善之家必有餘慶有餘之為言足乎一已而及於後世之謂也天有顯道福善而禍淫慶固不可以茍得其有受天之慶至於數世而未巳者善之積非一朝一夕之故也邑姻蕭君希道嘗以永慶名堂其諸積善之家矣乎蓋惟有餘是以克永衆目攸覩華扁昭然其豈無其實而姑假是名以為其堂之美稱乎惟蕭氏居吾邑東南桃源里至今數百年世之逺者姑未論自君曽大父德贊翁以至於君奕世以忠厚著聞於凡分內之事則相率為之分外之事一不為是以既明且昌而其勢猶盛庶足以興事富足以行禮有和樂之美而無憂患之干其已然者既不可誣而方來者益有可冀此堂之所以以永慶名也鄉邑士夫見而知者韙其名聞而知者嘉其實於是永慶堂之詩作焉善固人情所同好也慶亦人情所同欲也以其所同然者而發之詩而永慶之義無餘藴矣古詩刪定於宣聖得三百十有一篇大抵皆美刺之作蓋因其人之善惡或婉致其辭或直陳其事其為體雖不一要以明是非寓勸懲焉今永慶堂有詩或古或律或五言或七言雖與三百十一篇之體不同然於義為美雖美而其辭無溢足以使人知勸是豈不可傳乎於是君之姻楊君顯祖以求余序余於卜氏之學未之習也然竊以為是詩傳其子孫則今日之慶當思所以延之或傳於他姓則蕭氏之慶當思所以同之蓋是詩之作雖緣於一人而其義之所以為勸固無不可讀者試以余言求之其必將有得乎詩凡若干首習靜詩序友人尹其逺篤學而文於事親稱為以志養者一日過余西岡里居拜而言曰家君處士生十有六嵗而孤克勤自植詩書之誦習常業之經營所以秪承其先覆幬其後者甚矣乎其用力之勞而成功之不易也今年五十有五矣某兄弟不肖仰賴庭訓粗若有知家君以為志之所未酬事之所未遂者若有可委頗思自逸以休其神明數年以來漸省外事雖襟􅺒之請益者猶未絶於丈席之前而塵埃之汚人者不使得至於明窗之下淨几之上也蓋嵗多暇日日多暇時往往閉户焚香斂膝危坐而游心於恬淡之境其靜中若有以自樂者因自號曰習靜愚人某將告諸士友以求咏歌其所志惟先生序以先之余曰勞久而逸之思動久而靜之慕此人情之常也矧尊君植於早孤其勞為甚及兹暮年而有子則其思欲靜處以自休也固宜雖然人動物也自有知之後未死以前不能一日不與事物接酬酢云為有不容不動者尊君固將屏事絶物漠然一無所聞問使其身心如槁木死灰然哉其亦别有說邪蓋吾聞之天下之動莫匪氣機而是理之存主乎其間者則固本靜萬古如一誠有見夫天下之至靜而主之則雖萬變交乎前左酬右應自中肻綮從容暇豫沛然常若無事此聖人所以立人極之道也茍惟外物是絶內寂是耽則是釋氏之自私非吾儒之所有事矣尊君儒雅老成吾所願見幸得面請其說從而著於篇未晚也况乎詩序序所以作者之意未聞有先之者雖敕天之語先歌而發然彼自述其意蓋與序他人之詩者不同請姑後之其逺作而言曰人心之所同然者理也先生之言固已先得詩人之所同然者矣又奚為計乎序與詩之先後乎哉且德車不可屈致龍門未易泛登髙談奧論家君惟不得亟聞之是念幸筆之於卷俾某奉以歸而質諸家君不亦可乎余觀其意確不得固辭遂次第其語書之以為習靜詩序處士名士禎世居泰和山田里自其髙曽來以至處士羣從簪組蟬聨聲光赫奕處士雖隱而未見然有子如其逺兄弟顯揚固有在云枯復詩序枯復道人今之名有道者當其望八之年偶嬰疾危甚未幾遂平復如常間取魏伯陽周易參同契讀之至於任蓄微稚老枯復榮辴然笑曰兹豈余之謂乎爰以枯復道人自號道人嘗為吉之龍泉令為監察御史以聲績將致髙位然所志不存一旦棄其官去為尋真之遊凡世所稱諸名山無逺不到遇異人髙士輒相與研窮道術而悉取其所長以自資人徒見其老而不衰無能測其所得之淺深也去年春余過訪姻友陳上舍元善於池陽獲與道人胥晤問其年八十三矣坐自旦至午不移席每舉觴但微釂而談吐益健往往雜引仙經顧余早嵗亦嘗玩其辭益切向之後因讀晦翁感興詩乃已以此猶頗能酬答或巧相詰難以為笑遂相與如平生歡酒數行元善起而請曰祚嘗為吾師求得枯復詩數什莫任為之序者今吾師與先生言如有合敢丏大筆以辨諸卷首斯則重為枯復之榮道人亦欣然起酌余曰榮枯在先生筆端矣余惟枯楊生稊易著其象顛木由蘖書有其辭兹固物理之可徴者衰老之人理無再壯而黃髮兒齒嘗詠於詩非所謂復榮者乎然自吾儒言之皆定命也惟道術家則以是為有道之符今道人之志於道也甚専而其精力風神不以疾減不以老鑠自非有得何以及此第不知果能啓元命之祕養成所謂神丹者否邪蓋余嘗論之靈均之賦逺遊子房之學辟穀意皆逺大道則靈均為精如其志有成固將駕風鞭霆以遨遊八極遺濁世而獨立留不死之舊鄉庶幾乎來者之畢聞以快覩夫天之終定此其事非天下竒男子孰能辦之余既拙不能為於道人不能無過望也遂書其說以副元善見屬之意且又以俟夫知者區區榮枯之跡豈煩多辨哉道人張姓其字大信世為池陽人瞻雲圖詩序瞻雲本唐狄梁公事史家記之所以著公之純孝也臨潁賈鳴和先生今為南京翰林院侍讀學士日思慕其尊君樂菴公不置引領西望實勞寸心乃作瞻雲之圖以寄意焉其意與狄公豈異哉然狄公之赴官并州也庭闈之養宜必有託養之得如其志與否蓋有不可得而知者而當其時名位所得猶未足以光顯其親今先生兄弟凡五人諸子十人諸孫曽幾二十人每晨昏相率候公起居公或不能盡辨第如郭令公頷之而已先生雖逖違侍下而凡所以節寒暖時溫凊承色笑於左右者濟濟焉相與各供其職而交致其誠奉養之周從可知矣公嘗以先生初命被封為翰林編修至於今而先生位望日髙文名日逺方駸駸於大受其諸孫復多秀出領鄉書遊邑校者蓋纍纍有人文物衣纓聿追先世之美公之光顯於斯為盛心志之樂可勝計邪夫以其奉養之周也心志之樂也諸福之集於公者殆猶百川之滙巨壑在先生宜若可以少輟其思而顧不能自已兹圖之作蓋所以寫其陟降不忘之意而願公之萬夀無疆也公今年夀九十有三八月二十五日實惟初度凡與先生遊而能詩者因相與推明圖意各賦詩一首以為公夀且以慰先生之思先生以欽順託交有年屬為之序蓋聞忠孝無二理臣子惟一心狄公後來參秉政機卒成取日虞淵之烈心之亹亹孰非前日瞻悵之充今觀於兹圖有以見先生之與狄公其孝思信無異矣自是而往所居之位所遭之時容或有相似者即此心而充之其功烈所就詎肻多讓乎哉公年雖高而精力猶健其夀蓋未可量尚及見先生之大烈有成亦千古之一快也余辭不腆異時史家記事儻足徵焉其亦不為空言也夫三至軒詩文序江西以南昌為㑹府巡撫都院在焉其㕔事之東偏有燕休之所右副都御史髙吾陳公題其扁曰三至軒蓋公之於江西初以大參至再以大方伯至兹又以巡撫至此軒之所以名也維時士夫君子仰公之德樂公之政又知公雅好文事於兹軒也謂不可以無言於是或為記或為賦或為銘為頌為五七言古近體詩多至數十百首於公之志蓋有發焉公得而讀之良喜乃令侍者次第編輯而鋟諸梓以傳久逺間以書來屬欽順序之惟公以武陵諸生登𢎞治丙辰進士揚歷中外三十餘年所至皆有成績而江藩兩政適遭時勢之難所以折奸慝之鋒而沮其謀蘇憔悴之民而續其命者其勤尤至惟是都臺之擢則初至再至之勤固有以基之矣及奉璽書膺重寄益孜孜焉不遑寧處紀綱振肅設施精審激揚豫奪務有以協乎公論而厭服乎人心湖山千里之間民無弗受其賜於前兩政益有光焉聲實流聞無逺弗暨兹軒雖美顧豈公久居之地邪然公自受任以來於今亦三年矣所以端本澄源反觀內省精思熟慮以為發揮運用之地者鮮不於兹軒得之一旦去此而雍容廟堂之上固宜有不能忘情於兹軒者况乎諸君子之作事既詳於三至而推類以往莫不以無窮事業為公願之其意亦誠厚矣又豈公之所能忘哉欽順衰病空疏詞無足采幸嘗竊窺公所存之一二而知諸君子之所願於公者將必有徵也是以敬為之序而不辭七星文集序自昔擅名文苑者皆夙志早成博學多通之士夙志早成天也博學多通人也經天之精緯人之藴妙合而為文固宜遒麗瓌竒鏗鍧炳蔚可喜可愕而天下莫與之爭能然其於道有淺深則行之有近逺故有志於不朽者不以辨博髙天下為足恃必將深求斯道而載之以行庶幾仰協前聖而弗差俯俟來哲而無歉然亦希矣吾友劉雲表先生生而穎悟絶出方幼學把筆為文字語輒驚人川湧瀾翻雲蒸龍變有莫知其所以然者年益長學益博文益竒往往受知於名公巨人而其名遂聞天下天下之士莫不願從其遊行李東西爭先迎候質疑請益之外求其文者接踵先生舉欣然應之長篇短章人滿所欲濬長源於經史搜百氏之精英浩浩乎出之無窮恢恢乎其無所不有也然其沖懷逺度千古為期反約窮深惟日不足用能盡人情物理之變協是非取舍之公酌政體之變通判儒學之失得而一無所茍使知言之君子得而讀之其心將莫不灑然以為有合無疑夫才髙而無據則易淫學博而無統則寡要是雖其文之工妙有以震動一時然不旋踵而散亡磨滅以盡亦其理也其視先生之文可同日語哉先生早膺鄉薦竟不得志於春官年僅五旬忽焉長往懷竒器而弗試孜孜深造而不能無遺恨於所止也可不惜夫先生既卒故人厚者咸切傷悼且圖經理其遺文以傳㑹吉守任侯象之入朝錦衣指揮余君世臣首以為言侯曰是在我歸即謀於泰和令區君時行徵稿其家得記序等文十有八體凡幾百十首釐為若干卷刻之堅梨於是先生從子貞嗣子考與邦人士謀來謁余序夫有文若此當不假序以傳至於數君子樂善之誠尚文之美則非序無以見也抑先生平日涉歷既廣應酬亦多兹集所編惟據存稿四方人士之所得者或頗不在集中若其五七言古近體詩歌又皆編次未就將豈無君子兼收而併刻之以備一家言俾異時傳文苑者有足徵乎此又余之所不能忘言者也先生名鴻别號七星居士因以名其集七星本垇名在澄江之南一舍而逺劉氏居其上垂數百年世承宦學至故雲南憲僉公益顯憲僉剛稜嫉惡壁立千仭以鐵心為號而人莫不信今以鄉賢附祠學宫先生其季子云月湖文集序學莫先於明道也道茍明焉日新而不已則積之而為和順之德發之而為炳蔚之文措之而為正大光明之業由體達用沛然有餘蓋學之有得於心者然也然自孟子沒而聖學不傳千數百年之間道術四分五裂上焉者類以佛老之似亂孔孟之真下焉者記誦詞章而已惟漢之董子揚子唐之韓子宋之歐陽子頗皆號為知道然所見者大意而於精微之際容亦有未察焉故其著書立言所以闢異端扶世教淑人心雖未嘗不合於孔孟而弗精弗詳之病均有所不能免也求其克紹孔孟相傳之學粹然一出於正其惟濓洛關閩諸君子之於道也極無聲無臭之妙而不離乎日用之常窮天地萬物之逺而皆攝於方寸之地表裏洞徹左右具宜凡其形之於言筆之於書莫不明白而淵深縝密而通暢精粗隱顯一以貫之所謂語大天下莫能載語小天下莫能破斷非漢唐以來諸儒所可同年而語也今其遺書具在經生學士鮮不從事於其間其能有得於心與否徵諸文章事業固可槩見有如月湖先生豐城楊公可不謂之傑然者歟公夙有志識求道甚懇百家之籍無所不覽而一以六經為的凡辭說之出於諸君子者篤信而固守之精思而力踐之及其學成行尊遂為多士之所矜式士無遐邇皆知有楊月湖先生聞其名而不獲見者未嘗不以為私恨也公樂與人為善辨疑答問終日亹亹有以詩文請者亦欣然應之伸紙揮毫直寫其胸中之藴氣昌而詞達調髙而節和閎肆簡嚴雖或不同而事理物情往往曲盡蓋諸君子之權度在我其應用之弗差也固宜與夫似是而非詞深意淺者其相去奚啻十百也公所著有淨稿續稿遺稿四稿五稿六稿皆冠以月湖之號以欽順之嘗遍讀也因屬為之序欽順非知言者夫安能序公之文哉然獲從公游不為不久心誠好之亦自不能已於言也公登成化丁未進士第改翰林庶吉士擢纍南京禮部尚書今致仕家居尤著述不輟當積為後稿云後湖志後序金陵之有後湖其來尚矣後湖有庫宅中洲之爽塏以藏天下之圖籍則出我聖祖之神謀逺慮所以詒之萬世子孫者顧其地禁其事重其法久而益詳而紀載無文寧非缺典合州趙君惟賢以名進士擢南京户科給事中來蒞湖事爰始作志户部主事眉州張君濟寬相與參訂以成於是湖之源流庫之規制圖籍之目官職之守禁令之條莫不燦然可見趙君既徵月湖楊先生之序以冠於篇端矣及是始命工鋟梓圖永其傳乃持副本示余屬綴一言於其後欽順披閲之既竊以為斯志之作不徒然也自今以往有事於湖上者既得其所據以適夫損益之宜以謹厥藏將永永無敝縉紳君子有志於斯世者亦得有所考以知夫民生之庶其於圖惟殷阜容不既厥心乎蓋所書雖不出於一湖而其所關繫可謂逺且大矣以趙君之明達固宜惓惓於是也志凡六卷而附録詩文一卷讀之又可以想見湖中景物之勝樂近同於魚鳥憂逺繫於廟堂庶幾有若人焉亦可以想見其風采也於戲將欲奉延聖祖之德微斯人吾誰與歸庸書以為後序冷香塢韻語序蕭君時訓豫邑知名士也其清才健筆以續卷阿清廟之作乃其宜爾顧使之咏冷香於僻塢吾不知天之於吾時訓果何意邪然時訓懷竒而不售年且駸駸向晚其見於賦詠者宜必有怨懟不平之氣而塢中韻語吾乃得而遍觀之多至數十百首往往調髙而興逺語峻而節和深意所存付之識者而已豈其有見夫在外之適然者要不足以為損益而在我之浩然者雖當困窮之際處寂寞之濵亦無害其為自得邪以是槩之則時訓之賢於人也其亦逺矣夫以其才且賢如此於今猶未有所遇既非吾力所及吾安得不歸咎於天邪時訓固非怨天者吾乃為之歸咎於天是或一道庸書此於韻語之首知言者其折衷焉若其所取於冷香則題辭之自已出者已盡其說余無庸贅也西昌存古録序宋黃山谷先生嘗令吾邑邑有祠以祀先生在快閣西偏迄今三百餘年矣中間嘗一再廢輒有賢者為之復之𢎞治壬戌附祠之僧寺弗戒於火併祠毁焉滇南楊侯南金時為令喟曰兹吾責也亟以公牘白於部使者侍御王公哲少參王公綸憲僉王公啓言所當興復之狀與所以興復之方諸公咸韙之侍御公以謂寺因祠久祠以寺隘今兹之火先生其有靈哉遂檄侯規割寺基以𢎞其制侯奉若惟謹時適有良材當入於公者侯因取而用之祠故有祭田復經理其租入以為之助祠成而民不費一錢而其宏偉髙深率加於舊十六七新壇有泚遺像儼然凡君子小民所以尊仰先生之心於是無不慰愜鄉進士劉君鴻謂侯兹舉實關治化不有紀述來者曷徵乃具著其事之本末為書一編名曰西昌存古録而首之以贊詞傳序以概見先生平生終之以先生登臨原唱及後賢賡和之章以見先生之髙風逺韻有以歆動乎人人者如此至若祠址之圖祭田祭器之籍皆有繫於祠事而附以蘇東坡孤鴻之闋文信國漢節之章又義所當存者也侯取而夀諸梓將俾兹祠永永有徵既畢工屬欽順一言以為之引辭不獲命欽順竊聞孔子之作春秋有存古則幸之者有復古則喜之者蓋古制亡而天下之治日入於厖雜有能存之將亡之際復之既亡之餘世道實為有賴夫安得不為之喜且幸哉今一祠之復其事雖小而善政得民終有不可諼者固於是乎在後之來者進拜於祠下退而閲乎是編考其時論其世其能無所感乎即有感焉必將求先生之所以為令者以加乎民夫然後知吾楊侯之所存有不在於香火籩豆之末者矣蓋先生為令慈祥豈弟民不忍欺而其詞章操行亦皆有過人者皆可為後人師法跡塵心逺超然獨得哦其詩尚可以想見其為人兹其祠之所以隨廢而隨復也楊侯政崇易簡不一毫擾民蓋於先生有合而好古崇正尤汲汲焉其所欲存而思以復之者殆未可一言盡升階漸逵方自兹始夫安知將來所録不有富於是編者乎南谷萃英録序邑灌溪康君士杜家溫而質美雖好文墨其平生所得士夫君子之作事别為卷為詩若文卷數十首蓋痛其父之早世則求哀挽之什以發其幽光卷成名曰懷椿樂其母之夀康則求頌美之辭以章其完節卷成名曰貞夀即南谷之幽曠構秋芳亭以寄傲於其間叢桂交香萬松環䕃有足以樂其志者則又托諸賦詠之工以寫其優游之適而名其卷為秋芳亭紀勝顧其篇章既富恐將來不能無散逸之患也乃手自輯録詩文各從其類合為一編而凡家乘之所遺贈遺之所及及諸為其故嬪有作者皆以附焉此南谷萃英録之所以名也録成將鋟諸梓以傳示後人間造豫里居請為之序其曽祖母余之曾祖姑也中表之誼蓋不容辭昔人有言文章不朽之盛事然人之好之者鮮矣雖則衣纓之胄鄉曲之豪類營營於貨利之圖聲色之殉氣昏而志奪夫安知文墨之為貴乎此其人固無足論其或有好之者似能審於清濁之辨而恥於雷同之歸矣然不過以眩一時之耳目夷考其存心制行則與夫文之所謂常不免於背馳致令作者往往䝉失言之譏而其篇章所存曽未及終其身率已為覆瓿之具斯又重可嘆也君生質既美且嘗從事問學孝弟忠信之大節恆謹修之而罔敢或踰固宜為君子之所嘉與雄詞傑句珠明玉潤所以光揚其父母而增重其平生者豈徒好尚之篤以致之哉亦夫人秉彛好德之公也然則録始自今行之宜逺其後人相與世守之無失君其不永有聞乎先德録序為人子者於其先人之德汲汲焉圖永其傳豈惟終慕之篤有弗容已者哉明示後世又所以為教也詩云雖無老成人尚有典刑蓋典籍之所存即典刑之所在後之人得有所考以知夫先德之懿將豈無感發興起而象其賢者乎夫如是則吾親雖沒而其精神志意有不與之俱泯者矣宜乎仁人孝子以為當務而不敢忽也歟吾友羅君惟升其有見於此矣此先德録之所為作也惟升先君子西畦先生學行髙古屢試場屋輒不售晚以國子生釋褐通判廣西之太平又不久於其位而卒其卒也學士東白張先生銘其藏侍讀南峰徐先生表其墓大司成氷玉羅先生為序羣賢哀挽之詩凡先生之所以得於天成於學修諸身施之家達於鄉黨信於朋友而宜於小民者皆不一書蓋莫不稱其君子人也後以惟升考最追贈承德郎母贈安人袁氏性秉柔嘉婦道母儀皆足為閨門軌範亦具見於秋官主事劉君所著墓銘德有明徵詞無溢美斯其可傳也已惟升於是合凡行狀挽章祭文等以為是編而鋟梓以傳久逺終慕之孝不衰垂裕之仁斯在殆匪常情之所及哉惟升起己未進士出宰新㑹入評大理以奏疏論救大臣之枉忤權璫見斥再起知台郡遷廣東左參政所至皆有政聲休不待年風節殊偉蓋傳先生之學而光大之者也然則凡為其後人者其則固不逺矣尚思所以增光是録也哉惟升間命其子邑庠生平奉以示余因為書其首簡稼村類稿後序欽順嘗聞諸月湖楊先生宋之季世豐城有王義山號稼村者以文學名當時其所著有稼村類稿文詞良妙昔嘗見寫本於其族孫處顧其傳之不廣為可惜也余聞先生言然每以未獲一觀為歉一日稼村七世從孫冠以先生命奉所謂稼村類稿來示余得之甚喜疾讀一過如驟入武庫劍㦸森羅舉目應接不暇終卷復細讀不忍釋手蓋其才髙學博而筆鋒遒徑由當時之途轍以望古作者之門牆既及其門且駸駸然欲升其堂入其室也其所上廷對最為醇深有經世宰物之嘉猷有扶顛持危之至計其他作往往激詭縱恣開闔不常而未嘗不歸宿於義理其為儷語組織尤工誠可謂一時之傑作已時冠方謀鋟梓而先生已許為之序復請余贊以一言余曰子誠鋟梓以廣其傳於四方人之知而好之將必有甚於余者夫安用余言之贊矧余言不腆抑安能增重斯文也冠竟不余釋辭而去者數四而復來曰鋟梓已完工方束手以俟竊惟斯文固不假余言之贊然其湮晦不顯亦且二百餘年乃今一旦顯行於時雖玉光劍氣理不終於埋伏而識者之遇要為非偶然也然則非先生不能識斯文之妙非冠不能識先生之意以永斯文之傳是其可以不書庸書於卷末北上稿序北上稿者故大司成氷玉先生羅公之所著也成化庚子公以司經洗馬與故太師李文正公同被簡命考應天鄉試相期以得士為務禁不作詩事既成乃隨事有作逮還朝陛見畢遂裒集以為此稿而以北上名之蓋首尾僅餘四旬所得篇章凡百三十有二可謂富矣其第五子鐩今為南京刑部檢校以刻於梓而請序於余惟公與家父封君鄉同升平生以道義相尚交莫逆父執之尊製作之美後生小子敢以不腆之辭輒附名於其上哉顧刑檢之請甚勤有不容以固辭者因憶早嵗嘗聞家君之教以謂公之為文不屑屑於造語主於理明而意勝議論宏闊而波瀾老成識者尚之公之為學一宗程朱務明諸心以為發揮事業之本雖泛覽載籍而不為徒博公之為人寬厚樂善有休休有容之量如使得行其志雖儷美於鄉先正楊文貞王文端二公可也欽順恆謹識之及免先夫人之喪適公里居方獲一再進見坐春風而飲和氣為之酣暢終日而不能去也然以還朝之迫領教弗詳每用為憾蓋别去數年而公遂下世矣乃今得兹帙而觀之讀其長篇短章類若衝口而出信筆而成無苦心極力之態然而鋪張物理模寫人情無不曲盡非所謂理明而意勝者乎三復以還於其學問之所該精神之所契亦可以概見矣公在憲廟初賜進士及第歷官編修修撰洗馬調南京禮部員外郎升福建提學副使擢南京國子監祭酒為祭酒三載考績北上道感河魚之疾遂懇乞致仕而歸其調郎曹蓋鄉人有李孜省者以左道幸慊公不與還往隂中傷之孜省既敗㑹兩京連缺祭酒僉謂無易公者而公雅不為當軸者所喜猶歷外服數年乃見擢然公於升沈之際出處之間確然惟義命之安而未嘗少有怨天尤人之意此其所自得必有過乎人者矣孟子曰誦其詩讀其書不知其人可乎是以論其世也公平生著述甚富晚遭回祿稿皆散亡惟此帙幸存計才百之一二刑檢兄弟方悉心搜訪異時就緒當具刻之此特為之權輿耳嗚呼公之不朽將不有賴於是也夫整菴存稿卷八
