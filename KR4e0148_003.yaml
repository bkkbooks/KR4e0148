body:
  text: 整菴存稿卷三明羅欽順撰序一十五首送岑德充歸瓊山序瓊山岑德充𢎞治乙卯以詩經領廣東鄉薦今年上春官不第卒業成均得告將南歸展省太史蔣先生敬之屬余贈之言先生與余皆故少保丘文莊公門人而德充公子壻也推敬愛公之意以及吾德充其贈言也固宜然先生受公之知尤深而與德充遊且久先生有言德充無弗信也而臨别之贈顧以屬我豈以余言為能新德充之聽也哉且文莊公文學行誼師表當時髙風逺韻漸被來世德充早以美材處二室誠親熏而炙之計其所得殆非他及門者可比固將駸駸于髙大而為爵祿功名所迫逐而不置又奚取于余言哉况余雖心厚德充然從遊之日淺其深言之歟鄙鈍之質不足以自徵其淺言之歟又非先生所以見屬之意也余將何以為言哉雖然言惟其當不必自其口出可也曽子有言尊其所聞則髙明矣行其所知則光大矣德充平日之所聞知不于其師則于其友于其淺者固有所不屑于其深者必無所不至也顧所以尊而行之者果何如耶歸矣懋哉必其所立有在于爵祿功名之外而後無負乎師友淵源之懿且有以為之光矣送大尹胡君濟時還任錢塘序邑附㑹府半天下之途所由使軺日往來如織加以習俗傾險又多靡麗可欲之玩能使人目眩而志移為令于此不亟不徐不震不動期月而聲譽起三年而事功成書所謂有猷有為有守者此其人也乃今于錢塘令胡君濟時見之夫猷為所以應務也操守所以立本也三者皆為政所急其或此長彼短鮮不僨事而厲民必兼有之乃可貴也然非知道之君子其能兼是三者幾希何哉蓋必窮事物之理通古今之變然後可以擴充其猷為必明義利之分秉固窮之節然後可以堅定其操守此君子所以貴乎博學而尚志也學不出乎記誦詞章之外則于應務宜有所不周志不離乎富貴利達之間則于立本宜有所不屑是何望其能有以自見于世也哉如吾濟時其可為君子人已蓋觀于其政而知其學為有用也濟時比以其績來獻天官書上考循例還之錢塘鄉郡諸大夫士請余言以贈夫贈者有所增益之謂也濟時以名進士出宰大邑甫及三年而功效已焯焯如此吾方歆羡之不暇何增益之能為雖然蓋嘗聞聖賢之訓矣曰仕而優則學曰官怠于宦成兹亦濟時之所共聞也夫仕優而學不厭者所以為後日之資宦成而志不怠者所以保前日之美濟時方將乘堅䇿肥以翺翔萬里得無加之意乎尚克紹厥聞以勸以戒而勿忽焉夫何逺之不到也家弟允迪守官于杭得朝夕繼見幸以兹言相與切磋之贈太守張公之任吉安序夫分符佩印有數百里之地而君之所以正不正齊不齊俾四民安其居庶事得其理趨走之吏罔不祇率厥職以交贊其成功感化固繫于躬行抑亦仰視朝廷福威豫奪之權以為進退推移之用也雖然權以濟務常戒于下移躬行以立本必始于慎獨二者固常相須未有本亂而末治者或者于隱微之地檢律稍踈以為無足深慮曽不知姦人之隂圗密伺常思投閒以逞也其謀幸而一遂則吾福威豫奪之用殆不能無所齟齬由是四分五裂弊端百出乃不得已而甘為一切茍簡姑息之治是以政多龎雜而民有不勝其病者焉嗚呼焉有仁人在位而可以病民也今年七月錢塘張公孟端由前青州太守起復改任吉安吉安江右劇郡也領邑惟九民户多至數十萬財賦之入往往倍于鄰封朝廷不輕以授人亦明矣乃今以授之公欽順聞諸縉紳之知公者謂公篤學好古于世味淡然顧嘗慨然有濟時利物之志又謂公青州之政公平縝密民懷其惠吏畏其威雖已去位而人猶思之卓然今之良守也噫公之名實見推于縉紳者如此信乎賢逺于人然則銓曹之所薦聞天子之所簡命其果不輕也哉今也往蒞吾邦邦人士女方日徯朱轓皂蓋于螺川鷺渚之濱振久斁之頽綱昭躬行之實德福威豫奪風行草偃使善者有所恃而益勤惡者有所畏而不敢為厥有恫瘝一朝脫去而免于呻吟愁嘆之苦不于公有望乎凡朝紳之吉産者亦皆以是望公于其行也俾欽順引而伸之以為公贈欽順不敏固知公之優于是也而復效其愚見者豈謂果能有所增益于髙明也哉送通判劉君復任杭郡序杭為浙江三司理所中官郎御史銜王命懷公牒以蒞事于浙省往往建牙分司于杭故杭之務視浙中諸郡為獨繁守倅恆日不暇給且其勢無専決之便而所見又多難合之情彌綸稍踈則四面之責交至蓋其難為如此而吾郡劉君兆文倅杭獨以勤慎詳敏著名㑹詔有司舉下僚才行卓異堪任京職者浙藩遂以君應詔詔初下時吾郡士夫嘗相與物色下僚中求吾郡人之可舉者得兆文皆曰試以觀舉者之得失既而藩司薦章至果兆文也則又相與言曰古所謂公無私者其諸兆文今日之舉乎方日徯其升于王朝而兆文適以三年之績來獻吏部考其績果最然未遽陟也復還之杭夫陟明以三考固唐虞之法然當其時未必固執常法以待天下非常之士也蓋所謂神而明之存乎其人自崔裴率意改為以人徇法而抑揚髙下漸失其序其流弊至于今未除也雖有豪傑之資負挾器能一沈下僚卒無以自振使其英華果鋭之氣恆消沮于簿書期㑹奔走迎送之間是可惜也以此而望庶事修天下治豈不難哉今天子勵精圗治深惟變通之宜明詔一下有志之士無不競勸而權衡人物者方將破常格拔竒才布列庶位以仰承德意然則兆文雖未遽陟吾固知其不久淹于杭也雖然在吾黨自處顧當以髙下遲速置之意度中耶杭固不得久淹兆文如兆文汲汲以去杭為快則所以自任者亦異乎君子之道矣吾又知兆文當欣然而往俯焉益懋其所有事道久而益信名久而益彰可以任重道逺無疑也兆文還任將假道金陵拜其兄南臺侍御君侍御君賢者也怡怡之際試出吾言示之其必以為得切切偲偲之義乎送四川按察司副使尹君奉敕鎮瀘序瀘為川蜀南門其外皆剛夷惡獠難安而易動朝廷于是特置按察副使一員加賜璽書俾之飭戎兵明法令以控制其地環瀘千里皆在其掌握中蓋一方安危所寄也然必得亷重剛介達于人情物理者乃能使其人畏威懷德祗若王度以各有寧宇不然彼將肆無忌憚失禮而犯義或自相讐賊至紛結不可解紓而蜀以多事矣今年秋前奉璽書者他徙詔以刑部郎中尹君孔彰為四川按察副使往蒞其任君以進士官刑部凡十餘年精白一心威富兩訖聲實焯焯著于時㑹詔舉賢才少司寇屠公奏曰臣備員卿亞當舉堪任方面者竊惟臣屬雲南清吏司郎中尹嘉言處繁劇之司而斷無留獄秉固執之操而積有年勞臣竊以為於任方面無忝及是命君子莫不以為宜余與君同鄉而君實先進雅不余弱辱相與忘年蓋嘗語及立身行已之方君曰所貴者始終一節爾有初無終厚自待者不為余竊謂其言可以厲鄙夫敦僞俗充其志也其於任重而道逺豈不綽綽然有餘裕哉于是卿大夫士之同鄉者屬余言以為贈余聞先王之制詳內而略外聖人之訓悅近以來逺蓋實德有以及人則風聲自然動物法設而不用令出而不違而所謂戎兵者特為萬一之備而已其或詳略失宜先後無序惟臨之以法劫之以威以求率服之功未有能濟者也以君老成練達奚待余言蓋頌不廢規斯贈言之體且令後來之頌君者將考信于余言也君方便道還家獲拜尊兄宫保先生于澄江之上惇友于之樂慰契濶之懷必有逺猷以贊長䇿區區常談將無以為覆瓿之用乎送大尹蕭君之任江都序國朝建官圗治於縣令之選最嚴非發身科貢兩途雖下縣不以輕畀凡自他途進者間有循資序稍入優品而卒不得為令豈不以令者百里之民命所寄必得通經學古之士然後知所以教養之方所謂君子學道則愛人也而縣令之中選自進士科者特䝉異視其褒揚登進恩典視舉人輩恆優又豈不以進士者天子之所親䇿拔其魁然傑然者于羣衆之中固將以大任付焉非徒責其小成而已也夫以朝廷所以嚴縣令之選如此所以優進士之為令者又如此為令者宜何如其圗惟報稱也時俗所務在于謹送迎精簿書趂期㑹而于民之痛癢靡切于身俗之迷溺無改其舊嗚呼其無乃非朝廷所以嚴重優厚之意乎吾友蕭君以仁世其從祖太子少師尚約先生家學講明踐履之日久其為人純實豈弟有愛人之心由己未進士選為揚之江都令吾以江都之民庶幾䝉被君子之澤矣顧惟其地四通八達賓客之往來者踵常相錯於途簿書期㑹之瑣瑣未論也如以仁之存心將不屑乎時俗所務然而一送一迎之失固足以速謗而招尤欲安其位以行其志得乎夫天下固有事同而趣異者顧所用心何如耳吾欲安于其位得行其志以澤乎民而非以要譽也則夫送往迎來亦禮之所不容廢者而奚以不屑為哉大凡人之才性必有所長茍非聖人寧無不足要在勉強而已故曰勇猛剛強者戒于大暴仁愛溫良者戒于無斷湛靜安舒者戒于後時廣心浩大者戒于遺忘賢如以仁亦有當戒者乎誠不恃其所長務兼衆美以為用其不至于大任者未之有也以仁之官鄉邑故事當有文字為贈謂余職載筆不容以他讓余豈能文者哉姑以達諸君之意而已送大行人歐陽君序天下之民有四士其一焉士亦民耳而獨貴于農工商者命于天者厚修諸已者備也天之生此民也降衷惟均然而往往擢孤秀于羣庸寓獨靈于衆塞故其知覺特異器能亦殊而所業者有以極天下之精所任者有以極天下之大其于耕稼之勞鄙賤之事非徒不屑亦所不暇非徒不暇正亦不必親也夫在彼者皆我所不為在我者皆彼所不能豈不有命存乎其間哉受天命以為士然而自修之不力亦將無以異于蚩蚩者矣夫禮以立其本義以達其用此士之所當自力者也故學所以學此也仕所以行此也始于言行之常而極于神化之妙時而達焉則彼三民者皆將賴我以生而不得不為吾役時而窮焉則美實之在我者固無損敬愛之得于人者亦無間也夫安得不貴乎今夫褒衣峩冠誦讀詩書操觚染翰而能為文字者世之所謂士也其名是矣夷考其行或有農工商所不為然方竊其名以進取下者得丞簿髙者至公卿役天下之農工商以養其身以植其家而于此三民者曽靡絲毫之益其不為此三民所夷視者鮮矣名貴而實賤豈不大可羞哉豈不有負于天之所厚也哉吾為此懼蓋常俯焉日有孳孳以從事于禮義而未能也有能從事于斯者固吾所樂交以求輔焉吾邑歐陽從龍英年美質學博而才充其存心制行皆自期于古人居常慨然有濟時澤物之念此真吾所樂交者既舉進士擢行人然局于其職不得有所施設兹者奉使遼藩水行且萬里見聞之充拓諏謀之周咨其所得當自此益富異時所就其可量哉故于其行也相與極論為士之道以附贈言之義君方便道過家省侍二親稱夀之暇試以余言為尊君太守先生誦之亦足以知君之取友有非善柔便佞者矣贈僉憲姚君提學湖廣序國朝學校之設在洪武初已大備其以提刑提學則始自正統間或副或僉初無常官惟上所命提刑主于推鞫選授之際率以其才提學主于化導非學有本原行可師法欲其振起羣士以進進于聖賢之學而收作人之功蓋亦難矣嗟夫庠序之士日呻其占畢至于飽經飫史著為文字粗有條理可觀輒悻悻自負以謂其學巳至而孰知其未能無愧于聖賢之學邪蓋吾嘗試求之姑未論其逺且大者其孝弟忠信見稱于宗族鄉黨要亦未可多得至其所行與其所學常背而馳者則不幸屢有見焉其記誦雖多詞藻雖麗而根本固苶然矣見之于用果能有益于天下國家也耶天下之大非無豪傑然而待教以興者恆多方今振起之任賴有賢提學耳夫先其本後其末賢者之道固然于其本或不究心末雖詳奚益此余于姚君秀夫之行所以不能已于言也君世家信之貴溪余嘗聞其先君子以經術發身纍官陜西提刑僉事至君克世其業以顯而知其學為有原又嘗聞君治水浙西于水利十得七八在刑部尤以詳慎著名而知其學為有用舉進士垂二十年官始再轉厯官凡五考而先廬不益一椽于是又知其行為有恆也以其學行之懿如此其為羣士之表率也固宜故其擢憲僉提學湖廣知者皆曰是必能振起羣士以進進于聖賢之學不徒以程試無失為能而已夫人相與稱君所能固在此而不在彼君兹往蒞厥職能不究心于其本哉語曰可與言而不與之言失人余愚無識亦非能言者而意之所至有不能默矧重以程君廷臣楊君文淵之請于是乎言送寶應縣丞李君序丞與令均受百里之寄者也其位固有等差然為之茍得其道則民之父母之也一而已矣夫能使其民親之如父母其聲實之美雖髙官厚祿者亦或有所不逮孰有以其丞而輕視之者乎是知人之輕重不在于官而官之輕重實繫乎人也審矣故知道之君子未嘗茍慕乎外至其所以自任則不敢不力焉吾友李君廷模夙承家學厲志研鑽其經術明而行修謹以上舍生入選得揚之寶應丞于其素所自許與朋友之所期待皆不負也而其言曰位之髙下非我所能為丞之輕重在我所自致我其敢不勉圗祗遹我祖以為吾丞重哉其言如此是其學足以知道而勇于自任者也蓋廷模之大父信圭先生嘗為清河令以亷公豈弟協于其民秩滿擢知蘄州清河之民皇皇焉如赤子之失慈母耆老數百人相與走伏闕下乞以還當是時天下皆知李清河之為良吏也後先生超升處州太守然未久遂卒故其名特著于清河至于今清河之老長猶稱頌不忘也使廷模一由先生之道以惠寶應之民亷而無欲也公而無私也豈弟而不為殘賊也則民之所以歸心廷模者將何以異于清河之民之愛戴乃祖也哉夫得民心者仁之功繩祖武者孝之實仁且孝君子之道備矣夫以君子之道自任厚自待者也以君子之道望諸人待其人之厚者也廷模誠厚自待吾詎敢待之以薄也乎故因鄉郡諸君子屬贈言遂書此以申愛助之意送武平掌教段君之任序余家居績學時與蕭君時堅數往還相與下上其議論志同嚮道同歸久而益孚皆自以為莫逆也既又因時堅以交段君廷廣廷廣學優而識正文名勃勃為儕輩所推而言動皆依于禮余益敬重其為人三人者時堅最先領鄉薦廷廣視余稍後今年春余忝預禮部同考官二君皆在試中皆治尚書正余所考者余意必得二君置諸髙第以竊知人之名比填乙榜見廷廣名氏為之惘然自失猶冀得時堅一人尚可少慰鄙心而時堅竟亦不第余竊自咎以數十年相知之深而不能識拔于一旦此則不明之過有不可掩者敢謂諸君得失有命乎余既事寧家二君辱來過相勞苦如平日幾微怨懟之意不見于色辭余方以失人為愧觀二君之所自待與所以待余者又不能不為之喜然則余三人者之相交豈茍然哉廷廣竟以例拘授汀之武平教諭今例以乙榜司教者茍有成績不俟秩滿得再預禮部試則余雖失廷廣當終為明主司所得夫何慊乎廷廣之行時堅謂余宜有言贈顧余非能言者試舉尚書一二語為廷廣申誦之舜命契曰敬敷五教在寬此萬世為教者之則也穆王之命君牙則曰爾身克正罔敢弗正此萬世為教者之本也身之克正敷教之克敬且寬焉而人不相與化服以歸于中正而成其可用之材者未之有也然舜之所謂寬本欲因其人之材質所宜不強其所未及而優遊以俟其化蓋不舍乎規矩自從容于規矩之中豈如今之所謂寬者弛銜縱勒任其放逸自恣遂至于為所不為也哉廷廣之先祖翰檢公嘗為太學師學行表表可述今東平郡博廷舉于廷廣為從兄亦能以師道自持嗣美聫芳在廷廣必無難者余尚有以考其成焉送福建左參政劉君之任序國家承平日久文恬武嬉相安于無事一旦醜虜伺隙侵擾西鄙邉臣失律遂致猖獗屬天象亦屢示警聖天子赫然震動更用二三大臣以貞百度張皇威武命將徂征屢敕有司繕塞垣峙芻粟務為經久之計于時更張廢置幾務實繁每有大政輒令廷議吾友劉君子賢以刑科都給事中與焉方其事端既發互相觀望莫肯折衷君正色昌言無所顧忌援引古義揆度時宜利害是非必窮極所見乃已而皆不謬于公論二三元老樂得其助益相與敬重之間有不合亦稱君為難得破淺謀而𢎞逺略飭內治而嚴外攘固本于皇上之克明大臣之能任而議論之益在君安可掩哉君起家進士擢兵科給事中即有名厯左右至都更踐四科于今十有五年矣以久次當遷遷福建左參政參政秩三品位髙而祿厚在省郎郡守極為美遷而人猶有為君不滿者望實浮也然余以謂今之庶官在內莫要于臺諫在外莫尊于藩臬要者其機足以𢎞濟尊者其勢得以専行有𢎞濟之幾而重于顧忌有専行之勢而樂于因循是皆容身保位之徒非有忠君愛國之實者也以君昔者之居要其所表見已彰彰如此則今日之居尊將不大有所建明哉世之樂因循者類以文法為解夫朝廷之法雖密而所以潤澤乎其間者未嘗不付諸人茍一惟文法是拘而無能潤澤則夫守文奉法夫人皆可又奚必窮經學古出自髙科者然後為足用哉君識敏而學博氣充而才贍吾固知其將來所建明必有異于尋常者矣余與君素辱愛厚有切磨之益于其行也義不容無言然贈人以言其失有二以頌或失于諛以規或失于激不諛不激余竊自謂庶幾知言如君不識以為然乎否也送長史范君詩序昔賈誼以洛陽年少抱負竒才慨然有志于當世用吳公之薦獲事文帝屢有建明為絳灌之屬所抑出為長沙王太傅其用不究君子惜之然誼才髙而量褊官既左遷恆鬱鬱不自得坐此促其天年使其能養之以和平克至于夀考安知不卒究其用也吾友范君廷和自弱冠逰鄉校即負才名既舉進士屬邉事孔棘遂慷慨上疏條陳利害方略纍千百言已而除翰林檢討以經術入侍涇王府開遷右長史或謂君所言事大臣有不樂者故有是除余蓋不敢信其必然獨喜君樂居其職無鬱鬱之意寅恭朝夕輔導有方綜攝府事無巨細皆合權度收闊步而矩折斂逸氣以內充由是觀之誼之才略固優而其識量視君或不逮矣君之為人不亦有足尚哉夫建矦樹屏所以為宗社無窮計然宗社之固其本在于得民心今日封建之制有國而無民雖不得與之聚其所欲違其所惡第能勿擾之其為賜也亦已厚矣萬一有擾之者豈惟吾民告病于宗社之本何如哉此相之責也才如范君其必有以處此矣君兹以職事侍王即封于沂與君同舉于鄉而胥㑹于都下者凡十有一人相與醵餞于余侍御宗周之宅即席人賦一詩以贈而速余為序余觀諸君之詩所以詠歌其才美鋪張其職業而道離合之感寫繾綣之情者亦既備矣余不佞念才美如君固吾同舉之光故復詳著于篇而申之以得民心之說以冠于羣玉之首云送蜀府長史李君序國家以眀德當天誕隆固命卜年卜世不啻周漢之長而所以維丕基綿令緒亦惟封建是賴蓋太祖之所經理太宗之所損益宏規逺慮與周漢大約相同至于體統之尊家法之正則有非漢所能及者是故受社啓封千里承式展親秉德奕葉有聞振卓爾之風裕為善之樂者豈直一河間東平而已哉于戲盛矣王國文武惟百左右長史實惟大僚耳目股肱百責斯萃故其選授之際恆慎而不輕也大抵不以應變成務為難而以正身率物為貴夫身正則左右畢正率衆正以事君君其有不正乎一正其君厥邦時叙所以為王室重于此乎在矣于戲是其選也可不慎哉比屬府右長史員缺吏部請于上以南京國子學録李君介夫補焉蓋慎選也自洪武肇封以迄于今建國之大僅數十而蜀最于天下有聞蜀有國且數傳矣令德承承而先獻王最有聞于天下以蜀之大先獻之賢繫觀聽之日不淺象賢保大在嗣王固克自盡而所以彌縫引翼以歸之正者非相其誰賴哉介夫智足以燭幾敏足以適道其佐教國子也以妙年著老成之稱遂達于當途以有兹擢夫國有常度行其所無事則不愆心有同然動之以至誠則丕應此率物之要成務之方相之所宜既厥心者也以介夫之智且敏又何難焉余蒞南雍方喜得介夫之助不謂遽舍我而去也臨别惘然如有所失因其寮友諸君子求言為贈遂不復以辭贈按察僉事翁君之任廣西序按察法官也法行于吏而亷平之政修焉法行于民而姦宄之徒戢焉其有禆于治不小也秩凡三等而權任惟均凡章疏文移皆得専達于朝廷直施于郡邑其勢之便任之専故法之行如風之靡草無敢不率其或有所不行非法之弊弊存其人焉耳然余獨念夫法有所不可盡者于翁君朝梁往僉廣西憲事試一言之廣之西重山復嶂林深而箐密溪洞隱曲綿亘數百千里多為猺獞之所盤據而編氓之逋逃者亦往往藪焉蓋不惟羣蠻之性好惡不常而編氓亦無定志好則來役惡則之蠻此法有所不可盡者一也其地去京師既逺郡邑所在大抵蕭條敻僻凡沿牒而至者非必皆德與才之選也彼其心固有所不樂矣第猶顧戀功名未忍決肆茍其惡不至于大為民病其能僅足以守乎官常固宜矜恤保持遂其長而略其短則亦無敢不勵茍繩以一切之法而小小出入或不能容以彼不樂之心將遂肆焉為一飽之營以決去計而所以病吾民者豈其微哉此法有所不可盡者二也夫官以法名而法有不可盡者如此則將何以處之毋亦公恕之是務乎公以服吏民之心而嚴其在己恕以通吏民之情而盡其在人夫如是雖不盡法法固未嘗廢也將使良吏日多姦民日逺羣蠻聞風亦將革心而向化豈不為賢按察哉今之按察廣西者固皆通材偉器宜于吏民而吾翁君在大理日久體公行恕克既厥心亦既孚于上下今之往與其同官諸君子師師不怠並流賢譽茲固可預占哉大凡同官同年皆有切磋相成之義翁君之之任也余固欲有言而侍御鄭君禹範秋官劉君仲賢何君廷佩又以贈言見屬誠不自知其不敏輒以是言于翁君君其將有合也送太守髙君之任九江序兩京刑部並置十有三司廣東司所治俱稱繁劇非識之敏才之優為之鮮克以有聲也余來南京則聞刑部郎中髙君肅正名君時蒞廣東司凡司之由獄無不立斷其操持克謹又善處寮友之際故名稱籍甚一時所事大司寇烏程閔公浮梁戴公旴𣅿陳公皆時之巨髦而莫不禮重君且屬以通閲諸司奏牘奏上無弗允者同官多推服以為不及今年夏以勞以望爰被推薦擢知九江其同年友鄧君汝中輩喜其名位方進將益𢎞厥施也相與徵余文送之昔唐陸傪由祠部員外郎出刺歙州昌黎韓愈嘗送以詩而序其所以詩之意以為陸君之道行乎朝廷則天下望其賜刺一州則専而不能咸故其去也惜之者至于齎咨涕洟而不能已愚謂昌黎是言直推重陸君云耳槩以近代官人之法要為未盡夫天下之事惟宰輔得以行之臺諫得以言之外此雖尊居卿佐猶各局于一職欲咸其澤于天下未可得也而宰輔之位又豈郎官所得而驟躋哉夫登用賢才固不當屑屑于資格然試功之審者乃所以養其望而服天下之心而其人更厯既多則于運大濟艱將沛然而無不利傪果賢士足勝大任一試以及民之功奚不可哉如是而齎咨涕洟以為不當去蓋亦過矣今髙君之賢視陸君未知孰先孰後然其出知九江僚友皆為之喜者以君才志得大郡而治之肅羣吏以阜蒸民運訏謨而迪嘉績美實茂著大任攸階則今日之専固異日之咸也夫安得而不喜哉抑傪之事功未有書于史冊其名垂至于今者直以昌黎之文耳余文不及昌黎未足以重君于天下後世要之史冊之光君必當有以自致以大慰僚友之望也夫整菴存稿卷三
