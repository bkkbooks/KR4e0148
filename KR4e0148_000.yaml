body:
  text: 整菴存稿目録别集類五明卷一記卷二記卷三序卷四序卷五序卷六序卷七序卷八序卷九序卷十疏卷十一題跋銘贊傳卷十二墓表墓碑墓碣卷十三墓志銘卷十四行述墓銘卷十五祭文卷十六五言古詩七言古詩五言律詩卷十七五言排律七言律詩卷十八七言律詩卷十九七言律詩七言排律歌卷二十七言絶句小詞臣等謹案整菴存稿二十卷明羅欽順撰欽順字允升泰和人𢎞治癸丑進士第三人及第厯官禮部尚書乞歸以吏部尚書召再辭許致仕諡文莊事迹具明史儒林傳欽順平生專力於窮理格物之學而力斥王守仁講良知之非其大旨具見所作困知記中至詞章之事非其所好選録家亦罕及之其弟欽藹作儀訓録嘗稱欽順於應酬文字辭謝居多下筆稿成未嘗自是舊稿盈笥晚年手自芟存餘悉焚去謂二子曰此等文字世間不少慎勿出以示人姑留自觀可也其欿然不自滿足如此然集中所作雖境地稍平而典雅醇正猶未失成𢎞以來舊格詩亦不腐不率絶無擊壤打油之習蓋由其學問純粹心胸髙曠故能説理明透無往不流露性情在講學諸人中固可稱卓然質有其文者也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e7fc436a0409cb504593ff2c0e0b57547aad654ba142ac7d260b8fc6547e709d
