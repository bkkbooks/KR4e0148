body:
  text: 整菴存稿卷十三明羅欽順撰墓志銘一十四首中順大夫南京太常寺少卿劉公墓志銘正德九年夏南京太常寺少卿劉公以疾求致仕優詔賜允既還里居以其年十月十二日卒于正寢享年六十有三諸孤夀等將以某年某月某日葬公某里某山之原乃奉翰林庶吉士尹君襄所述行狀走數千里來拜余請銘余與公同官南京有年晚辱同事不可謂不知公也銘安得辭按狀公諱稱字務教別號拙菴系出漢長沙定王之後世家永新城北曽祖諱元傑贈工部右侍郎兼翰林院學士妣歐陽氏贈淑人祖諱髦鄉舉易魁隱居教授學者稱為石潭先生封翰林院編修贈官如曽祖妣楊氏贈淑人留氏封太淑人考諱定之纍官禮部左侍郎兼翰林院學士入內閣典機務卒贈禮部尚書諡文安妣賀氏張氏贈封俱淑人公賀淑人所生文安第三子也成化壬辰以任子授中書舍人滿九載升大理寺副仍掌中書事又四年升南京尚寶司丞丁張淑人憂去位服除升尚寶卿又八年遭賊瑾盜權變亂任子成法或相先以賂得免公誼不肯遂罷歸歸逾年賊瑾誅死乃還公前官滿考遂有太常之擢授階中順大夫比其致仕僅亦踰年爾公祖父皆名重天下而公天資純朴守其家訓惟謹歷官四十餘年寅畏小心未嘗有過其家居每夙興輒詣祠堂焚香展拜已則就省張淑人安否遇有疾必躬侍湯藥不離左右及其卒也執喪甚哀而禮亦稱之接人謙厚質直不為矯飾其言若不出口至論先朝典故古今人物出處則屑飛繩貫終日無倦公退常博覽載籍吟詩合律作字雖倉卒無一筆茍士夫之論皆以為能世其家云配廬陵胡氏封宜人內助有方閨門整肅子男四長夀國子生次福富尚女四嫁賀柄賀寀蕭應寵蕭湘孫男七女四凡狀所述與余所以知公者皆同余為之銘宜也銘曰石潭之孫文安之子祖父高明難乎其似似之惟有有行有文家聲載延有馥其芬優遊兩京位登四品逾六首丘知幾則敏惟終之令于始彌光遺基有付亦曰肯堂南京戶科給事中劉君墓志銘君姓劉氏諱紘字景瞻吉之安福人漢長沙定王子安成侯蒼之裔其先居湯村君高祖敦復始徙今葛洲再世得忠愍公球以大節聞天下而族姓益顯及君為給事中於南京戶科從子兵科給事中持美淮安知府持慶又同時起聲烈蓋其盛如此君既居言路與諸同官一心多所建明如論竇給事不宜深罪章實君具草尤有關係又往往獨言戶科事言皆溫厚而平正可據以行正德壬申六月忽被錦衣逮先時君以職事入朝道淮隂有巨璫驟至持慶方侍君語未暇省璫璫怒即騰章誣詆持慶并中君獄成持慶坐免君得白還任然已因暑致疾醫療久之竟不起癸酉正月二十一日也得年才三十有六人事之變固有屈有伸而長逝者已矣嗚呼是豈獨劉氏之不幸哉君自幼開明遇先生長者談名理及古豪傑事輒拱立注聽長益深造遂以春秋擅名邑庠𢎞治甲子領鄉薦明年登進士授江隂知縣時海寇擾鄰境猘甚民洶洶君至首料丁壯為備備甚設卒保無虞堂左右立二厨分收案牒日以次發視決遣而謹其扃鑰定擬賦役覆視必再三由是吏絶姦欺刑清政平民小大無不服者時詣學視諸生業且問興革所宜一日諸生以修學請乃從容風曉俾歸各謀于父兄居無何相次以名來上計楹授任聿砥完美少師石齋楊先生喜而記之逆瑾勢方張郡縣率以賄為悅苛政亟行君若罔聞知顧民間有隱田久逋輸稍稍摘取之以彌縫歲計而已前令塗禎既入臺忤逆瑾以死士民悲思不置君立主于名宦祠祀之或危其舉一不顧愛民惜費至輟堂食錢以益賑恤受奬勞取具公帑甚亷蓋為江隂四年而擢戶科又踰兩年而卒君性質端重寡言笑喜揚人善人或道機穽事輒頻蹙不欲聞祀先延賔務致豐潔其於自奉泊如也曾祖伯文以忠愍貴贈禮部主事祖圭父釗以君貴贈南京戶科給事中母王氏贈孺人配謝氏封孺人子男二褍􅀈女二君之卒也六科同官與吏部兩歐陽郎中實經理其喪事司勳復為狀以褍來謁余銘將歸葬其邑之原嗚呼余何忍銘君也伻來告曰以已未發引不得已勉為之銘葬在某年某月某日銘曰白而長身有蔚其文朝綰銅章治聲夕聞乃陟黃門當幾必果靡遺弗拾靡獻非可追榮所自式被恩私焚黃墓道指日為期病不及瓜沒有遺憾昭示方來美銘非濫南京刑部郎中周德孚墓志銘正德丁卯冬德孚以甲子舉人來南雍卒業余時方為司業一見偉之進而與之言知其所藴有過人者輒以逺大相勵明年春德孚遂中二甲進士擢知邳州其為政有條甚得民和俄劇賊劉六等跳梁四出德孚亟料丁壯增埤浚隍具器械積芻粟為備一旦賊果驟至即躬率士卒登城抗禦晝夜巡督不暫休衆感其誠益相與用命賊連失利遂解去城卒完民小大歡呼曰周侯實再生我相與立生祠祀之余時卧病淮隂淮人多為余道其事莫不壯其節也壬申冬德孚進南京刑部員外郎蒞山東司其治獄善求情嚴而不刻長二亟加奬豫同官有不合者嘗挾私誣奏以事久之事竟白時理其事者頗持深文使德孚毫髮可疑當不但已余方佐南銓知之特詳丁丑秋余奉表入賀聖夀德孚以考績聯舟北行旦夕晤語益欵戊寅升郎中其冬丁繼母柴氏憂解官南歸踰年又哭其父以哀毁致疾醫藥罔效後其父之卒七閲月竟不起庚辰三月二十三日也余時移疾家居聞訃大驚為之嗟悼纍日豈意德孚遂止此邪蓋得年四十有五而已德孚天性孝友母早卒事兩繼母皆無少違忤有弟三人出繼母李俱幼而失恃柴繼至遇之殊少恩德孚恆惻于心撫視周至服食寢處以至從師受室百需一切以身任之父嘗貸重資挾以出遊既乃垂槖而返即竭力以償所貸生事日窘養大父及父母未嘗有失節家庭之內讒譛或行諸弟往往被譴德孚輒起敬起孝婉辭柔色委曲開譬必致感悟而後已論者尤以為難平居端重有威言不妄發自奉約而豐于賔友待宗族鄉黨各當其分一飯之德終身不忘處官處家條理皆極精密其可稱者亦多矣惜哉周世居泰和羅江里逺有端緒德孚字也諱尚化曽祖諱崇高祖諱希茂皆不仕父諱廷從封南京刑部員外郎母李氏贈宜人配同邑路邊蕭氏封宜人柔順貞則男子三人循典循法循理理邑庠生男孫幾人德孚貴而能貧其卒也至無以庇其妻子蓋久而不克葬諸子經營纍年始謀以嘉靖乙酉某月某日奉葬某里某山之原豫來拜余請書其墓中之石余於德孚有不能忘情者乃據平昔所知參以其友郭正學所述事狀為之志且銘之銘曰有質如山有文如泉有政惟蠲企高鑽堅行義昭宣世所稱賢而不永年嗚呼莫之為而為者天也封承德郎禮部主事前建寧推官孫公墓志銘公諱序字尚禮姓孫氏其先濠梁人六世祖仁從高皇帝起兵始家于滁其長子聚充有武功世官正千戶次子慶是為公高祖慶生會會生和皆以善人長者稱和生允恭卒官贛州教授教授生公公有子七人其第三子存登進士第今為贛州知府比三世以文學顯於是孫氏蔚為滁之名宗教授公經術通明由鄉舉歷教嘉魚贛州兩學諸生多所成就如都御史李公田御史孔公儒尚書董公越其表表者公早承家學成化癸卯繼舉于鄉六上春官不第𢎞治辛酉始擢建寧府推官至官創作理刑廳日勤事事獄無小大務砥於平而亦無久淹者建俗貫服毒草以死誣人公得其情率反坐其謀主俗以衰息有殺人而泯其迹者吏不能得至枉坐平人當道檄公與溫州郡官雜治之公默禱於神得異夢焉旦閲諸囚有張烏眼者後其衆以伏公命前之曰殺人者汝也其人惶駭具服出其殺人之具于河而枉者遂白閩浙間相與驚異以為神白水洞盜起官軍往擊之屬公督餉餉道多灘險苦難繼公令以苧布為囊囊其米遇險輒負以之夷竟事平餉以無乏他如督逋賦輯礦徒皆有成勞可紀然性素剛直時為守者所為多不法公常顯諫隂諷冀其能改乃竟為所中傷罷而歸歸則益留心於教子動以義方不徒文藝存初仕為禮部儀制司主事三載考最獲封公以其官階所得命詞甚寵公每寓書京邸必勉其盡職且令兼習刑名曰此用世所須民命所關也晚得雙泉於醉翁亭西乃作亭泉上品其風物釐為八景因自號雙泉居士又營夀藏於城北之龍蟠岡名曰安樂窩時時㩦客往遊登臨觴詠樂之不厭也存既領郡持吳白樓先生文歸以夀公賔筵無虛日已而從公遊於窩上公飲酒甚歡因諭之曰汝觀我我夀殊未艾也而有君命何可久泥於私翼日遂親送之登舟而誨勵加切州舉鄉飲欲得公為大賔以公前此屢辭乃具輿從踵門固請公時年已八十至則進止拜興皆中節度邦人士益高仰之無何喪其長子因感傷致疾醫療踰月竟不起嘉靖甲申七月十七日也其生正統乙丑十一月二十九日原配李氏伊府長史傑之女贈安人繼黎氏滁州衛指揮全之女封安人七子者長孝益府典膳次孜義官次則知府存次季次孟州學生次厚次孚女四人長適吳知府璋之子鶴次夭次適舉人李德霖次適郭奉祀之子原孝孜及吳氏女李出孟厚及李氏女黎出存季及郭氏女少室寶􅨩李出孚馬出孫男九宗之守之憲之密之寅之實之賔之宜之官之女五長適鄒金餘在室曽孫男一世美存聞訃哀毁先以書來致其寮伍二守佐所為狀道其乞銘之意而匍匐隨之初余偕計道滁獲與公晤遂辱交焉于今三十餘年矣存仕學兼優顯揚斯在顧自以為子職多曠幸得銘以葬庶以少逭其罪慝云者余讀其書聽其言悲其志而慨公之不作也銘其忍辭葬以某年某月某日地則安樂窩是已銘曰侃侃孫公亶惟自信有懾其嚴有祗其正彼哉何物我嫉我仇豈無泉石畢我優遊抱弗盡施施𢎞于子寵命煌煌其來未已公歸奚適安樂之窩堅珉有刻終古不磨廣西太平府知府王公墓志銘知廣西太平府王公以職事入朝道經故鄉疾驟作留治數日竟不起正德二年十月八日也享年六十有三諸孤恭等卜以次年十一月已亥葬公雲亭鄉小溪茶頭山之原先期具公事狀拜余請銘余遊公父子間不為非知公者顧德薄名頽有言不信其何能永公之存用此固辭而其請益力曰葬先公而不得先生銘猶弗葬也恭兄弟何所逃罪兹大事也敢二三乎余感其意勤乃為執筆公諱俅字去矜姓王氏王氏自晉太傅導始盛於江南其後有崇文者嘗刺吉州因家于吉至宋戶部侍郎贄又徙居泰和故公世為泰和人國初有以文學徵為諸王説書學者稱竹亭先生公之高祖也曾祖字伯貞官至瓊州知府有惠政民祠之至今祖諱直纍官少傅兼太子太師吏部尚書贈太保諡文端父諱稹好學篤行楊文貞公嘗説玉以與之以公貴封中書舍人加贈南京後軍都督府經歷文端諸孫凡十數皆名能守家法而公最良年二十四以文端遺恩授中書舍人歷升南京光祿署正後軍都督經歷凡三仕率九年勤慎周詳未嘗有過𢎞治甲子始擢知太平太平地接蠻荒法禁積弛強貓弱鼠習謂固然公至首鋤厲民者數家配盜鑄之魁一人戮妖師一人豪姦屏息羣情大慰乙丑歲歉以官粟貸民約令輸息十一民以不餒息既入併他所通融分儲府之三坊為廩者九乃定為義廩法將隨歉隨貸不復取息期於久行大新學宫增補弟子員時臨視其勤惰讀書令自小學始又取古冠昏禮俾其講説推行遊宦死太平者積數喪貧不能歸皆為資遣之俾歸葬行旅入境死喪疾病處之各有條其施設規模類非俗吏所及也公器局修整惇行孝弟母宜人歐陽氏早世每言及輒泫然事伯兄能敬以和聲色之娛絶于耳目博學多識兼工詞翰而不以自名接人甚恭雖童幼必以為禮識時知變然不茍為同在中書時鄉人李孜省以左道幸朝士多出入其門公迄無一迹其遷光祿蓋當國者嗛公持論高語嘗侵已故以抑公公不為悔也督府卒有獲罪於其母者法司當以大辟公察知無大故呼其母諭以天性之真母大感悟泣下詣法司自實獄竟罷復為母子如初母病且死囑其家人世世無忘王公德公仕中外垂四十年其忠厚之存隨事及人多矣而得行其志之日淺故於建事立功有遺力焉然考論其平生大節則世之知公者未有不以公為君子者也初娶楊氏文貞公孫女早卒贈宜人繼任氏長樂知縣衡之女封宜人五男子愈恭愚思哲愈乙卯舉人恭邑庠生思辛酉舉人文行皆有稱而愈先卒二女子大司成羅公之子鏜建德司訓劉先生之子廷儒其壻也孫男二女四公訓諸子恆曰學以言行為要謹言正行必始于家庭干祿非其先也嗚呼公其有見哉銘曰儀維德隅恭維德基道豈逺而文端我師望之顒顒即之雍雍亶其疏通為邦有庸弗違者天世欽厥傳歸寧斯阡於千萬年成都府同知致仕李君墓志銘成都府同知李君致仕家居者七年年五十八正德丁丑五月十一日以疾卒余其同年進士也聞訃則走哭于其家弔其寡孤問其喪具而退既踰月其孤鱟等奉監察御史李君師文狀來請葬銘余不文念於君之葬也無能為助遂勉從其請君諱儀字公著別號虛息其先鎮江丹徒人曾祖福洪武初徙實京師始占上元籍祖惟善父元昭皆有隱德君自幼穎敏強學善記弱冠從故方伯吳秋堂受易為門下多士稱首𢎞治壬子以應天學生領鄉薦明年會試中式廷對賜同進士出身歷知江西之新昌山東之冠同知四川成都府中遭家艱者再居官前後不能以十載而皆有名初至新昌值寇賊羣行即躬練兵民為備民驚徙者皆招使復業聲張實副卒能上下相保置橫民盧希淵於法及其諸子境內震服臨江王張二姓格鬭王殺張一子懼罪乃殺丐者三人稱為已子以誣張纍訊不得其情後乃屬君君問死者皆有婦邪各以婦氏對徐檢視黃册驗諸死者及婦名氏張具有之王一無有也於是刑王婦婦即吐實曰受顧來爾事乃白冠俗死者多從火化君求不食之地為漏澤園以與民葬埋俗由是變勸學禮士補助貧乏士民皆歸心焉其為同知嘗攝守重慶時劇賊某者率其黨蔽江而下人情洶洶君百方備禦江兩岸皆置疑兵旗幟鮮明金鼓之聲相屬盜相顧叵測竟潛遁天全六番二招討以茶利相讎殺往來道阻播州當嗣宣慰者與其庶兄不相能日尋干戈駭動四鄰監司皆檄君亷問至則一引大義責之且婉為開導遂皆感悟頓首謝不韙願受約束還報監司皆迎勞以禮然君素羸弱頻涉危險勞瘁甚病且作遂以致仕請堅請而後得之家居清約無異寒士而綜理詳密雅好吟咏有虛息稿若干卷藏于家配王氏子男四長鰲先卒次即鱟次鱗習舉子業次魴女三長適王知州子儒次適倪主事子霆次適張布政子志孫男二祖夢祖繩女二君於義利能知所取舍既終母喪父又疾篤兄子求分異即請悉以家産與之播州贈纍千金見即辭去此皆有足稱者葬以某年某月某日墓在某縣某里某山之原銘曰學優乃仕光于纍試為柔為剛應變不常宜仕而止式全其美居逸而勤以詒厥孫其存孔厚而嗇於夀沒也不亡視此銘章李先生墓志銘先生姓李氏諱穆字元載吉之泰和人泰和自國初以來號稱多士其尤顯者文學勛業往往追配古人或乃顛躓於時負其才終不獲展而深培厚積以大放厥辭者亦多卓然有可稱述先生其一人也先生方幼學屬對已有竒語長而益務博覽性復強記迥出其輩流賦詩作文不拘一體宏肆簡嚴各極其趣裁剪之妙幾於自然於敘事尤長有條而不紊蓋平生所作名寄寄集者凡八十卷所修郡邑志處別為部又數百卷嗚呼可謂富矣其才如此而其用弗究豈非其命哉先生年三十有四始以虎賁左衛軍餘中應天府鄉舉明年得官南樂訓導將滿者會其令以官地私媚貴人先生不義其舉發其事被逮至京竟坐兩罷後雖申辨得直第令以冠帶家居士大夫聞知交致書弊以講學著書為請由是蹤迹多在荆楚間因以寄寄為號所至或數月或一二年留滯久之而先生老矣既倦逰而返則與諸故舊為真率會閣老澄江公尤重之每見必酌酒賦詩奕棋相笑謔以為樂如是者又十餘年年八十有三正德戊辰八月八日以疾卒其始終之際如此先生為人坦亮和厚事親孝待諸弟姪有恩凡授徒所得束修皆持歸以為親養晚年喪母諸弟請具適有潤筆金數十即以授之介弟元平以翰檢遷官廣東過家病卒倉卒無以為斂即斂以已所備棺於親戚交遊禮意無不周洽一飯之德終身不忘必報之乃已而尤善施德於人在南樂有竺簿者嘗被誣為言於所知得釋竺致五十金為夀先生曰吾所為言義也奚以利為竟不受嘗客武昌見民冬月渡金沙江多溺死者亟以啓事白于當道乃倡為橋以濟後因為浮橋為利至今其教人有方多所成就如曲沃二耿攸縣二戚尤知名所作真行篆𨽻諸書學者亦爭藏去以為法蓋其性行與其及人者又如此曽祖文佐祖克禮太保王文端公為銘其墓父諱玉璧博學工吟咏有詩集若干卷藏于家母劉氏以元平貴贈父翰林檢討母孺人配蕭氏先卒子男四長仁繁昌訓導次佾仕信佾信皆為儒仕為郡掾女二長適上模曾扞次適雲南按察僉事曽顯孫男九長潮鄖陽學生次鴻潛漠沔溫淙瀿洲女四長適藍田蕭傑次適濠下嚴綬餘在室曽孫男二曽音先生初葬其配于五十六都佛獅印西南為雙壠而虛其左疾亟遺言諸子善自立且令葬無違卒踰年諸孤始得葬日於十有二月某日佾先事來請銘先生欽順父執蓋嘗獲侍教焉兹其敢辭不敏乃據先生所自書年譜及仁佾所補述事狀敘次如右而為之銘銘曰齊景千駟伯夷首陽同歸于盡芳孰逺揚兒童所羡金朱煌煌孰云不朽德業文章嗚呼先生才高志剛栖栖一世抑又何傷遺文百卷其存者長義官蕭公墓志銘公諱珹字景卿別號退逸姓蕭氏其先自瀘源轉徙社坪再遷今泰和城西之茒園凡若干世矣曽祖仲齡祖貫之父元獻貫之為溧水知縣有能名其世父伯齡以進士卒官寧波同知伯兄薦之亦以進士知高要而卒仲兄引之以子少司空彛貴封左通政蓋百十年間領科名登仕版者相踵家門之盛鄉邑推之公生而資稟端厚初就外傅日記數十百言長益深造大為少司空所器許甫弱冠遂喪其父俄又喪其伯父大父母垂老諸弟多未成人而公私百務日滋出公於送死事生養老慈幼應門幹蠱一切盡心力為之且惓惓督諸弟于學俾無忝厥世處宗䣊以和以度未嘗有疾言傲色見先生長者為禮必恭其交接之周雖童孺亦無所忽諸父仕既顯聲勢烜赫公當其時方精為諸子擇師程督之嚴無間晨夕稍暇則課僮奴力耕稼外此無他慕者雅好賔客客至為具必腆家有餘積往往推以及人𢎞治中嘗入粟助公家賑飢例錫冠帶公儀觀瑰瑋設施優裕既拜錫鄉人僉以克稱其服為公榮之比及晚年顧諸子若孫職業之修皆可觀因以退逸自號其志亦可見矣正德己卯二月二十日以疾終于正寢距生正統己巳六月四日享年七十有一配曽氏多內助子男四序廩亷廣廩廣嘗例授淮府典膳孫男十一仁傑儼仰侃修偕仲倫侹僅仁儼俱邑庠生女三其壻贛庠生曽應鳯西原羅光鳯余次子邑庠生珝曽孫男五朝鳯朝賔朝用朝魁朝宗女三諸孤卜以卒之年十月辛未葬公雲亭鄉下梘之原先期奉平樂二守段先生所述事狀來以墓銘見屬余於公伯子舊有斯文契晚獲與其季連姻因以知公之平生頃余還任南都公攜酒殽追送十餘里盡歡而別其時方盛暑而公俯仰酬酢竟別無倦容且飲啖皆勝孰意其遽止此也然其始終之際如此可不謂之福人已乎是宜銘銘曰世纍簮纓於赫家聲舍醇以生昌辰是丁不競不儜識慮惟精以篤于成以永其盈曾不百齡大命俄傾地有留耕允穆鄉評蘭玉交榮身後之禎尚覩兹塋俾表崢嶸旌義冠帶介軒劉君墓志銘君諱述倫介軒其號姓劉氏嘗奉入粟例受冠帶之旌先世本汴人宋之季有功甫者來丞萬安因留家邑城之西其後裔日蕃且多才傑入國朝尤盛仕而名位有聞于天下者若故刑部尚書克平湖廣左布政使述憲河南左布政使咸卓今南京都御史咸栗父子兄弟踵相繼也隱而名號有稱于鄉邑者則君其一人焉君曽祖正年祖德英父廣宣正年仕元為瑞金丞與贈刑書昭年公為再從兄弟皆功甫之曽孫也君生五歲而孤有兄述彞僅十歲母孺人鄒氏年甫三十守志不二以撫二子其伯姒周亦早寡有子述傅相與同志同居後十餘年而述彞又卒家事日就衰落君夙夜圖惟自振罔敢懈督視耕作生殖貨財為之皆有方積纍久之益恢于舊貫乃與述傅協謀作堂以事二母堂成其伯父浦城教諭有臨以雙節名之廣東布政使周公鐸為之記一時人士得於見聞者皆相與稱頌二母之志有成而二子者為能無負也有司察知其實將奏請旌門之典鄒孺人俄以疾卒例不得與獨周被旌君既早孤事孺人尤謹孺人性嚴急每婉曲承順務得其歡心及謀葬孺人既得善地因奉移其先君之柩來合其謹於送終又如此顧以旌典弗逮每一念及輒慊慊不自釋云君性剛直而厚於倫紀言動詳審取豫分明族有公使錢籍在祠堂君計所儲未足以周於用請得而蕃息之比其入也倍焉族老長良喜命子弟勞之以禮君再三辭謝曰此分內事爾何勞為衆益賢之房孫鑾卿嘗舉家病疫死亡相枕親戚無敢入其門者君亟以鑾卿歸祝家人善視之審其藥食而時時進之旬日疾良愈留不即遣旦夕撫教與諸子均踰年乃聽其歸立門戶鄉人有曾華山者典司縣庫嘗寓食君所食畢忘所挾官錢而去君見而收之有頃號而來曰食客多矣將誰詰身家之禍今至矣君迎謂之曰無患輟而泣吾以歸汝出其原封授之華山驚喜泣拜曰公活我公活我遠近傳聞益用高君之義曰斯其所以為介乎平生與物無爭非公事未嘗涉迹公府諸子皆教之學其季尤穎敏則遣充邑庠生學行之端信於朋友君享年六十有七正德丙子十二月初八日以疾終于正寢臨終精明不亂諸子環侍囑以孝友勤儉無忝我又顧其季子若婦言曰汝尚無子宜審為圖言畢命取酒正坐三釂恬然而逝配蕭氏出同邑南門舊族賢明善內助子男四斐彥能宏宏余子壻也斐早卒女一適泰和庠生曾用孫男四軫卿畿卿克卿亢卿女二君卒後數月宏以母命來南京拜余請葬銘問其期知未卜也余因與論古禮及鄉俗之弊曰兹事何可緩汝歸與諸兄其速圖之銘吾宜為審日月有期不汝誤也及是乃來告曰將以庚辰之歲某月某日葬先君於邑東田心里塘下山之原石已具敢請乃按宏自為狀及求得其族譜詳考其世次為之論著如右而銘之銘曰遐思以忞忞式亨厥屯無曰亨只孝之篤義之遵慈𢎞于教以垂永世之仁其蕃其大其有弗洵上舍生郭君廷祥合葬墓志銘君諱麟字廷祥別號介軒姓郭氏其先自吉水白沙徙贑之烏溪十二傳至朝玉甫自烏溪徙信豐龍洲君高祖也曽祖諱子恭祖諱彥英以輸粟被徵為義民又徙安遠之陽寨考諱紹經母堯氏君自幼穎敏選充信豐邑庠生從明師受尚書長而學識益進提學試入優等俾膳於廩人屢試秋闈不利貢禮部卒業南雍無何喟然嘆曰吾親既不逮養吾何為於此遂謝病歸家居二十餘年介然自守邑大夫皆高其行每鄉飲恆以賔介處之名聞於少參俞公會舉雙橋之役訪以兵事所言多見采納維時陽寨亦多警乃移家信豐之水東聲實蔚充水東稱巨擘矣正德壬申十一月十一日以疾卒其生正統乙丑八月二十三日享年六十有八君天性孝友初遊邑庠去親舍稍遠晨夕自講堂退輒南望欷歔得一佳味即馳獻其親度未嘗不敢輒食二親沒居喪如禮遇諱日必齋宿將事以為常兄弟七人其四異出相與雍睦無間而事其伯兄惟謹待兄弟之子皆有恩有遭誣在理者罪且不測亟捐百金以營救之事卒解待親友情極款曲而言論侃侃不茍為同尤喜奬掖後進持身嚴整衣履雖敝不甚垢飲酒至微醺即止厭俗尚奢靡一以儉約矯之教行閨門出入以度無敢求服美者食指雖衆每時其寒飢而溫飽之緇黃之流庭無一迹其租入歲贏萬斛里中貧乏賴之以濟者不可勝數所焚逋券前後以數百計人多德之有士人持券投君求濟其父喪君䀌然輒遺之數金而歸其券優遇莊客果不給即貸其租惰者必撻以示警由是人人思奮多有成富家者矣配胡氏出安逺名族時濬翁之女孝敬溫柔宜于上下性勤甚杼柚無虛日凡事一惟君命而彌縫之力為多以正統壬戌十月望日生卒正德甲戌二月既望享年七十有三子男一守謨女一適瓊州王太守從子巽孫男五鐸鑰鏐鈇煆鐸鑰鈇俱安逺學廩膳生鏐煆俱信豐附學生曽孫男五日昌日宣日乾日贊日習女五守謨及王氏女鏐孫煆孫皆後君卒家仍多故君之葬是以緩也始君特竒愛諸孫教之甚篤晚得余從弟欽藹以為之師遂委心託之迄今二十餘年余弟猶主于其孰而諸孫者學皆有成此可見君詒謀之逺諸孫亦無負君之教矣嘉靖己丑鐸等始得吉地於信豐安息里下堡寨前並營二壙向卜是冬十二月乙酉奉柩歸藏前期因其師來請余銘君之賢余聞之余弟稔矣乃按其鄉友瓊倅俞君淵所述事狀參以所聞敘而銘之而不辭銘曰學匪徒文惟行之端理優于家政弗以官婉兹內相嫓德無愆以明以昌人也非天紹聞嗣服諸孫則賢有衍其流莫深匪泉寨前之阜厥壤燥堅雙璧偕藏我銘是鐫封淑人羅氏墓志銘故工部右侍郎柏菴張公之配封淑人羅氏年七十有八以疾卒正德癸酉六月四日其子鏔將請命于朝合葬公墓先期屬其再從兄宿遷司訓鑰為狀拜授使者來南都徴余銘欽順早辱公知既乃通好於淑人德善得於耳目者非一日矣惟不文是愧銘其敢辭張羅皆泰和西郭故家門閥屹相望淑人為薊州同知孟旭之女夙間姆教動止有常則年十八歸公時公父贈光祿卿華軒先生母贈淑人吳氏俱在堂淑人承事惟謹吳愛之愈於諸婦公自家居績學至取科第歷官兩京榮名宦業為世所仰警戒相成之益淑人實多有之嘗從公吕梁直歲凶飢民載道公悉力賑濟淑人則親烹糜于內日出以食旁近飢者纍百千人其用心如此後公以內艱服闋起淑人即留主家政園田邸第歲有增加人謂公官久宜然而不知淑人自奉甚薄凡事可省即省於中外賢子弟待之尤厚間有失怙恃者鞠之長而授之室故莫不為之盡心遇臧獲有恩而指使必當故莫不為之盡力用能以其家大非偶然也及再從公京師每時節朝賀三宫有所賜豫歸必具香案載拜而奉藏之已而公以疾終諸子姪皆不在侍淑人治喪一如禮既請得恤典又得葬銘於名公遂扶柩以歸葬焉年益高治家益不倦出入以度內外斬斬比疾革遺言毋以金帛殮我葬毋隨薄俗妄費其善教諸孫務砥于成言訖更衣正坐而逝子男二長鑌早卒無子其妻蕭氏寡居十餘年而終以節稱次即鏔用公蔭補國子生久當得官以淑人老不忍去左右其妻羅氏故國子祭酒氷玉先生之女賢孝宜其家女一適象山知縣蕭異孫男五循律衛術衍女二長歸余次子珝次許嫁王翥淑人德容莊肅言簡而善盡事理尤知所取豫隂德亦多初被敕命封安人後進宜人以至今封又兩被誥命尊榮康豫夀考令終其福可謂備矣是宜銘銘曰從夫而貴豈曰無人勤家以大或匪思存彼昧弗思其祥可考眷此賢明子孫是保惟勤惟儉惟德之光惟柔惟順而動也剛恩命屢申號登三品在笥之珍亦有宫錦生涯奄盡五福斯成載廑恤典合葬惟寧太恭人李氏墓志銘太恭人李氏諱淑賢出蛟川儒家為安福令恭之子歸鄞之楊為安福司訓贈刑部主事南里公之婦山東提學憲副菘畦先生之妻今南京儀制郎中叔通之母先以菘畦初仕最封安人後以叔通初仕遇國慶覃恩加封太恭人正德壬申叔通因考績過家得躬捧命書展讀成禮踰年以疾卒癸酉十一月十九日也享年七十有七太恭人生而貞靜其父尤所鍾愛為審相攸一日與司訓會學宫見菘畦大加稱賞遂字焉及期來歸時祖舅靖菴夀官祖姑張方以勤儉治家禮法甚嚴其姑封太安人陳實繼贈安人金金慧而賢陳頗重滯弗當祖舅姑意太恭人委曲承事務求得其歡心凡縫紉汚涴飲食賔祀百需一以身任之動皆整辦陳由是得安其所終陳之世執婦禮無怠姻族莫不賢之菘畦雅志功名太恭人內助有方不使家事分其心文學益大進遂發解浙省魁禮闈纍官至副外臺宦業焯著諸子始知學太恭人即嚴督之期必紹芳祖父由是叔通亦魁鄉舉第進士以至今官其處娣姒諸姑間和易寡言御羣下不嚴而肅平居由謹婦戒非至親無得見者崇尚儉素絶不信浮屠言執祖舅姑及姑喪皆盡哀及菘畦卒于官痛毁幾絶叔通適來省亟令扶柩以歸藩臬諸公以菘畦守官亷諭所屬裒得千金為賻叔通義不受具以白太恭人太恭人曰兒言是也汝父固以清白遺汝兄弟吾何取於此邪竟辭之子男二人長叔達以輸粟拜承事郎娶張氏福清丞張君之女次即叔通學行為士林所重娶張氏開令鏞之女女三人長適確山令吳照次適士人金鏞次適郡庠生盧俸孫男三人充耘充耔皆習舉子業充耕尚幼女一人適郡庠生王楷叔通聞訃將奔歸謀葬于其兄謂銘當首圖以余雅相知厚乃手述事狀介其僚友夏惇夫劉士鳯來請誼有不容辭者遂按狀序而銘之狀無一語及辭金然士夫習傳其事菘畦雖沒而道益行於妻子其可不書書之豈徒昭示其後人且將以愧夫世之貪冒無恥者太恭人之葬當合菘畦之兆在其邑桃源鄉白馬塘窆以明年十月十七日銘曰宣尼贊易坤以順承有齊士女不習而能輔成君子龍變雲蒸惟坤主利而以義勝義方之教亦既有徵休命申錫奚啻百朋其終也令惟德之恆堂封永合來拜繩繩太安人劉氏墓志銘太安人劉氏為封南京刑部主事蕭君廷美之配郎中世賢之母也正德庚午遇國慶覃恩敕封今號乙亥閏四月十四日卒于南京官舍其生景泰癸酉正月二十九日享年六十有三郎中將奉柩歸葬于鄉以其同官周德孚所述行狀來拜余乞銘余家與蕭劉皆有連郎中於余相往還尤密誼有不得辭云按狀安人諱錦娘出吾邑西平士族祖諱某父諱某安人生長富家既歸封君朝夕承事乃若素嘗艱苦者事舅姑惟謹遇有疾湯藥必循用節度及其卒也佐封君治喪哀且慎鄉人以孝稱之初其舅筠軒翁尚義輕財晚年家無餘蓄封君遂客遊江淮以取給已而占籍桐城家事一付之安人安人悉力經紀公私酬應斟酌適宜殊不見窘束之態尤盡心教子延明師購書史具膏燭至脫簮珥以給其費而時時督勵之郎中學垂成乃遣就封君於桐城益加磋磨俄以庠生中應天鄉試第七連登進士第擢纍今官士夫皆知其有父母之教也安人性勤儉慈恕而明達祁寒暑雨不廢女工郎中屢迎養官中衣食之奉隨時稍加安人輒不懌曰汝今守官清慎吾自樂矣安用勉強為此乎訓諸婦多溫言而規範甚整臧獲有過亦誨諭從容賙恤族姻惟力所及遇外侮能傳片言折之婚媾聞有武斷鄉曲者歲時謁見皆拒而弗納其族父雲表一時之高士嘗稱諸里族以安人為有女中男子之風云子男三長即郎中世賢文學治才士林推重次世瑞次世立女二長適萬安曽藻次幼在室世立與在室女皆庶出也孫男三午介聿女七俱幼前卒三日世瑞自桐城來省安人良喜御酒食談笑至夜明旦郎中省問如平時乃入部俄報安人驟得風眩疾倉皇馳歸聚醫滿堂皆束手無措凡三日而逝嗚呼其命也夫葬以其年某月某日墓在某里某山之原銘曰君子生生于千里外內事之修非賢曷賴賔禮先覺以為子師教成于內名乃外馳爰登甲科官資屢進祿養恩封式鴻厥慶迪勤訓儉終始不渝承以守官清譽孔都何德之豐而夀之嗇沒也不亡視兹銘刻太夫人孔氏墓志銘太夫人孔氏系出闕里宣聖五十八世孫故湖廣左方伯安菴劉公之繼室也祖諱某父諱練伯闕里支𣲖實繁惟練伯公一門姻婭為盛其女之壻多名卿賢大夫而𢎞泰𢎞緒二衍聖公又皆其甥之所出大抵皆德選也劉世為萬安宦族公父官至大司寇受知英廟有重各而公克世其業以顯方為御史喪其配歐陽氏聞太夫人之賢以禮聘焉既歸公執婦道惟謹後公遷副閩憲擢長湖憲進左右方伯太夫人隨宦南北實多內助公得以盡心所職宦業日熙姑康夫人耄夀家居間從公歸省朝夕上食恭甚康夫人卒贊公襄事無違禮待諸子女恩意惟均所生二男子二女子公卒時俱未成立既而婚嫁皆以時舉其生事為之經理尤悉家亦裕如貌莊性嚴人莫敢犯然施諸姻族疏數隆殺必有恆儀度泰然迥出儔類望而知其為貴也初以公貴封孺人後以子貴進封太夫人晚年處人更和而治生之勤終始如一忘其身之老云子男四長玉纍官刑部左侍郎以議獄忤旨間住次奎先卒次璧又次璜以貢需次銓曹女四歐陽宗之彭穰黎恩張玉其壻也孫男九思常念慤愈愆恕喜忠常以官生領鄉薦慤愈俱邑庠生曽孫男五俱幼侍郎本公季弟之子公初未有嗣以屬歐陽夫人子之其事太夫人有順無違居間纍年與諸弟日隆色養愈愈左右太夫人心志益樂夀益高體益康蓋享年八十而卒嘉靖辛卯三月二十六日也其生景泰壬申十月十一日侍郎初葬公于其邑松陽之原奉歐陽夫人祔于左以是歲十一月初十日奉太夫人祔于右先期具事狀緘書授其子常俾來謁銘欽順與侍郎相知深且有連誼有不容辭者謹次其事而系之銘曰肅肅矜鞶來自闕里從夫而貴復以其子體柔用剛式𢎞內理龍章載錫先昭厥美松陽之原墓木拱矣葬于斯合其永寧只整菴存稿卷十三
