body:
  text: 整菴存稿卷六明羅欽順撰序一十五首送南京少宰石公入為少宗伯序君子之學有以明其體必有以周其用禮樂法制工虞教養錢穀甲兵其為事雖有精有粗或巨或細無非一理而已能于此而不能于彼通其一而不通其二其為用有所不周則其體之未明也固不容掩然則君子之學豈易言哉體明矣用可以無不周矣而非遭時得位則無以盡其用夫用之周不周在我用之得盡與否繫乎人茍為君相所知而位以時晉是非君子之幸實天下之幸也欽順初入翰林則獲從熊峰先生石公逰時公文名已日起後數載為南院學士著述益富遷兩京太學祭酒以嚴正簡重清士氣以公平明恕得士心進少宰于南京鑑别精詳縉紳愜服間嘗署南京工部事曽不數月而積弊一清由此觀之公之用為何如哉此其所學豈記誦詞章之謂哉茲被簡命入為少宗伯南京士夫莫不欣然以喜凡所謂喜者非私公也君子之學行于朝廷則所以翼贊宏猷匡扶大本必將日見其效士夫既以此為公願其情不約而同况當此時天下望治尤切公自南而北亦安得不深思而永念乎思之深念之永與諸公同心一德以篤致夫匡扶翼贊之功天下之幸其在此乎公先君子雲崖先生官至按察使伯兄東􅀈先生今為大司徒家門之盛天下所仰所以垂光青史者蓋存乎德業而不専在于名位也公行有期公卿大夫皆相與賦詩以贈既成卷太宰孫公以授欽順俾序之竊惟不敏分當辭避顧從逰之久蒙愛之厚茲又以淺薄辱為之代誼不可無一言也于是乎書送南京少司徒王公入為少宰序今南京臺省百司皆國初所置自京師視之無異制焉至于設官則北為詳南為略蓋天下大政皆自京師出而南京直以根夲地重諸司惟一二常務是釐其官之不必備固其宜也以不備之員猶多間暇之日故凡才猷學識聲華器局卓出于一時者繫官南京稍久則天下皆以為不盡其用一旦易地而處雖未知其用果能得盡與否而君子道長之漸朝廷用人之公不有以丕慰天下之望乎凝齋先生南陽王公博極羣書才髙而識逺性剛毅多大莭起自郎署擢纍國子祭酒進南京少司徒垂及三年茲被簡命入填少宰之缺凡有識者聞之莫不以朝廷用人之公君子道長之漸為喜欽順遂因以占乎天意其為喜也殆有加焉如果天無意于斯人將不使公等得居要地公等既居要地將未有不使之得盡其用者也夫天下之勢固有甚重而未易反者亦觀乎經營布置醖釀之工力何如合天下之君子以為一人心同其誠而要之于久及其至也經營者以周布置者以定醖釀者以熟當幾速斷而無二無虞天下其有難反之勢難成之事乎顧今天下之君子猶未盡合是容有間之者非欽順之所敢知也其所知者書曰自一話一言我則末惟成德之彥以乂我受民公與諸公必將于是乎究心焉由是推之君子之盡合也其有日矣公將出祖卿士大夫謀以百壺奉餞且相率賦詩以壯其行詩成宜有序大卿洪公不知欽順之不敏而固以見屬既不獲終讓庸具述區區之見如此以就正于公云送太常卿張公致仕還鄉序𢎞治癸丑欽順初入翰林今南京太常卿河東張公已為侍講時公同年進士同官翰林者凡十數後進仰之皆以為將來公輔必多自其中出盛可知也其後公纍官至學士地望已崇遭賊瑾盜權以讒被謫瑾既誅死乃起為南京尚寶卿遂長太常于今又四年矣年甫六十以疾求致仕上察其情許之且念其嘗侍青宫特令馳傳以還蓋異數也于是其同年同官石齋楊公厚齋梁公皆位登師傅為國柱石涇川張公為南京兵部尚書參贊守備機務以保傅致仕者二人卒官尚書者二人其不至公輔者才數人耳然公秩正三品恩加二代未老而退晚福方隆數人之中又有不公若者合諸公而通驗之則戊戌一科豈不誠盛矣哉公茲還歸故鄉計其為童子時合伴而嬉遊同忩而講習者尚亦多在稅駕以往無非暇日相與登山臨水酌酒彈棋往來倡和于其間雖溫涼寒暑之變猶將有弗覺者而况乎人間之毁譽世道之理亂豈復能溷其耳動其心哉公之得以遂其樂者如此時則涇川公亦以剛介寡合辭位而去得與公同其樂焉而石齋厚齋二公方以其身佩天下安危勞心焦思殆無一日之間蓋憂樂之相去逺矣是則公可以無羡于二公之所至而二公在位雖欲尋公之樂而不可得正惟有羡于公耳傳所謂賢哉大夫者公非其人已乎公之先君子官終太守長子淳甫為户部主事次濓甫方舉進士次沂甫以公廕為國子生有開于前有承於後傳所謂無憂者在公其又庶幾矣公平居喜讀周易參同契間嘗遇異人得其要旨志嚮甚専夫人心有樂而無憂則血氣和平精神完裕自有得夀之理然則參同契之學雖不復講不亦可乎公既解官長洲吳公自國子祭酒來為之代遂與欽順遍求諸卿大夫之詩以贈公行序則吳公宜為而固以見屬豈以佐公日久相知尤深邪公亦謂欽順宜有言誼不獲終辭乃勉為之序送太守歐陽君之任序吾邑稱士族推歐陽氏百數十年來登仕版者後先相望往往以才行著聞于時賜之其一人也君初以己酉貢士典教湖廣之應城應城學者皆樂從其教人才為之一盛後登壬戌進士授南京工部主事遭外艱去服闋改吏部進文選郎中所至皆能其官蓋其識見明應酬敏動必稽乎典法而未嘗不合於人情此所以克有佳譽也茲拜金華太守之命輿論翕然以為宜之任有期其同官諸君子來請余言以為贈余與君居同邑且有連同官南都相處之日久誼固不容以無言也惟金華乃浙東名郡其景物之勝自齊梁時已為詩人所賞逮宋中葉大儒吕成公出卓然以興起斯文為己任遂啓一方道學之源相去未百年而何王金許四君子相與導其委至于近世則又有楓山章先生相與揚其波漸及士民其習俗要為端且厚矣君往而為之守豈待於他求哉余嘗聞古之有邦家者其才智雖逺過于人人然猶必有所友有所事蓋稽謀考德既以為在我之資而養老尊賢又所以為士民之勸身不出户庭之近而化行千里者此其機也世降以還人情多喜于自用師友之誼鮮克致隆所以功業如彼其卑無足怪者今浙中大老幸有若楓山先生在君所敬禮宜莫先焉考德稽謀匪朝伊夕于以發揮于政事將見舉無不中勸無不從其士習固將益端民俗固將益厚矣夫如是君且優優然得以其暇濯八詠之清風玩雙溪之明月賡昔人之麗句以繫他日之去思其佳譽之有終名位之逺到也不可必乎余嘗佐楓山先生于南雍多辱教益奉違日久每用馳情輒因君行附致區區之敬送太守葉君之任福州序自秦罷侯置守至于今因之上下千數百年有天下者未嘗不與守共治得人之效槩可見矣然其權任有輕重則所以為之者不無難易之殊大抵自唐以來守之權已不逮漢蓋漢雖以部刺史察郡國然有按舉而無督責政無不自守出者故得以行其志而多卓然有可紀之績在唐則臨以觀察使使者雖名為觀察而實以督辦財賦為功在宋則監司之員益多政多出于監司故守之志不得盡行而為之益以不易韓退之所謂民就窮而斂愈急吾見刺史之難為者其一端耳我國家經理天下之初以布政司按察司監乎列郡已而又有巡按御史焉則又有巡撫都御史焉則又有鎮守中貴人焉凡此皆守之所當稟其命奉其令者也使其人皆哲其命令皆公守亦何容為異一有不合不得已比而同之至于病國而殃民守將曰是不在我未有能逃其責於君子者然則為守于今日其難易可知已抑將何以處之乎蓋先聖之論治民必先獲乎上至求所以獲乎上之道則歸于明善誠身孟子亦言至誠而不動者未之有也今之君子無不習聞是説顧以為迂逺難用而常喜用智術以僥幸于其間蓋直未及尋而所枉者為尺亦已多矣吾于葉君時用之守福郡其將見誠明之效乎君浙之龍泉人初以進士為湖廣廣濟尹有異政擢南京兵科給事中有直聲其務實而不崇虛名循理而不任私意蓋吾黨之所推敬焉者往率是道勿渝勿怠能同能異而一無所茍上下惡有不協政理惡有不成者哉夫如是則所謂卓然有可紀之績者其在君矣君其朂諸南京户部郎中陳君德偕與其弟兵部郎中德英福産也以其郡得君為喜求余言為君贈于是乎書送廣東少參張君之任序古書善言理財者無如大學大學釋治國平天下一章其言理財之道詳矣至求其要則歸于好仁一語自後世之理財者觀之其不以此語為迂濶者幾希彼固惑于為仁不富之説也殊不知上有好仁之實則下必有好義之誠感應之機捷于桴鼓斷斷乎其不誣也漢兒寬為左內史崇尚仁厚收租稅時裁濶狹與民相假貸以故租多不入會軍興當免其民皆恐失之大家牛車小家擔負輸租繈屬不絶課更以最由此觀之民曷嘗不好義邪所患好仁之君子之難遇耳夫好仁之君子愛民一念始終無間至于經理財賦亦莫非此心之推是故民有小大而其賦必均嵗有水旱螟螣之不常必不肯為取盈之計老胥黠史貪官汚吏之並緣徵斂以為姦者必有以罪其人而窒其穴逺近視其地緩急視其時務求其便乎民而不自為便誠如是也民其有不信愛賦入其有不及者哉今好仁之君子蓋有之矣顧余不能多識以所嘗識而徵諸已事則有若張君宗周其人焉君博學能文而性質剛介初以名進士厯知貴池華亭兩邑皆有治聲纍升至南京工部郎中奉敕督理蘆課課常及額而民不稱病論者多之今升廣東布政司右參議職専督賦又奉敕書以往昔吾夫子嘗以剛毅為近仁君之性質既于仁為近宜其所好之在于仁也茲以財賦為職誠一惟仁之是好而為仁不富之説斷不為其所惑焉曽謂廣東十郡之民有不如昔日倪寬所治二十四邑之民邪或以今時方難為則倪寬之時亦不為不多事矣此固君之所知也君世家鄱陽之鳯亭其先出宋吏部尚書燾世承宦學以君之志業將益光而大之于其行同鄉之宦于南都者例以言贈盧君用中以簡至謂非余言不可顧余言迂且拙辭避久之而竟不容已也于是乎書贈浙江按察司僉事胡君之任序比年四方多紛擾杌隉人無定志家無寧宇惟浙中列郡熙熙如平時豈惟氣化之獨淳殆亦人事之得也然隂陽相禪其變無常治亂安危往往相為倚伏故當無虞之日凡有位于藩臬者尤當協心同道以圗惟寧永其可以目前之熙熙為可恃而遂忘其警戒也哉今藩司所治大要以賦役均平為主臬司所治則在于搏擊豪強殄除姦宄伸理寃抑屏斥貪殘罷惰無良之吏以培植善類惠康小民茍皆以克臬稱熙熙者斯可保矣斯言也吾安得不為胡君誨之盡乎誨之登壬戌進士科初授行人擢南京雲南道監察御史其為人溫雅慎密居官不為矯激而典法所在守之惟堅考以最書遂升浙江按察司僉事其同寅蕭君吉夫等皆為之喜來請余文以贈其行余與誨之同鄉同官南京相往還為密聞其有憲僉之擢固欲致一言之贈而况諸君之有請乎余之所欲言于誨之者亦惟慎修其職而已然欲慎修其職蓋有道焉傳曰君子有諸已而後求諸人無諸已而後非諸人夫公明正大此其所當有者私暗邪曲此其所當無者凡吾所當搏擊殄除屏斥之者孰非私暗邪曲之徒而在我者顧可以不慎邪誨之君子人也其必知所從事矣今浙臬長李君立卿其副徐君宣之皆余同年友皆能以公明正大自勵其他雖或未相識聞多君子余弟允迪亦叨為之副則思欲寡過而未能也誨之行哉幸與諸君協心同道孜孜夙夜以砥克臬之績以永保列郡熙熙之美使余弟亦賴之以寡過焉豈惟余之深望以副而臺中諸君子之望皆有以慰滿之矣庸書以為贈送參議周君之任廣東序參議于布政司其任不為輕矣日與使相處則凡司之政議率當參決其可否而使實資其助及其時旬宣于外則凡郡邑之政治皆得以察其張弛考其得失循典法以申勸戒而小大趨走之吏莫敢不承其風夫協恭以有為表正而無失使善政畢舉而一方蒙福非賢且才者不能也然則選授之際當道其有弗慎已乎吳江周君行之初以名進士授行人已而擢給事中凡一入禮科再蒞南京兵科多厯年所其為人篤于孝友襟懷坦易而博學多能有所不言言必當乎大體茲膺當道首舉遂拜廣東左參議之命輿論翕然以為宜廣東北距五嶺之陽南跨大海其土田肥媺嵗入常厚而魚鹽之利畨檣賈舶之珍復充牣于域中以波及于四方四方仰之皆以為百貨之府故官于其地而能以清白自持者不多見焉傳曰民者邦之本財者民之心官匪其人民心未有不傷者也傷心及本而邦且安賴邪是必得賢監司同秉清明之德以照臨其上然後小大趨走之吏皆將有所畏戢而厲民之事一不敢為蚤夜孜孜務求所以為民利者善政之下河決而風行庶幾嶺海之間永為樂國近壯四鄰輔車之勢上寬朝廷南顧之憂此余于周君之行不能無厚望也始君薦名禮部余忝試事嘗與聞之及在南京相往還為密其同寅諸君子因屬余言以為之任之贈誼有不獲辭者遂為序云送副都御史范公巡撫雲南序昔虞廷以九德官人而德以有常為吉至于今日朝廷之所登用亦未嘗不注意于有常者以有常之君子執德堅定始終一志惟為國為民是圖名愈盛而實愈惇位愈加而心愈小實能有益于人之家國而上下皆利賴之故或久居其官或屢更其地無非所以究其用也鞏昌范公鳴逺初以癸丑進士拜監察御史即有名四遷而至浙江按察使治行益美御史大夫陶公得于巡視遂舉以自代會公遭母憂去位不果遷乙亥秋三年之喪畢吏部即奏起公為南京都察院右僉都御史提督沿江庶事甫半載而雲南巡撫員缺上又從吏部所擬進公都察院右副都御史賜之璽書以行公學識通明操履端介于凡議法圗事取舍興革之際必盡心焉是以嵗中再遷而輿論翕然無間蓋知其德之有常也雲南雖逺在一隅而朝廷之視之也一如近服巡撫重寄往往擇焉而後授之上覃保惠之仁而下享阜康之福如此者亦有年矣夫何一二年來災異頻仍景象蕭索此毋乃貪殘之吏豪猾之黨恣為民害民率以其愁苦不平之氣積傷隂陽之和而致然歟然則今日所以慰藉撫循其人與之厚其生和其氣俾禎祥日至災異日銷當何如其用心也蓋聞轉移感動之機不在乎他而在于德公茲執其常德以往一言一動率由中出凡地望與公相埒者孰不勸而思齊榮辱惟公所制者孰不仰而承式夫如是則左右前後孰非德鄰相與心公之心以見于行事其于民康物阜固可坐而致也然則所以答寵光而慰輿論者夫豈逺哉公行有期其寅長大夫洪公中丞趙公合凡臺省諸公出餞于石城門外而以贈言見屬顧惟不敏其能達諸公之意然辱公年末誼有不獲辭者于是乎書送侍御范君清戎江右序國朝設衛所以嚴武備所轄軍士皆有定伍其伍或缺則按籍而求其人以實之按籍而求其人初若易簡及其久也而弊端滋出禁令科條由是日繁故自京畿以及諸藩服上常専命監察御史一人往蒞其事期于武備之無乏爾而御史所至凡一方官吏之賢否軍民之利病有所聞見皆得列上于朝黜陟廢興于是乎在自牧伯以上有大疑大議率參決其可否一言之當則闔境之內莫不隂受其賜焉蓋雖名為清戎而其責任之備乃如此此其人之賢否所繫于輕重之數豈小哉吾江右屬有盜賊之虞清戎之政因而暫輟及茲劻勷甫定而南京雲南道監察御史范君以載乃復承命以往君桂陽宦家子既登進士擢行人猶好學不倦才識益宏以逺嘗奉使肅崇二府一以禮自將及遷御史于南臺嵗猶未期而封事已三上所言皆天下大計與當時切務忠直之氣輿論推先肆吾江右士夫聞清戎之屬于是莫不欣欣然以得人為喜而君既被命例許挈家還鄉因獲躬奉巵酒拜上其慈闈千萬嵗夀極天倫之至樂貽鄉里之美談又重以為君喜也君行有日侍御楊君抑之等以告于太宰孫公謀所以贈遂來徵言于余余非能言者然不謂之知君不可其可失君吾江右之民比年以來憔悴甚矣所望于仁人君子撫摩煦嫗以迓續其命脈真若大旱之望霖雨今得君以臨其上其有幸乎夫清十得三不枉平民此清戎之最君固無難辨者惟是所以宣上德而通下情贊訏謨而翼公道使吾民小大咸不失望而憔悴以蘇宜必加之意也推是以往以居大行之地功業所就其可量哉遂書以為贈送羅兖州序羅君子文之出知兗州也南都卿士大夫雅嘗往還者相率賦詩送之詩即兖州境內古先聖賢之遺迹為題若山澤衢圃殿閣樓臺廟堂亭館之類凡二十有四人賦一題為詩二十四首既成卷侍御李君師文請余序諸其端余于子文為宗家且同邑往還相好也贈言雖屢兹行要不容默矧師文虛卷端以見屬邪今兖州為山東大郡地方數百里兼古鄒魯曹滕諸國而有之魯為周公所啓之宇而孔子父母之邦從孔子逰者實多魯人而孟子則鄒人也是以聖賢之遺迹在兗州境內為多厯今千數百年猶使人樂取而咏歌之赫赫如前日事者本其道德功言垂法萬世人之思之仰之自有不能忘也士君子幼而學壯而行所以成其身澤其民者固一以聖賢之道為凖况乃得周公孔子之故國而為之守得周公孔子之遺民為之治而教之則于仰髙企美以求其道之必達豈容在他人後邪聖賢之論治道詳矣其至切而至要者在孔子嘗有三言曰敬事而信節用而愛人使民以時孟子有二言曰老者衣帛食肉黎民不飢不寒由孔子三言行之各極其至則孟子之二言可得而驗矣今民無壯老厄于飢寒而不能自振者舉目皆是其習俗何由而美子文方敏于事道安得不深念而力拯之哉諸公之詩各因題命意言雖不能不殊至其所願于子文事必盡心道必宜民以阜其生以善其俗俾功烈茂著足以垂耀于無窮此心則不殊也誠如是也安知後之人相與詠歌其遺愛不亦有如今日者哉余是以推廣其説以為序送浙藩少參林從學之任序浙為天下首藩其物産人才賦入之數皆先于天下風俗之美亦自昔有聞崇雅而尚文勤生而多藝徵諸今日益昭昭也而談者或相與摘其疵遂遺其美以其工為讒謗而浙之官守為不易為吁有是哉凡興讒造謗以中傷善良其人固可知己未有君子而讒謗人者也浙中固多君子則雖有工為讒謗者豈能勝夫不為讒謗者之多邪誠使在我者無瑕施于政者有利民之實必將收多譽于衆君子之口彼小人者雖欲售其姦慝誰則信之吾嘗見守官于浙中者未及有為已懷讒謗之慮恆竊以為過使此處每橫于胸臆其弊也豈惟視枉尺直尋為常事至于枉尋而直尺亦有之矣夫茍不能無枉又何官之能守邪今吾從學往為浙藩參議其殆無疑于此矣從學初以閩藩之秀試禮闈余備員同考官得其卷喜而進之而知其文學之美乃與余同官南京已復同事觀其折獄之精審考功之明察而知其治行之優出佐名藩實光簡命所以盡其在我而惠利其民者宜必有道矣夫道必本于聖賢乃能有合于君子從學幸加之意尊美屏惡開誠布公而一以忠厚待其人則令聞日章而讒慝自逺其進于髙逺也孰能禦之從學行文選郎中尤宗暘等循故事請余文為贈科場之雅寮寀之誼其又何辭送閩藩少參魏喬儀之任序余以菲才叨任南銓新建魏喬儀適為驗封郎中前此蓋屢相往還以論文講學為事及相與同事事無不以時舉者余甚賴之喬儀初登進士科擢行人司副遷員外郎于刑部再遷郎中皆在南京其為人溫雅周詳而臨事有守抑揚豫奪無弗慎太宰孫公嘗書其考纍數十言極其嘉與而人皆以喬儀為無愧所書蓋相與徯其進也久矣及茲乃擢閩藩右參議輿論翕然宜之于其行文選郎中尤宗暘輩以贈言為請余雖拙訥其可無一言以為喬儀贈哉蓋聞君子之為政要在合于人情宜于土俗而必于朝廷之法無所戾于聖賢之道無所違乃為盡善彼違道以干譽者已不為君子所與若夫厲民以自植置法守而不顧則所謂何足算焉者也然欲其政之盡善非見之明守之固不可見之明矣守之固矣或乃遲疑顧慮當幾而不能果斷亦安能有益于事無失其時以大為民利也哉故夫道也法也俗也情也斟之酌之稱之量之觀其會以求其通灼見其可行也而吾無所容其毫髮之私于是斷然行之而不惑雖蠻夷未有不率服者此其所以為君子之政也喬儀素所蓄積良已合于君子顧逺大之業實基于達德之崇余是用申告一言以庶幾乎少有助益云爾贈太守徐矦考績赴京序嘗讀後漢書至章帝本紀見其所下詔有取于安靜之吏為之惕然有感喟然而嘆曰嗟乎安靜吏之有益于人家國也審矣然由漢以來至于今日試求其人可多得邪夫吏所以治人而顧有取于安靜非無所事事之謂乃行其所無事之謂也其本正其源清事至物來順其理而應之隨其分而處之而已無容心焉不違道以悅人不飾竒以干譽不役精于分外以僥幸于萬有一之成功蓋安靜之實如此如此者責以旦暮之效或非所及及其久也信既孚而事日簡政日理而民日安所謂月計有餘者章帝豈欺我哉上下千數百年吏于民上者何可勝數類多矯飾外貌似是而非簡册之所書耳目之所接安靜吏蓋寥寥焉豈其實之難能亦其人之自不為耳乃今有見于吾徐矦豈非幸哉矦之為吾郡也持身亷潔惇尚文教愛民而惜費因事以就功簿書精詳而刑獄惟允夙興夜寐于今垂四年矣美績優于勤勞之後輝光發于篤實之餘蓋雖深山窮谷之民莫不知矦之為仁相與愛戴稱頌之無間御史之按行江右者奬勞之禮亦屢加焉視彼粉飾雖工終于為人所厭苦者其榮辱之相去何如也今以三載之績入奏其為宰相之所鑒賞明天子之所簡注不亦可以豫占也夫矦世家寧國之涇其先君子朴軒先生學行純篤為涇名士嘗教兩州一邑官不大顯而門下弟子受其學以顯者為多若董都憲萬英則其尤者侯之學內得之于家庭外充之于都憲本原之地恆謹視之是以施諸政理類非俗吏所能及也侯名冠字士元别號竹岡居士起鄉舉教清豐訓浮梁知都昌餘干兩邑擢南臺監察御史以至今官行有期二守徐君吉貞郡判陳君士華郡推陳君相楊君旦僉以贈言見屬顧雖不敏而侯之善政不容以無述也于是乎書贈大尹黃侯還任萬安序斯民也三代之所以直道而行也聖人之言夫豈欺天下後世云哉奈何世之從政者鮮求其道之直否何如顧嘗以民之難治為解此天下之治所以終不能庶幾于三代也夫世有古今而斯道之在人心則一上之人茍得其道雖蠻貊且將率俾而况于吾民乎故夫不以三代之民視吾民是不以三代之為民上者自處也亦無所貴于學道之君子矣六合黃侯德裕以名進士尹吾鄰邑萬安其君子小民皆稱之不容口余耳熟焉蓋嘗詢其為政之詳大槩以謂凡設施豫奪必揆諸理未嘗茍有私曲余因嘆曰黃侯殆能以三代之民視吾民者哉去年冬吾邑大尹楊侯被召入朝當道謂泰和緊邑賦繁事夥才非黃侯莫辦遂以委之侯至則以其治萬安者治吾泰和半載之間事多就緒民用無擾吾泰和君子小民所以稱之者亦無異于萬安惟吾二邑蓋嘗有被以難治之名者矣自黃侯視之其施治之難易果何如也彼其所以號為難者得非其道有愧于黃矦也哉茲吾邑新大尹至侯當還任萬安萬安之民固莫不欣欣然喜父母之孔邇其悵然若罔攸賴者不獨吾邑之小民而已雖其君子亦然于戲直道而行黃侯其近之矣異時且大用誠以是行諸天下其庶幾有以還三代之治于千數百年之下哉侯之還任吾邑士夫皆有贈言余姻家張上舍主亮謂余以文字為職不可無述爰以余之竊有所試者著于篇整菴存稿卷六
