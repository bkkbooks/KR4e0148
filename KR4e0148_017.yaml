body:
  text: 整菴存稿卷十七明羅欽順撰五言排律七首七言律詩八十八首送林太宰入朝宿德登三事留都領百寮勳庸隨日盛華衮及春朝每憶天威近寧辭驛路遙祖筵移白晝文斾倚丹霄江暖魚龍躍風微燕雀嬌碧雲淮浦樹明月廣陵橋物色添詩稿民風聽里謡由來氷作鑒到處斗橫杓信有安危責能忘燥濕調漢庭推丙吉唐室重房喬宰府應重入皇綱助聿昭拔茅如有象疏拙分漁樵送邵憲副提學江西得氷字有美儒林秀無慚國士稱文章明藻火意氣俯丘陵山霧曽藏豹天風忽徙鵬敕從中祕出官就外臺升正學推胡瑗諸儒慕李膺獨持風采峻會覩譽髦興雨共芳尊歇雲兼别思凝炎威方熇熇珍重玉壺氷壽封君吳先生號味菜人物三吳舊家聲百代延風流思季札文采見通玄種德高槐在鳴隂老鶴便菜根新得味春酒正開筵屋照晴川潤花迎綵服鮮氷壺行玉果銀甲響鵾絃蓬島雲霞接南山紫翠連舉觴公自樂分席我無緣壽域知優入官封看屢遷正當難老日還值太平年磊落欽高躅殷勤寄短篇莫論初甲子從此更三千送鄭司徒致仕還閩了却公家事真成晝錦還風雲清夢斷天地此身間人在羲皇上恩深季孟間長籌寧復凂逸駕未容攀逺驛通嚴傳新杉繞故關海鷗應漸狎徑竹擬重刪敢告離觴盡休辭酒量慳可能分手後猶得會蓬山大人生日奉壽壽酒年年旨今年旨且多三郎初在侍雙鬢幾曽皤庭隘回波舞林低擊壤歌乾坤真廣大風景更清和水活秧堪脫山明雨乍過曉鶯啼緑樹梁燕乳新窠每每人同樂來來吉有他獨憐西望眼無奈白雲何仲弟允迪參議進表還取道歸省江東酌别詩以送之公事粗能了私情自合通暫迂千里道偏得一帆風過我冬才半趨庭日正中金緋堂上下桑梓屋西東壽酒先春熟華燈徹夜紅鶴鳴欣子和塤起聽箎終燕賀逢迎數牛眠灑掃恭朱絃還雅調玉樹愜深衷龍福三生石玉山百丈峰轍因乘興逺詩為索題工溪鳥羣相狎巖花漫作叢舊遊人漸減新好趣應同鄉井雖云樂官資亦頗崇吾翁如月眼貪看及民功仲弟年滿五十且新居落成詩以慶之新構連雲起華筵匝地開晴光鮮户牖秋色淨樽罍藹藹衣冠集紛紛燕雀來芝蘭隨日長茀祿自天培知命希宣父娛親學老萊逺山明有望深徑寂無媒碁響林花落詩成鶴夢回鈎簾通野氣閉閣理書堆琬琰崇家乘絲綸寶聖裁百年方半厯衆美似兼該晚潄泉飛玉朝餐菜截薹私懷真自愜王命恐相催筋力吾衰矣猷為子壯哉幸逢更化日應展濟川才壽擬岡陵並名期竹帛陪短童慚善禱為報謝瓊瑰七言律詩劉仁仲修撰歸省壽其祖母龍衮昭垂萬彚春從班多暇夢歸頻非關故國青山好為憶重闈白髮新畫舫寒光迎灔澦壽筵晴色散峨岷何由泂挹巴江水淨洗金罍侑幾巡送襄陽郭太守廷章兩考還任峴山深刻照乾坤善政千年擬並論魚藻載歌榮晝接虎符重剖慰思存風前旌斾河南路雨後桑麻漢上村送别祇今何必逺佇看玄髮入都門持節東魯為周希源冬官賦展親共喜天書下持節遙看水部東麟角新聲諧律吕馬頭晴色見龜蒙心馳闕里春風動宴錫靈光禮數隆周度想應河患急早攄籌䇿贊司空送尹如川副郎奉使靖江星郎蹤迹半天涯今日槎頭却到家萬里風雲隨絳節九原香火拜黃麻板輿曲盡人間樂晝錦從教里閈誇想得盍簪重對酒東風開遍上林花妹夫蕭時肅與其兄時堅攜酒邀余晚遊休笑菴才到城來便覺忙共尋芳草趂斜陽髙謳潭淨遙山合休笑菴深翠竹涼掃地開筵情轉洽倚風懷古興偏長斯文此會應難得後夜相思月滿梁陳秉衡劉闕二侍御餞余西江第一樓酒酣乘興却登樓千里湖山豁醉眸風挾霜威侵骨冷梅將春意與心謀繡衣愛客成佳會彩筆題詩紀勝遊後夜孤舟明月裏顧瞻南斗思悠悠送義興耕隱徐公還鄉先生歸向毗陵去木落天髙正及秋萬里長風吹潞水一船明月過揚州大家文獻風流在暮景林泉福履優籬下黃花應有待壽筵深泛紫金甌送胡長史之建昌親主開國綏南土賢傅承恩出禁闈鳳輦龍旗煩扈從緋袍金帶有光輝當杯莫惜離筵醉此别應知後會稀路入官湖詩景好落霞孤鶩看齊飛分題王司副天申沙溪八景得太守仙風南阡耕樂二首止存其一太守遺蹤半緑苔廟門猶倚碧山開競傳梅福登仙去恐向桃源避世來棲鶴長松無鳥宿鎖蛟深穴有人猜何當載酒窮幽討杖屨應須約我陪送封君劉先生歸陳留侍講司直之父先任南雍博士清朝父子才名重上國衣冠樂事多優老舊承天子詔考槃還賦碩人薖白雲有待開三徑明月相隨過九河物外髙懷誰共賞塵途回首一長歌送吳翰之任北勝州劉仁仲先生之友大夫官重清時選薦沐天恩夙志伸辭闕乍窺丹鳳曉下車初見碧雞春治如延壽終移俗政比陽城却近仁最是交親憐逺别便鴻無惜附書頻送同寅劉可大先生南還十年甲第尚青袍宦業多因養母拋朝退不辭趨館數夢回還念倚門勞燕山曉送雲邊騎嶺水秋移月下舠一日三公真不換相看吾已愧吾曹送熊掌教之任無極徐舜和先生為求徐其所取士也馬度河橋柳正黃青山千里護行裝道尊豈論功名薄縣古曾聞士習良高座橫經朝伐鼓小齋哦句夜焚香碧桃天上花如錦會有人傳種樹方送萬典簿之衡州久客京華鬢未霜又攜書劍赴衡陽黃金臺下人千里青草湖邊鴈幾行大國樞機關簿領小齋風月託壺觴知君更有登臨費七十二峯秋興長送學士李石城先生詣闕里祭告回祿後銜命専車駕四騏雄藩冠蓋逺追隨暫停祕閣裁書筆細講虞庠釋奠儀泗水秋風千古意東山明月幾篇詩眼前不用論興廢天地無窮祀典垂送李壽夫司訓之繁昌秋日河橋楊柳疏幾人攜酒送征車官清最喜逢迎少俸薄寧論服食餘紅燭夜傳齋內火青山朝對案頭書嚴君會有東遊興入饌偏多白白魚送羅宗溫太守之思南别駕翺翔絶後塵功成俄領郡符新從知簡拔遭明主想見敷施慰逺人錦樹秋風催畫舫青山春雨映朱輪三分公事詩兼酒莫惜篇章附鴈頻送朱克諧謁告還進賢故園桑梓客邊心看遍春花思不禁得告暫容親藥裏承恩終擬盍朝簪如雲雙鬢功名在向日孤帆驛路深莫道行囊無一物王言何止重千金送王慎簡乃郎還安成一見能令雙眼明謝庭蘭玉不勝清二南詩熟聞來日五采衣懸别後情檣上萬鴉淮浦樹江頭百雉豫章城經過數寄平安字莫遣髙堂白髮生送劉文煥憲副提學福建十年聲價重朝紳三世衣冠一味貧明陟乍辭丹鳳闕晝遊先慰白頭親豺狼道路風霜舊桃李門牆雨露新未覺離筵懷抱惡士風從此定還淳送羅宗器還任閩藩東林見月幾虧盈布被藤牀客夢清最績過煩徴覆考宗器以無按察司考語吏部行查是以久住報至乃得歸新詩長得入優評便民方略仍騰疏入幕風流獨擅名來鶴亭前春色早錦袍歸映百花明亭乃宗器建以為退息之所九日同彭景武春官徐舜和汪抑之器之三太史白雲觀登髙人情都愛重陽好塵世難逢笑口開與子丁寧深載酒及身強健數登臺千山落木嵐光老萬井寒煙暮色催上馬頽然烏帽側風流無讓習池回送羅子文任興化推官離觴欲罷更吟詩正是詩人别我時雲布曉隂天漠漠柳含春意日遲遲親闈視膳江魚美官舍開筵海錯宜珍重案頭三尺法功名何止百年期送李都閫赴江西將軍赴鎮馬如龍寶劍飛霜膽氣雄第一才名光武舉儘多能事振家風西山曉色旌幢外南浦秋聲鼓角中翹首雲臺髙萬丈會將歌舞笑兒童送蕭順之宰古田交情千載渾如昨文雅風流繼昔賢製錦秖今須妙手夢刀他日看喬遷仙舟泛泛投前浦啼鳥依依戀别筵勤學一生知底用姓名留取汗青傳次韻吳克溫先生雪假山二首對酒山成大笑號千金須賞片時勞解因積雪寧非智恐礙飛雲不用髙勢壓簷楹張鳳翼光侵樽俎析牛毛眼前真假無煩辨不見桑田變海濤夢裏山靈向我號良工無乃用心勞三峯削出瀛洲近千里移來太白髙見晛恍疑流石髓出雲空擬潤田毛知君自有悠然處幾度長歌酌翠濤送趙庭實太守之濟南入眼風標識貴人錦袍還似布衣貧久含雞舌趨金馬暫别龍顔剖玉麟千里封疆河濟合百年勛業鼎彝親寒風落盡離亭柳未阻隨車有腳春挽封編修吳公南夫先生尊甫憶過吳門趨拜日秀眉盈寸炯雙瞳承恩已帶氷銜貴愛客頻催玉觶空千里書來驚伏枕一朝仙去訝乘風天平山畔人多少細挹甘泉思不窮翁於天平山浚井以便往來者故云送段廷舉掌教之東平移官又問東原路臨别匆匆不盡觴庠序合興周禮樂山河猶記漢封疆行邊樹繞雲帆迥坐裏風回泮藻香師道正看繩祖武氷銜重擬荷恩光壬戌元宵應制四首明德當天厯數歸華夷無處不光輝還將燈火同民樂未覺觀遊與道違瑞靄迥浮溫室樹卿雲濃染侍臣衣不知夜色深還淺星近蓬萊頂上稀千金一刻是元宵惟有官家樂事饒煙火熏天呈巧樣管絃隨處奏新謡重門月上金鋪暖四海春回玉燭調願取滄溟供壽酒年年今夕奉神堯九陌香塵徹夜飛禁中燈火正輝輝煙雲杳靄魚龍見樓閣玲瓏錦繡圍風遞歌聲聞别館梅交春色上重闈皇心自警無虞日畢嵗觀遊此外稀舞態頻更夜未央漸看華月轉東廊燭龍夭矯天門迥火樹參差輦路長一笑獨回春似海三呼齊祝壽如岡太平樂事渾難寫擬續卷阿第二章試六館諸生喜而有作夙正衣冠坐講堂載歌棫朴興洋洋碧梧日上羣英合丹桂風行六館涼野馬蕩回周禮樂春蠶繅就漢文章陶鎔自愧渾無術校閲寧辭纍日忙送劉循理冬官公差之贑便道過家官曹暫入身如客省檄専承命自天驛路年華南鴈盡故園春色小桃鮮功名正屬三場後弩矢寧煩百步先何處詩懷應更好鬱孤臺上俯晴川齋居懷京中舊寮友殘雪凝光竹嘯風齋居那復故人同孤吟入夜才偏澀逺道逢春夢忽通七日文章慚霧豹百年蹤迹等泥鴻也應垂念江湖客鳳沿詩來定幾筒送馬汝礪太守還廬州尊翁時為南京少宗伯帆轉濡須鼓急撾兒童騎竹滿晴沙才傾别酒催行色便有春風管物華雲氣暖通南省樹茶煙清繞使君衙亦知撫字勞心在留取功名入世家氷蘖為彭中舍乃尊賦生來不作封侯夢老去依然赤子心千駟景公身易朽一瓢顔氏樂堪尋行藏自喜山林邃清苦誰知意味深欲叩凌隂探藥籠祕方珍重幾南金奉邀舊翰林諸公草酌次韻是會有詩太宰林公名曰壁水會詩煙雨樓臺午氣清肩輿聯過識髙情座當移處懷初暢酒到酣時令轉明樹好故應啼鳥戀山髙還被夕陽旌風流夢想瀛州舊璧水新煩訂會名送陳黃門惇賢送父還鄉安車穩就金陵養紫誥新貤近侍封正喜德星移照逺忽聞歸興逼秋濃銀鞍晚弄離亭雨綵服晨窗别岸鍾此去亦知寬告在壽筵無日不從容次韻呈守菴叔父平生防意直如城憂患無千老太平間對金昆終日欵醉看玉樹幾枝橫養魚水縮還親導採藥山深慣獨行誰道古人今不及鹿門風景正分明送鄭司徒致仕還鄉老至飄然謝寵榮詔書優進地官卿從知去國心猶赤見説還山夢已清驛路暫依紅樹宿海邦重訂白鷗盟維駒不盡今朝意仰斗徒懸後夜情和鄭司徒留别韻别酒初醒月滿江暫憑方舫作吟窗殘碁懶用機心著神鼎那無膂力扛路出五湖人去獨風清三徑鶴來雙間中著述能多辦消得羣儒北面降送邵憲副提學江西雨霽官河柳乍晞仙舟乘漲去如飛諸生學問存章句夫子心胸有範圍白鹿洞前雲漠漠聘君亭下草菲菲從來古意知多少此日臨登願不違中秋夜看月有作月滿髙樓猶未知今朝那合上樓遲不須達曙殷勤望且試停杯一問之三五何能長潔白尋常還是幾盈虧樂同年少心偏逺遍倚欄干有所思十六夜長空萬里淨無雲月色今宵滿十分清賞偶因嚴戒輟時老父以目眵止酒逺書頻遣吉聲聞時連得二弟書知允迪再被薦允恕亦平安山連北斗疑增峻風入南樓覺尚薰辦得此心如此景人間何事漫紛紛奉和大人送行韻上呈二首可人秋月滿樓光明發誰教促去裝清夢尚隨靈壽杖兼金難覓返魂香前周後魯知何日北斗南箕各一方惟有訓辭長在目要看千里作尋常奉來庭訓日周旋宦業無成浪有年愛日自緣心事切辭官非為里居便陶鈞妙手寧須我螻蟻微忱莫動天離思更將秋色逺晚江孤鴈落霞前又用韻奉廣大人之意二首慣依黃髮欵年光肯為浮名浪趨裝竹色不隨寒暑變花枝長伴笑談香家傳宦譜非今日道濟時艱有大方烏鳥私情憐未遂諸孫歌舞亦能常兩京仍護彩舟還色養關心幸有年三徑舊開風月滿深衣新製起居便謳吟體傳唐家律寤寐心懸杞國天逺别極知諸福在夢魂偏泥寢門前兩有年字同義別瀛洲雅會次劉野亭先生韻四首垣竹埤梧映碧溪八龍名氏鑠新題乾坤此會今能再江漢清流自不西前席已歸黃閣老雅歌仍和北山藜黃花待我渾無恙敢向霜枝著眼低鄙夫貪住白雲溪一鶴多慚大手題幾憶蓬瀛天逺近又親談笑席東西酒行樂處兼浮白羮味平時半著藜千古斯文知未喪晚風衰柳望中低分曹多暇復同遊意氣歡然隘九州佳地稱為文字飲清樽嫌及婦人謀毫端珠玉三千首眼底衣冠第一流却恐疏慵參未得君恩交誼兩難酬黃花對酒勝春遊甕裏蒲萄肯換州諧謔有時成故事行藏無處著人謀病軀每憶三年艾長楫終輕萬里流瓊玖木瓜渾不類向來詩句若為酬送王實菴太宰致仕承詔歸田鬢未皤好山徐奉板輿過人生盛福今如此身外浮名更若何四海均平藏妙用三朝遭際足恩波夢魂儻憶留都景飛示新篇莫厭多楊文貞公祠成大司成氷玉先生有作次韻二首霖雨當時已霈然更餘膏馥逺流傳元臣廟食宜千載太守囊封契九天奔走故應多士合經營還喜後人賢清時盛典那無紀牆壁新題又幾聯物情天意久差池殷禮初聞賦孔時公旦蒸嘗侯國領巫咸勳烈史官知衣冠此日方胥慶陵谷他年莫浪疑來哲升堂渾不少合分前席與伊誰送王伯安入朝巵罏聯句佛燈前雲散風流頓十年曽見山東題小録又聞瀛海遇真仙一封朝奏心徒切萬里生還命有懸今日仕優仍好學獨攜書卷去朝天慶鶴次劉野亭先生韻四首出塵標格價難裁籠入南宫手自開槐露乍零呼伴起竹風微動御仙來新袍有象宜為主老鳳無毛合避臺我欲借騎應不惜上摩黃道訪三台故典新儀賞討裁鬱襟煩思若為開才看種竹百竿活又喜傳書雙鶴來聲徹鈞天偕律晚食分清俸走輿臺浮丘相去流傳在何似吟篇落上台鳴臯詩好為誰裁靡爵心同象有開禁省合容山客聚竹窗疑是故人來春程玩舞時參隊靜鼓瑶琴屢傍臺多謝揚州貪刺史清風千古屬公台緇素應煩玉女裁曉風聲度畫堂開身輕幾欲凌雲去性警端能擇主來曽見蘇公遊赤壁復隨清獻過琴臺人間俯仰江山舊今日光華邇上台送黃太宰先生致仕馬船橫壓大江湄且對離筵賦别知天上風雲還似昨古來卿相亦如斯青山自是通行路黃髮何妨再起時家近蘭亭春正好未應高興減羲之送楊長史之任璧水溶溶老翠芹湘潭春色又平分裾長穩向王門曳調古多從宦邸聞曉殿光華依大雅晚窗消息付微醺有時夢繞同寅地莫遣緘書隔暮雲送韓大卿赴刑侍任宦轍周流四十年甘棠隂在有詩傳匡時慮逺人難識執法官髙地屢遷朝下午門同輩少賞尋韋曲晚芳妍羣生共此恢恢網一道宏綱上屬天送俞少司空赴召鶯求高樹有新聲吹起殘花弄曉晴春水欲平桃葉渡冬卿初别石頭城魏牟江上心能逺顯父壺中酒正清臺沼百年餘武烈秖應前席問蒼生送林博士赴九江二守任手裁桃李盡成隂此去應勞撫字心清酒幾行賒後會朱絃三歎有遺音爐峰日射香煙紫湓浦潮添雪水深解慍風行吾亦快不妨題句滿東林陳復清挽章侍御察之父吳水東頭舊隱村幾株楊柳映柴門間中秀句多能辦身後清風凜尚存藥圃燕交春徑迹釣沙龍變晚潮䀶亦知埋骨青山久深入泉臺有湛恩次韻睡起答何中蒙趙元默二舉人二首趙嘗及白沙門雨中江柳亂毿毿午枕知君未肯貪萬里珠還南海櫝一般青出白沙藍心遊物表風斯下坐到更深月正南巾幘依然塵不染蒼頭猶進曉盆泔眼前真合口三緘山有黃精憶舊鑱美酒如澠輸客醉翠屏當牖要人監吟多未覺風光盡夢少何妨燕語喃行止分明天意在北風長夏送歸帆時除名歸雨中過鄱陽湖望廬山不見那堪雨腳連山腳寄與山靈莫浪猜宇宙要開觀物眼風波方見濟川才卧龍庭院誰専領跨鶴仙人儻一來袖有瓣香真自惜爐峰何日掃莓苔北堂永秀為趙元默賦北堂坐對宜男草遊子行看永秀圖風渚殘燈飛夢近曉叢清露著花無香浮壽酒筵初秩影亂斒衣日未晡共識王孫家法逺眼前餘慶是貞符候風南浦連日苦熱南浦逶迤緑樹多萬艘環繫水無波喧聲不覺催人老美景其如執熱何河朔芳樽空往事郢中白雪漫髙歌十年塵垢紛盈爪聊就深清試刮磨寫懷寄監中寮友雞鳴山下橋門路二十年中憶屢遊伴食再書新紙尾趨庭先到舊營頭大人舊居校尉營清時有幸歸田早白日無私照物周千里故人髙誼在幾回風雨夢孤舟環山樓為陳太僕題元龍牀上有高樓新占淮南第一州青翠入窗來不斷圖書終日坐忘收花香客醉釀泉酒雨霽人爭野渡舟吟送夕陽芳草逺滿川雲錦散驊騮慶族叔用丹甫壽七十東風吹却暮雲輕南極星光徹夜明細數春秋經七十直從髫齓閲升平山扶棟宇層層在手種松篁箇箇成壽酒一年還一度德音長合重鄉評用西阜叔父韻謝守菴叔父招飲小樓偏得近髙居酒熟常蒙隔壁呼最喜家庭多壽豈不妨窮達有乘除古人可作歸元亮實事堪陳陋子虛飲到酣時情已洽天寒何必更投壺用韻謝諸父見過賞雪雪中清賞就蝸居坐久還聞凍鳥呼草率時羞慚餖飣拜興常禮荷開除老親飲量渾無敵諸父詩名總不虛聞説梅梢春意早擬於花下更攜壺次韻寄二弟并自述同朝同氣復同居看取荆花滿意舒斗附北辰喉舌正春生嚴棘網羅除笑談自可兼三益變動還應玩六虛飲酒飫時遙念我磁罌無謝玉為壺奉親堂上是安居春酒杯長日自舒已向園林成獨樂不知廊廟富新除讀殘帝典孤燈在參透禪機萬象虛藥籠秖今多國老間身聊寄老翁壺天涯書到動經年字滿長箋又短箋小日弟兄原競爽一時名位總光前從知有道興明哲自信無媒合蹇連身世未應容易了古書何啻一囊錢聞逆宦伏誅次澄江公韻元惡端宜具五刑株連仍覩罷三卿曹劉畢君臣有道終須正天日無私本自明堪笑李斯空歎犬張也若為馮道尚封瀛焦也中興合在周宣上一攬威權萬國平次韻奉呈大人一門重疊被恩光仰愧慈烏又趨裝清酒已廑先敘别紫袍猶得自薰香心期及物才非稱教熟趨庭行合方聞説便途歸仲子私恩公義總天常將行之旦得加封文書遂行望謝禮告祠堂會族次韻答守菴叔父復官之賀社鼠寧容久穴居時來羣憤一朝舒祖功宗德分明在苛禁繁文次第除萬里渚鴻飛向北幾人蕉鹿夢成虛不才也復青氊舊賀酒親煩載滿壺次韻答曽雪坡此行疑是又疑非賴有髙人獨我知義重敢先東郭弔情深難忘北山詩即看俎豆橋門日寧異簞瓢陋巷時好景别來偏入夢雪坡春水到愚池寄李敬夫用其送行韻二首謫仙孫子瑩氷清七步踉蹡五字成心逺獨憐山水好眼高渾看利名輕存身我已慚龍蟄縻爵誰應和鶴鳴别酒半醒回首處江風吹浪暮雲平幾載巖居夢亦清手栽松竹喜初成君王自合天明畏我輩寧關世重輕殘卷未容資蠧食好山重許對雞鳴却愁心學人稀講滿耳高談了治平整菴存稿卷十七
