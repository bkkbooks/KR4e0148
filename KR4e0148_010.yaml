body:
  text: 整菴存稿卷十明羅欽順撰疏一十二首缺三首獻納愚忠疏正德六年秋時為南京國子司業臣學未聞道用不適時猥以棄材復䝉收録天地大德萬死莫酬亦既備官勉修厥職顧惟事君之義尤以獻納為恭謹竭愚忠上陳四事小見僅同於坐井頑石謾期於補天伏乞聖慈俯垂省覽采擇一二少益髙深庶幾愚臣圖報之萬一也四事一曰修德臣聞惟德可以動天惟天佑於一德竊嘗仰窺天意其眷佑陛下甚隆是以賊臣劉瑾之蓄謀雖深而太監張永之輸忠甚力蓋有隂相之者非偶然也陛下既以褒賞功臣延其後嗣獨不思所以奉答天眷以祈永命乎奉答天眷無他惟增修其德而已夫孝奉九廟敬事兩宫親睦宗藩禮接大臣仁愛萬民凡此皆修德之實也而其要則在勤御講筵痛節遊宴茍凡天下之理莫不備於經書必其講之素明然後行之不繆故終始典學髙宗之德所以無愆好古敏求孔子之聖所以為大臣頃伏田里竊聞陛下嵗御經筵不過一再近臣執經以勸講者纍嵗而未周然則此理之微疑有未與聖心為一者德何由而日新乎此勤御講筵所以為修德之要也臣聞文武適張弛之宜先王無流連之樂祖宗故事遊宴有時今陛下無日不遊往往繼之以夜雖心意良愜而形體甚勞是以奉先殿之朝謁或妨兩宫之定省時曠宗藩之奏請或滯大臣之進見轉疏况乃玩好日新繕修日廣勢不能無妄費左右日狎請乞日繁勢不能無妄豫府庫之財且盡溝壑之民愈多陛下將誰與守邦乎然則遊宴不節臣恐於孝敬仁愛之德皆有所虧此痛節遊宴所以為修德之要也陛下審能勤御講筵痛節遊宴將見盛德髙於千古天眷申於萬年篤生元良永為民主宗社靈長之慶其必在兹二曰勤政臣聞虞舜兢業以圖幾周文和民而忘食我祖宗躬勤聽斷逺法舜文每日昧爽臨外朝府部等衙門以次奏事已而又臨內朝司禮監等衙門亦以次奏事皆有定規臣嘗伏讀我髙皇帝詔㫖有云朕居江東三十六年未嘗見日而臨百官又嘗伏讀睿皇帝聖諭有云朕負荷天下之重五更二㸃起齊潔具服拜天謁奉先殿行禮畢視朝循此定規定時不敢有誤退朝至文華殿或政事有關大臣者則召而訪問商確臣惟此皆陛下家法所當率而行之者也奈何近年以來視朝愈簡時或一出多至日中萬務糾紛未遑盡理流傳四逺虧損實多臣愚伏願陛下嘗以昧爽視朝使大小之臣趨走之吏有職役者皆得以盡亹亹之勤於昭昭之際而事無不康朝集之員蠻夷之長當見辭者皆相與瞻穆穆之容於蒼蒼之表而心無不肅遇有大疑未決大政未安即乞如睿皇舊規特御文華殿宣召大臣從容商確憂勤惕厲之心果無間則安富尊榮之福亦無疆矣此臣之所為陛下願也三曰作士氣臣聞猛獸在山衛及藜藿中流砥柱遏彼狂瀾自古士氣之盛衰實繫朝廷之輕重不可誣也頃者賊瑾盜權擅作威福毒痡四海不忍究言在朝臣工孰無知覺曾弗能抗已愧於心况或首開趨附之端或隂為羽翼之助彼致聲生勢長因造逆謀不測之憂幸而獲免臣不知後人之視今日其猶以為國有人乎否耶今士氣積衰理宜振作振作之要舉措為先蓋凡為賊瑾挾私懷忿而斥逐之者大抵多正直之士也近雖節次誅鋤而其大者猶在當治化更新之日實世道轉移之機公論未融人情尚鬱將何以振作積衰之士氣使之一旦有以隱然增重乎朝廷哉此愚臣之所以有憂也伏願陛下參考羣言勿為私意之所牽制勿以一眚棄大善勿以微勞貰大姦伸厄窮斥朋比退讒諂進剛方意嚮既明士風立變庶幾緩急之際有可倚仗之人不然國之安危未可知也四曰審時宜臣聞禮莫大於時易貴通其變我祖宗立國參酌古今其大經大法之昭垂蓋與天地相為終始至於剛柔之用損益之權理須隨時勢難執一臣嘗推尋故事竊見永樂年間之所行已不盡如洪武而大者至建新都宣德正統年間之所行又不盡如永樂而大者至捐交趾是非固欲相反皆其勢不得不然然則今日之所宜行有不容以常例拘者救時之道也臣聞重華有弟源源而來行葦之詩載歌具爾伏讀皇明祖訓定有親王朝覲之儀中輟多年似為缺典朝廷親睦九族恩意固無不周但禮重朝宗勢資夾輔雖然中輟亦可復行竊詳中輟之由殆以勞費之故然臣伏讀祖訓又有世子代朝之文斟酌變通惟陛下之所處爾如以世子代朝勞費亦省由近以及逺由親以及疏上以顯陛下親睦之仁下以表宗室朝宗之義光昭祖訓隂折姦萌此今時宜之所當審者也臣聞周室附庸不與王㑹虞廷考績止及庶官我國家蓋推廣而兼用之凡方面之長及府州縣正官若首領官皆三年一朝凡方面長二及府州縣長二若首領官皆三年一考其法視前代加密矣然行之既久勢若稍窮變而通之宜在今日何也蓋朝覲之年正官皆往事歸權攝多不得人以致吏緣為姦變亂文籍盜伺其便攻陷城池似臣鄰縣萬安去年之變正坐此耳臣恐天下之類此者尚多也其或朝覲甫還又當考績往來道路動及朞年文册初無甚殊賢否不容頓異徒使正官久曠而政出二三非所以為民也臣愚以為天下之縣皆統於府若州州府正官應朝凡百當任其責所屬知縣似可免行使各縣皆有正官則州府可無後患既省科斂之擾尤適繁簡之宜至於應朝官員已經部院考察免其考滿似亦無妨常使在任日多庶幾事無廢壞此又時宜之所當審者也臣聞至誠成物猶待悠久漢人為吏至長子孫我祖宗盛時在外巡撫大臣及方面府州縣正佐官員莫不久於其任如周忱巡撫蘇松等處凡十有八年陳本深知吉安府亦十有八年其他但有遷改往往近八九年故人無茍且之心而事無廢弛之患然而遷轉之際不盡循資惟其才賢而已如周忱自郎中即升侍郎陳本深自主事即升知府其他科道部屬或就升都御史布政按察使知府髙第或就升布政使蓋超遷之法與久任之法相為流通超於前則後之久任皆謂當然超於後則前之久任孰云淹滯人心競勸職此之由頃年以來専用資格一資半級魚貫以升自西徂東倐近而逺往來如織勞擾多端奮厲有為者或開端而未竟其功因循自便者第謹守以坐需其進欲求事理民安其可得乎臣愚以為時方多事所宜破常格拔真才省遞遷隆久任以為陛下分憂共理惟陛下主張於上則大臣有以奉行於下矣此法果行則凡自臬轉藩自右補左皆宜就近不必他推至若分巡憲臣似亦無庸嵗易宜令各専一道之寄仍俱假以兵備之權事權既専責任亦重儻令地方有事彼將何所歸咎哉此亦時宜之所當審者也臣聞去盜之䇿或動干戈用兵之道必嚴賞罰今自京城內外至山東河南四川湖廣江西廣東等處盜賊羣興大者攻陷城池僭稱名號小者燔燒聚落殺虜人民朝廷節嘗慎擇文武大臣俾其分投招捕或㸃集民壯或摘撥禁軍區畫多方而成功未奏者臣竊推求其故無乃賞罰皆輕之所致邪兵法有之軍無財士不來軍無賞士不往夏書亦云威克厥愛允濟今大臣雖奉敕行事然將士有不用命者未嘗輒誅一人或有勇力超羣敢於殺賊及機謀深密堪以為間者數金之賞又不足以易其一死欲以重賞購士則府庫之財大抵劫劫無餘安危所關變在呼吸始謀不盡後悔何追臣竊聞頃者抄劄賊瑾家財金銀動踰百萬此皆萬民衣食之資而聚為賊瑾囊篋之實民之為盜固其所也夫盜起由財之聚則財散而盜可平散小儲以成大儲此臣之所為陛下願也陛下幸聽臣言乞於前項用兵地方各分給入官銀錢十數萬兩俾討賊者以為購賞之資仍乞假以便宜之權俾其一切以軍法從事前有重賞後有重罰則將士無不用命間諜無不盡心盜賊之平計日可待此又時宜之所當審者也夫天下至大可言之事蓋不止此第臣愚陋所見弗周自源徂流才得其四中間節目亦未盡詳陛下省覽之餘倘不斥為迂妄伏乞以前二事躬行於上以後二事付大臣討論斟酌奏請施行誠致察於邇言必廣來乎衆論盡聞天下之利害以謹百司之廢興馴致太平實由於此臣不勝惓惓願望之至疏入留中考察自陳乞休疏正德十年時任太常寺少卿臣才不逮人學未聞道遭逢聖代忝竊賢科受恩兩朝躋位四品職甚清而每慚於寅直祿逾厚而無補於涓埃矧年力之向衰兼肺腸之有疾誠合退藏於空谷豈容久混乎清朝考察方嚴自陳敢後如䝉乞敕吏部放臣致仕回還原籍俾全拙守以謝素餐則自始至終莫非天地生成之賜矣災異自陳乞休疏正德十一年時任南京吏部右侍郎臣以駑劣待罪南銓側聞數月以來風霾屢作於京師荒旱逺連於陜洛穆清之上方用焦勞小大之臣咸懷憂懼臣夙夜亦加循省惕然不敢以自寧者竊以災異之來實由庶政庶政厖雜責在百官惟百官皆得其人然後政理日修災異可弭有如臣者才猷短淺學識迂疏當此多事之秋曽無一毫之益理當求退以讓賢能伏乞皇上察臣愚衷特賜俞允俾才不才各當其分庶有益於修政之實而臣亦獲免乎妨賢病國之􅏺不勝區區至願乞歸省疏正德十二年冬時任南京吏部右侍郎臣原籍江西吉安府泰和縣人正德五年䝉恩起廢復除南京國子監司業六年三月到任管事自後兩䝉簡拔以至今職恪守官次於今七年臣有父用俊在堂先䝉聖恩以臣弟欽忠出納命令微勞封通政使司左通政今年八十有一嵗矣臣久違定省晨夕興思而臣父老境彌侵亦復念臣不置伏覩國朝著令京官供職及六年者其親在例許歸省近時臣僚節有援例上請者每荷矜從臣雖愚庸而為人子一也伏乞至明垂照大造曲成容臣照例省親以少篤夫私恩依期還任以勉盡乎公義臣舉家欣戴何有窮已不勝懇切祈望之至再陳情悃乞休疏正德十四年秋臣先以三年考滿例應給由緣疾病交侵不能赴部具奏陳乞休致奉聖㫖羅欽順學行老成著照舊用心辦事不准所辭吏部知道欽此已而吏部為缺官事㑹官推舉具題節該欽奉聖㫖羅欽順改吏部右侍郎欽此臣近日連得咨報一一恭行捧讀訖因伏以思期月之間兩䝉恩命諭留甚寵擢用惟超顧臣何人而可當此感激之至慚懼交深分當力疾赴京委身供職庶勉䇿於駑鈍期少答於鴻恩欲求終遂便安固臣之所不敢也惟是銓衡所寄參佐必須得人臣以多病之軀無能之質南銓事簡猶覺弗勝幸滿三年因乞休致今來求退獲進去簡即繁病既有妨才復難强坐縻廪祿何補絲毫必將纍聖上知人之明損清朝序位之美而臣之罪悔其何以追贖哉是以心雖切於報恩慮不忘乎審已深惟疲苶弗稱髙明用敢再具封章申前所乞仰惟天地之量日月之明伏望赦臣煩瀆之誅察臣衰朽之跡容臣辭免今來所改官職准令致仕以養無能則朝廷之舉措得宜而愚臣之進退皆寵光之所被也臣無任祈恩俟命踧踖屏營之至謝賜先臣祭葬疏臣先於嘉靖二年四月內丁父封南京吏部右侍郎用俊憂竊思所以假寵几筵增光窀穸者具以情事上聞荷䝉聖慈俯垂憫念賜祭與葬有司承命奉行惟謹祭禮既以時舉墳塋工亦完備榮光焜耀垂映無窮臣舉家存殁無任感戴天恩之至臣於襄事之後即圖趨造於朝百拜稱謝不期舊疾舉發下血不止展轉牀席自春涉秋耗損過多氣力全乏至今動履艱澀欲進不能若更稽遲愈增罪戾臣誠惶誠懼令親男國子監生羅珝驅馳赴京代行祇謝之禮臣北望闕廷神爽飛越仰祈天鑒俯燭下情辭免禮部尚書疏嘉靖六年三月嘉靖六年三月十九日吏部差辦事官齎到公文一通內開節奉聖㫖堪任禮部尚書的吏部上緊㑹推學行老成公議協服的兩員來看欽此㑹官推舉得守制服滿原改禮部尚書羅欽順禮部左侍郎劉龍俱堪任伏乞簡用一員令其到任管事題奉聖㫖是羅欽順便差人齎文去取著上緊前來到任管事欽此咨臣欽遵施行臣孤露餘生日就枯槁不意聖明復厪收用訓辭下逮有赫其臨義重身輕敢忘圖報惟是審已量力則誠有不敢當者切惟聖朝典禮在今日固已大備顧其間隨時損益自不能無為禮官者茍非學有本原通知今古折衷適當良未易言况乎儀文節目之繁乃至纍千百計自非强有力者行之鮮能以無失也臣誠至愚然自知頗明不敢有隱平生所學僅通章句其於大道初未有聞特此以居禮曹將何以為折衷之本加以賦禀至薄多病早衰今年六十有三而精力覺已全乏視昏聽重心思短淺以此奉行三百三千之禮愆忘之患其能免乎則臣之不堪前職昭然可見矣是以聞命以還慚懼交集凜措躬之無地爰瀝懇以籲天語皆由衷無敢矯飾伏望聖明垂照察臣悃愊俯賜矜從俾臣仍以舊銜終老山林别選賢能以當其任則朝廷之舉措惟允而愚臣之分義亦粗安矣臣不勝惓惓至願辭免吏部尚書疏嘉靖六年六月嘉靖六年六月二十三日吏部差辦事官齎到公文一通內開為傳奉事吏部尚書缺員該本部㑹官推舉具題奉聖㫖羅欽順改吏部尚書吏部還差官去催取著上緊前來到任管事欽此咨臣欽遵施行寵命再新慚惶滋甚緣臣初辭禮部之任實以才微力憊勢難勉强今復䝉改臣前職責任逾重臣何敢當雖欲避譴於頻煩義誠有所不容已也夫致治之要莫切於官人而凡髙下之稱量幽明之鑒别其責皆歸於吏部尚書首任其責者也必其明足以有照公足以有執量足以有容庶幾可以仰贊聖謨式序在位顧此三者臣皆未之有焉而近年以來左耳常鳴目力漸短尋常視聽殊缺精明臣之多病早衰此其驗也夫行能既無可取而衰病復有所妨雖末僚且當辭避况銓衡之重任乎使不審而冒處焉其不至於獲戾者鮮矣在臣之愚何足過計所深懼者將纍皇上知人之明是敢傾竭愚忱冒干天聽伏乞聖明垂照諒臣之非矯飾矜臣之果不能特敕吏部收回成命俾臣以原官致仕别選賢哲以掌銓衡則庶績有其凝之休愚臣免曠官之罪獲茍全於晚節誠仰賴於鴻鈞臣無任懇切祈望之至致仕謝恩疏准吏部咨節該臣具奏辭免吏部尚書重任懇乞休致等因奉聖㫖卿才行素著人望久歸近自陳休致已有㫖勉留如何復有此奏既情詞懇切准致仕有司仍月給食米四石嵗撥人夫四名應用吏部知道欽此欽遵備咨到臣謹已望闕叩頭祇受恩命訖理合具本謝恩伏念臣一介書生粗通章句偶塵科第遂厠班行自翰林編修六遷而至今職叨享祿位三十餘年荷䝉國家長養登用之恩至深至厚曾無毫髮微稱所䝉近以衰病支離不堪驅䇿力辭重任懇乞退休章奏再騰俞音始降在臣私願亦既滿盈豈意聖慈垂念閒居日用之須重以食米人夫之賚恩加望外寵倍常倫誠由帝德之如天不忍一物之失所遭逢有幸感激無涯竊揆餘齡無階上答惟遇嵗時令節瞻天拜稽祝延聖夀於億萬斯年此則愚臣惓惓一飯不忘之義也然而尤有所深願者伏惟願陛下靜以制動安不忘危敬奉天時恪遵祖訓允蹈書經之三要備舉中庸之九經髙盛治於百王回享風於九有非獨愚臣幸甚斯實天下之幸宗社無疆之福也臣無任感戴恩德願效餘忠之至整菴存稿卷十
