body:
  text: 整菴存稿卷十五明羅欽順撰祭文三十首祭澄江先生尹文和公文嗚呼學之博矣或短於辭惟公通敏當代攸推文章事業兩得云稀經濟大略公復有之雄聲偉望清秩崇資遭逢憲廟尤被簡知孰工為間官屢外移卒登黃閣參預政機王言以大國是以熙元良是保朝著是儀重明繼照彼此一時奉身而退鄉有衮衣江山之勝可遊可嬉著述之富愈出愈竒踰八望九一疾不支訃音上達當寧齎咨諡從中錫葬則有司公乎奚憾不朽在兹顧惟某等嘗辱提撕山頽梁壞何仰何依寓哀一奠有淚漣洏澄江明月悠悠我思嗚呼哀哉祭三江先生毛文簡公文嘉靖更化朝多老成一其心力以迓休明公作春卿首嚴邦禮既飭既周神人具喜心勞身病夢繞南雲里門未入凶訃遽聞嗚呼哀哉學博而醇文清而婉德厚才充識精慮逺賢科首選謙約自持居無妄動行必循資甫陟桂坊孰甘余沮竟長詞林孰非吾與經筵陳説亹亹其恭文場校閲濯濯其公乃佐銓曹遂聯八座多事之秋有聲無過驅馳萬里捧日而升化成可待壽顧弗增嗚呼哀哉議禮之難古今所病猶幸殘經頗存明證品節有稽民志斯定公之忠勤於斯為盛懋官懋賞恩則非私病妨朝謁位許暫辭錫之溫詔春浹肝脾預期平復來覲勿遲公竟不來皇心孔䀌官豈不髙用其未極易名孔令恤典載申光昭青史一代全人欽順無能辱公同榜過賴公消善資公長星霜屢易乖隔恆多尺書往復不廢琢磨爰及晚年幸同史事筆削方殷去留復異從兹一别再見無期遡風承訃有涕漣洏頃值家艱荒迷失度薄奠寫忱後時為負嗚呼哀哉祭楓山先生章公文嗚呼天髙日朗公之襟懷地負海含公之問學德容之溫潤則甘雨和風氣象之尊嚴則泰山喬嶽萃精誠於月窟天根悟至理於鳶飛魚躍亹亹焉無時不勤休休焉無日不樂此欽順之於公蓋未易極其形容而粗能道其大略者也公之發身則聽歌鹿鳴省元甲榜吉士蜚聲公之厯官則翰林編纂評刑僉臬司成六館然而滿考之書恆少居間之日甚長惟公論之交附肆屢騰於薦章朝廷方急於用賢由司成三遷而正位宗伯公尤篤於自信自南雍一退而終老故鄉此欽順之於公蓋未易詳其本末而粗能道其行藏者也藻思雄文忠言讜論折獄惟明誨人靡吝何王金許上遡程朱正傳斯在之死弗渝其所未為付之猶子出入門牆矧多良士謂公宜壽千百為期云何一旦失此人師欽順初涉仕途公方髙卧竟以非才忝為公佐夕炙晨薰膏枯起惰巨海纖鱗欣然自賀研窮性命商略古今何逺何近何淺何深奉違彌久懷仰無任屢憑過客貽我好音聞訃南銓亟圖遣奠家問驚心弗果如願奄罹大故孤露煢煢迄兹纍嵗徒抱微誠墓道春風青回宿草翼翼新祠柏題蘭橑敬遣頑兒祇薦蘋藻短誄無文中忱是倒嗚呼哀哉祭大司徒吳公憲之文嗚呼才不虛生名不茍得必有勳勞效于邦國承流宣化激濁揚清兼資文武濟以忠貞四十年間如公有幾君子所資小民所倚我皇勉勉方切圖終人惟求舊公遽罹凶天實生公著名亦早胡不少延為傅為保嗚呼哀哉臯臯訾訾其玷莫知靖共在位公則有之赫赫炎炎其焰可畏寵辱不驚公其無愧髙冠初挂三徑已成論文尊酒樂我良朋伴奐優遊疾綿壽祉曽是哲人七旬而止嗚呼哀哉蓋棺論定好惡疇私銘幽揭顯不朽在兹丹旐翩翩行就窀穸曷寫哀悰瓣香束帛交遊之痛邦國之悲昭明如在歆此一巵嗚呼哀哉祭大司馬王陽明先生文惟公才周萬務學本一心氣蓋古今量包湖海紹斯文之墜緒躋斯世於平康豈惟衆所同期誠亦公之自任遭逢昌運服在大僚屬時望之方隆胡仙遊之遽爾固有光於建立曽未究夫經綸偉矣希文天章遼邈勞哉諸葛渭曲凄涼愚也弟兄夙欽風義交遊以世氣味攸同宦邸論文不在盈尊之酒歸途講學猶存隔嵗之書約信頓乖䀌傷何已素幃伊邇薄奠斯陳有炯精靈鑒此誠意嗚呼哀哉祭都憲金公德潤文嗚呼一第為階百年良逺何以克終其惟勉勉公由鄉校起擢巍科郎胄精彩如鏡初磨乃職旬宣于川于廣于贑摐金閩楚交響廋姦隱慝公鑒惟明深山長谷公令惟行莫祥匪刑莫惠匪政凋瘵以蘇反側胥定通才宏量勤力小心何燥何濕何淺何深玄髮欲斑外庸斯訖旋軫留都式均勞佚乃佐邦政乃長憲臺不徐不亟隂闔陽開有周其防無罅不補遭彼權姦莫豫敢侮功成身退壽考令終全人之目交口屬公訃徹九重載廑恤典出綸如紼俾幽作顯靈輀將駕素服盈庭齎咨涕洟豈獨親朋亦有瓣香來自千里報德酬知以後為恥吾儕宿誠奠此一觴斯文之好何日而忘嗚呼哀哉祭都憲歐陽公子相文惟公稟質瓌竒抱才卓犖行事近乎中庸處心一於誠確鄉榜榮登甲科繼掇出宰花封春勻萬萼晉陟烏臺秋髙一鶚秖膺副憲之遷躬提列郡之學既樂育夫英材亦兼療乎民瘼方面正員載光簡擢刑以時清政以時擴尹京府而令聞沛然佐都臺而清風凜若宜享遐齡永儋髙爵胡一疾之偶霑竟彌留而不作氣之當盡者既還付於山川用之未窮者終虛委於冥漠此上下之情所以無不䀌傷而吾人之淚於焉為之迸落也丹斾悠揚長江空闊歸葬故山復為完朴某等好素敦於同鄉禮宜薦乎清酌痛方甚而詞莫宣情有加而儀則薄嗚呼哀哉祭常少劉務教先生文惟靈天資醇朴心地坦夷為石潭之孫而克繩其武為文安之子而善為之箕中舍承恩光增東閣符臺進秩名著南畿既兼工於詞翰亦克謹於操持遭權姦之亂紀甘廢黜而不辭隂霾既廓舊物重縻爰被清卿之擢厥惟顯相之宜俄嬰末疾乃宿名醫方屢更而藥罔效疏朝上而舟夕移行金緋於清晝覩桑梓如平時小愈之歡僅洽長終之慘遄罹訃音逺徹孰不興悲欽順分聯伯仲韻協塤箎尚擬重遊之有日寧知再見之無期遙陳薄奠以寫我思公乎如在庶克鑒兹嗚呼哀哉祭太平知府王公文嗚呼世祿之家鮮克由禮自古雖然豈無卓爾惟公先世太守尚書公少而貴晚亦分符百有餘年有祿有位公視如無溫恭靜退出言舉足循矩應規若無不可而有不為三載遐邦令行禁止食之誨之大小咸喜庶幾黃髮以究厥施天乎何意曽不慗遺歸葬兹山其寧惟久生死交情炙雞絮酒嗚呼哀哉祭封編修陳公文嗚呼鄉有老成一鄉之望儀刑所存奈何凋喪公以子貴惟德稱之出言不茍持行靡虧命服在躬聲華有煒會訂耆英養隆甘旨髙年盛福以引以增後生小子是仰是承子秩再遷握章南院庶公一來式燕且衎安車未動凶訃遽聞愁雲黯黯落葉紛紛凡在官曹孰非僚友惻愴同情遙奠杯酒嗚呼哀哉祭王宜學編修文惟仁與義人道大端有生均稟去之實繁所貴吾儒真知允蹈為臣必忠為子必孝時雖多變我則有常不幸而死其道彌光君世髙明資稟尤粹學匪詞章務求諸內一官翰苑再犯逆鱗甫離炎瘴竟殞其身新化方流天子明聖彼獨何人搆兹禍阱是非榮辱茍快目前百世之下容有聖賢旅櫬來歸江山慘淡求仁得仁君亦奚憾斯文之好逺大之期嗚呼已矣曷寫余悲祭蕭若愚憲副文甲子之秋鄉升秀士我之識君兹惟其始出入兩京過從二紀我之知君詞章政理間辱詩箋率單底裏我之懷君室逺人邇權任方隆生涯遽已我之悼君胡能自弭身後清名洋洋盈耳有永其聞克旋其里弔以疾妨辭由誠纍寓敬一觴靈其鑒只祭告江湖之神文大江之神鄱陽湖之神章江之神欽順不幸喪妻封孺人曽氏又喪介婦張氏兹遣兒子珝扶送二柩由上新河發舟歸于泰和以圖安葬江湖浩渺厥有攸司謹以剛鬛柔毛果殽清酌用伸虔告神其保佑俾人情胥協風波不驚登岸如期副此惓切則存沒皆受明賜謹告祭舅氏鼐翁文嗚呼吾母兄弟次長惟公孝友直諒古人之風公在初年讀書幹蠱出取束修入奉慈母家口數十視猶一身飲食衣服莫或不均亞卿公族父也有言汝家良睦彼富彼豪視之有恧曽惟大族禮正吉凶須公裁酌以適于中公於晚年頗厭紛擾後子前孫朝園暮沼龍坡春暖杖屨出遊登髙眺逺其樂油油老父家居門牆密邇時枉過從談笑移晷吾母先逝幸公久存庶同老父頻對清樽將謂昊天俯從斯願孰意今兹奪公壽算嗚呼哀哉欽順無似早辱稱竒鄉科之捷耀以大旗逮佐南雍特廑枉視目擊清貧口贊心喜雖無旨酒亦暫淹留平安之報别後屢收頃乞侍親來歸故里見公康強欣慰無比兹逢新嵗緦服任躬拜公弗克公遽考終嗚呼哀哉考公平生諒無可訾沒世有稱訂于君子衣衾既備棺斂孔時哀號悲泣莫匪親知龜吉辰良祔于先祖水繞山環有龍有虎公歸奚憾生者徒傷少停風馭歆此一觴嗚呼哀哉祭叔父守菴府君文嗚呼惟我叔父一紀而孤我父惟兄是挈是扶是率是模以成厥德是度是諏以修厥職先祖宦業吾父是承居家而理叔父之能惇本鄉方朝耕暮讀為所當為惟日不足公私兼濟門户以光肆其餘力亦善詞章鄰鬭我平族謀我定克厭羣心亶惟忠信帝嘉我父早賜歸田薦封四品式介髙年鴈序載聯華髮相映子姓振振莫不承令春風秋月菊榭蘭階從容杯酒和樂無涯大耋之榮方為兄喜如何一疾竟頽不起嗚呼痛哉憂勤惕厲靡間初終生平所獲有吉無凶名以德延謀以孫逺壽考令終旁稽亦鮮顧惟鄉族重失老成咨嗟悼嘆有識同聲嗚呼哀哉欽順越自成童粗知學習仰賴提撕爰忝科級間從家食興滿竹林迓于官邸亦辱來臨拜别嘉禾壬申之夏夢想音容才如隔夜恩侔長育報乏絲毫遽承凶問惟有悲號斂莫效誠葬莫供役悠悠蒼天此恨何極一觴之奠其敢怠寬哀纒毫素辭達為難嗚呼痛哉祭外舅西磐壽官文中元追逺時俗所同思翁不見有惻其衷翁殯在堂神遊何許秖奠一觴泣涕如雨嗚呼哀哉尚饗又惟公德重于鄉壽幾于耄子姓振振率遵彛教東塢藏春西磐寄傲取樂能多其神不耗乘化飄然如夢斯覺諸福實全幾人能到惟豫小子好自髫年迂愚靡及愛助惓惓逮兹退處頻侍芳筵餘歡未洽永訣何遄靈輀既飭于彼新阡寓誠薄奠有淚如泉嗚呼哀哉尚饗祭季弟允恕都憲文嗚呼死生修短吾不復疑廢興得喪諒匪人為若吾弟之善始令終其亦可以無憾矣吾又何為哭之不足而繼之以辭邪蓋英才之挺出恆千一以為期其陶冶於隂陽者既精醇之間值而玉成於君父者亦甘苦之兼滋厯嵗年其既久殆左右之咸宜冀仰酬於大造必有補於當時撫流光而自惜希前哲以髙馳曾此志之未就忍何心而弗悲嗚呼天人之際誠有未易言者矣古今之迹豈無厯覽而周知者乎所以淚滿英雄之襟蓋不獨孔明渭曲之師而已嗚呼痛哉甲申之吉爰契我龜玄堂深穩允協成規君行靡顧我老安資舉觴為别能不遲遲嗚呼哀哉尚饗又小祥祭文吾弟云亡余襟猶濕誰謂兹辰小祥奄及四方上下魂氣何之百憂余感知乎不知賔鴈再來桂華仍吐子獨何為一去終古情深骨肉矧曰竒才長編斷簡觸目興哀物理固然如何則可歆此一觴庶其慰我嗚呼哀哉祭劉氏女文父子之愛天下所同而吾愛之所鍾乃若稍偏於汝者數年不見念之無已忽聞遘疾心甚憂之然以汝孝敬誠莊克修婦道宜為鬼神之所鑒佑冀必臻勿藥之喜以遂歸寧之願也豈期日復日月復月纒綿半載竟至此極遂成千古之長别邪天乎痛哉荼毒盈懷言莫能盡特令汝弟往奠一觴汝其有知歆我至意嗚呼哀哉劉氏女周年祭文汝生在室凡十九年嬪于劉氏其數亦然命既弗長子復短折宗姻之論徒惜其賢昔人有言吉凶不僣今既無徴於汝又安所取信於天耶倐再逢於諱日驚嵗月之易遷貞姿懿質永閟重泉惟見外孫女二人婉孌於吾前而已嗚呼痛哉酒以薦芳詞以達意一氣感通無逺弗至尚饗祭劉壻咸宏文隂陽迭運五行交錯萬變不齊其機疇握求之弗獲惟曰自然莫致而至命也何言子之秀明識于初冠甥館得人良適我願往來二紀匪直情親論文講學所敬日新行已端莊性尤耿介孝友之稱孚于內外徐驅逺到衆所共期云胡中道倐與世辭嗚呼哀哉疾之初萌微覺中燥懼貽我憂諱弗以告徴於面貌始克知之百方醫療則已後時三嵗孤兒八旬老母永訣丁寧載甘載苦手書囑我一札十行披讀未竟淚下浪浪嗚呼哀哉玄室既營靈輀既飾視窆末由重我心惻平生所學觀象玩辭死生修短亦復何疑送往撫行兩兄一體慰子于冥庶其在此有殽維旅有酒盈觴靈兮不昧來格來嘗嗚呼哀哉祭告故嬪曽淑人文兹者柩已登舟安置妥貼時維冬半江湖水平晝多北風舟行良便兒子珝不離左右季弟復得告偕行早晚之間家庭無異吾妻魂靈其無恐無懼安歸故鄉以就窀穸一杯奠告尚克鑒知謹告祭黔國公夫人樊氏文惟靈柔姿懿質育粹含貞姆前保後不肅而成親則帝甥芳傳椒殿容德既間蠶繅亦善明哉都尉式謹相攸莫如黔樂豈必中州萬里于行上公是配蘋藻宵陳參殷夙退篤生主器光紹前聞月行幾望桃實向蕡音樂在房亦惟靜好曽是委他而不偕老痛深骨肉有淚如澠喪車還葬恤典宜膺牛首峩峩玉顔永閟奠此一觴縉紳之誼嗚呼哀哉祭楊淑人陳氏文月湖先生楊氏之配惟靈德門鍾美姆教時申秖循內則以慎其身清吏之支豐城之望爰得所歸其車百兩姑嫜允顯位號斯崇孝隆于始禮奉其終肅肅良人聖賢是企克配無違柔嘉而理欽于賔祀惠此宗姻執麻服浣居貴猶貧樛木垂隂芝蘭滿室撫愛之勤一如已出豈云徒愛尤篤教之乃其文行莫可瑕疵攜赴鄉科庶幾聯擢胡不少須遽歸冥漠相夫之效錫命已蒙夙勤丸膽未覩攀龍嗚呼哀哉欽順等辱在同鄉飫聞德操儀鳳在瞻失凰是悼風帆南移寓奠一觴慰存悲逝詞短意長嗚呼哀哉遷葬顯妣夫人告文維嘉靖三年嵗次甲申十二月辛卯朔越二十六日丙辰孝子欽順等敢昭告于顯妣贈淑人曽氏之墓男等卜以明年正月元日奉葬亡父封侍郎府君于四十一都天柱岡之陽牛了塘之上惟吾顯妣禮當合葬謹卜明日丁已之吉夙啓玄堂虔奉遺魄俯就新棺至日與亡父靈柩同行往即永安之地伏惟鑒知謁族髙祖樂志府君墓告文維嘉靖六年嵗次丁亥正月已卯朔越八日丙戌族孫南京吏部尚書欽順敬謁族髙祖考樂志府君髙祖妣王氏孺人合葬之墓再拜而言曰府君去世垂八十年德積厥躬慶延于後子孫蕃盛咸篤孝思改厝從宜獲兹吉壤山川盤互永永其安慨想明靈不忘佑啓詩書科第尚克有承瞻仰塋封良深慰感特牲清酌惟以薦誠謹告祭告始遷西岡祖大觀府君請神主入新祠文頃年改作祠堂幸底完美乃涓吉日用妥明靈位正厥中禮從其舊質堂府君位下子孫神主序列于左章山府君位下子孫神主序列于右謹以牲醴用伸虔告靈其降鑒是止是綏祐我後人永永無斁祭告三代考妣請神主入小宗祠堂文頃作小宗祠堂幸砥完美式遵國典以妥明靈兹奉顯曽祖考妣神主入居右第一室顯祖考妣神主入居左第二室顯考妣神主入居右第二室亡叔凱風秀才神主祔于左序故嬪贈淑人曽氏亡婦張氏姪婦曽氏神主祔于右序謹以牲醴用伸虔告靈其降鑒是止是綏祐我後人永永無斁新居落成祭告先考妣文仰蒙垂裕克遂貽謀惟此一區舊為重屋癸未之夏吾父實考終于斯其年仲冬爰始改作堂寢相次傍翼以樓比及今兹工役方畢永惟吾母存日已開厥基吾父晚年復形諸夢時如有待事匪偶然今擬名前堂曰有開中堂曰思永後堂曰拱北式昭夢卜之祥仍寓針規之意率遵遺訓罔敢自専謹以剛鬛柔毛清酌庶羞用伸虔告英靈如在惠我無疆整菴存稿卷十五
