body:
  text: 整菴存稿卷二十明羅欽順撰七言絶句一百四十首小詞二首題許由傳說二圖箕山樹古白雲深孤冢誰封却到今厯數由來歸濬哲荒塘餘論豈堪尋箕尾儲精泰運開巖居何意畫圖來漢文也解徵奇夢不道黃頭乏相才題雙鶴圖二首胎仙本是仙家物長與羣仙作伴閒何日傳書雙渡海誤將形影落人間雨霽秋江淨晚汀憑髙一望野田青閒來不用看圖畫好構城南放鶴亭晚看取魚供先慈妣愍忌之薦記得明朝奠酒漿取魚侵夜繞回塘慈顔一去無消息腸斷西風桂子香發龍江以下俱壬申夏考績北行所作浦樹亭亭散曉晴鍾山回望轉分明順風順水船如馬初是朝天第一程過儀真樹杪浮屠逺露尖官船梗稻客船鹽十年笑考三年績東去還須半月淹送大人赴仲弟官所過金山八年三度金山過圖報君親總未能磐石隱江清見底濯纓無路愧山僧發京口北府從來酒味醲秖今租稅不全供雖然上下都無事淮甸旌旗在眼中過丹陽書所見丹陽吏卒紛紛過遙接觀風使者回平挽一舟兼百力唱呼聲合響如雷後其人果干清議過常州新堞連延表舊城城中門第半公卿千紅萬紫皆春色白傅園林獨擅名過無錫好山如畫隔蒼烟洗耳空懷第二泉要識太平涵育久古城為路半無磚喜鄒永章承事來訪一杯初把望亭前萬里神交二十年曾記南塘松與石眼中今始見髙堅永章弟永明揮使晚至請次日登虎邱笑談取適元方簡俯仰留情叔子文白首怡怡還好客相期同踏虎丘雲遊虎丘名山不用多妝點景物由來自有真客到山巔僧未覺野烟籠樹鳥啼頻過吳江湖心有地還成縣湖面無雲總是天一帶西山青㸃眼囊中那得買山錢次嘉興客中午日嘉禾郡江上清尊父子情芳草亦能醒醉眼榴花何處獨分明拜别父叔滿湖青草默無言歲歲春風不離根游子却慚湖上草白雲回望渺平原復過蘇州千年事往不須悲後此千言未可知今日繁華天下最我來剛費七言詩復過無錫遇雨東風吹雨向毗陵山色濛濛對曲肱平日愛山今轉解只須常看不須登復過常州承李太守羅二守餞于毗陵驛中薰風醉我毗陵驛髙樹隂濃鳥緩啼但使客來醇酒在不妨曹相臥臨齊羅二守復攜酒送至新閘雲樹十年多少事畫船尊酒故須深那堪又作匆匆别明日今宵兩地心復過丹陽阻淺久之方脫平生行路喜遲遲耐得如今閣淺時似有髙人騎駿馬也曾清晝陷深池復過鎮江城兼山勢兩崔嵬池受江潮日往來和雨和烟瓜埠柳隔江猶解映樓臺過揚州兩兩三三聽事人陶然都是醉鄉民黃昏點鼓移舟去揚子灣頭月似銀過邵伯聞說去年湖水泛舊痕依約半柴扉今年一飽天公賜處處牛車刈麥歸早發髙郵湖氣連城雨未收行邊多是打魚舟因何換得農官做添著湖田萬頃秋次淮隂漂母祠前起夕隂隔江漁艇對孤吟干戈滿眼諸公在合有千金一飯心借得公館養疴擬借禪林暫託居偶臨公館更清虛門前盡日無車馬一味薰風養病軀公館即事庭前髙樹欲凌雲擾擾昏鴉漫作羣明月滿天人已靜數聲猶向夢中聞內子生朝花吐髙葵日正長草深幽砌獨焚香浮生苦被虛名纍仍向天涯憶孟光讀桂進士兄弟文字喜而賦之進士名萼其兄名華坐久香風斷續過入心文字不嫌多還尋邃密深沈句他日重逢奈若何復過廣陵道中一夢迎鑾已十年再來心跡總依然疏簾復對青山捲誰信看山獨有緣借居三塔菴野寺蕭條一老僧粥鐺茶竈煮枯藤夜窗對我渾無語俄去堂前供佛燈連日客至庭草朝來滿意青屐痕交處便凋零從前不是逢迎懶恐誤諸公伴獨醒送魏良輔秀才還新建四首萬木邊江葉盡稀玉人初抱五經歸懸知後夜趨庭夢長共孤雲斷續飛客路風霜日夜嚴行裝攜去幾重氊丁寧莫怕寒侵骨耐得寒時骨更堅千里琴書入故村朋來何惜酒頻溫也應問訊村南北兵後耕牛幾具存雞鳴山下小齊幽曾訝明珠暗裡投千古斯文期共學科場容易出人頭共學非為科場詩也當識此意次韻答守庵叔父二首百年詩酒樂時雍清比梅花徑比松長憶橋門聯上壽舉觴惟願福來崇官寺原因地勢髙宦情常苦送迎勞何如伴賞東林竹笑把銀黃等一毫用前韻奉寄西阜叔父二首初度曾經匕箸雍坐看西阜長髙松簟瓢陋巷詩千首身自居貧德自崇仕路﨑嶇不出髙有心那得為人勞細簽大押干何事枉費山中萬兔毫用前韻奉寄壽官伯父二首翩翩飛鷺滿西雍老鶴相依只澗松髙岸烏紗摩醉眼救時勳業付姚崇四峯駢聳一峯髙好景長牽客夢勞拙宦有年無寸補何如贏取伯成毫連被公薦不果用士夫有見慰者因賦短章三首朝朝無事也升堂退坐寒齊日正長大學中庸頻料理不知身外有軒裳江漢秋風日夜清一壺聊對菊花傾人心自有光明處變化無端是五行伊洛淵源世所宗髙談性理半雷同若無上蔡除根力逺隔程門一萬重蕭生循威為余寫真復作小影傳其家因題一絶循威運筆有家風能與衰顔借壯容十載江湖心事苦不知多少見眉峯送三垇宗姪邦團二首朝耕暮讀承家早冀北滇南識路多數酌金陵官舍酒醉來詞氣亦平和吾宗子弟森森在愛爾清年頗自强勤儉兩言行到底管教門戶日輝光送求古叔還鄉四首薰風一棹入秦淮為惜多年出處乖官舍晚烟人吏散燈前觴咏兩開懷家庭肅穆團三從肝膽輪囷總一身况是早年曾共學緼袍那羡錦衣新平生經義千篇在老去心情七字能得喪飽經知有命當杯何惜醉騰騰兩月清談未覺窮歸裝何事復匆匆匡時愧我渾無術悵望東林舊竹叢吳白樓重修清風亭有述次韻二首重把柔荑葺舊椽楣間珠貝復齊編清風暫作頌臺主黃閣還公未老年竹色青疑上采椽蓊隂凉可玩遺編詩成每向花前酌酌到梅花又一年庚辰閏八月十四日冒雨發郡城杪秋凉雨濕行韀山路泥深費折旋多病不堪來往數可能頑石補青天安成道中有感碧水澄潭岸影斜夢中曾繫逺行槎分明只缺深秋景黃土牆頭匾豆花四五月間夢往安成中途棄舟登陸亦忘之矣是日行邊所見恍然有悟乃似夢中景也異哉後中秋夜分宜公館對月秋再中時月倍明倚闌東望不勝情奉親堂上諸孫子歌舞還應到幾更袁城謁韓文公祠羅守質夫復請豫登宜春臺一覽二首渾厚文章百世師丹青香火郡人思宜陽水石應堪顧不似潮陽謝上時髙臺孤起郡城中表裏山川四望通賢守愛民還好客等間那肯著遊蹤次宣風館幾間官屋百家村四簋殷勤禮意存壁上題詩渾欲滿紗籠塵蝕豈須論次萍鄉邑小猶能滿萬家山耕溪釣足生涯倦來不暇聽更鼓睡覺東窗月已斜次醴陵公館憑髙得暫停咨詢欲罷見疏星淥江縣前江名近繞蕭牆過江外羣山晚更青宿荷塘鋪茅屋零星十數家溪山深處有公衙一杯暖腳還髙咏稿就燈前字半斜次臨湘驛岡阜連延半隱陴清湘如帶曲通池猶聞屈賈悲傷賦不見朱張磋切時早發長沙守二追至北關揖别半窗斜月淡寒輝輿𨽻喧聲徹枕幃行客計程常起早可煩顚倒郡侯衣次湘隂城下湖波欲漫梁燭行遙見太師坊夏忠靖公之家太師名德聞來久貧到諸孫德更光聞公諸孫共有山田僅數百畝次大荆驛山館停車坐夕陽芭蕉新葉過簷長吾心已覺渾無事是處安身總不妨登嶽陽樓黏天秋水淨無瑕極目東南感慨賒心體本來包四海相如詞賦為誰誇次鴨欄驛對岸斷山偃蹇臥中流山下平鋪一片洲茅屋人家生理薄酒帘斜拂釣魚舟次魚山驛斷堤疏柳簇茅廬土著無多半客居誰似李家兄與弟共將名字顯嘉魚江行即事秋晚江湖漸落槽兩涯曾架逐場髙低田水泛常艱食鮮食堪求若憚勞過牌洲驛地平山迥渺洪流西嚙東吞得自由道是牌洲須記取驛樓仍在水中浮望金口早泛扁舟閲二梁山川形勝憶興王寧知此日過金口眼界雖同志未償金口兩岸皆山相去甚近絶似東西二梁但不及二梁之雄壯荆江洞庭之流至此始為所束至金口登髙一望生受輿夫踏草茅登臨何止助風騷殘山點點浮鵝鴨阻截狂瀾恨不髙次漢陽漢陽城下暫停舟江樹湖雲一片秋千古神功存大别隔江黃鶴亦髙樓次蔡店驛一飯行行兩舍交饑來仍念僕夫勞驛樓已近泥途隔笑指厨烟上柳梢過漢川縣一峯圓聳映湖明却借川名表縣名城市蕭條官吏少鵠袍猶喜見諸生次劉家隔復渚重湖接漢川劉家名隔是何年南來北去尋常事樹杪風帆後或前次應城縣艤舟湖岸路初平野色蒼茫入應城中道不堪風雨惡燎衣猶自到天明自劉家隔舟行三十里始登岸又行二十里而風雨大作車帷盡裂衣靴皆是濕透至德安駐城南金泉寺環寺山重竹樹稠繞城江曲淨含秋僧家亦有奔忙日只為征驂一夜留壽府免見遣官來賜羊酒靈光伊邇愧塵容肥羜芳樽禮意濃因憶先皇虞蜀險愛深同氣此移封途中見野菊盛開有感荻籬黃菊手親栽預擬清香溢壽杯庭獻跡遙憐野摘馬頭三嗅獨徘徊次應山逺山崷崒近坡陀千室深藏宛一窩莫道窩中無勝槩須知平池有風波過恨這關恨這關頭一問名浪傳先主恨難平居民却有無窮恨家落黃巾半死生豫因問關名下人以劉先主事對且及往年狂賊劉六之慘云一縣死者以數千計次悶城公館重門深院小廊偏茗碗薰爐坐有氊猶憶荆湖山色好望窮來路渺雲烟次信陽州野樹蕭踈見女牆沙灘清淺競褰裳城中宦達知多少曾向南宫識二良張常少雲何憲副景明皆壬戌進士其年豫備員同考也次明港公館午飯長亭已渡淮夕陽明港坐空齊盤飱復自官厨出一飽應慚始願乖次確山幾輩酣嬉老太平兒孫辛苦築堅城西山不管人間事長向秋空閣晚晴邑之西南一帶皆山壬申兵燹甚酷九日確山早發見菊花有感客裏重陽也自佳山城初日見黃花遙知仲季娛親處應念驅馳驛路賒次遂平詩興多應似確山不堪重叠叙艱難環城樹色青青在休把安心托抱關自確山歷遂平西平郾城臨穎一帶皆經劉賊殘破城皆新築過西平片片秋田總過犁滿原晴色樹髙低欲從父老諏生聚清晝無緣駐馬蹄次郾城渡口孤舟往復頻兩行燈火入重闉途長馬瘦飢僮僕槖有餘糧旋覓薪未至城數里渡一小河舟往回數次始畢夕炊柴不足旋取之久而後至過臨潁潁水趨淮日夜流幾經名縣又名州懸知潤及都䝉福逺近無煩子細求縣名臨潁而去潁水良逺次許州麥田微緑柿林丹豐歲從知合境安聞道德星渾未識不辭深夜倚闌干過長葛一畨朝雨淨浮埃長葛雲林望裡開風動輕帷如有意好山東面送青來次新鄭劈面崇墉帶淺河後肩隨踵上南坡車徒未了逢迎事又報公差御史過次鄭州已有輿梁屬要津應無芍藥媚芳春萑蒲澤畔安然過始信孫僑是愛人次滎澤星蓋風帷夜復晨日中滎澤偶停輪不知濟脈今安在欲濟洪流且問津登西城望廣武山蓋世英雄百戰休黃河依舊繞山流斷垣廢壘蒼茫外斜日西風獨倚樓途中憶長兒生朝節過重陽候欲遷桑弧曾憶手親懸承家要是身先立細數今年是立年渡黃河汀樹風微水不波急催輕棹過黃河河流曲折渾無定憑仗梢翁涉歷多次亢村驛過却黃河走退灘人烟寥落北風寒亢村有驛無完榻聊託羸軀一夜安次新鄉客遊那免犯泥塗舉趾凌兢愧僕夫暫入新鄉如故里夕陽庭院老槐疏過衛輝有斐詩篇且解亡無名公迹故難荒風埃不辨泉源處惟見清流繞郭長古御河也在郡城北次淇縣盡日衝風野氣昏肩輿辛苦到淇門豐年不了莊家債薄酒無煩注酒尊淇水在縣之南二十里清而淺年豐而酒甚薄民之貧也可知過宜溝驛宜溝南北棟交加地拱邦畿錯犬牙驛吏逢迎無别語趂墟叢裏告燒茶驛南牆外乃濬縣也斗入衛彰二郡界中次湯隂閥閲爭髙王氣饒鄂王祠廟更岧嶤湯河未過先聞說山雨多時也漫橋過彰德日中猶未減風稜把酒安陽慰夙興韓氏墓田人共保不須多事問西陵次磁州河北風沙五日程磁州初到目增明髙門小戶多光潤應是州家政理平過邯鄲午飯有菌幾為膏粱錯用心飢腸吾已慣芝菌邯鄲夢巧渾難說七字哦成付賞音次臨洺驛古洺州也烟火星攢約萬家斷垣猶自繞坡斜邏旗戌鼓朝還暮應有章逢隱綘紗過沙河縣十里浮沙一帶河冬來惟是攝衣過民間大缺耕桑地霖潦無端占却多次順德山勢遙連澤潞長樓臺髙壯壓龍岡岡頭定有寒泉伏改井隨宜也不妨城中泉水多鹻龍岡橫亘東西郡之子城在焉過內丘迎駕心忙驛路修雙旌聊為一簞留帝丘往來粗能憶忙裡無從問內丘次柏鄉逺樹浮青認柏鄉近城唯見滿林桑不知縣吏清平否試問家餘帛幾筐過趙州聞伍朝信都憲以迎駕東行僅先數刻我自南來憲節東趙州城裏各匆匆承恩正屬旋鑾日㑹向蒼龍闕下逢次欒城九月二十三日來到欒城更著忙曉庭袍笏自薰香黃昏不見雙鳬影三五空餘雁鷺行令以下皆托言他出庭參唯數吏耳過真定北嶽橫分第一支滹沱南抱正流澌昔人話好行還憶玉食無忘麥飯時未至伏城驛數里天色已晚有數騎睥睨林間整備而過前路迢迢日漸沈怪形疑影隔林隂乞君琴鶴渾無用留慰衰翁晚歲心新樂道中一年官路幾回修差盡丁男到白頭縱有不平猶實地往來車馬莫深愁發定州二首野性從來酷愛山不辭終日對孱顔定州城外山偏好誤送征車入帝關沙路霜消日正東淺青濃黛滿晴空車帷得却觀山眼欲去帷時又怯風次慶都深池流水出山長公館髙槐䕃女牆題壁自慚非作者端居誰信發天光察院壁間有都憲林粹夫詩刻二首次保定千里王畿得右肱三關西去鐵為城欲求士飽民安日符鑰須還授老成聞聖駕已次臨清喜而有作江南花木競春深塞上風雲逼歲隂愛日倚需長一線冬至已近管窺應得見天心過安肅萬瓦無霜曉更寒羸軀偏覺舊袍寬日中一飯方停筯又報前驅已跨鞍過白溝河髙柱長梁跨急流淡雲寒日使人愁兵家幾度分成敗青史千年記白溝次涿州心感隨緣只自知涿州城下又題詩軒轅一戰渾餘事想見山龍黼黻垂次良鄉琉璃河上俯雕闌第一臺前見北山未入春明心已慰五雲光護六龍還河在縣南四十里有石橋頗工察院有天邊第一行臺之榜乃同年謝汝為所題經歷河北諸郡邑惟良鄉正北負山云柬同里曾氏諸親二首晴明天色中和酒九世依然共一堂自國太公至朝字行計之也知是源深流亦逺秪應相好莫相忘忿來不管珠彈鵲惑解真成鐵化金物我平觀無一事眼前何限好光隂確齊為禮舍豐城王克振題二首經營世業紆長算進止王門肅令儀機巧紛紛都看破了知誠確是根基交情舊與中郎稔今日題詩更及君想見暮年多樂事佳兒佳壻總能文長兒琰行年四十族長老而下皆辱來賀兒頗任事宗祠之建豫有勞焉是日榜刻適完余亦良喜因憶前十年赴召北上途中值吾兒生朝曾寄一詩勉之今用原韻賦詩二首見意西岡元自闕城遷新榜宗祠易舊懸爭賀吾兒今四十微勞差可慰髙年深愛寧隨物外遷寢門晨夕寸心懸果然百歲從天賜看汝斑斕七十年自題半影二首安臥烟霞歲屢移清羸渾似布衣時等閒開卷非無益只悔平生學道遲早以儒冠對紫宸三朝遭際忝臣鄰深恩未報身先老為語兒曹合致身次兒珝以國子生登名仕版選期且及猶戀戀庭闈余以大義督之乃束裝北上行有日奉所藏余半影請識一言欲時時瞻誦以圖無忝余方作行誨未就姑題七言絶句二首于上詞雖不足而意則有餘矣吾兒勉之嘉靖辛卯春二月既望久雨次韻吳寧菴小詞二首不信東南天也漏川原渺渺都平愁聞簷溜短長聲烏慵兔怯那肯任為晴了事棕簑披欲綻青苔坐滿南屏朝朝望闕眼雙清陽開隂閉元后亶聰明右調臨江仙祈禱精誠空自許得勢豐隆肯聽風排去薪米經營誰得住舟行却是人行路時事關心朝復暮禹甸茫茫不見栽秧處蛛網低垂紛亂緒梁間燕子都無語右調蝶戀花整菴存稿卷二十
