body:
  text: 整菴存稿卷十二明羅欽順撰墓表七首墓碑二首墓碣一首奉議大夫修正庶尹南京通政使司左參議程公墓表正德初年逆瑾方用事察士夫不附已者輒斥之時南京通政使司左參議程公資望兼優吏部擬填太僕少卿員缺及報下乃令致仕瑾既誅死言者多以公與劉東山諸公並薦僉議當復起而公俄已即世君子皆惜其用之不究云先時公葬其配於邑之下露墟預營夀藏于其左其孤梓既以公卒後五月奉柩而藏之及是其子壻蕭桂來南雍卒業乃手録事狀一通謁余再拜請書其墓上之石往余與公久相處雅辱愛厚誼固不容辭也公諱溫字德和別號鑑亭姓程氏永州祁陽和平里人其先世家河南之上蔡曾祖惟旻元季為祁陽令阻兵亂遂占籍邑中祖子富考達蘭溪主簿再贈南京吏部郎中母劉氏出誠意伯之後宣府左衛千戶佐之女公自幼則從事問學年十六補邑庠生成化甲午以詩經領鄉薦已而卒業南雍與鄱陽胡大聲樂平程正之交莫逆甲辰登進士第授南京吏部驗封主事進考功郎中公外和內剛器質厚重言動必以規矩自官吏部於人物即克究心一旦考察庶僚公適為考功以贊太宰廢置無或不當大為縉紳所推太宰張莊簡公嘗以事有定見志有定守稱倪文毅公又以文行兼優亷能並著稱皆薦其可大用於是有通參之擢後野亭劉公為太宰復當考察公以年踰六十即移牒乞休野亭持之不肯上曰君未宜去當與共圖天下事爾其見重於當時諸名公如是及歸林下杜門却掃平生所購書凡五百帙盡以充入學宫曰來學庶其有資有隙地在舍傍乃闢軒鑿池環植花竹朝夕偃息乎其間親朋至則談笑彌日足不及公府口不及時事逺近聞而高之公以正統丁卯生生三十八年而仕仕二十六年而休休六年而卒得年六十有八娶成氏吉府奉祠正賢之女初封安人進宜人又置側室三人皆無子以伯兄夀官淵第三子為嗣即梓也女六人已嫁者四壻寧象賢蕭桂皆國子生劉廷瑜邑庠生某已字者一一尚幼孫男一人瑩顧太守華玉嘗為公記夀藏而未及詳其世其葬也故人相知者皆相去逺莫任為銘葬已而桂始託余余是用特詳其世以表于墓上其平生大節則張倪二公之評品可徵當為天下後世所取信宜不假余辭之贊也嗚呼公其不朽已夫封徵仕郎南京吏科給事中毛公墓表南京吏科給事中毛君用成聞其父封君之喪將奔歸襄事介同官葉君時用徐君可大來屬余書其墓上之石余辭不文不獲退而取徐君所為狀讀之則其事多可書者乃作而嘆曰嘻是其墓之有表也宜哉顧雖不文書之其可不法按狀公諱倞字士能號石菴姓毛氏其先良鄉人曾祖從讓洪武間以部長從征定雲南遂留戍其地因家焉祖義父瑀母曾氏公性醇朴而篤於孝友於治生尤善資稍裕則推以與二弟而赤手自樹用此恱於其親季弟居祿豐莊越三程來省暴病以卒公慟甚為獨舉其喪長女適中江教諭裴旻旻卒老母妻子無所歸亟迎以來居之便宅凡生事皆為之經紀其母終則葬之子女長則婚嫁之而女氏訖完其節諸子皆教之學給事君既仕所面命若貽書若因鄉人寄語一惟忠孝大節是訓語不及他常言若能持身奉公吾死且瞑目其激切多類此也雅重然諾善平人之曲直而恥言人過人有窘急常傾已助之或貸而不能償則焚其券其接物和易下至僮僕遇之皆有恩平生不信浮屠惟喜延儒紳俾諸子有所觀法稍暇則觀古史於歷代事變類能道之蓋滇南人士稱之必曰先生而無不愛且敬者此公之性行可書也公賢而夀且康鄉飲禮行有司得公為大賔乃皆喜而公每謙避僅一再赴給事君嘗以行人奉使亟取道歸省得少師西涯李公詩為夀傳誦傾一時甫入科遇國慶推恩公遂被敕封如其子之官階徵仕郎而原配谷氏繼袁氏贈封皆孺人又三年為正德癸酉正月六日而公卒享年八十有四矣此公之榮夀可書也公祖父皆早孤而單賴曾祖母劉祖母魏守志不移撫之以立劉之寡也年方二十四魏之寡也年方十八相與引毛氏垂絶之緒而屬之公豈非難哉至公之世而子孫始衆積善餘慶要為不爽然非徒衆而已乃有給事君乘時而出以忠藎稱為天子爭臣聲烈著聞而天下皆知雲南之宦族有毛氏也豈非盛哉於是絲綸之命士君子之論莫不以善教推本於公夫公能以其子亢宗而二母之節益顯是尤不可不書以昭示無窮谷孺人為處士竹窗之女柔嘉莊靜有中州舊族風範佐公甚得婦道而不幸早卒法當附書公五子鑑玉鎧錡鉉玉即給事君也鉉縣學生二女一適胡宇皆谷出孫男七曰清曰漢曰涇曰汶曰洪曰某曰某女五書以著其世他有墓銘在無庸復書南京刑部郎中鄧君墓表𢎞治甲子五月二十二日南京刑部郎中鄧君廷器卒于家先是君以疾謁告家居士友皆冀其復起至是竟不祿聞者莫不悲之是歲之冬其嗣子球俾其介弟瑭來南都謀葬事余諾為行狀又為請葬銘于其榜首太常李公公亦諾之而適以考績北上余亦得告隨侍南還皆不果為明年冬球兄弟葬君油潭之山余往與于執紼之役已而來謝泣言曰先子葬已緩訖未有銘雖則人事差池然不肖孤何所逃罪幸先生改為之表俾孤等刻置墓上用少贖罪戾於萬一是所願也余重哀其志矧實知君忍使其平生遂弗彰聞于後顧行狀亦未脫稿乃芟其繁而謹書之君諱鼎廷器其字別號居易自幼穎敏過人初讀小學書至諸葛武侯范文正公事皆書願學字于左師大竒之比長舉業既成猶以為未足遂負笈往從一峰羅先生遊居久之造詣益深特見奬豫成化癸卯領江西鄉薦明年登進士第八乙巳出知鄧州君性本慈祥其設施一以愛人為主時方歲歉首竭力救濟飢民賴以全活已而益廣儲蓄數年間積穀至七萬石收養孤寡凡數十輩察疑獄生死者六人於學校尤盡心激厲有方而誨諭諄切其於鋤惡亦果有罷間巡檢王雩者橫甚人畏如虎君捕得竟論戍邊由是部使者交稱其賢署其考皆最𢎞治庚戌以外艱去任癸丑改睢州其治睢如鄧重建廟學修築河堤士民莫不歸心且連知兩州皆有嘉禾紫芝瓜果並蒂之祥頌聲屬耳又三載升南京刑部員外郎戊午升郎中其治獄務求情不肯有所遷就當其執議挺挺雖忤當道意不恤也然亦以屢執不合遂謁告以歸君篤於大倫事父母及異母諸兄誠心無間初其母劉既喪其父淡菴公遂析産以畀諸子繼室子惟君畀田數畝乃逺而瘠君拜受於堂下退靡後言後以進士居京師念公年老即奏乞歸侍事雖不遂然士友益以此賢君任鄧所得俸資必先以備養諸兄子姓咸取給焉其居公之喪他事一不聞問惟建祠堂以奉時祀合族人共爨以隆親睦而已於處鄉人故舊雖貴不變有負已者亦接之怡然嗚呼能言者不必能行勉於暫者或違於久此士之通患也君於言若不出諸口而行乃能敏焉故其處則父兄宗族信之其仕則君子稱之小民德之而其感於物者又能致祥而召瑞斯豈可以偽為者哉雖其位止於五品夀僅踰於五旬若未足以盡其才而卒其志然視彼靜言庸違石中玉表者固已相去逺甚嗚呼斯其可表也已鄧之先由金陵來居泰和在宋有舉神童者數傳而至明逺娶冠朝郭氏始居今之鄧原國初有以文得與同邑楊子淵羅子理並稱曰崇志先生者君世伯祖也曰原善曰永文君之曽祖祖也父諱鵬翀淡菴其別號性豪邁涉獵書史以君貴贈南京刑部郎中母劉實繼郭配蕭氏先君卒二母及配贈皆宜人男子七球瑭瓉琮瑊瓏璫瓉邑庠生其季亦多秀爽知向學男孫二梁楘蓋君墓中之石未書則余書其墓上之石於其世有不容略也儒林郎合肥知縣曾君墓表高明之胄襲國恩而受官使所能終有令譽無忝其先烈者何哉端厚而周詳恬和而有恥守其道而不變則上下左右皆宜之是以令譽克終而於先烈無忝此其人固不多見然則曽君之墓余可無文以表之乎君余同里人也諱慶字曰慶別號延菴故刑部左侍郎省軒公冢孫六合訓導主敬先生嗣子君生質簡重稍長即隨侍公左右日領誨言讀書作文積纍不懈年二十以公蔭補國子生預試京闈文卷已入等考官或避嫌落之後屢應鄉書竟弗利年三十九始為福建布政司都事小心善贊畫嘗供事試院力薦松溪吏陳明入試已而中式士論稱之歲當入朝私贐無所受幕中時有差遣知市舶之盤詰為人所趨絶口不言至如巡鹽監織稽覆屯田類當涉窮荒歷艱危與諸豪猾為敵讎檄至即承或助之治裝輒遜謝竟其事皆辦聲舉由此遂起中以外艱去凡再任乃滿九年吏部通閲其考多褒語語出於御史者尤善遂擢知合肥進階食俸皆從六品從升格也合肥廬附郭縣舊嘗掣肘君至則修明職掌體正而情通或啓以時宜結鄉宦飽權璫則可以要譽免禍君亦不顧顧戒石亭闕則曰是官針也何可無創為之如式均敘賦役賑救凶飢務使實惠及民民馬氏市居習持吏短長為家一旦發其姦論如法有徽賈墨銀以贄輒峻斥由是政聲日章卒亦無能禍君者俄以疾卒得年僅六十人皆惜之君平生篤於倫理為都事得間輒取道歸省父祖祖父相繼沒二喪迭舉皆出君區畫而孝誠備至仍刻省軒遺德録以傳處分家財一惟母命待其弟庠生􅂒蓋老而益厚也二叔父與父異出視猶一體恆切切冀其有成自奉泊然而性喜修潔書畫服飾常自完整母郭氏配羅氏余族姑君以都事勞法當貤封勘報不時臨終以為遺恨子男四南冏同用用邑庠生女一適尹憲副之子習孫男八戬咸威彧針式盛試女四長適楊鴻諸孤既葬君西徑之原以余世姻雅知君來請書其墓上之石余文素拙誼則不容辭也惟君位未崇年未永其用容有弗究而聲譽之美所得良多一時名公如戴都憲廷珍秦司馬崇化張京兆宗厚皆盛加奬豫往往見於文字非其端厚周詳而有恥何以致之先烈載揚而垂後亦裕墓之有表固其宜也濟南府知府蕭君合葬墓表前濟南知府萬安蕭君謝事家居之八年年甫六十有三正德戊寅八月某日以疾卒先是歲在癸酉君得吉地於其邑之荷塘山既以葬其故嬪王孺人遂營夀藏以俟前卒之數月適余蒙恩歸省君以其子臯來訪首出所自書行實一通王憲副正朝所書孺人行狀一通示余請合為一文將刻之碑以垂示無窮余頗疑乎其名然誼有弗獲辭者既復以書商確書未報而訃聞矣悲夫臯襄事有期乃奉君遺言來申前請顧雖不敏忍不為之表著以慰君於地下哉君諱柯字升榮號默菴姓蕭氏其先有希宗者自龍泉尚洲徙今萬安之龍塘至君若干世矣曾大父雲巖大父用器父諱翀母泰和長溪曽氏君生而穎異年十一二已能賦詩綴文提學憲副夏公竒之養之邑庠朂之以逺業成化癸卯遂領鄉書又十年始克登進士科居二甲前列改翰林庶吉士學識益充踰三年授雲南道監察御史其持憲有體雖嚴而不苛嘗巡京城督馬政按四川凡所剖斷激揚多協公論考績書最敕以其官封其父而贈其母孺人配王封亦孺人兩遭家艱荐經數載比還臺遂掌三法司奏牘俄有濟南之命至郡方值歲歉君亟以賑濟為務防制盜賊招撫流亡伸理寃滯孜孜如不及於學校尤加意作興已而郡庫之財有用之不以其法者君發其事事聞上罪坐巡按御史竟死獄中言者因以是及君君遂坐免遇有相慰問者則曰吾無愧於心足矣他何計哉君謹飭自好而篤於大倫四兄早亡與其弟協心幹濟以養父母提挈諸遺孤子俾皆砥于成與人交意氣歡然而未嘗茍合雅善舉業由鄉舉入太學堂試屢占首選從遊之士常數十百人鄉試之年嘗一為四川監臨官兩為山東掌卷官所刻程文往往經其潤色其他應酬之作亦皆有思致有松鶴軒文集藏于家孺人諱恩珠正朝憲副從兄正中之女也性明慧通女誡諸書及歸君能以勤儉佐其所欲為彌縫其所未至而縱臾其進學尤力用此甚為君所敬禮事有未合未嘗不與之謀謀出多稱君意即所不可君亦終不行也及君自濟南入朝孺人在邸疾且殆猶戒其子遣報平安如常日曰無以是撓而父心其識慮深逺又如此家道之成非偶然也卒年五十有一實正德戊辰正月十四日君凡二男二女孺人出者男即臯邑庠生績學有待女適同邑廖民頌先君卒幼男曰夔女許嫁同邑王某者側室黎氏出孫男二仁孝余家去龍塘稍邇余初遊場屋已識君名其相與定交則自癸丑同升始既而兩家婦子又同舟北上情好之篤莫或加焉迄今二十餘年而死生離合之際有不勝其可感者矣君名位不為不顯文章政術亦皆有以自見所可惜者退休之日早其於建功立事有遺力焉然以其未老之身而獲夫優遊之樂又能明乎必然之理而順夫來去之常可不謂之有終已乎斯其可表也已葬之歲月則正德庚辰某月某日云衛輝府學訓導楊先生墓表先生諱佩字光郁以字行別號南臯居士姓楊氏世家泰和之高隴與太師文貞公同宗曾祖子友祖彥實嘗輸粟有司備荒璽書旌為義民父敏異亦以輸粟冠帶先生生數歲則知學甫弱冠選補邑庠生與仲兄僮俱有名提學臨試率居甲乙之列其時文既善尤喜為詩坐搆行吟至忘寢食屢應鄉試輒不偶而詩名特著往往見知於賢士大夫久之始膺貢上春官再試及等授衛輝府學訓導守官清苦而勤於講授諸生多用有成凡七年以病謝歸歸五年為正德乙亥十二月十六日終于正寢享年七十先生孝友慈厚父既卒家事一惟伯兄處分後以母命析居所得土田有便於伯兄者舉以讓之無難色待諸兄之子一一有恩家故饒財自奉儉約而豐於賔祭尤樂施豫同舍生有貧乏半月廩之入皆以周之族建祠堂首營致大木以為倡從弟有嘗隂謀為害者先生恬不為動逮其妻死于疫與之棺而葬之蓋其識量如此配胡氏有賢行先先生三月卒先生所為詩專用唐律多至數百千首而稿或不盡存存者皆藏于家惟當代名臣詩一卷梓行于世初先生年方四十即相其鄉鵝鼻峰之下預營夀藏嘗作詩一首云殘編於我老將至預為夫妻身後謀自古以來無不死此丘之外更何求已知處世真如夢何必蓋棺才是休親見四周風氣足青山不動水長流及將屬纊又作詩一首以自挽云平生清苦承先德不覺光隂七十年無命無才今已矣有生有死古皆然休論教職俸囊盡敢謂名臣詩句傳回顧南臯春意舊鵝峰江近水涓涓凡其詩之格調大抵類此而其為人大致與夫始終之際二詩亦可以槩見矣其孤普茂既以先生卒後七日奉二柩合葬所預營處普不逺千里來金陵謁余文將刻石表于墓前先生從兄之子平為余女兄之夫余辱交於先生尤厚無可辭者乃據先生孫壻邑庠生王歷所述行狀取其世德之實學行之美書之而特著其詩二首以見其所成如是庶乎後之讀者知而信之也嗚呼先生其不朽乎益陽羅氏松山墓表益陽羅君胤衡早失父事其母郭孺人甚謹孺人享年八十以卒葬其邑西二十里松山之原今十有七年矣胤衡恆痛念二親之潛德弗章思有以表著于墓道及其嗣子嗣秀以例升太學乃授之書俾請余文刻焉余既舊交且宗家固宜無靳於文於時屬公私糾紛則辭以不暇比余省覲還任嗣秀已注選而歸胤衡復寓書其從弟太學生胤元俾申前請余無以復辭也胤衡自為狀云初祖號雲邃翁當宋建炎二年自廬陵巇下來居益陽八傳而至大珍生贈南京光祿寺典簿允恭寺簿生詩􅀈􅀈生考諱高字時升別號竹軒考氣豪志逺不屑意生業業舉子擅名邑校校諸士皆推重之纍赴鄉科不偶天順癸未膺貢入太學旋丁內艱服闋之京遇盜于繁昌至月子河遂卒時成化丙戌十二月十三日也年止四十有四妣出同邑舊族天性純朴言動無所茍綜理家事尤密中年寡處子女皆未成人惟一女奴代給薪水復遭歲歉幾不自存所親欲令就産于鄉妣泣且言曰不幸夫罹竒禍所以忍不即死者為此遺孤一旦置之村莊與樵牧伍烏望其能世先業終不聽頽坦破屋處之裕如衣食婚嫁百需悉力經營兼資紡績既而豪鄰有覬覦其居地者勢不能遏乃攜諸孤幼往依外家以居時從叔憲使安尚從公食亟令胤衡從之學學成中成化庚子鄉科旋復舊廬妣心良慰然以前此哭泣之過漸至喪明胤衡方卒業京師聞妣動須扶持遂決意歸侍周旋膝下凡十餘年一旦呼胤衡屬以後事且諭之曰他日居官務以忠愛為本下至僮僕輩一一呼而慰之翌旦遂卒殆若前知然者考妣生年皆永樂癸卯考四月五日妣十月六日也子惟胤衡一人初任淮安府通判升金州知州以禮致仕女四人壻符善懷曹燉胡伯川國子生蔡國聰孫男二嗣秀其長次嗣才孫女二壻陳仕學許栻俱邑庠生狀簡而文末復深致其懇余讀已為之惻然有動於中既以悲竹軒之不幸及詳觀其寡孤之所以自立以克至于今日休又信夫天道與善之必然也夫吉凶禍福之在人固有常理然二五交運萬變不齊人之遇之未必皆偶故君子或有時而得禍惟君子而得禍此其所以為不幸而可悲也余雖未知竹軒如狀所稱亦可想見其大致而其始終之際乃如此於余心能無惻乎自竹軒既沒門戶日以蕭條孤兒寡婦人固得而欺之矣孰知屈以時信晦以時顯不旋踵而光復舊物且有以垂裕後昆俾寺簿之宗于兹復振其福慶之集又如此良由孺人克盡為婦為母之道秉心不二教子以成所以迓承乎天者有其地也是則必然之理信惟影響而適然之數亦惡足多置疑於其間哉吾是用具書其事而推其所以然以為羅氏松山墓表正奉大夫河南左布政使劉公墓碑銘劉之先本汴人宋季有功甫者來為吉州萬安丞遂留家邑城西奕世載德至今伯祖克平纍官刑部尚書始大顯從伯父述憲及公官皆至左布政使再從弟咸栗今為刑部左侍郎百十年間連三世比居大官文學行誼政理之長往往有聞于天下公諱挺字咸卓生質明粹從師問學穎悟過人以邑庠生領成化癸卯鄉薦𢎞治庚戌中二甲進士觀政兵部癸丑授武選主事已未升員外郎辛酉署郎中事癸亥實授郎中正德戊辰以內艱服闋改禮部歷祠祭儀制兩郎中尋升光祿少卿庚午邑人有通番事敗者時逆瑾竊柄雅忌江右士夫因偽傳詔旨凡其官京朝者皆與外任公遂出為湖廣右參政辛未升右布政使壬申轉左使移河南公為人精確端凝臨事尤不茍雖處繁劇未嘗少厭初蒞武選雲貴旗役册適至同官疑其多冒濫欲盡革之公謂此曹素衣食於縣官一旦盡革將失所者衆詳其本末以為去留可也於是稽較纍日得可存者十五六時大司馬馬公嚴重少許可閲公所上牘甚嘉之曰活者殆萬人矣武辨蔭襲新條舊貫乍離乍合吏易緣為姦公默識無遺豫奪皆自己出或挾威富輒求上比者一不顧曰法如是吾何敢私在武選凡十餘年所守如一日銓綜清整譽望甚隆間嘗輔少司馬李公閲邊李公卒于行公攝其事修城堡選將領補器械出精卒於私役以實行伍諸所施設皆適機宜為少卿嘗被命勘遼陽軍屯同事者意有他忌公為梗俄以計解其使事在湖廣厲精旬宣威立惠行無減其伯父長藩時也河南荐經大盜千里蕭然公初至盜甫平王師凱旋宴犒迎送勞費百出羣僚相顧殆莫能措手公不動聲色區畫有方事皆贍舉人情大恱無何感疾間小愈益勤事事已而增劇遂不起癸酉八月五日也得年僅五十有六高祖諱昭年曾祖諱俊英俱贈刑部尚書祖諱廣華卓犖工詩翰考諱述勳纍贈奉直大夫兵部武選郎中妣彭氏封太宜人奉直公早世公事太宜人甚謹恆得其歡心與二季居怡怡如也接人謙和有片善輒稱之不置為古章句步驟栁栁州字法顔魯公晚益竒偉精於易學鈎深剔微卓有定見遊其門者甚衆多砥于成若吏部左侍郎汪君偉翰林修撰陳君瀾按察副使吳君山其尤顯者其器業宏裕士夫莫不推重都憲安成張公司徒安陸孫公冢宰樂平喬公知之尤深使天假之年所建立又當何如也配蕭氏同邑學堂宦族封宜人男子一旦邑庠生男孫一宗健公卒後七年庚辰之冬始克葬其邑楊梅山之麓其年旦復短折又五年為嘉靖乙酉公季弟搏以潮州府通判致政家居念公墓碑未刻無以昭示久逺乃為書授宗健來請余文余初仕京師與公鄰居往來為密嘗荷公有所警發蓋相尚以道相契以心者也公族弟邑庠生宏為余子壻復助判府君以請顧雖不文義其可辭哉事狀出刑侍君允為實録銘曰昆岡之珍匪圭斯璋鄧林之植匪棟斯梁猗歟德門禎祥所萃莫出匪賢亶惟國器仕非徒顯名以實隆往者弗覿盍觀于公玉質瑰文有卓其行介不失人和不失正十年武選藹矣休聲軺車所至克壯邊城公所當為盡其在我內陟非華外遷非左荆湖南北地大民稠旬宣之績人歌二劉晉長汴藩百紛填委會通在目從容而理庶幾黃髮𢎞濟斯時天乎何意而遽奪之世實需才才難自古蓄弗盡施歸咎無所高原鬱鬱斯卜斯藏刻辭墓道於昭厥光贈奉直大夫戶部員外郎夏公合葬墓碑銘公姓夏氏諱傅字時訓別號訥菴卒𢎞治壬戌十二月十五日年僅六十又明年正月葬其邑范莊先塋之次時其子從夀官至戶部郎中而公亦既被封為承德郎工部主事矣郎中既免喪未即起會逆瑾亂政輒坐以罪除名及瑾伏誅官乃復始獲贈公奉直大夫戶部員外郎公配包氏亦自安人進封太宜人距公之卒蓋十年矣後十有二年太宜人夀八十有一嘉靖癸未二月二十五日無疾而終時郎中以福建左布政使入朝歸至京口聞訃號慟卜以明年某月某日啓公之兆而合葬焉以欽順辱在同年雅相知先期具事狀緘書幣遣使走二千餘里來以墓碑見屬顧欽順亦抱無涯之戚久廢文事而書詞甚懇有不容以固辭者乃勉為之書按狀夏之先本陳州人有諱曼者從宋南遷始占籍江隂至公十二世而上世多顯曽祖諱賢永樂間以人材徴歷事有勞未及官而卒祖諱景昭鄉稱長者考諱瓛甘隱嗜吟自號小靜以見志母趙氏出宋宗室家法嚴整公生而穎異數歲誦習兼人甫成童即以父命當家不克終學然家事井井小靜嘗被詿誤公奮往就逮痛被拷掠卒無改辭事竟白母嘗遘疾晝夜不離榻前居喪盡哀歲時尤篤於追遠父母所嘗敬愛者遇之終身不變與傲弟處能有容哭其死痛苦不勝因致羸憊樂道人善有不善輒面斥之賔客過從談笑灑灑所交厚者緩急輒為之盡力遇里中子弟隨事勸誘不自為煩博物多能於星命地理卜相諸家之術槩所通曉凡古書畫器物一過目頃真贋無遁情好事者多就公以求鑒定雅善繪事兼工刻鏤既自以為無益絶不復為晚讀醫書有得因嘆曰人生業儒上也其次宜莫如醫於人良有濟二者吾皆失之今老矣吾子孫幸識吾言其治家嚴而有恩自奉精而不侈雖片紙必適於用布政君自幼學即嚴督之禮致明師未嘗惜費受封之後有司屢請赴鄉飲輒遜辭其謙退又如此然夀不稱其所有故其卒也人尤惜之太宜人出同邑名家宋龍圖學士孝肅公之後父曰士初母陶氏太宜人生有至性母病不食亦不食能讀小學列女傳而纂組尤精及歸公克承克相旦夕奉舅姑之養惟謹賔筵時薦皆迎意而辦見公疾惡過甚常從容諫止之兩遭大喪贊公襄事幾無遺力陳氏妹家貧無子請於公致其夫婦與之鄰處而禮送其終夜常篝燈治婦工輒課其子誦讀盡二鼓乃已子既顯未嘗色驕及其除名而歸亦怡然不以介意惟却冠帔不復御俄追奪令下笑曰吾固知有是也其後年益高家務日殷旦夕猶綜理不倦僮奴殆千百指錢鎛機杼各勤其事計日而獻功布粟有餘尤樂施豫事一經其裁決人無不厭服者宗黨皆以女丈夫稱之子男二長即布政君時望偉然次從聖女三壻周濓趙慎何惠孫男三長禎邑庠生次禋次祐女一許聘華子信次子及趙氏女及禎皆先卒曾孫男一霖霖母王氏禎婦也守節以長其子亦太宜人有以成之事狀甚詳皆布政君所自述書其大者如此餘不能悉書也蓋公所不足者年而令名之垂則永太宜人所不自享者逸而遺其後人之休則有餘凡綸命之所褒鄉評之所尚孰非公之所以不朽而墓碑之刻布政君尤惓惓不置孝子之用心固如是哉銘曰夏始南遷惟狄之避再建厥家武蕃來裔或質而處或仕以文提學判府表表前聞顯晦相乘亦惟天意長厚餘風逮公弗墜公多材藝內行亦修凜其剛直孰我敢仇私養公需仰酬俯應宣聖有言是亦為政惟賢克配天固畀之識高慮逺代終允宜勉勉相先克成其子高步天衢蹶而復起貤封有命有赫其光其生孔淑沒也不亡松柏成行永寧兹竁太史作銘洵于世世贈淑人范氏墓碣銘贈淑人范氏為贈右副都御史菊軒姚公之配今太子少保左都御史鏌之祖母也沒後五十年為嘉靖壬午以宫保貴遇國慶覃恩爰贈淑人初淑人葬時嘗識其存沒大槩納諸壙中而德善之詳未有述也宫保恆夙夕慊慊惟弗傳之是懼及是以提督兩廣軍務功成得謝乘傳東歸乃辱顧欽順于山中猥以墓文見屬顧淺薄無能為役然交深而誼重其曷辭按狀姚范皆世家慈溪宋知越州范公信淑人所自出也父積翁母陳氏淑人自有知即涵濡內教動止有常度嘗讀小學諸書於姆訓甚間及歸菊軒公尤善內助會公尊人雲隱先生以詿誤謫戍逺方羣從子姪六七人皆孱弱無依至不能具饘粥菊軒顧而心惻以屬諸淑人淑人曰是當無負於公乃收恤提攜衣之食之時其缺遺而補益之恩勤備至及長復選求名家女以完其室家由是皆砥成立生事日廣門戶復大振蓋同居而食者垂六十年後乃異爨然恩愛綢繆無間也人以為有鄭氏義門之風淑人初無所有久之始得一女乃言於菊軒公曰吾聞物有螽斯者善羣處故多子孫公無芥蒂我宜速為百世圖可也菊軒善其言乃納少房徐氏遂得二子淑人旦夕引以自隨恩猶己出及其從師受業時脫簮珥以為之助焉自宫保初生即大竒之嘗置諸膝指以語人曰大吾姚氏者必此孫也若是者蓋纍纍言之宫保亦耳熟焉恆語所知不知當時所見云何何其異也以舅姑皆沒於戍所遇忌日必蔬食者三日躬設奠哭泣盡哀客有來賀生辰者輒峻却之曰吾舅姑安在吾敢當此禮終其身不受鄉人皆稱淑人之孝可以為法矣平居容必整服必潔几席非灑掃弗即婢使見之皆肅然不敢有涕唾聲月旦望坐堂上子婦以次進見咸卑卑惟謹環侍左右拱聽告戒命之退則退亦無敢為嬉笑者其嚴正又如此子男二長坰浙江壬午舉人建昌府學訓導次墅宫保父也倜儻有風槩所贈官與菊軒公同女二長適士人孫琳次適錢琴孫氏女淑人出也孫男四長鎡例授承事郎次􅀈次即宫保次鎮曽孫男十長潮次泮邑庠生次渙次淶癸未進士第一人翰林院修撰次潓乙酉舉人次汲國子生次淦次湞次滚次􅮙女一適南京刑部郎中王鎔嗚呼和氣致祥實惟常理以今觀乎姚氏宫保振其烈翰撰繼其芳文學才猷志行之美功名之盛蓋天下莫不仰之其為祥也大矣繼今而出者又未可量也然推原所自謂非淑人螽斯一念中來邪夫德類螽斯和之至也其所稟者厚矣宜其他行皆非尋常女婦所及宫保所以服膺無失至于皓首而不忘表章之者親親賢賢其道固如是也淑人生以永樂甲申卒以成化癸巳葬以乙未墓在其邑飛鳬山之原是宜有銘銘曰百世之祥一念以開萬夫之傑得于嬰孩窺觀者邇胡見之卓哉亦有羣孱君子所哀或均以慈家用咸恢湛恩流潤深入泉臺銘於斯刻匪竟其來整菴存稿卷十二
