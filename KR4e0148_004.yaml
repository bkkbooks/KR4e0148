body:
  text: 整菴存稿卷四明羅欽順撰序一十五首送南京光祿卿楊公致仕還進賢序𢎞治十六年春正月南京光祿寺卿進賢楊公以年滿七十馳疏乞致仕留司諸卿大夫士公評私議僉謂公雖老神識未衰其疏通果斷之才進當重寄猶當有以發揮于事業雖有請上且不俞已而竟得俞旨特命有司給驛以還蓋異數也于是諸士大夫卿又相與言曰公固賢者能以禮自處朝廷處公以禮不賢公而若是乎公行有期其僚友豐城楊公率諸僚屬張筵以餞而屬欽順以言欽順與公令子刑部郎中二和為同年友比來南雍時進謁辱教愛良多雖不敏誼當敘公之所以歸奉揚清風焯著髙致俾夫人皆有欣羡感激之意以為公榮矧重以少卿公見屬乎夫士非無才之患也才而不失其正者為難非進而成功之難也功成身退以全其令名之為貴宋當元祐之際才如鮮于子駿者不少也至考其宜民之實則凡平日鋭志功名以希進取者曽不得與子駿班彼其所存者可知己公自舉進士出宰丹徒擢監察御史厯升至左布政使更踐福建廣東浙江三方而在浙最久其為政適寬猛之中聲稱燁然著聞中外浙之士民至于今頌其德美不忘一道福星子駿固不得専美名于宋矣然則公之才豈巧于進取者可例論哉漢黃霸為潁川太守薛宣為御史大夫其功名風采震動一時之耳目後以為相而少貶焉甚矣全名之難得也公自布政遷卿光祿且無所見其才使進而任撫綏佐臺省固綽有餘裕然享有令名以去而使士夫君子有才不盡用之惜視黃薛所得不既多乎况有令子如吾二和年甫三旬官已躋于五品方來所至何可涯涘凡公所能為而未盡遂者其必能祗承懋績以砥于盛此尤人所難得者而公豈必身親為之而後慊耶方壯而仕既老而歸尋往躅之釣逰訪平生之耆舊相與從容燕飲為樂以休數十年塵埃鞅掌之勞竊以為一日之適雖三公不換也公其以欽順為知言哉送光祿少卿楊君考績序學不必優而仕仕優矣而于學無復庸心焉此士之通患也患之所自凡以內外之辨不明先名而後實茍明乎內外之辨知于其實汲汲焉其于學也有不容一日怠矣汲汲乎其實者由體以達用泝流而徂源始端其趨終不謬其歸是故以之處則有以正其行而成其身以之仕則有以發諸謀猷而措諸事業其用力也勞其收功也逺孜孜焉惟弗逮焉是懼夫安有止法哉豐城楊君方震初舉江西鄉試第一已而登進士第改庶吉士于翰林獲盡讀中祕書文學日益有名尋擢給事中出入兩京前後幾七年封事凡數十上其大者則屢勸上勤御講筵求古帝王御世大經以施于治其他率繫大臣之用舍時政之便宜邉鄙之利害其為説大抵明切而不激委備而不迂坦然可舉而行讀其奏知其忠且達也升光祿少卿凡寺之宿弊佐其長疏剔幾盡其為人動必由禮言簡而時當即之溫溫愈久而愈可親于戲其可謂純明淵篤之君子也實則日勝而退然不有其名慊慊然常若有所不足蓋公事之暇書卷未嘗去手于性命微旨若治體所係尤足研究間形之著述率于世教有關固將收功逺大而不自知其用力之勞者歟君佐光祿三年當考績北上大光祿胡公合六科諸君子暨凡光祿之屬為酒以餞之而以贈言見屬君與余同出大江之西凡君交遊皆當世聞人而余之迂鄙狷隘幸亦不棄所愧者知君之弗盡耳既不獲卒辭則姑述余所知以為胡公復有深于知君者其必不以余為媚其鄉里交遊也夫送太宰林公考績詩後序泉山先生林公以太宰統治南都既三載當以其績入奏縉紳之士類有贈言此卷則舊嘗從公翰林者七人相與分韻賦詩以為公贈者也少宗伯馬公既序其端復俾欽順綴茲末簡狗尾之續秪以厚顔而義有不敢辭者竊嘗觀之三載考績朝廷稽古立法固然然凡大臣以滿考聞者第付之吏部磨勘其資力而已于所謂績固未嘗深考也名為考績而顧弗深考豈以髙明遂從而略之耶蓋任大則體宏位髙斯責重能否所繫誠有在于簿書之外者凡平日之一言一行帝心簡在時罔或遺必有考焉孰深于此故三載之考非大臣所以輕重大臣所以輕重其必有道矣惟公德業之美見于縉紳之所詠歌之所紀述者甚富欽順不佞莫能備舉獨觀公在南都三載之間兩章繼上有人所難言者雖一時不無少忤而聖明卒亮其忠世道轉移厥惟有賴則公之績其待今茲入奏然後有可考見哉故夫以大臣之道事君雖逺去朝廷而功未嘗不被于天下不以大臣之道事君則雖日近清光月效成事而所務者亦末矣此輕重之所以分也此公之所以重于天下也稽天下之公以慰天下之望聖明允用斯道亦惟舊矣由此占之公又終能逺去朝廷矣乎雖諸公之作詞不一指其于茲義大抵互出而纍見云送太常少卿李公考績詩序聖學黜計功之心王政嚴考績之法然則學與政其道固不同耶愚不能無惑也蓋嘗聞之宇宙間事皆吾分內而莫不有定理循其理而應之凡以盡吾職分之當然而已夫豈容一毫計校之私耶然而理得則事成事成則功于此乎在是雖無所期于先固自有以徴于後也王者立政分人以職而屬之事而屢省其成寧欲有加于分外耶亦惟觀其事理之得失何如以别其人之賢否云爾此聖學之與王政所以為合內外之道而君子之功所為異乎十禽之獲者歟東崖李公初以進士第一人入翰林為修撰遷春坊諭德日侍皇太子講讀且兼經筵講官才名甚著俄以便養求外補遂拜南京太常少卿之命在太常三載考正典禮之失一二大者實既厥心雖忤人情而不恤曰我道蓋是也于是士夫莫不服公之決而功名之譽歸焉然以愚觀之公髙才博學通知今古雖衆務紛錯往往談笑處之而莫不中其會方當進當大任以究厥用區區儀文之損益曽足為公譽哉茲以法當考績將遂北上南都鄉士有同翰林之舊者情好素篤于其逺行不無暌違之感乃相與醵餞于玉堂之署觴酌既屢復侑以詩詩以唐人雲間金闕迥樹杪玉堂懸之句為韻賦者五人人得二字為詩十首泉山林公官為吏部尚書東園鄭公由户部侍郎進尚書致仕未行紫崖馬公官為禮部右侍郎楓山章公官為國子祭酒寧菴吳公官為翰林侍讀學士而適以微恙禁詩者吏部左侍郎碧川楊公拙不能詩而以羣公命為之序者國子司業泰和羅欽順也送府丞張公還鄉序士君子之仕止又速蓋有孔氏之家法存焉惟其可而已然或內輕而外重則惟有見于仕之可而于止之可也無見焉夫有見于仕則不必可仕而仕矣無見于止則可止而不必止矣是故養亷逺恥之意少而偷合茍得之行多雖名為士鮮不得罪于聖人之門者若今南京刑部郎中張公之去殆有見于止之可也豈非賢哉公年未可以止而止以疾其疾猶可自力以供事而重于辰入酉出遂決自止之謀會其子監察御史鳴鳯以職事入朝乃草乞休疏屬之戒令必上上則報可且進應天府丞以寵其歸今之自郎官擢府丞者百無一二而公以求退乃沐殊寵是其退也未始不為進也夫進退之道仕止之宜豈可一言盡哉然自公今日觀之則彼支衰扶疢含垢蒙恥因循嵗月以覬夫一資半級之遷用慊其所大欲而卒以不慊反貽玷毁者其于為人賢不肖何如也公先世纍有聞人厥祖號雲林尤精理學傳公之父晚節至公遂以家學顯上貽晚節之封下衍御史之慶衣冠世美蔚為上海之名家公為人質直坦夷不尚苛刻自舉進士即為司冦屬于南都官三遷績屢考皆最蓋將駸駸于大用而遽以疾中止縉紳之士莫不惜之然寵渥荐加金緋有煒又有御史君以為之子英年敏識才志傑然其進蓋未可量是猶秋冬之收斂而繼以春夏之發生也人之所以為公榮者其不又有在夫昔二疏之歸賜金雖多而名位無加于舊楊少尹之歸祿雖不絶而其子則未有聞以公觀乎古之人其所得果孰多而孰少也是必得如班孟堅韓退之之巨筆以述其事然後可與夫三子者並傳而公之同寅諸君子乃猥以屬諸不文如僕者其于公之髙致盛美安能使之焜耀于天下後世乎哉抑姑以贐公云爾送何徽州序國家肇建王業實根本于江南于時軍旅百需所取給者不過數郡徽其一也其民蓋亦勞矣暨天下大定定都金陵而諸郡皆為近輔聖祖念其民久勞于供億也時賜租稅以休養之繼以列聖寬仁每加意于根本重地于是江南諸郡以富庶稱天下可謂盛哉比年來中外日多事其非時調發省符下四方者前後相仍雜以富郡如徽亦駸駸入于凋瘁物不能以常盛固其數然也然而撫摩愛護之以復于舊以逺覃聖祖之澤近宣列聖之休非吾人之責其誰責哉當此之時舉其責而付之人者宜不容茍而身其責者宜亦不敢以易視矣吾于何君子敬之行而知徽之民其有賴焉君吾同年友也有疏通之才而持之以慎有愷悌之德而行之以果舉進士未幾才名已聞于當道遂擢御史蒞南臺君之為御史也內攝臺綱整整一時輿論推為老成由清戎籍于吾大江之西寬不容姦猛不自遂其所經厯民耆少靡不安之吏常病于不能或能而未必良良足以裕民而能足以成務有如君者以膺輔郡之寄及其民之凋瘁未甚而為之悉心力以撫摩之俾生殖以時家給人足內有以用其禮義之俗而外有以應乎公上之求古所謂良二千石君固其選矣夫民猶樹也合抱之樹百年培之而不足一日伐之而有餘如使樹之在山常有培而無伐則其枝葉之峻茂所以庇蔭其本根者不亦逺乎君之行也侍御馬君善徵張君某合同寅諸君子張筵以餞而屬余以贈言余言固無取君無以為飾牆壁之具則幸矣送明府楊侯赴召序吾泰和舊稱忠義邦其民多士雖不為士業亦往往通章句能操筆記姓名其治生甚勤野無寸土之曠老長旦暮相與教詔其子弟率在于孝弟忠信敦禮義尚亷恥先公家之奉而後其私圗故其民至為易使雖使之或非其道猶必謹于上下之分黽勉趨赴而不辭况乃遇學道愛人之君子如今楊侯者以為之父母則其愛戴慕悅有加而無己者豈非其心之誠然哉侯雲南鄧川州人也以名進士被推擇而來持亷秉公始終一節事無巨細處之務盡道理不茍以己意為髙下嚴以行恕簡以制煩日惟廂區之長數十人奔走承令于堂下其餘則皆怡怡然早作暮息于村墟山谷間無非時非事之擾民于是始知有父母之仁蓋六年于茲矣以侯之所存與其所以施于有政者雖蒞岩邑御頑民猶將有以擾之而得其心服而况于吾邦乎然得吾邦人以為之使則其見效之難易遲速亦豈不有間哉侯茲以政績著聞榮膺風憲之召吾邦士民欲挽留而不得也其能言者咸相與作為文字以揄揚盛美而道其慕戀之私兩廂之長曽欽談榮輩十有二人手一卷踵余門言曰侯之去慕戀者實多欽等尤不自勝也顧無以致其情于吾侯願得先生一言余亦作得小詩一章將以為侯餞未及而欽等至則復之曰余有言矣固自謂以代輿人之頌今為若等頌之詩曰六年江縣屹堅城贏得窮櫩識太平文斾忽將秋色逺南山長對邑樓橫已看學道光初服却喜遷喬得大行報國寸心知更苦眼中人物定分明又略與釋其意云首云云侯治狀也斾逺惜不留也山橫著不忘也初服之光吾與若等之所以惓惓于今日也或請卒章之説余曰兹其義係于天下姑置之言已十二人者立需于門顧余思蹇才疏其何能遽有所作則姑述一時對答之語以致羣情于吾侯侯其無以為草草時一展覽將亦不忘吾邦也哉送助教鄒君致仕還臨川序始余自翰林出二南雍猥當攝行正事深惟寡薄弗勝之懼所幸一時殷考具備協恭夙夜用以粗飭條綱至于士習之轉移則固未能無愧也今年秋大司成金華章公始至公進退有道卓然古人既出而領袖諸儒士類翕然感激駸駸有丕變之勢則凡為之僚屬者宜益單心畢慮紬繹其素學勤施于誨誘于以贊襄新化夾就羣才用副聖天子惓惓振起儒文之意而助教鄒君節明乃以此時引年決去毋亦未之思耶雖然出處進退士君子之大節也蓋有禮義存焉過者或矯以蒙譏不及者類庸而可鄙節明起自辛卯舉人厯教蜀之達邑浙之嘉興山右之太原二郡皆有明效陟助教于南雍又三載矣雖其作人之志未始有怠而年則已及揆之禮決之義而不敢渝焉其視溺焉而不知反者何如哉而況使支屑屑焉較計失得于毫釐之間者聞之必將有所警悟是亦所以為教也然則節明固已思之審矣節明有子洛充邑庠弟子員嘗以見余其姿稟偉然年富而志甚鋭足以世其家學且聞節明嘗預菟裘之營于其故居數里之近土田膏腴林泉清茂其歸也有足樂者獨念余之寡薄方有賴乎淳篤老成如節明者以為之助顧勉留而不得其何能無介于懷而大司成公方謹責成寮屬之規有如節明之賢亦不能無歉然于其去也于是羣僚合辭請言為贈公謂余宜有述乃序其所以歸送梧州太守李君之任序正德三年春述職事竟監司郡守或黜或遷闕員凡數十銓部擇所宜補位置有倫旬日間奏章連上或一上而即允或再上而後諧蓋上意方嚮用老成其難也所以示其慎也余同年進士分職南都于今僅二十一人而遷者六山隂李德美自刑部郎中僉廣東憲事臨川李希先自禮部郎中守梧晉江陳洪載自兵部郎中守髙户部郎中太和王文瑞守台霸州曹夲忠守臨江刑部郎中仁和胡永清守廣之太平六人者厯年多而經事熟固皆監司郡守之選而當嚮用老成之日同時受命吾黨與有光焉雖或逾嶺而南稍為僻逺然君子居之無弗宜也于是吾十有五人者僉為諸君贊喜相與醵金以餞其行獻酬禮成樂飲無算清言善謔間以針規希先顧謂欽順曰何以贈我余曰廣東西列郡二十有一梧為中梧雖中郡而當兩廣之會有總鎮中貴人總兵將軍總督都憲三府在焉自兩藩文武大吏若二十郡以及其所統凡名有職位者不知其幾皆望梧而走以受三府之約束外之則深溪復洞連山密箐之中昏猺惡獞在在蟠結畜其狂猘而未敢盡肆者懼梧之不可度也此其地顧不重歟守之政令不出其封而郡之形勢實臨乎逺君兹拜命而往發揮素藴以見諸施設獨幾庶事舉封內乂為無所負云乎哉梧之山川君實主之使其山若增而髙川若增而深隱然足以為一方千數百里軍民之所倚賴茲固有任其責者而君亦不容以出位為嫌也君在禮部時嘗侃侃論天下事人固以為有竒節今攘鄰地比勢有相關切者孰謂不當一置慮耶朝夕三府誠意積孚時出嘉猷以贊良畫則君功名之美將出古循吏之上矣希先作而言曰豫之言贈我良厚惟不敏是懼豈其敢忘余乃顧侍者取卷書之為送君之任序有言于一憲四守者亦各書于卷云送太守曹君之任臨江序士患無誠心愛民與其才之弗周才與誠合則時無不可為者蓋其通變宜民之慮常有以和調于法制之中截長補短以為功因髙就下以為利日計雖不足而嵗計則有餘矣彼工于徇時者必將曰時如是法如是吾民雖病吾且如之何哉于是一切以整辦為心此其人豈不足以致聲稱資進取然而厲民以自便君子之所不由也余同年友霸州曹君夲忠由南京户部郎中擢臨江太守臨江之士之仕于南京者素知君所以存心所以行事皆相顧而喜曰吾民何幸得此慈父母哉凡吾輩之知君者亦以為臨江之民之幸君之為郎户部也大要主于惜費而便民法在必行而不為刻深故人畏而不怨嘗督京庾庾有蠧皆宿猾君亷得之軍一人徒四人宿弊為之一清又嘗榷舟淮安其稅兼輸錢鈔數纍巨萬計有姦民囊槖其間輸者苦其邀求而司榷者多緣是獲謗弗之察也君首捕置諸法舟往來者頌焉先皇帝末年嘗從南京户部之請裁減冗食嵗贏米二十二萬有竒其議蓋發于君于時羣小沸騰勢洶洶若不但已者君屹不為動曰茲吾職也敢弗盡乎君在户部有年其行事蓋不止此然即此以觀可謂有愛民之心而周于才者也臨江之士其相顧而喜相語以為慈父母也宜哉夫愛民莫切于寬征此理之不易者而寬征之説豈惟難行于今日識時務者亦難言之雖然此説不行終歸于厲民而已其何有于愛况才之為用正以濟夫時勢之難而副其心之所欲為者不然又何貴于才美才如君其必有以處此矣昔人有言寬之一分民受一分之賜况積以嵗計其為賜也不亦多乎夫然吾將見臨江之民莫不有以自給乃心愛戴真如赤子之慕慈母而君之聲實茂著自將進于髙位豈獨彼工于徇時者之足以興哉抑臨江號稱大邦而蕩無城郭有備無患兹亦愛民者之所宜留心况其利害又不止于一郡而已余鄰郡人也故因臨江諸君子屬言為贈既道其民之所欲而又贅及乎此蓋亦唇齒之過慮云送助教符先生九載考績序養士之法莫備于成周方其君道之昭明也師道亦有所繫而立是以人材衆而風俗美治化隆周既東遷教衰士散天下日以益亂紛紛籍籍以至于暴秦而君師之道胥亡也久矣士之出于其時者可謂大不幸也更漢厯唐而宋而元上下千有餘年其間有志之君亦頗能留意于學校雖其立教無本其為法粗略而弗周然而師道往往賴之以行是以先王之道不終墜于地我太祖髙皇帝天縱聖德受天明命以為天下主尤以學校之教為急務之先首建國子學于京師遂推之以達于天下雖偏州下邑窮邉絶徼莫不有學其授業也有師其代耕也有廩教養之法視前代詳矣而于國子學尤詳蓋凡宫室之經營制度之品節成德達才之要飲食器用之微裁自聖心無不曲盡復深懲近代之失以為敗倫傷化鮮不自懦師悖徒故所以訓飭師儒者必欲其嚴以立教有不率教者往往屏之逺方甚或處以重典肆為教者有所恃而舉其職遊歌者有所畏而不敢為百餘年來人材風化可以逺追成周之盛者有由然也雖然師道有所恃而立固為斯文之幸而吾黨之居其職者茍非有以自立亦安能無愧于心乎學至于自立甚難而行則不可不勉勉乎行者務重乎內內之重者其外必輕吾嘗以是而求之于吾助教符先生蓋在所取也先生行恪而和言簡而當儀度修整而講説詳明士子從其遊者皆自以為得師而人之知之者蓋鮮夫嗟卑厭冷常情之所同人不已知君子之所不病先生自蒲州學正升助教于南雍于茲九年矣兩監師儒厯任三五年者率遷他職以去而先生久于其職自守益堅今其獻績于朝也妻孥弗移舍館如故意若將終身焉所謂重內而輕外者非耶夫重內輕外之士豈惟可以為教亦優于為政也如建之民上吾固知其必將後已而先民當道者或以是處先生豈不為得人乎然使吾失一賢佐而力弗能留吾將不能無私怨也先生之行其僚友合詞請余言為贈余與先生皆出大江之西而學正郭先生又以同鄉之好申請至再三不倦誼有不得辭者于是乎言送少參張君之任湖藩序天人之相勝吾嘗聞其語矣然不免于二之夫天固不外乎人也是故推其數殆不可勝窮循其理則不容少易凡人之所為即天之所在也是故人事得而天降康人事失而天降亂非相勝也乃相應也雖其窮極之際轉移之機若有莫之為而為者然亦未始不因乎人故君子之仕也小而一邑一郡大而一方又大而天下茍其責任在已必惓惓焉惟治安是圗以為斯民立命一有敗證固將反躬自責而勉圗後效其敢諉諸天數謂吾力不能勝乎頃年以來中外亦多事矣余方從事農圃天乎人乎所不敢知頗聞湖藩水旱荐臻盜賊羣起軍民憔悴之態談者至不忍究言反覆以思恐未可謂之適然也虐政召災貪風鼓盜人事之失殆非一朝以貽其患于今日不有君子誰其拯之大庾張君天衢舉已未進士第出宰揭陽休寧兩邑皆有聲入為給事中于南京禮科端雅周詳務持大體蓋君子人也兹有湖藩少參之擢湖之民其有賴哉夫琴瑟不調其絃在所當改前車既覆其轍不容復循推所以致弊之由而救弊之方明于指掌本諸身以嚴乎吏宣上德以下于民通融其有無宣暢其湮鬱洗滌其瑕疵夫是之謂改絃易轍人事既盡湖湘漢沔之區其有不清矣乎以吾張君之賢用當是時不肯泄泄于其間也審矣余嘗得休寧人士所刋去思録一帙讀之見君遺愛之深足以不朽顧其所及者猶狹孟子曰廣土衆民君子欲之今君位進參藩澤可逺施茍此心不懈異日以豐功偉績去陟巖廊將湖人之思不有百倍于休寧者乎君行余不及餞黃門胡君斯靖劉君景瞻謂余素善君宜有言曰亦同鄉諸君子之意也夫言既及之誼不容隱張君宜有合矣得無有病余言者乎送福建少參鄭君之任序今布政司即古牧伯之任也書紀帝舜咨牧之辭曰食哉惟時柔逺能邇惇德允元而難任人成王志切阜民首令六卿分職以倡九牧而詩韓奕之篇有曰因以其伯實墉實壑實畝實籍獻其貔皮赤豹黃羆是知重民食一遐邇親君子逺小人修城池治田畝正稅法貢土物皆牧伯之所有事也修此數事以和六卿于外天下之治其有不成矣乎我朝以布政名官加繫承宣字于其署其官之長曰使其佐曰參政參議其職任無異于古可知也然而中外同心倡和以義則民莫不蒙其休中外異心倡和以利則民莫不蒙其咎詩云民亦勞止汔可小康當此之時固將出遺黎于塗炭而濯之以清風引尫羸之氣于一線之微而滋息之以復乎膚革充盈之舊為民牧者容不盡其心乎余友鄭君立之夙慧不凡而充之以博學眀乎隂陽之變達于人情物理之紀以進士為郎南京兵部厯職方車駕武選三司自守嚴臨事敏差遣舉措動合人心雖權貴無能以其私撓之者當道雅知其賢遂奏為福建布政司右參議士夫之論皆謂其必能盡心民事無疑君世居上饒之葛源直江閩之界尊府君雅有髙行嘗被職方主事之封與其配安人偕老無恙君喜過家道便計日將拜慶于庭其行孔亟諸謀以言贈者未之達也會余起廢復蒞南雍侍御徐君子謙夏官歐陽君相周乃來屬筆余與君交厚其曷辭蓋君子雖無所不用其心然必審乎先後緩急之序先後緩急之序不失是則所謂義也率義以從事始于民食之足而終于職貢之修俾承我者之心皆與我同而不同者不容一日幸居其位夫如是則其成功也何有哉功茂成于一方道且行于天下吾黨屬望惟在此余以是忘其不敏而著之于篇贈侍御楊君奏績序士有志于功業者必以守身為本其身一失則萬事瓦裂雖有絶倫之智髙世之才尚安用乎頃年以來中外士夫往往不幸而壞于賊瑾而關陜為甚蓋瑾陜産也瑾善盜官以啖其鄉人用為腹心股肱耳目受其啖者恬不思義方揚揚自慶以謂天下事無不可為然而智未及謀才未及展一反掌而已俱敗曽其身之無所措尚何功業之云當此之時其凜然自守超然逺迹不為其所汚者亦有之矣以余所知得二人焉監察御史楊君德徵翰林修撰吕君仲木皆出自關陜者也余去翰林也久吕君之賢蓋得之一二舊寮友間楊君則余嘗往還其寮友周君誨可許君舜咨間為余言之尤悉語云嵗寒然後知松柏之後凋也何幸于二君見之充其志也德由此而立矣况功業乎楊君初領鄉薦再上春官以乙榜例拘去為內鄉教諭升教東昌保定凡十有五年七膺薦剡乃升今職蒞山東道于南京君教人先德行而後文藝尤善啓發至如冠婚喪祭飲射諸禮皆稽諸古厯厯舉行于生徒有恩贈遺雖微一不受一時師儒中不多得也及為御史論事持法未嘗有所遷就嘗清理諸輔郡戎籍又領都城徼巡之寄又經理諸輔郡屯田推究施張規模整整凡其寮友莫不推重以為能孟子曰人有不為也而後可以有為其不信夫今以考績入朝當公道大明之時而君卓然有已試之功皎然有不汚之節隮華陟要其誰曰不宜名位日隆其建立當益偉茂著忠貞之績昭垂竹帛之名以稱為關陜第一流人物不于君有望哉君之行也周許二君舉臺中故事來以贈言見屬余不佞蓋嘗聞古人有初節晚節之説君自茲以往宜必有光于其初贈封諭德西園豐公還四明序凡山水之經逺者百里不皆峰十里不皆瀾也峻極之餘必有堂焉急湍之下必有潭焉曼衍紆徐渟泓淵淨蓄其所以經逺之勢而再發之是故其為峰也益竒其為瀾也往往極天下之文而莫之能狀兹理之在地也固天然也而在人則亦有然者矣以余觀乎四明豐氏若今封諭德西園先生豈不能為峰為瀾也哉然而名逸于賢書官止于宫教衍而弗峙渟而弗流人或以是而致疑于天而不知夫天固以蓄豐氏經逺之勢也豐為四明著姓若清敏公之在宋最為有聞在國朝則自先生尊人以及先生及其嗣子凡三世顯矣尊人起家進士纍官河南右布政使其功名利澤殆與嵩洛相為雄深先生有諸中者實克似之而名位曽莫之副然于義方之教則専矣由是嗣子熙原學一旦以諸生入奉大對遂取先多士拜官內翰再遷春坊諭德簡蒞院事于南京其望日益隆而文日益盛泰山之仰江漢之方將有不期而自合者蓋其資稟固異而增髙益深有得于義方者又非一朝一夕之功然則謂大以先生蓄豐氏經逺之勢其不信耶先生好古而惇禮初為訓導湖口以奉母夫人之養棄而歸後以教授侍建安王會當得編修之封遂辭去原學屢以迎養請輒欣然而至然所至不肯久留蓋其髙尚如此其學于經史百氏無不覽而于地理尤深然則自識者觀之亦何嘗不以為峰為瀾也兹者將自金陵東歸其鄉之彥監察御史顧君輩來以贈言見屬余嘗辱先生不鄙相與論金陵形勢良有合因有取于山水以為先生父子况焉整菴存稿卷四
