body:
  text: 整菴存稿巻十四明羅欽順撰行述一首墓銘六首先吏部府君行述羅氏系出豫章初祖諱詢宋紹興間來主泰和簿因家邑城東北即今缺城三傳至伯玉府君諱子圭舉嘉定解試伯玉二子曰涇甫則族祖庶吉士仲深府君之髙祖也曰和甫生叔大號大觀始徙邑南鄉上模里之西岡大觀生君質君質生元亨元亨是生先髙祖諱以直號直庭富而好禮鄉稱長者配郭氏繼劉氏先曽祖諱寧字存謙邑學生芳洲陳先生髙弟未試而卒配曽氏先祖諱鐸景泰庚午鄉試中式授黟縣學訓導贈通議大夫南京吏部右侍郎配王氏贈淑人生三子二女長子即家君自㓜穎敏有志操隨任黟庠潛心問學未嘗出户庭先祖嘗以隂山木風之暫遊即反丙子還鄉應試三場畢即赴黟不幸先祖前數日得疾棄世遂奉先祖母扶柩歸葬已卯舉于鄉明年㑹試禮部中乙榜急於祿養拜青田學諭便歸為叔父受室畀以家政奉先祖母挈季父少姑以行時年甫廿四毅然以師道自任青田科目久乏士亦鮮有志者乃擇可進者加勵之謹條範公勸懲日坐堂上親為講授夜間至齋房稽其勤惰且有茶累粥餌之餽士爭感奮文風一變陳暕王庭相繼中選倡修廟學饌堂事見潘太守琴所作記己丑秩滿辛卯擢安慶教授先祖母仍就養焉其為教一如青田櫺星門蔀于藥局力白于太守且率諸生撤去藥局以位櫺星及移學門於櫺星之右求羅一峰先生記之學宇頽敝輒割俸修葺視如家事不屑屑煩有司初廨舍有妖頗著影響屹不為動久之遂熄庠生吳本清母喪廬墓縣不為申徑取諸生呈轉達當道得䝉旌表丁酉秋闈閩浙交聘往考閩試得人為盛若司冦林公待用春官鄭公仲璧輩凡若干人是年先祖母壽滿六袠事既竣還至中道遂迎以歸㑹婣族稱觴為樂庚子秩滿諸生得雋者柯忠劉溥王鸞方向戴恩亦前此所未有也辛丑上吏部考居最力辭有司之選壬寅進南京國子學正尋聞先祖母訃奔歸治喪乙已復前職戊申考績受勅進階登仕郎乙卯秩滿先時已有歸志因不肖欽順初入翰林先夫人勸往一視乃北上六月轉國子助教仍加俸一級冬聞先夫人訃遂上疏乞休時年僅六十已未受勅封翰林院編修文林郎庚午受誥進封中憲大夫通政使司左通政庚辰加封通議大夫南京吏部右侍郎是冬感寒疾尋愈逾年患疽久之亦瘳癸未四月偶痰氣壅滯至十九日已時竟不起生正綂丁已四月一日戌時享年八十有七家君為人孝友勤儉嚴毅方正重義輕利壯老一心養先祖母二十餘年曲致承順居喪葬祭盡禮痛先祖不逮養移其孝於伯叔祖先後迎至宦邸極愛敬焉兩叔兩姑婚嫁以時先祖母視成而已撫教季父學成早世念之終身先業惟叔父所取仍作樓以居之既倡羣從作本房㕔事及後堂增祭田以供時祀致政歸復作祠堂及聴事以尊祖合族先塋所在一一悉心經理宗族婣表待之咸有恩意施不望其報有桀驁者率優容之終亦自愧服也兩輯族譜家乘皆鋟梓以垂久逺服食器用雖貴無所加然必整潔夙興夜寐罔自暇逸教兩庠升堂伐鼓恒在府縣之先諸生每私計之九年無一日曠也以身為教不尚言説一言之出聴者莫不敬而信之延及平民亦恥為非禮安慶父老皆以為前所未見也既離任往來經過諸生奔走候問如常咸依依不忍别有尾行數里瞻望弗及而後反者後復白于當道設主名宦祠生祀焉其遇諸生恩義兩盡於束修不計其有無貧者非惟不受某議婚不能成禮某室敝無以為居某親老而養不繼某親喪而不能舉且皆有以給之畧見安慶志及李太守璡書而鄉士夫之賢而貧者亦間周以義見劉通府鈺書然實無厚積于時惟先祖母肉食而已敬以事上而不為諂非公事不入守令之門在安慶見太守止行揖禮而前後守若陳侯雲鶚王侯璠潘侯蕃皆賢雅相禮遇㑹必坐欵有文事輒以咨之巡按佀公鍾至舒見其立迎曰固當驟試一論乃大加嘆賞曰吾巡舒六邑人皆稱汝行檢可謂文與行稱矣佀明年巡浙遂有考試官之薦兩任提學若憲副劉公釪御史戴公珊婁公謙率優禮焉戴每揚之於衆各縣學生有不率教者輒發詣講下背書觀禮婁初至進武生十數人皆告願入府學婁問潘守彼樂羅教授寛邪潘備稱之婁曰吾固知其然也在南雍尤為大司成方石謝公所重謝歸休諸生謁文以贈謝得之喜曰吾初得先生之為人今又得此文惜不久處盡閲餘稿謝後起掌成均為作像贊有維昔南雍實為老成環視六館惟先生有聲之語一切世味泊然無所好惟酷好觀書然不喜泛濫六經通鑒綱目之外則文章正宗文選古體韓歐曾文李杜盛唐詩及本朝二三大家集而已夙擅文名遇人有求無不樂應南雍務簡與同官為文㑹有所指摘皆自以為中其病也後以不肖兄弟迎養又兩至南都及錢塘弔古探竒吟咏尤富自丙辰謝事後或家居或就養三子實畨侍焉而季侍于家最久壽朝令旦必會婣賔宴欵葢無嵗不樂自作慶壽記紀其實以示後人每聞朝廷進一善人行一善政輒不勝喜羣姦用事語及恒蹙額長嘆季有召命部符且再至即以大義速其行曰有以事君吾志樂矣年踰大耋聰明康健金緋在躬人詫其榮而秉謙執虚未嘗自滿雖後進晩生必與為禮人無遠近親疎皆知其為君子長者而推為鄉之達尊未病前二月先祖神道碑亭初畢工即從子姪肩輿而往周覽畢喜動眉宇曰了吾此念節届清明又欲躬奠祠堂不肖以筋力難强諫至再三乃已屬纊前三日進茶猶欲自舉請曰甌熱則應曰我自知之執虚如執盈蓋臨終無一語之亂將斂則大風雷雨竟夕萬瓦如傾鄉人驚訝以為哲人云亡非細故也訃聞賜祭仍命有司營葬域事家君諱用俊字舜臣别號栗齋又號西岡退叟配先夫人同里曾氏初贈孺人再贈恭人三贈淑人賢明慈孝與家君相待如賔先二十九年卒家君終老不忘哀焉子男三即不肖兄弟女二長適楊平次適蕭欽蕭氏妹亦先卒孫男五琰珵珝璫珏珵璫俱邑庠生珝國子生女五長適萬安庠生劉宏次適楊黍餘尚幼曽孫男四偁倜儋份女一所著有芝田皖城南雍寓京歸田諸稿論語有類編葬卜後二年乙酉正月庚申墓在邑樟橋里天柱岡之陽先夫人同兆云亡弟前都察院左副都御史允恕墓誌銘允恕余季弟也諱欽忠初號敬軒更號西野晩樂金魚洲之勝作惺翁亭其上士友亦或以惺翁稱之生成化丙申三月十九日年二十預江西舉送遭母夫人喪未行𢎞治己未中禮部試列名第八廷試第二甲第三人賜進士出身三榜皆與仲兄允迪聯名庚申春授刑部福建司主事其秋遂移疾歸壬戌秋奉先吏部公赴杭以允迪在運司迎養故其冬還朝改禮部精膳司正徳丙寅陞署主客員外郎事明年春選陞通政使司右叅議三遷至左通政滿考推恩封先公如其官贈先母恭人壬申冬請告歸省癸酉陞南京太僕卿會疾作辭明年陞通政使行未及上而言者劾其曠職吏部得㫖將改用之力引疾求退竟得請既而有司以病痊奏請起用不報嘉靖壬午始復除通政使添註管事辭不允㑹遭先公之喪及再被旨入朝供職則丁亥春也允恕舊有血疾變為積塊供職未幾疾屢作頗妨朝夕遂連奏乞休上矜念之特改都察院左副都御史賜璽書仰總督南京糧儲視事僅浹旬復以通政使召辭疏亟上召命加嚴己丑春力疾啓行且再辭行至邳州奉冠帶閒住之命抵家輒就牀褥疾日益甚更數醫竟不可為矣前卒數夕强起正襟危坐舉手向余首屬為銘已而從容百十言皆臣子大節且言事君之義敢有不盡但自覺光景已促無可柰何兄宜為我表白此心死無憾矣遂語及葬地顧諸姪厯示其向背曲折令善為之乃復舉手向余曰夜向深兄宜就寢弟亦倦矣明當更盡所言然自後恐重傷余懷時有所付囑惟授諸子姪而已語皆精審如平日初允恕來告行余嘗酌之酒酒半頗嘅叙其平生謂異日兄當銘我有志未就而卒此言幸勿忘也余笑曰安有是然心竊怪之及疾甚余偕允迪往省其宵輒感異夢或示余易義有戊與癸合之文卒之日則八月二十五日戊子也嗚呼孰非前定邪惜未徴其所自覺者何也享年五十有四吾羅氏初祖諱詢當宋紹興間自豫章來主泰和簿遂留家邑城東北隅今所稱缺城是也八世祖號大觀始徙居上模里之西岡世遠族蕃居止頗隘允恕欲還居缺城未果乃市地學宫之傍築室而居之髙祖號直庭富而好禮鄉稱長者曽祖諱寧從芳洲陳公受書游邑庠早卒祖諱鐸黟縣訓導贈南京吏部右侍郎考諱用俊國子助教致仕累封官與祖同祖妣王氏妣曽氏俱贈淑人配蕭氏封恭人子一珏女四長許嫁曽教諭之子民章餘皆㓜側室丁氏王氏吳氏珏王出也允恕生質厚重自㓜不凡年十四五即有志向上聞父兄前輩語及聖賢可學輒踴躍思奮若不能自己者舉業外恒别有用心處家庭相聚於學蓋無所不講若心性理氣諸説講之尤詳始或異同終其所見皆合性剛負氣然於親賢取友毎深自謙抑惟善是從一時名士往往樂與之交晩於湛甘泉尤善也為文工造語簡潔圓勁惟意所向善變而不窮而必歸宿於理詩古近體多清婉有餘韻頗造古作者畛域方將㑹萃其稿以俟知言者擇之事二親愉色小心恒若不及奉養之具雖微末必躬視之余與允迪性各有偏未嘗不婉致其樂也厚於宗族嘗别儲粟以周其乏臨終慮其不繼復益之千石屬講求斂散法以圖經久居官奉職綜理精敏尤善奏對廷中推為第一嘗一充廷試讀巻官雖久從家食然於天下事皆嘗留意逢時再出亦將有以自見矣顧阨於多病而年復不永可勝惜哉以卒之年十二月甲申葬邑東門外金魚洲上首寅趾申皆從其治命並營二竁虚其右以俟蕭云嗚呼余衰鈍不文然所以銘吾弟者惟其信而已矣文不文不計也嗚呼銘曰生必有知孰為之制近止尋常逺通百世知之所逮皆欲行之其近其逺抑有攸司進非子能實惟知退有赫其臨有嚴其對斂其精英還之彼蒼隨帝周流其或不亡郭處士配羅孺人墓誌銘孺人姓羅氏先祖考贈侍郎府君之季女也母王氏贈淑人景泰乙亥十月二十六日孺人生于徽之黟庠官舍故其諱曰徽娘踰年而府君卒後四年先考封侍郎府君筮仕得青田教諭奉王淑人往就養孺人隨之成化庚寅先封君滿考過家遂歸孺人于同鄉竹溪郭氏為處士善仁君之配孺人性専静寡言笑自㓜奉母訓惟謹及為婦能竭力以事舅姑烹飪調胹汚澣補綴率身親之不以付婢使姑老而患風痺左右扶䕶者十年未嘗有惰容事後姑亦能得其歡悦處士雅克振奮孺人相之甚有方治女工常至夜分大布之衣非甚弊不易日積嵗累貲用益饒用能廣園田新棟宇以成處士君之志春秋薦享賔客過從殽甘酒㫖不戒而具尤篤于教子奉師之禮每每從厚待羣從子姪皆有恩有與處士不相能者遇事輒相持不置孺人恒委曲小心以彌縫其隙卒歸于和孺人體貌清癯然素少疢疾中年嘗苦目眩恪守禁忌俄而遂愈晩以勤家之故乃日就衰憊一旦呼諸子語之曰死生有命吾度不能起汝兄弟其善事汝父務相與雍睦勤耕讀以圖光大家門吾死無憾矣翼日遂卒嘉靖癸未二月二十日也享年六十有九子男四長淳龍南縣學生屢試秋闈未遇次景直先卒次景文景賢女二長適平原曽僉憲嗣子紱次適上模曽國教諸孫庎孫男十三某某女二處士卜以是年十月庚申葬孺人于其里曽家山之原先期命淳具事狀來以墓銘見屬嗚呼自吾姑謝世而吾父同氣之親無復存者矣永念平生友于之愛不知涕泗之交集也未踰兩月吾父又棄諸孤積憂薰心百慮昏塞尚安能執筆以銘孺人之墓邪葬事且嚴處士君竟不余釋乃勉强叙而銘之銘曰孝敬儉勤慈惠溫良宜家之本婦徳之常彼驕彼哲慈謂非祥不覩梟鴟疇辨鸞凰孺人逝矣遺馥彌芳亦有賢子尚觀顯揚亡妹蕭氏婦墓誌銘亡妹諱考珠姓羅氏以成化己丑六月七日生于浙東青田之官舍家君時為其邑教諭適九載當考績故因以考名之稍長先母曽夫人親教之女事習之旬月輒可觀其工多而用省者稍解即已性沈密寡言笑而遇事優為先夫人每有所指使動皆如意以故尤竒愛之年十五嫁為同邑蕭欽時肅妻時肅先君憲副公與家君同領鄉書故因而締好吾妹出入貴富一以勤儉自將相時肅治家斟酌淺深度量緩急不動聲氣而條理斬斬時肅常曰吾家之成吾妻之力也憲副公嘗便道還鄉良賤聚食累千指且賔客沓至吾妹介婦也適以次當家隨分應酬未嘗有失恒痛先夫人早世於家君動静必謹候之屢獻時物以助甘旨既連失數子即以時贊時肅置妾久之復無所出由是恒鬱鬱不自釋曰如身後何余每從容寛譬之輒應曰諾然未出户已聞嘆息之聲竟以此成疾卒正徳乙亥六月十五日年止四十有七嗚呼痛哉後數月時肅書來以葬期告遂請為銘夫其賢而不壽且無子余所為甚哀之者也將為之計久逺銘其忍無作乎吾妹有二女長適南富王煦㳄適清溪楊衮皆同邑葬以卒之年某月某日墓在千秋鄉江東里某山之原余往時嘗一至其處為時肅言可為隂宅者也銘曰凡人之情皆願有子命之方正有無定矣妹也賢明獨蔽於此我銘其藏究極終始後千百年誰其忍毁亡女劉氏婦墓誌銘嘉靖甲申春余壻劉宏以女氏之疾來告亟令人往候之疾且進其二弟又迭往候之五月十六日竟不起年止三十有八嗚呼痛哉將以是年某月某日葬其邑某都田心之原宏來請銘銘蓋有不忍為顧不可無一言以慰吾女於地下乃追憶其平生誌而銘之吾女以成化丁未八月二十五日生名之曰任潔稍長其母攜之從余於官所即能領教戒嗜女紅間佐其母治庖饋已而業復在手居止有常處未嘗輒窺外户於服飾不求華美雖屢經修補亦自安之余心重其賢為之相攸屢矣最後乃有薦宏者稱其秀穎好學受知其邑大夫黄徳裕特進補弟子員余察之信女時年十九遂以歸焉劉世居萬安之横街為衣纓鉅族吾女既習聞婦道承上接下無所不致其謹舅姑悦之居五六年流賊破其邑焚其居宏先已挈家避之江上適余復起莅南雍遂以壻女偕行館之再期宏請還修子婦之職乃辭去吾女初嫁資裝殊弗備及是亦未能有所増益察其意無不悦者宏既抵家其父介菴君以口衆事煩析産授諸子宏方力學圖進取一切内事皆吾女任之自此比其卒十餘年間凡宏之親師取友所以資給之者既無或缺而田園加闢棟宇復完吾女之約身勤家於此亦可見矣生子皆不育有女二人長者年十三幼者六嵗女之族姓曰泰和缺城羅氏今所居里曰西岡大父號栗齋國子助教致仕封南京吏部右侍郎大母曽氏贈淑人余其父也號整菴母曽氏亦贈淑人銘曰女事之習其心孔専迨其有家黽勉相先勞則多有而不永年無忝所生銘以是鐫恩例冠帶西磐曽公墓誌銘嘉靖庚寅春正月外舅西磐公有疾欽順往問之就牀坐語甚欵意氣浡浡如平日以酒饌進徧嘗之已乃握手言曰吾疾殆不起即不起宜以時葬勿效時俗所為第為我書其平生納諸壙中吾無憾矣余拱而對曰謹奉命旬日後公出就西齋宴息勢若小愈二月十六日朝食罷覺微噎就卧少頃則恬然逝矣余走哭於牀遂視棺斂時其伯子明揚官于廣乃與其仲明瑞謀殯公于正寢之後堂以俟禮也明揚歸卜葬日得是年十二月二十八日甲申欽順乃以公治命為誌公諱𩕄字之恭别號西磐姓曽氏世居泰和上模里為望族曽祖諱楚芳祖諱季倫父諱衝字士舉前母羅氏余從祖姑繼母後塘羅氏母南舍郭氏以正統乙丑二月十三日生時舉翁年幾五十矣得子晩頃刻不令去左右教愛甚周公生質清􅋯或頗疑其難育惟西平胡處士仲溫甫一見竒之許妻以女後卒歸公是為外姑胡孺人也稍長從師讀書學五七言詩皆略解顧舉翁年已老乃一意服勞學以中輟性闓爽樂易事伯叔諸父與羣從兄弟處皆能得其歡心遇人無小大戚疏一見皆如舊識綜理家務及供事邑庭動皆整辦鄉人莫不嘆羨謂舉翁有賢子矣翁既逝公益挺挺自植族綱之振宣力尤多嘗慮房族間有不率教者特走㑹府以族兄刑侍公故所立家範白於憲司願得舉行以保其族憲使陸公大悦下其詞郡邑俾符公如所謂公益嚴諸身以為之率進二三賢子弟以為之輔小懲大戒而恣肆者鮮矣舉翁嘗率羣從建祠堂以事先公復與諸有力者増置祭田時祭益備延師教子常厚為禮待賔客一無所忽性不飲酒然公但在席即無不樂者有時興至或髙歌一曲音韻清逺聴者皆為之灑然余初入翰林公為挈家以來留浹嵗及佐南雍復走使奉迎至則為留再嵗兩京之勝皆徧覽之士夫多以詩文贈其歸往往能道其實嘗得别墅去所居之西僅里許竹樹深茂意甚樂之因以西磐自號又别治花塢出門百步而近名以藏春二晩年蓋無日不在塢中也邑大夫聞其賢嘗禮致鄉飲辭不赴及年八十遇覃恩詔下遂拜冠帶及絹綿米肉之賜賀客駢集酬酢雍容衆莫不榮其遭而美其稱也胡孺人先公二十八年卒所生女一人最長是為余室封孺人卒贈淑人子一人即明揚博羅河泊所官貳室劉氏子一人即明瑞邑庠生孫男三人曰都曰鄒曰郊曽孫男四人朝著朝彦朝譜朝瞻初公葬其考於里中嶺背之原既老遂營壽藏於其側今啓而葬焉墓門北向因其山勢然爾銘曰惟西有磐碩人之寛貞于嵗寒五福斯完葬從其先既固永安匪辭曷傳堅珉是鑚處士楊君墓誌銘君楊氏諱平字顯正别號勿齋余女兄之夫也年五十有二正徳己巳五月庚申以疾卒親交厚者皆赴哭盡哀而余哀之念之至於久而不能置葢不獨以其親也自余獲從君游于今二十餘年矣雖狎見未嘗不相先以禮相匡相翼一出於誠心而驩然無間其不相見遇有事輒交通手畢君所貽或片紙數語莫不粲然成文家君嘗稱其簡當可喜其風儀秀整性軒豁善辭辨從容往復衮衮數十百言不可窮然余説或長亦未始不欣然服也先夫人大故余在朝二弟荒迷莫知所措殯殮一出君手極其周慎家君致政里居君時時來省遇生日必清晨攜酒殽至嵗以為常不爽時刻余兄弟相繼登仕辱君贊喜者數矣而未嘗少以非義見干蓋其識明而氣豪審于大體而所向者恒近正然也嗚呼余閲人亦多矣求如君者蓋少而况肺腑之親乎此余所以不能忘情於君也君㓜學記誦兼人年十六受室其父方游邑校圖進取即舉家政授之君不得辭學因以中廢然治家極有條理常以其間涉獵書史旁及隂陽醫卜之説皆頗通其大義事父母善承順弟奉亦有才智事多與之謀内恊宗親外交納名人賢士施張磊落聲價聳一時富有餘財然一錢不妄用即當用雖空槖無難色楊氏居泰和世久其源流有太師文貞公所作譜在自君六世祖始遷髙隴其諸父又分居綿溪君曽祖彦實以輸粟被旌為義民祖敏恭别號不侮父光衍未仕而卒母歐陽氏初室蕭氏贛榆大尹時習之女繼室是為家君國子助教封翰林編修之女於余為兄側室劉氏蕭氏諸室皆無子先已立弟子黍為嗣女三繼室出者歸尹貫劉出歸陳儋蕭出許歸曽氏子綱初余往省君疾君首以葬地託余為相得航溪里南木岡寨下之原吉比疾甚余再往省則遂託余後事第姑應之嗚呼豈謂遽成永訣邪君卒後十有一旬有一日其從子穏即余所相地斂甓並甃二壙越七日戊午壙成奉君之柩葬其左虛其右以俟君繼室余於是再往視窆且為銘刻石納壙中以寄余情以終君之託云銘曰才足以達其志氣足以充其智年則不償其有而從子為之嗣嗚呼奈何其永寧於是整菴存稿巻十四
