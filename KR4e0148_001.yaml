body:
  text: 整菴存稿卷一明羅欽順撰記一十五首婺源縣重建察院記察院者故御史臺三院之一也我朝改御史臺為都察院其屬惟監察御史分十三道以居而三院之制盡廢惟其銜命四出以按吏治者所至之處必有館宇以正厥位而出政令焉乃名之曰察院葢其名雖仍唐宋之舊而實有不同者通建扵郡邑也婺源為南畿大邑邑有察院創自宣徳年中厯嵗滋久傾頽且盡平原聶君瑄來知縣事喟曰是非所以尊嚴風紀也按節時至俯就他館可乎顧初政尤重勞民已而惠洽信孚民用和懌爰稽庫厯得顧役餘財若干遂謀作新以還舊觀適御史羅山劉君東之按行至邑聞而韙之乃市材僦工涓日興事屬鄉老陳樞朝夕程督而縣丞天津顔輔主簿漢川謝銹典史餘姚陳輅皆賛襄惟謹未㡬院以重建為屋凡若干楹堂寢崇深門序整飭牆垣堅厚塗繪鮮明所以表風紀之尊嚴係一人之瞻仰斯有在矣實𢎞治壬戌夏四月也明年聶君被召為南臺御史慈溪羅君縉代之謂茲役不可無紀乃請扵聶君欲得文詞以刻扵石聶君重違其意而屬筆扵余余惟封建罷而郡縣成廵守輟而使權重前代姑弗論若今御史之按治扵四方制度得以考正之官吏得以進退之民情之利病得以權其輕重緩急而罷行之事權所寄葢鮮有過之者也挟重權以臨乎下百度所由秩也而其所居之署有司者乃玩而不理豈非以上之人習扵遺逺因謂虚器為無用哉夫近之察而逺之遺是上慢也察者理而遺者玩是下慢也天下之治未有上下胥慢而能有成者雖一察院之廢興若未足為輕重然霸圗方振則賔館斯崇王政克行則明堂不毁是亦惡可例以末節視哉故觀扵茲役而劉君咨度之周聶君従政之敏皆可槩見誠不可無紀也羅君所為欲紀之者固已休於前政殆亦有見扵治體所係者乎後之人尚時葺之俾勿壊當塗縣儒學重修記我太祖髙皇帝渡江之初首駐蹕扵太平武功既成誕興文教亦自太平諸郡始當塗太平附郭縣也縣之儒學則洪武六年其令王俊即宋尉司舊址創建後來若楊守仕敏韓令恭元令霖拓基葺宇時有潤色然大抵皆因舊規師生廨舍四散不整正徳五年之夏洪水入焉浸淫久之㡬無完宇泮池湮塞射圃荒蕪學因以甚敝廬陵周侯統自南京刑部郎中出守其邦周覽徘徊有意經理㑹柱史洗君光以巡按至視而歎曰學校如此何以育才失今不修他日為力倍矣遂與侯定議屬任令髙鳩工庀材以舉其事已而洗君滿去柱史鄺君約代之實成厥終凡新作師之廨宇三區區十楹駢列扵後堂之後其址則舊為諸生號房及社學或遷或易兩得其宜又作號房二十八楹分列扵堂之左右琢石為梁柱各六以改作靈星門殿廡堂齋咸加補葺湮者以濬天光洞然蕪者以剪門庭翼然繚以周垣凡五百餘丈肇工扵六年初夏至十月而落成規制一新觀者咸喜為費凡白金三百二十兩及食工之粟皆取諸贖刑人力取之餘夫逺邇均一初未嘗有病乎民也侯以余同鄉且嘗備員太史乃具其事之本末以授訓導楊綱來請記焉余惟三君子之所用心非直為觀美也以為學校育才之地必其髙明整飭使為師弟子者居之而安則其心一無所撓而其為教也必専為學也必固庶㡬人才輩出有以維持斯世永抵于平康葢其用心之厚如此則凡學扵此者寜不知所感發而興起乎昔顔淵在陋巷之中而獨以好學見稱扵夫子今焉學宫完美風雨攸除陟降興居既安且適則所以進扵學者宜何如也葢士當窮居之時固當學顔淵之學顔淵之學其本末具見扵魯論惟博文以明之約禮以成之至扵積久而有得焉則心無不存情無不正由是出而效用建功立業參諸禹稷其庶㡬矣澤潤乎生民道光扵前哲夫然後無負我髙皇興學之意諸君修學之勤茍徒規規焉扵記誦詞章以為富貴利達媒斯亦陋矣嗚呼學扵此者尚其知所學哉周侯為政惓惓以教化為先葢有其先都憲公家法而同知秦侯茂通判劉侯卓推官紀侯憲章學教諭訓導皆賛襄是役惟謹敦匠則經厯周鴻主簿劉孟選財用之出納則委諸義官張喬甯隆法皆得書是為記安慶府重修儒學記嘉興陶侯煦守安慶之明年疆埸無虞惸獨有養乃圗新其郡學既得請扵提學御史黄公如金巡按御史鄺公約遂諏日興工同知楊君通判侯君推官陳君懐寜知縣李君純皆克賛之又明年春督工檢校張珂率富民之供事者十有六人以工畢告八月朔旦侯舉釋菜禮告成事扵先聖先師實正徳七年也扵是學訓導貴溪江君奎具事本末俾諸生方欽陳潔造余宦邸請文刻石以永侯之功余為童子時嘗隨侍家君學扵茲學㑹刻一峰羅先生所作靈星門記過必一再讀至今尚能誦其辭追想舊逰固不能忘情也屬茲盛舉可無述乎惟茲學建自國初百餘年間葢屢經修葺然其敝壊不至如今日之甚故其功亦莫過扵今凡今所改為者若明倫堂若養賢堂若中外二門其髙廣加扵舊率五之一而中門倍之所創為者若中門外之泮池池上及門内之綽楔門左右之迴廊規制所存陟降所由固皆不可闕者其他若東西四齋㑹講之堂尊經之閣肄業之舍以至扵倉庫庖湢則舊貫猶可仍然皆正其攲傾易其朽腐補其缺漏而加之藻飾焉葢凡可以用力者無不為也靈星門舊據髙阜荒蕪而不整乃甃為方臺自臺以達扵㦸門有坊有池有旁行之道増楹改甃咸就規矩聖賢塑像設色加精葢凡可以用力扵廟者亦無不為也自經始以至告成厯日凡四百九十有竒為工三千六百費白金僅千兩内垂久逺之計外聳壯麗之觀而民不知勞財無妄費侯扵是役其可謂盡心焉耳矣夫興作葢春秋所慎然宫室之制取諸大壯泮水之樂頌扵魯人則凡去撓就隆固隨時變易之義而學乃教化所従出人才所自成敝之宜修而作之宜壯又孰有先扵此者扵此而克盡其心非知務之君子乎是宜大書而深刻之俾後來永永有考若夫學者之所當取舍則一峰言之已盡而家君之教諸君容亦有未忘者惟勿疑勿怠以進扵聖賢之道以充其文武之才則人與學而俱新矣夫如是豈惟不負侯之美意執筆者與有光焉韶州府重修廟學記學校之教所以明倫理育人才厚風俗隆治化自古帝王君臨天下必以此為先務焉而凡為民師帥者亦皆預有其責其祗其怠而興廢繫之矣凡教之所以興必由扵表率之端誨誘之善勸戒之明固無待乎其外然而廟貎之顯設堂宇之崇峙齋舍之分列乃學者陟降瞻依之地藏修㳺息之所式完且美則其居之也安而志不容扵不篤故興修之舉誠亦有資扵教事有不容槩以末節視也然其所望扵學者豈徒藝焉而已㢤夫學所以學為人也人之所以為人仁而已矣四端五典萬事萬物無一不統扵仁故孔門教人以求仁為第一義凡古聖賢經傳其言累千萬計無非所以發明是理博學而慎擇之審問而精思之明諸心體之身積之厚而推之善其仁至扵不可勝用然後為學之成不此之求而徒事空言以徼利達則其志亦陋矣夫安能為有無扵斯世哉韶為嶺南名郡在唐有張文獻公在宋有余襄公皆其人物之表表者郡故有學自宋景徳間創立迄今垂五百年中間屢壊屢修而其頽敝莫如頃年之甚葢郡嘗為猺宼所踐蹂繼而師旅之供給公私匱乏而修葺不時無怪乎其然也今天子紹統之初九溪周侯叙以前大理正起自謫籍來守是邦急民之艱一意拊循爰及期年民用蘇息而嵗復大稔乃喟然嘆曰廟學之修此其時㢤㑹有僧徒以因果誑人而掩有其所施事發當沒入其銀四百兩遂擬以給諸費不足則議毁諸淫祠通融以益之以白督撫右都御史張公嵿巡按御史謝君珊余君敬皆報如議扵是涓日興事若大成殿儀門及霛星門若明倫堂皆撤而新之若兩廡若四齋以及號舍之類則皆因而葺之又新作堂二以㑹講以習禮祠二以祀鄉賢名宦門一以表泮宫殿中塑像加精兩廡仍用木主經始扵嘉靖改元壬戌之冬落成扵三年甲申之夏材良工善計必經久輪奐之美迥軼舊觀扵是學師生相與謀曰茲學之新凡以為吾徒計耳顧其費省而功倍非吾侯詳與經理勤扵督視未易臻茲盍紀其成功刻之石以示久逺郡倅臨江符侯錫聞而韙之樂賛其成以余嘗莅南雍有一日之長乃具書及事狀遣學訓導張杞芳來謁記余聞周侯往以忠諫獲罪賢名已振扵一時及起而莅韶政有以宜其民而為士者亦皆樂従其教至扵修舉廢墜其成績又章章如此不賢而能之乎然學既一新第不知諸生之所以學者何也誠能遺近小之圗而厲其逺大之志由吾之説以底扵學之成處也徳足以熏其鄉出也道有以周扵用風俗之厚治化之隆皆能有補扵其間則其卓然為一代之偉人也必矣伊周顔孟猶將可及矧其鄉先正乎㢤余既嘉周侯之功又感符侯之書能逹其意故不辭而為之記且因以致丁寜扵其學者計亦諸君之所樂聞而不厭也萬安縣重修儒學記萬安在吉之上㳺稱望邑其俗尊禮教尚儒雅詩書之誦習科第之奮興嵗以益盛其長才偉器出為時用以文章政事聞天下者葢往往有之固本其山川之靈而漸磨成就未有不由扵學校者也儒學在縣治東北洪武五年因前代遺址創建景泰間嘗撤其舊而一新之迄今嵗久亦漸敝矣義烏虞侯守愚以癸未進士治優嘉魚更令茲邑初至謁廟退而用覽學宫謂失今不修將來工費必倍遂慨然以為已責方隨事區畫有言邑富民彭南齡可任者召而諭之聞命躍然即輸白金二百以為助侯大悅亟以書白于提學監司于郡守皆報如議乃卜日興事擇義官朱廷望周軫督工殿堂齋廡門庭廨舍泮池射圃鄉賢之祠題名之閣以及于周垣通道治之皆遍易朽腐以堅壯更破缺為完整化漶漫為鮮明凡十閱月而落成實嵗丙戌之季秋也教諭毛君鵠訓導沈君良陳君彛乃相與謀欲請余文以紀成績且因以勵其學者先之以諸生羅勲劉宏已而相率偕至禮恭而義慤義不容以衰鈍固辭顧惟平日誠亦嘗竊有所感者其又安可黙乎洪惟我太祖髙皇帝受命之初即以建學育才為第一義葢將俾百千萬世永有賴焉與造化相為無窮者也學校之教大抵先經而後史祖孔孟而宗程朱至扵諸子百家則亦隨其力之所及而博觀焉以考其是非得失之歸而定夫取舍之極務明其體以適諸用是惟聖祖建學育才之大㫖也列聖相承所以敦崇而風厲之者無或不至是以百六十年來士有定志庠序有正業異端邪說舉無所入乎其間敦厚者徳以之崇通明者才以之廣公卿百執事之選佐理承化之功亦既屢得其人而顯収其效矣然士之進用必由扵科目本末輕重之分有所未察則其所汲汲焉者鮮不在扵記誦詞章體之弗明弗暇計也豈不失之陋哉世之君子或病其然欲従而振起之意亦善矣至考其所以為學往往脫略章句而注心𤣥妙巧立宗㫖而妄議先儒又豈非所謂智者過之已乎夫學以知言為至孟氏而後有如程朱數先生斷乎不可尚已其扵佛老二氏皆有以深究其蔽陷之失而顯摘其似是之非自非見道分明何以及此舍程朱之説而欲求至扵孔孟與希升堂而閉之門者有以異乎亦多見其惑矣嗚呼世道之隆汚鮮不由扵學術而吾人之所謂學其不及者如彼過之者又如此有志之士可不明辨而熟講之乎虞侯之令萬安通敏慈祥政教兼舉方與諭訓諸君日勵諸生俾従事扵正學期扵知類通達強立不反有以踵賢躅而應時需此其意良厚非徒興修之績為可紀也諸君子尚思國家之所以教益自毖懋以無負賢大夫之所期待者哉泰和縣儒學重建靈星門記門以靈星名者尊則文廟次則社稷山川諸壇皆有之然莫詳其所以惟靈星之有祠也逺意者兼取其制名遂因之而立乎相承久矣而莫或正之葢其慎也吾邑儒學靈星門嘗值震雷楹之中裂者二勢殊岌岌邑大夫太倉張侯寅以才堪治劇來自宜春甫及數月遂拆而重建之規制率仍其舊而棟梁加壯瓴甓加宻藻飾加精視大成門殿良稱門舊臨通道民居蔀其前相去僅踰丈許既隘且䙝上下胥以為病者葢亦有年侯乃徐致其人諭之以禮民輙承命遂以善價庚之得地深若干尺廣百有二十餘尺爰設三屏中隆旁殺石刻泮宫二大字陷置中屏之端而其壖劣通往來以従人便落成之日則嘉靖丁亥季秋朔也扵是嵗時朔望有事扵廟中也進止周旋行列克整襟佩濟濟廓其有容人心之祗肅殆有加扵前日者矣學師生僉謂茲盛舉也不可以不書乃相率過余請為之記惟今制天下郡邑皆有學所以敦教而育才也學必有廟以事先聖先師所以尊道而明統也吾聖人之道髙明廣大固有非言說所能形容者然而精粗本末初無二致為學者必明乎此然後謂之知學為政者必通乎此然後謂之知政故曰器亦道道亦器也是知一門之建一屏之設雖則形器之粗而至精之理焉往而不在乎故或安扵茍簡而漫不加意或務為侈麗而過用其心皆非理之當也若吾侯今日之舉用壯以易撓闢地以逺䙝設屏以致嚴妥聖靈於穆清慰輿情之素歉為所當為而心亦未嘗過用非知政之君子其能然乎由是道而推之天下寜復有遺事與過舉乎葢凡為學之所講求為政之所彌綸固皆不出乎事物之外惟物循其則事適其宜則道即此而行而其為聖人之徒也無媿矣敢因記侯之績申舉斯義以告之吾黨讀者亦庶乎其有發云北極𤣥天真武廟重修記天子受天明命為天地神人主凡重臣受天子明命以鎮臨一方者亦各為一方神人主事神治人必盡其心必由其道俾幽明胥協和氣流通然後疵癘不生盜賊禍亂不作而上下相安扵無事矣南京乃國家根本重地内外守備實惟重臣凡南京祀典神祇與夫軍民百萬之衆皆守備重臣所當盡心焉者北極𤣥天真武廟國朝洪武中所建在欽天山之陽當十廟之中而勢特髙峻厯年滋久日就頽敝司禮太監劉公以長才敏識起自家居再膺守備重託莅事之明日躬謁廟下顧瞻徘徊謂宜以時葺已而禄賜之贏稍積遂捐以為倡同寅太監黄公偉髙公隆余公俊芮公景賢董公文掌中軍都督府事太子太傅魏國公徐公俌皆欣然協心以濟羣材既集卜日興工遴委南京兵仗局前厰左副使楊順日勤督視始自前殿及扵後寢循兩序而出以達扵中門外門凡其朽腐破缺漶漫傾頽者皆易而為堅壯完宻鮮明端整工既畢公専使來致幣屬欽順為文以記之欽順頃佐太常嵗常再有事扵茲廟目擊其頽敝之狀葢動心者久之而力莫能及及聞公之盛舉為之欣慰不勝乃今遂獲見其成功何其幸也茲廟之修其費已鉅而財猶有餘則乂以修飾五顯廟美亦如之夫公之事神所以盡其心者如此至誠之感何福不臻推此心以治人上下相安之效可以立致然則根本重地豈不誠有賴扵諸公㢤此欽順所以樂為之書也始建廟之嵗月與神之所以為靈已具扵前國子祭酒宋訥奉勅所撰碑文此非欽順所敢贅及重修之嵗則正徳十年乙亥也謹記江藩重建滕王閣記滕王閣自唐永徽中創建其後葢屢廢而屢興南昌之版圗初入我國朝遺構猶在聖祖親征偽漢嘗扵此宴諸將領既而頽壓以盡遺址亦頗淪扵江正統初布政使呉公潤始扵其地築館作迎恩之堂景泰中都御史韓公雍復扵堂後建重屋取韓記中語意名曰西江第一之樓成化乙酉布政使翁公世資再加修葺始復其名曰滕王閣扵今六十餘年矣自逆濠搆難戎馬之跡相尋閣以益敝今都御史武陵陳公宏謨以宏才偉望撫循江右百度既飭爰及扵茲謀協扵鎮守太監黎公玠提督南贑軍務都御史潘公希曽巡按御史秦君鉞徐君岱清戎御史潘君壯議采扵三司諸君遂撤其舊而重建之閣凡七間髙四十有六尺視舊有加堂凡五間大門前峙其壯皆與閣稱閣之後為堂三間以祠文文山謝疊山二公名曰二忠祠葢以義起者也自大門以達扵祠下左右各有廊廡以次相承為間通計三十有二祠有垣以嚴其限中垣為門以時啓閉隨面勢稍拓其址周垣凡七十四文有竒經始于嘉靖丙戌季秋落成以丁亥春仲葢出羨財以僦工故民不勞移在官間樓以為助故用財省瓴甓甃石皆取諸廢邸丹漆諸物一出扵和市堂堂藩府連城數十樓觀相望扵逺近未有若是其壯麗而傑出者也僉謂茲役不可以不書乃走使山間徵文為記吁記斯閣者多矣必其文之典人之賢斯其行之也逺以欽順之荒陋而當是筆也其可乎然竟不獲辭也惟斯閣之勝著聞自昔傳九百餘年以至扵今似有非偶然者然在異時要不過以備登臨寄㳺觀之適其在今日則扵時奉迎詔勅扵時館穀使介扵時宴餞賔朋政體之所闗衣冠文物之所㑹固當與異時異視況扵表章忠烈廟貌顯嚴髙山景行嚮仰斯在其闗扵世教不尤重乎則諸公之協心以成是役誠亦有非徒然者矣葢古之君子凡有興作未嘗不致其慎至若維持政教之具為天下國家之所不容已者則往往相先相勸而為之故觀扵是役之成而君子之政可知也或乃徒以為續名蹟扵往古崇一方之偉觀豈足以盡之㢤維時圗議克成藩使則孫君修葉君相參政則方君楷馮君馴參議則陸君溥張君懐邵君天和憲使則張君羽副使則林君大輅李君緋何君棐徐君一鳴沈君良佐僉事則髙君賁亨鍾君雲瑞陳君璧趙君光都閫則馮君勲劉君璽王君寜張君鑾也二忠之議發扵前提學副使周君廣移樓之議發扵前僉事江君應軫督工則藩司照磨黄某南昌衛指揮孫某法皆得書具書以為記鯁夫記造化之妙不出乎隂陽剛柔人之所得以生者其中也中之為體也㣲而為徳也至葢舉之者恒莫能勝自非聖賢往往皆氣質用事是以或偏扵剛或偏扵柔或偏而為善或偏而為惡體隨用化而甚者遂㡬扵亡人極之不立職此之由也周子曰剛善為義為直為斷為嚴毅為幹固惡為猛為隘為强梁柔善為慈為順為巽惡為懦弱為無斷為邪佞夫聖賢尚矣至扵善之與惡又豈可同日而語㢤奈何氣化日醨俗流愈下强梁邪佞之徒所在林立而所謂善者落落如晨星先聖嘗云善人吾不得而見之得見有恒者斯可矣豈其難得自古而然歟妻姪曾標一日奉其尊君民愛父之命以鯁夫行事請記扵余余未嘗識鯁夫然嘉鯁之為號考其行事殆庶㡬所謂剛善者遂諾之鯁夫朱其姓浡其名九興其字自其髙曽來世有徳善為儒先君子所稱見扵文辭有足徵者鯁夫承之益惇行孝友以圗無忝其世性真而能斷遇事是是非非長區賦累年惟法惟時不猛而事集其為人如此故能得鯁夫之號扵衆多之口而君子亦喜稱之自昔以鯁稱人必繫之骨葢以骨强四體稱曰骨鯁則其人之堅强正直也可知今獨以鯁稱其義亦無異也鯁誠剛善而充實為難有以充之見大利而不前見大義而不却臨大變而不撓則操履益固而聖賢可幾又不但賢扵强梁邪佞之徒而已吾聞鯁夫喜従君子逰亦嘗有以斯義語之者乎鯁夫所居在王山之麓古平之里王山峻立扵一方實吾邑之望吾所望扵鯁夫者庶乎其克配之夫安知鯁夫之名將不與茲山同其悠久也鯁夫今夀六袠四子景明景曙景㫤景晟皆克肖標其女之壻云劉氏雙節記劉氏雙節者太學生新昌劉煥之大母母也二母皆其邑陳氏同出義門之後為士恕甫妻者是為安仲母為煥之大母為安仲妻者是為煥母安仲之孤也方五嵗煥之孤也方七嵗其弟燦方二嵗所克至扵成立以有今日者惟二母之為恃也夫士恕甫父子相繼以短命死在扵人事為大不幸盛年寡處固人情所甚難者一或不安其室而動淇梁之思藐焉遺孤且將誰屬然則劉之宗祀未可知也而二母者皆誓死靡他姑厲其節扵前婦厲其節扵後盡心竭力兼任長育教誨之勞竟以成其孤而永其祀又非劉氏之大幸歟夫仁與義人極之所以立也婦能従一而終此其心亦惟不忍死其夫不忍棄其孤耳不忍棄其孤是之謂仁不忍死其夫是之謂義一節立而仁義兼隆此為婦者所以尤著扵節也教衰俗薄民之興行者葢鮮而婦節之著乃繼見扵劉氏士君子僉以雙節稱之詎非秉彛好徳之功㢤國朝著令凡節婦年及五十有旌表門閭之典惟煥之大母既踰下夀而卒雖若無及然其母固無恙方届五十扵茲誠祇若明條舉以上請恩典葢可并得此其責在有司若夫所以顯二母扵無窮此則煥之所當自勉也煥嘗従余㳺其資明敏可進今既登名選籍將歸需次扵其鄉乃踵余門拜上雙節本末以記為請余嘗見新昌志其事葢已特書顧風化所闗書之不嫌扵復輒従其請而為之記亦因以朂煥云爾南京户部題名記官有常府而其人之遷代則不常故必有題名之碑然後可以考見其迹其厯年有久近望實有隆汚而人品之髙下亦既皆有定論觀覽之際師戒存焉非徒以為文具也其或缺焉而未舉明治體者詎容已乎正徳丙子春正月宜章鄧公自南京都察院右都御史晉户部尚書未幾而湘源蔣公以右副都御史來為侍郎二公徳望才猷表然推重扵當時協恭一堂不大聲色而十有三司之屬相與師師不怠甫及期月部之百務以次畢舉顧題名獨為缺典乃考自洪武以來至扵今嘗為卿臣者得若干人姓名刻之堅石樹扵部之後堂以垂永久仍各虚其左以俟來者續題刻既完屬欽順為文以記之惟南京户部之建扵今百五十年矣在洪武永樂間實掌天下財賦軍需國用均莭是専民數地圗簡稽是屬其地要其事繁及北京定為京師大政悉歸扵北而財賦之入出扵南京户部者曽不能以十一雖其地望如故而事則簡矣朝廷登用卿佐未始不惟其人然方其事之繁也則其人之賢者率以功顯及夫事之簡也則其人之賢者率以望重其身負時望由此而光膺召命入為丞輔以𢎞宣其用者往往有之觀其名考其迹欽其望偉其功而思與之匹休此二公刻石以詒後人之意也然世當屢易人且數更所謂盜臣與夫聚斂之臣豈無一二厠扵其列斯則千齡之永戒㢤欽順弗工為文而辭不獲命懼空言之無益也輒因記以寓規吏部題名記建官之法源扵邃古至周而益備三公論道三孤貳之六卿分職取法扵天地四時而天官卿實掌邦治天官雖與五官並列然五官之得人與否亦必由之故其責任尤重傳所謂天子之相是已周家治化之盛厯年之久前後鮮及雖由文武成康賢聖繼作抑豈非建官有體職分勢一相與左右維持之效㢤嬴秦事不師古亦既罔終由漢以來規制率相沿襲未有能卓然盡復周官之舊者其治效之不古若無足怪也我太祖髙皇帝以天縦之聖開萬世之基制治保邦一惟有周是式乃洪武十三年斷然革罷中書天下大政悉以分屬六部而升崇其品秩扵是尚書秩正二品左右侍郎秩正三品凡中外百官封拜考課黜陟之事吏部掌之列聖相承凡用為吏部者恒極一時之選而冢宰之䝉簡命禮數特異若夫勲勞茂著則三孤是加及其卒也往往三公是贈申之以易名之典任之専待之厚而其人之所建立光明碩大亦班班可數治隆化洽端有賴焉雖嘗驟值權奸擅作威福若無所容其力者徒以體統素正品式具存猶得慎守堅持黙救潜扶以需大來之慶夫然後有以知我聖祖之稽古建官慮周萬世而収其效扵近日者亦云偉矣今天子初即位首用趙郡石公為吏部尚書俄入掌絲綸亟召太子太保南京兵部尚書太原喬公為之代至則修明紀法舉措惟允孜孜夙夜以翼維興運與石公先後一心朝野欣欣以為太平可嵗月冀矣公視事稍暇日考求前人名迹以為尚友之資已而得大司徒九峯孫公所集兩京吏部題名錄参互考訂乃戒工礱石次第書而刻之將樹扵部之後堂以表交承存法戒焉惟吏部之稱扵北京始自永樂辛丒迄今嘉靖壬午凡百有二年中間十六七年雖仍以行在吏部稱然大政所出固無改也故今題名之刻斷自永樂辛丑始卿佐凡百十人其在南京及辛丑以前之行部皆不與焉後來者可得而續書也刻垂畢某適承乏南銓公遂以記文見屬顧惟不敏再三辭避而竟不余釋也乃勉書其顛末如此若其人之孰為可法孰為可戒觀者當自得之要豈出扵公私義利兩言之外哉是為記江西察院題名記凡公署之有題名其來尚矣原其所以將使後之人覩其名而求其迹以無失乎取舍之宜政理之資扵是乎在非徒紀交承存嵗月而已況御史之按行外服事權之重迥非他職可比賢人君子膺受斯寄為之必以其道其流風餘韻固有漸被扵久逺者矣而江西察院乃獨無題名之石使凡赫然可仰之名迹與夫自崇自用者槩泯扵無聞非缺典歟嘉靖八年秋仲三原穆君相實被簡命而來勤勵精詳風紀聿振爰以餘力興言及此乃自其所代儲君良材泝而求之至蔡君英而止僅滿百人蔡君來按在天順年中迄今僅七十年而其前無復可考者矣其姓名之幸存者字或未詳邑里年次亦多闕略君以謂必求其備將愈久而愈失之遂據所得俾鐫諸石而虚其左方以俟來者伻來屬記固不獲辭夫人之生也父命之名無貴賤賢不肖一也若夫鄉國之所知碑板之所載則惟其人之貴者而賤者弗與焉髙官要職自昔不為少矣若夫史册之所稱天下後世之所仰則必其人之賢者而不肖者弗與焉然則御史之所自為賢者果安在也其身正則不猛而威大體得則不煩為理時措審則百度惟貞所謂流風餘韻之逺被者非若人而何今題名之石既立以此三者求之而有合焉則其人皆我之師也以此三者求之而靡合焉則其人亦我之資也穆君惓惓之意實惟在此後之君子其心不亦有同然者乎書云三后協心同底扵道詩云庶幾夙夜以永終譽誠如是豈惟大江之西十有三郡之民長受其賜所以禆益國家之政理亦多矣察院舊在按察司左今之所在乃廢府承奉司數年前嘗為巡撫都院比裁革巡撫官乃奏請更定扵此隨宜増損規制益備而舊廨則改為南昌道云上模曾氏續置祭田記上模曽氏所居有上下村下村故有祠堂有祭田嵗以中元日行事凡在陪位與燕列者頗有義例為之損益然常不下千數百指可謂盛哉成化間堂宇頽敝租入或不登先世墳塋之散在他方者亦曠不時省其族之傑曰士舉翁力倡族人修輯經理且扵堂右作祭掃亭以視牲殺左作宴㑹亭以展旅酬而祠之規制益備少司冦省軒公所為記可考也正徳初元祭畢而燕翁嗣子之恭甫乃言扵衆曰禮扵先祖有四時之祭今吾祭先之禮得無簡乎盍相與圗之扵是其族父士獻正源二夀官正秉處士及其諸兄弟姪輩凡三十一人謀以克諧乃各出已資别市良田若干畆嵗収租榖以畜以醸扵春秋及冬諏日之吉行事一如中元顧其品物未能如中元之豐則不敢以祭名而姑名之曰時薦其亦慎哉方圗請文刻石以垂示久逺㑹余䝉恩歸省扵是峻等三人奉諸長者之命來以文事見屬意甚勤也夫祭先之數以時而四在禮與法自士大夫以下葢無不得為者禮法之所得為固不容簡而無財不可以為悅亦豈獨今日為然哉今曽氏諸公之為斯舉也心固存扵孝財亦副其心使古禮之未盡行扵今者一旦光復扵其族其為美之大小何如也余以通家誼重獲聞美事其可不書惟此祭田實三十一人之偉圗其子孫當世守惟謹俾三時之祭常與中元迭舉永永無廢才良繼出容有増益第隨時致其豐腆而無敢為黷豈不有光扵孝徳哉請以是為記凡三十一人之名號與田之段落及租入之數一一列諸碑隂來者其有考也沅州守素菴曾公祠記曾氏故居泰和之文溪自俊甫新甫兄弟始分居城西檀樹巷再遷韋家巷者遼海翁子永也三遷雲亭鄉之月岡者耕樂翁士敏也至公又自月岡遷文水扵是乎有専祠焉公諱瑀字儒玉素菴其號耕樂仲子遼海曾孫而新甫七世孫也起明經授南陵訓導几載考最擢知光山陞廣安州守連丁家艱服闋改沅州久之引疾得謝享年若千嵗考終扵家公平時恒病舊居湫隘欲他遷而不可得一日偶以事憩文水上徘徊瞻望若有契焉已而徧叩堪輿家皆以為宅地莫善扵此公志遂定厥基既廓乃市良材構廣厦落成之日遂徙居之顯厰邃宻垂後裕如矣公有七子考陞任憲瞻忠晩皆能立公卒後若干年憲致桂陽令事來歸乃與諸兄弟謀曰先公官至大夫基開文水所以覆載我後人者功徳甚盛子子孫孫詎能一日而忘報耶夫情之所不能忘則禮固有當講者矣議以克協乃刻木肖公像奉為文水開基祖祠扵正寢之東創置祭田若干畆以次収其租入具品物嵗以中秋後一日公之生旦迎神像出莅中堂致特祭焉配以元配封孺人蕭而郭氏章氏周氏三孺人皆與祭畢而燕小大均霑行之既累年復恐後人未知其深意之所存也乃來拜謁余文將刻石垂示永久俾勿替予觀桂陽兄弟之意葢以文水之遷實自公始子孫將百世賴之異時雖服窮親盡報本之祭斷不容已然必自今有舉則以嗣以續庶乎可至扵無窮而公得以長食其報雖考之扵古未必盡合要其心之篤扵孝則賢扵流俗逺矣寜不為君子之所取乎後之人尚相與深念之因其禮之有常而每致其謹隨其力之可及而益致其豐篤學力行懋圗無忝吾知幽明一理有感斯通公扵𡨕𡨕之中所以監觀厥誠而錫之祉福宜亦有不容已者矣然則曽氏之盛詎可涯哉余與桂陽兄弟文字交是以不獲辭記而因以告其後人如此任擅名鄉校累舉無所遇今始膺貢上春官云整菴存稿卷一
