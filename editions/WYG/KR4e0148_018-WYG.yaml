body:
  text: 整巷存稿巻十八明羅欽順撰七言律詩九十八首遊白鹿洞三首偶尋白鹿洞中春初識廬山靣目眞往回數次惟此行始見廬山分明雙瀑下垂深歲月開先瀑布在西南遥望見之五峯髙聳切星辰白鹿書院正在五老峯下篤生豪傑寧無繼雄鎭江湖合有神安得結茆當絶頂此生長作看山人肩輿晨發路逶迤樹老山深日上遲古洞有名傳白鹿斯文無恙仰先師瓣香喜遂平生願遺刻貪尋絶妙辭指點重勞賢别駕不妨深酌更題詩南康胥通府陪行因具午飲斷岡深谷少人行逢著山花不識名水滿稻田羣鷺下林藏茆舍一雞鳴儒冠夾道儀俱肅時郡學及星子都昌二學有生員九人讀書院中在獨對亭前迎候皆秀朗可喜石刻臨溪字半明將近書院道傍澗中皆巨石挺立往往深刻大書所可見者白鹿洞鹿洞風泉流雨文行忠信流盃聽泉凡數十字葢有文公先生遺筆焉其晦而不見者尚多有之追省舊遊多漫浪斯文今日最關情送楊晉叔京兆之任玉立班行憶共朝金陵重覩舊風標九天召命來何速千古心期話未消酌别盞香初壓酒過江帆趂欲歸潮都人合識韓京兆佛骨端能手自燒辛未五月九日仲弟允迪自丹陽寄來江行五詠時久候不至遂用其末章韻作一詩答之繞門迎候幾朝昏飛葢飄然向大藩百里江津能自畫五年心事共誰論雖傳謝眺新篇到應負姜肱舊被存東海莫教明月上金樽分照欲傷魂憶仲弟以六月六日上事二首曾從東海泝天河又占吳山第一坡官比舊寮真特達運使同知皆免歸劍蟠深匣未銷磨薰風别院啼黄鳥細雨閒堦長緑莎飛蓋東西休草草要聽含哺老人歌桃花千樹塞𤣥都超佐薇垣帝渥殊上事不妨霑暑雨開門先合剪春蕪農桑徧野家應給寮寀同心徳不孤須憶少年兄與弟青燈相對講三謨奉呈大人封君簾幙風薰酒味柔野雲垂䕃晚油油靜觀物理都成趣閒聽樵歌或點頭衣笥逺封開孔雀聞京中寄有孔雀袍上臺釣臺新水下輕鷗不才又作經時别多負當年返哺謀憶季弟以上皆用仲弟寄來詩韻日照銀臺晃掖垣五年五度沐殊恩拜右參一轉左參二進右通三轉左通四貤封五葢五年内也對揚闓切心無愧裁决從容令不煩草色入簾詩興逺花香迎客酒盃存誰知一片瞻雲思欲共雲鵬萬里騫次韻答司訓光郁先生時致仕歸愁將病眼看催科不道剛逢使者過生理秖憑詩巻足夢魂原傍隴雲多氷霜晚節松當徑牛女佳期鵲近河先生一向獨處官舍不與故人留一宿良宵爭奈月明何送少司寇戈公赴京早從周道騁華驂閱歴年深事事諳諸老共推心徳一兩都更踐法司三時須壽考天饒健人惜暌違酒要酣王國靈長端有頼登仙羞聽鄙夫談送通政馮子􅺒同年赴京二首先朝同醉杏園春此㑹南都僅七人髙文達龍徳宣劉廷璧李公著胡伯珩子􅺒及余也顧我官資偏耐冷喜君恩命又更新廟堂自是憂民地青紫誰非報主身髙閣離筵殊草草有懷無惜附書頻子􅺒行予六人者餞於憑虛閣小弟銀臺久備員長官今喜得髙賢日明梧竹開唐省風度壎箎恊舜絃對酒共輸情似海清黄須讓筆如椽因君重起連枝念為把平安兩字傳送都憲丁應韶入長銀臺著處圓融徳稱才還因求舊領銀臺看花莫問𤣥都樹把酒聊空白下盃心計向來勤獨運廟謨從此屬參陪有時雙栢軒中坐為道頑兄一味獃雙栢軒者季弟所居廂房之新扁也壬申元夕大人用梅聖俞韻賦四章依韻奉呈并寄二弟坎止流行到處歡童顔無藉酒巵還元宵月朗心千古紙帳風清屋半間晚愛吟詩渾入杜早知尋樂獨希顔分來一派源頭水洗透諸兒夢覺關千金圖奉萬年歡况喜陽和次第還春酒復陳燈火夜綵衣長在戸庭間天憐淡泊舒華月人為團欒逞笑顔猶有一般佳絶處紅塵飛不到清關記得西湖醉裏歡滿城燈火夜深還乙丑元宵正寓杭老親樂在遨遊外賢弟官猶季孟間藩省秪今參大議閭閻何日破愁顔身兼童侍纔三口宅有重門底用關政通應得萬人歡將父心勞獨未還紫殿香烟朝夕裏澄江明月夢魂間豈無鮑叔深知管㑹有宣尼巧鑄顔他夕不妨更秉燭談鋒先斬利名關夜坐偶作時臥病僧菴斜倚繩床認斗牛火星初夜欲西流人間絺綌猶含暑天上風雲已報秋舉世可能無管葛腐儒空解説伊周行藏兩字明如月領取清光付酒甌次韻平陽方懋學秋夜客懷二首渠時主王司成之家坐閱芝蘭長謝庭幾畨時雨又秋晴流螢影度鄉心切老鶴聲回客夢清屋裏琴書渾冷落眼中星斗却分明還山自是尋常事問取鵬摶九萬程一葉飄黄下碧柯羇懷强半屬詩魔山圍晚市風塵合月滿秋庭草露多賓主東南原自美才華西北定誰過玉泉金井深千尺汲引無能奈若何壽致政大司徒洪洞韓公宰相從來自有眞故園消息幾回春遥看冉冉低垂翅贏取堂堂老健身鳥弄花枝春酒熟山圍壽域衮衣新亦知海内瞻依在還擬彈冠踵後塵次韻荅吳石樓學士二首累歲開雲日有程向人醻酢禮全生愁将小數迷金注不道諸公費玉成原廟曉晴髙樹出公庭春雨亂蛙鳴報章未就心偏悚山北山南伐木聲曾舒短翼共雲程偶落天南北路生人在蓬壺勞夢想詩來江漢妙裁成春風未遣梅花盡阿閣應聞鳳鳥鳴尊酒論文知逺近百年珍重是風聲次韻儲柴墟少宰除夕感懷病起自慰二首使宅清如學士㕔一燈除夕烱寒星春風細入鑪烟紫食案髙将菜縷青曾有嘉謨參禹益况餘新製敵孫丁從前只欠維熊夢聞説維熊夢始醒大成門左闢寒㕔華轂來趨曉戴星坐久玉山疑乍倒笑回銀海覺全青登庸正儗光雌甲陪祀還應戒上丁神相髙明諸福在得霑醇酊幾人醒次韻寄答劉中和大尹論文尊酒邈佳期春樹愁看暮雨滋桂管夢回三萬里河陽花發幾千枝庭參鸞鵠登科日筆掃珠璣退食時游刃也知餘地在心君隨處合巍巍喜通政弟至龍江壬申十一月初七日别來誰擬㑹江南細數年華已十三烟郭樓臺還舊夢夜窓風雨入清談燈花屢撥偏能健心事相看兩不慙白髮髙堂凝望久豈無尊酒未容酣仲弟久無書立遡東風臥看雲多情啼鳥隔窻聞人非堯舜誰無過子有衣裳自合熏保障一方雖用武平安兩字豈須文床頭頼得清尊在且共良朋一醉醺得家書知季弟以除日至邑城新正三日拜家慶六日焚黄先是久雨其日始霽各識以詩一章萬里歸來及歲除布帆無恙喜何如南平門壯知新作光逺堂深得暫居草酌夜留親客醉朝衣晨向縣庭趨逢迎有道應忘勢不害眞為孺子愚拜舞能多喜不禁童顔朱紱畫堂深堦庭草木通和氣里閈兒童續好音紫誥直從天上落香醪初向壽筵斟風吹幕動輕雲捲矯首南山見碧岑旌斾悠揚鼓吹明翩翩輿馬快新晴龍亭立處山增勢鸞誥宣時谷應聲封號光華躋四品義方辛苦憶平生每憐予季寧無見今度焚黄禮又成喜季弟得子季方書報捧珠新喜動渾家色笑眞十載震來長虩虩一門麟趾漸振振桑蓬出試寧論巧犀玉分張自合均天眷吾翁全福在壽筵無日不陽春寄贈仲弟進表赴京分守歸來暑欲徂逺飛雙棹入皇都炎天默試氷霜力壽域重披海嶽圖要得承恩堪醉飽不妨隨例有追趨賢勞合是平生事暫許鄉園入夢無送薛全卿之淮安往還不盡斯文好猶喜分符近在淮洪範剛柔歸擬議小民休戚繫科差風含畫㦸森階戺雨濕青田盡海涯期月規模千古事好音須慰故人懷送王甌濱赴北監便道歸省寵命初臨正及𤓰緋袍金帶轉光華門牆桃李新千樹南北車書舊一家晨省細將萱草看晝遊都付里人誇永嘉前軰儀刑逺心印傳來定不差瀛洲㑹次豐原學先生韻壬申四月十九日開徧春花麥正秋鍾山晴翠滿芳洲地靈合有羣仙㑹景勝那無七字收淨洗玉盤行海錯徐開霜匣看吳鈎年來自笑無靈氣敢躐丹梯出一頭是㑹也以欽順有逺行将處之賓席偶疾作不克赴實亦不敢當也送歐陽誠之出守肇慶吉州著姓歐陽氏六百年來幾派分木本水源推刺史風流文采到司勳遥遥祖武今能繼藹藹仁聲素足聞多賀端溪諸父老炎天髙䕃有青雲送龍徳宣之任瓊州同鄉同榜復同庚獨以能官早著名臺院風隨銅虎去故園花向錦衣明從知攬鏡心長在須信乗桴道亦行尊酒送君還自省素餐應覺負平生送吕仲仁少卿之任沙頭别酒過江醒滿路懽聲是徳馨飛葢乍臨西澗水攜壺頻上醉翁亭山當戸牖瑶琨碧雨過郊原苜蓿青同事亦知吾弟忝書來方自說趨庭半山為歐陽時瑄賦秀色知從武姆分蜀江迴抱隔塵氛骨蟠地穩疑藏玉頂去天遥斷出雲樵徑客稀羣鹿擾草堂星在逺鐘聞㑹看叢桂秋花發山北山南處處薫哭族祖壁翁二首寓居景陵故園喬木碧森森新貫經營幾歲隂空有尺書頻問候何由尊酒一論心湖田繞屋秋仍熟紗㡌籠霜病稍侵不道生涯今奄盡計來清淚滿衣襟塵世勞多佚未償桑榆無復繫斜陽負薪有望前聞在坦腹多能後事詳每憶轉蓬聊異縣不知埋骨定何鄉舊時長徑山頭月夜夜清光滿屋梁哭孤峯伯父昭代遺才老一簟却憑髙壽作恩官烏紗對酒壎箎合丈席談經弁總攅病起尚憐黄菊晚仙遊俄上白雲端孤峯絶頂良宵月愁向金陵洒淚看贈王宜學時以翰編謫官嶺南凉風吹客過金陵尊酒相逢感慨增路逺只知紅日近山深初見白雲層百年譜諜傳忠孝四海交㳺念寢興君力正强吾未老江樓春暖待重登次汪司成秋日登獅子山尋閲江樓故址韻絶頂風塵萬里秋閲江何處覔髙樓草深欲礙遊人上林茂長容倦鳥休近水一灣明似玦逺山三點大如牛知君感慨題詩罷滿酌金罍坐看鷗碧山紅樹玉人登水色人心晚共澄萬里輕帆風作使六朝遺跡谷為陵霜鴻過眼渾如客美酒開懐不計升强欲追扳多病阻坐酬佳句復難能甲戌初度伏䝉大人寵賜長歌謹用首韻賦詩一章以志感且以申致眉壽之祝青田官舍懸弧日五十年前正此辰科第偶然承世業劬勞何有報吾親詩來錫福恩逾重夢想承歡意亦眞猶覺寸心如赤子靈椿何止八千春依韻奉荅西阜叔父五十又逢初度日聰明那及少年時髙堂錫福憑黄髮同氣増光有白眉官久只餘金作帶酒醇何用玉為巵竹林勝賞須重覓已幸新民似舊黎時江西羣盜之就招者號為新民云次韻寄荅銀臺弟百歲平分業未光家庭杯酌但循常孤踪久合依盤谷清夢時猶繞建章江冷魚龍愁混處天遥鴻鴈憶殊行何應共暖姜肱被細講行藏到夜央送大理胡伯珩遷少卿北上北人官向北京遷騎鶴揚州不論錢原隰皇華如舊識官河新水快重沿手無髙下寃須白心有經綸髮正𤣥因送年家還自省坐慚清俸欲歸田春晚登憑虛閣次熊峰先生韻穿雲舊路偶重登歩屧輕如鶴背乗髙閣俯臨千萬樹夕陽斜映兩三僧振衣總覺清風洒題壁惟應大手能何處花開紅又白醉遊吾記昔人曽送楊晉叔亞卿入掌太常尊酒江亭送長官錦帆髙掛疾如翰風生緑樹吟懷爽鳥下平蕪望眼寛清廟駿奔惟徳稱治朝精選見才難台躔已近頭仍黑勲業何勞把鏡看壽錢侍御乃父封君曾抱遺經齒辟雍倚閭人老宦情慵虛名漫領江州幕厚徳終膺柱史封七袠滿來還健在大篇吟就每舂容隔江雲物悲遊子壽域天教有路通幽壤重光為唐仁夫少卿賦兩度恩光照夜臺分明功自義方來林間稍覺悲風靜地下都應笑口開碑表嵯峨天近止山川盤鬱氣佳哉舊灰未冷新烟續長使贏金父老猜送龍孔紹上舍還鄉浦樹迎秋咽早蟬江風吹雨潤離筵壯懷永結青雲上鄉思遥馳白鴈前伴得同聲深酒盞行逢佳景費吟箋已看頭角崢嶸見此去寧容久在淵送同年劉廷璧出知蘭州吳帆髙映楚江秋轉向黄河最上頭落葉打篷疑夜雨邊雲仰斾見州樓男兒意氣終能壯刺史班資亦自優都下故人長引領政聲多遣向東流送大司馬張涇川進太子少傅致仕歸全州頻歲求歸始得歸此心惟是老天知寇公聞望無多輩白傅風流又一時帆向瀟湘秋色逺首回鍾阜夕陽遲能將捧日排雲手盡采山中五色芝送尹其信司訓之新昌喬木名門逺近知舊官新命老成時重逢正擬論文細相送無嫌載酒遲氷雪戒途應耐冷江山如畫好題詩憑將實學從頭講肯作尋章摘句師送大司空柴公致仕相送都門更一程喜於身退見功成舊提留鑰江山重新掛朝冠步履輕綵鷁亂流風正駛隼旟開路晝偏晴山林歲晚無塵雜幾箇松筠是友生楊恒叔以母老求去詔進太僕少卿以寵其歸二首徵書暫起陶園主祖道榮歸僕寺卿京洛風塵從此出哲人心跡到頭清鷗迎釣艇添新伴客闖詩壇續舊盟樂事賸於諼背取傍花啼作小兒聲早從京兆聞佳政晚向留都近徳鄰杯酒未交心已醉篇章難和諷能頻腰間合有黄金帶頭上終須細葛巾文敏家聲渾未墜百年林木盡含春秋答尹憲副先生三首頓收佳什見情親一字都來不犯塵秋院揮毫風正爽曉窗開巻墨猶新論心每憶同遊處矯首難忘奉別晨門帶清流山附屋暮年新酒共誰頻天賦微才諒有垠誤䝉新命出楓宸平生漫許心非石何道能令鬼不神報乏涓埃慚厚祿愁深江海繫斯人爭如未老身先退林下清風世所珍十年一曲採芝歌髙掛朝冠保太和風采至今傳蜀土文章從昔重賢科情縈藻句能多寄光照寒門辱再過休怪報章成怠緩兩曹重叠簿書磨時兼攝工部和答楊司訓先生芹泮香風十載聞故山歸早亦殊恩春來每自添詩債酒罷同誰臥竹根臺省備員遥慶我篇章傳世竟輸君因風報李還西望雲樹參差日未昏奉和大人示喜之作天恩已自先朝厚休命還從此日申三品從班兼着我萬邦黎獻豈無人憂時鬢改終誰諒衞道身微每自珍勉率義方圖寸補永怡黄髪照青春山明水瑩西岡里日暖風和久大堂老父自應多受福諸兒都幸畧成章才慚吏部纓能濯識可銀臺佩合揚海道書回仍有獻壽筵珠玉爛輝光送胡司徒致仕壽篇懇著留公句公竟投簮可奈何林下清風應更逺鏡中疎鬢未全皤功成不負官曹重身退還膺寵命多却把釣遊尋往跡攜竿重去弄晴波寄銀臺弟及寫懷各一首俱用其采石登髙韻樹色凝寒鴈陣横兩回江上送君行長年也識㳂洄意流水何如去住情將父事諧心最樂登髙詩到語堪驚别來還夢金陵否早晚相親是友生柳暗春城起暮烟城頭殘照數峯妍欣同道侣尋顔樂懶聽詩翁詠李娟蜂蝶有營終自苦䕫蚿何校漫相憐素來心事如絃直得謝浮名更洒然羅子文侍御墜馬傷足有作次韻二首九衢驄馬乍停經贏得都人掉臂行事出不虞應有數膚存兼愛豈無驚少拚日月供衾枕兼把琴尊養性情髙步天衢𤣥髪在直須宣力徧蒼生詩句清堪敵草塘為占諸福定如岡還臺再騁追風驃宴客仍開晝錦堂便好喧呼如杜適可能堅臥似袁僵他年華轂翺翔地細雨新橋路莫忘次吳白樓借山韻借居聊誦鵲巢詩兼得峰嵐不費辭青眼熟看忘主客紫金遥對辨公私棲雲老樹巖頭幹照水名花洞口枝仁者安然如固有我來須盡壽筵巵送學正蕭乃􅐃同考應天事畢還定庠秦淮西畔棘闈深夜燭晨光最苦心自信吹噓遺朽木總知淘汰得精金儒門譜諜端能繼客路風霜亦慣禁此去三鱣佳兆恊再從天上叙鄉音送王司成考績離筵氷雪瑩征袍未說官資望已髙戀闕豈辭來往數過家兼有送迎勞百年繼武仍科第四海知心總譽髦春暖鴈行分又合鳯池從此對揮毫送大司成魯蓮北改莅北監南北山川總帝畿賢勞那得謝驅馳江濤滚滚風初定燕黍芃芃雨載滋多學竟須歸易簡時文先與變支離臨岐病眼分明在不負清朝國子師少司馬陳公進大司冦致仕僑居金陵宦轍留連即故鄉石城斜日錦衣光官髙獨欠樓臺地身健何須服食方繼粟深恩應有數承家餘慶故難量都人拭目耆英㑹莫遣風流擅洛陽送潘寺正鑒任福建僉事棘寺勞多徳在人外臺超擢寵恩新未論冨貴還鄉里豫擬澄清到海濱秋院雨聲蕉葉重晩衙晴色荔枝勻垂芳汗簡應留意惟有亷公兩字真午日白巖司馬招飲于天界寺席上次寗菴宗伯韻髙雲閣雨試朝晴寶地清凉即化城江不擇流看欱納鳥猶求友聽嚶鳴衣冠已盡東南美歌舞兼容雅俗更聊把閑情付游衍永持忠赤賛升平孝陵行香喜晴用前韻遥鐘隱隱報新晴陵樹蒼蒼接禁城燈火重門千騎出陂池流水亂蛙鳴瞻依地切天同久奔走身微歲屢更歸路喜看紅日上南山剛與㡌簷平題山水畫送郭姑夫南還竹溪溪上久逃名乗興飄然到石城尊酒笑談剛匝月腎膓傾倒見平生雲移逺樹千峯出風送歸帆一葉輕福壽直將山海祝畫圖持贈不勝情憑虛閣宴飲次吳寗菴周大理韻各一首上方雲起望來迷下界聞歌客到齊髙㑹我叨陪末席捷登誰肯犯旁蹊談依日用諸乗小氣逼星躔萬象低吟罷不妨歸路晚綠楊無數鳥爭啼雲藏髙閣樹浮烟老衲焚香導客前秀合江山千古在美兼人景一時全爭哦藻句添公事頻繼芳尊減俸錢紅日醉看猶未晚羲和應與暫停鞭貞壽堂為安福朱仁舉人祖母賦少司空趙先生所扁堂下蘭菲桂亦芳栽培人只在中堂柏舟自昔關風教春酒頻年祝壽康過雨遥山朝翠合凌霜髙竹晚隂長司空為秉春秋筆兩字應垂百世光丁丑十月七日早辭朝有感而作萬年枝上萬鴉飛曙色蒼茫接禁闈當路驊騮行總快候朝燈火聚還稀南來日久衣添著西向心勞帶減圍寶鏹再承恩賜出鑪烟裊裊思依依寓儀眞公館大雪清源見雪又迎鑾天遣愁腸一再寛杯酒自堪供爕理瓊樓誰切念髙寒孤村乞火還趨市小艇求魚巧泝湍詔許寧親歸有日緘書先遣報平安戊寅春分日祀先禮畢奉大人合宴于中堂喜而有作神馭初旋燕席張東風花柳日偏長圭田永食諸孫報福酒分霑滿座香歌舞總能娛大耋笑談時復得周行歸寧已荷天恩厚吉禮參陪更有光觀瀾為曾峻術賦門前屋後雙龍水岸岸青苔送急流應恨早年無眼力頗於中道識源頭髙人㑹肯傳琴譜稚子何須理釣鈎便把脚跟牢劄定芳名從此合多收慶季弟新居落成用仲弟韻新構崢嶸與世更宋朝遺址尚依城地靈總信人須傑心逺從知夢亦清春酒日長花賸發曉簷風細鵲雙鳴百年事業無窮在一善何妨取衛荆吳寗菴宗伯家園絲𤓰有一蒂四五實者次韻二首生祥生到後園𤓰始信天親積善家一氣分張還共蒂五行團聚正交花題經大手絲成錦賞泛深杯影辨蛇靈種只疑傳不得未應無地長春芽浮花摘盡紛垂實和氣熏餘更發祥未說嘉賓來四面㑹看仍代起三場巧憑造化人難測秀出叢蕭露轉瀼往事合將同穎况作書何日獻明堂中秋燕集大人命以看字韻賦詩宦海心期欲訂難一時齊奉萬年歡堂髙坐待氷輪正酒釅行分夜氣寒物外髙懷原洒落人間眞福是平安壽星近與南山接還上層樓仔細看次韻憲副弟獨遊金魚洲一見洲形便識名去年曾此共臨清路盤絶岸遊蹤少秋透遥山望眼明老樹新篁均雨露浴鳬飛鷺各心情雖然獨往堪乗興誰與詩成勸一觥送李濟之赴寧波貳守任暫假霜威肅泰和李以御史再調而來又飛文斾入寧波當官已見勤勞著敵愾兼聞斬獲多嘗與勤王之舉老樹疎花江畔影古聲新調别時歌相知相愛相期逺汗簡功名諒不磨次韻憲副弟元日志喜人日寫懷之作晴光朝動綵雲端稽拜欣逢后土乾家慶一門春鎭好皇恩三世海同寛瓊葩的歴含殘雪瑞靄氤氲繞畫䦨早晚賜休應有詔鯉庭從此日承懽流傭無處覓宗襟何意春雲又作隂把酒未消今日悶讀書曾見古人心望懸北斗虛回柄責在羣公合受箴頼有庭梅為伴久愁來猶得對花吟遊青原山庚辰閏八月十一日歐陽綉衣從龍季弟允恕同遊朝訪名山露未晞翠嵐浮動欲侵衣坡頭路轉松隂合隴上人閒荳莢肥泉響遥聞心已淨寺門初到夢先飛從來賸有烟霞癖爭奈行藏與願違數月前嘗夢遊上元縣一寺及入山則宛然夢中境乃知上元即青原亦異哉整菴存稿巻十八
