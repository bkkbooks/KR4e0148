body:
  text: 整菴存稿巻十九明羅欽順撰七言律詩七十八首七言排律三首歌一首清明謁陵有感辛巳曾騎羸馬遡秋風廿載重來鬂已蓬史館故人多化鶴泰陵新樹復摩空山連禁籞春仍碧花傍齋廬晚更紅坐聽白頭宫監語鑪烟銷盡思無窮送太宰廖公之任南京春風飛葢出長安蘭臭彌襟執别難河近故園分馬頰山臨東省見龍蟠經綸業共年華逺舉措功歸士習端便儗從公從未得永懷遥寄碧琅玕送楊瑞虹亞卿謝病還蜀昭代家聲海内聞兩朝華寵職頻分正趨黄道依紅日俄向青山臥白雲物理亦知無定在襟懷聊與釋憂勤鏡中𤣥髮應難變滿擬重來更䇿勳慶劉鐵柯司冦八十壽江亭酌别公初老烟樹馳情又十春暮景喜聞身絶健秋曹猶頌筆如神花開别塢飄香逺歌送深杯換曲頻誰伴笑談終永夕孟光曽共早年貧次韻蔡都尉自喜鳳簫聲協早登仙金石何如信誓堅曉入簾帷香滃霧春融庭院栁鋪綿徳門慶衍兒孫令戚畹名芳逺近傳重覩嗣皇如憲祖未妨詩酒樂餘年送彭錦衣濟永歸蘭州幸菴司馬之弟金臺雲氣接金城去住偏關手足情經國雄才新遇主承家能事舊宜兄百壺且壯登車色雙鯉應傳過隴聲眼底太平渾有象賸哦詩句莫談兵汪石潭分惠新酒兼侑以詩依韻走謝寒欺吟筆硬如柴鄰甕分霑一笑排透鬲便疑生羽翰賞心何必論官階方傳内署名難擬韻洽同年樂每偕銀燭煖光揺醉眼報章題就漫稱佳送熊峰太宰祭告東行百神隨帝扶興運殷禮春來次第行祝帛逺將周上宰衣冠迎拜魯諸生堯陵孔廟瞻依切漢檢秦碑感慨并風咏也知餘樂地玉堂青史仰裁成送劉克柔尚寶祭告南行朱函分捧内廷香斾指西南驛路長將祀有誠宜受福登髙能賦更飛觴鶴樓晚照熏殘席牛渚春潮接故鄉須憶明良千載遇晝遊雖樂未容荒送劉汝忠尚寶祭告東海東鎭曉分青帛出廷中才地眞當海鎮雄馬首直迎初上日旌旄微颺欲回風亦知物色勞題詠應有馨香妙感通十載關心松柏路更持杯酒酹先公慶敬所少傅六十壽力扶周鼎寸心勞紅日初升見二毛神秀早從南嶽降忠貞頻荷玉音褒花迎大斗春無際喜動連枝望總髙元老壽康天下福承恩長傍鬱金袍送張敬亭都憲還宣城優詔親承返故鄉春山春水盡增光懸車已遂題橋志背郭應開佚老堂花塢嬉遊詩轉冨賓筵歌舞晝偏長也知别有酬恩地接武亨衢見兩郎二月二十九日隨駕耕藉壇上風雲䕶赭袍壟頭旗鼓夙分曹三推預擬粢盛潔萬壽縁知稼穡勞景向春妍人總快燕逢恩賜我猶叨升平敢就諸公卜未取明農一節髙三月初七日駕幸太學喜而有作時朝鮮使臣陳乞觀禮詔特允之翠華侵曉莅成均道仰先師釋奠親玉振金聲千古韻鳶飛魚躍萬方春講容坐聽承優詔光許陪觀慰逺人茗飲啜餘齊拜舞中天文運喜重新成國朱公奉使安陸恭上興獻帝冊寶奉明園樹九重心目極南雲思不禁玉册尊親昭盛典上公􅋦命惕冲襟花迎使節晴川麗風引香烟曉殿深登薦禮成歸奏早開筵應出賜來金承乏南銓同年諸公㑹餞于石潭少宰之第即席聯句為贈余因賦短章留别三江以冡孫之戚不與時五月二日也金石交情向白頭一尊今日轉綢繆心同不道江湖逺材劣偏慚雨露優綵筆有神看並掃明珠無價辱分投秋來更喜多鴻雁别後書應次第收五月四日朝辭後過部中告辭白嵓太宰留酌于水鏡堂已而移坐花間同石潭少宰聯句為贈余亦賦短章留别花前樹底更移尊醉眼看花未覺昏長巻倐題佳句滿髙情須共古人論極知場藿堪終夕誰遣驪駒已在門商鼎祗今欣有属漸容投老白雲村舟行有懷三江宗伯用收字韻奉寄離索偏懷老狀頭交情自昔兩綢繆已推永叔文章妙更仰王曾徳望優祖道深杯妨共把雲林倦翮有先投蘭枯莫重經時戚美實都看晚歲收送胡伯珩都憲入賀尊號禮成剛拂行塵又送行蟬鳴髙樹已秋聲使華盡仰中丞貴嘉㑹欣逢大禮成喜動天顔榮晝接養隆慈極副葵傾晩風凉月過從地尊酒從容話兩京送郭正學太守之辰州畫舫南來日幾程眼前華寵見雙旌宜民豈乏循良政折獄曾留敬忌名溪繞舊封蠻路合砂登新穴貢函盈臨岐重憶當家事人境還看竹馬迎鈐山堂為翰讀嚴惟中賦堂上昔年曾聚首隔江山肯送青來雖緣客路忙中别也識天機靜裏該文筆迅揮端有助道心深契了無猜出門咫尺多芹藻誰信詒謀更逺哉贈大司寇趙清溪先生次熊峰太宰韻二首才髙當代更多聞到處真成旱歲雲司冦得人方慰我留都分務復從君山河再展于公第案牘新刋極禹文偏是後湖風物好不妨飛葢往來勤去來心迹喜雙清官署依然接太平南京三法司皆在太平門外公先是嘗佐南臺故云湖水滿時蓮正發圜扉空處草還生爭看老氣凌霄漢自倚丹衷答聖明堂後新碑髙幾許知公無愧續題名次徐太守登快閣韻二首飛樓獨立俯重闉髙興凌雲得句新江氣半侵巖岫曉菜花微漏圃田春暫延故老還諏俗遥望窮簷總切身分合趨陪慚蹇劣杳如南北海之濱戸牖憑虛次第開喜看春色上蒿萊香凝便坐遥山合風動髙旌過鳥猜詠物思深渾脫洒懷賢心苦重徘徊寧知父老瞻依切願倒雙江作壽杯東湖書院為吳獻臣亞卿賦髙情偏愛水雲村書院新開地望尊未說五車堪實腹要將諸子共尋源風回逺渚漁歌斷月滿中庭桂影繁誰信我非曾宿客曉來傾葢已忘言張怡軒藩檢以使事便道過家省墓訖遂還任晝遊初洽又辭鄉綠水紅蓮引興長寢食未忘公事了姓名曾列薦書香洲連驛樹藏鸚鵡山染晴雲躍鳳凰早晩政成應入奏更從天上沐恩光送通政弟赴京東園花木正芳菲誰遣行藏與願違還闕未嫌雙鬢短報恩渾覺此身微柳縈别緒紛如織風奬征帆疾似飛諸老㑹時應有問幸容衰朽謝朝衣咏茉莉用通政弟韻庭前偶結三年伴嶺表曾聞四季開弱朶慣涵清露重幽芳能趂美人來未論茗椀分餘韻且向氷簷䕶宿栽花譜流傳多鉅筆總誇顔色亦偏哉咏憲副弟庭中茉莉用前韻南屏𦂳䕶芳菲地為問霜前幾度開老蛾不應迷路入晴蜂猶省傍簷來香浮壽斚憐新摘根穩陶盆憶舊栽却笑詩成花已過凌冬能發更竒哉用韻招二弟小酌時平稍緩憂心擣老至何妨笑口開已戒張筵花底坐預期聯歩午前來和鳴莫負朝陽扁晩翠曾厪老父栽記取詩人歌蟋蟀一觴一咏亦宜哉滕王閣新成兼祠文謝二忠次陳髙梧都憲韻江上重瞻第一樓按圖還是幾春秋衣冠聚㑹清時事歌舞銷沉異代愁北斗近簷星盡拱西山迎客雨初收俗傳澤國須雄鎮頼有中丞肯細諏兩公真不愧儒冠牛斗秋髙劍氣寒百尺新祠連閣起萬年青史當經看勤王慷慨心俱盡就義從容事總難風馬雲車無近逺他鄉何似故鄉安送朱推府顒伯考績赴京南山凝翠雨初晴髙樹含風彩鷁輕戀闕不知江路永過家還趂晩潮平雲霄此去看凌厲才氣從來羡老成最是平反遺愛逺挽留無計若為情壽徐大卿廣賢八十門題三鳳爍金鴉天柱東頭第一家官到大卿心更小齒登中壽徳彌嘉幽居地逺江如帶仙侣筵深棗似𤓰從此耄期無用頌靈椿原慣閱年華壽節菴叔父七十竹樹隂濃小逕迂壯遊那復夢江湖門銜逺岫將青入身到稀年謝杖扶肯播力均家有慶代終心一徳非孤憑誰喚取丹青手為續西岡五老圖讀歐陽碧谿詠雪諸作用韻美之雪裏豪吟忘旦暮句中深念亦黔黎才髙豈待搜尋得興劇時同戲謔為稍出肺肝酬大造還將風雅訓諸兒余衰已甚應藏拙試問年來和者誰謝曾石壁僉憲過訪一冬纔見兩朝霜髙葢臨門喜欲狂雲雨謾憐翻覆手時曾公偶愠于羣小也利名俱脫戰爭場瓦鑪續火添和氣尊酒論文欵夕陽豫擬春遊何處好童洲橦寺正相望送鄧正科還南安已是聰明不反前那堪鼻孔更成淵醫門晩遇肱三折官簿眞收效十全入眼更憐風韻别論交應覺世情偏百年種徳深深在諸老留題有鉅編壽楊潛菴七十二首羣從風流不復瞻喜看霜雪在多髯芝蘭滿院紛呈秀水竹成村獨養恬山拱壽筵秋更碧客貪清話夜仍淹七旬自是人間少五福惟應好徳兼得謝朝簮力已愆秖應肝膽向君偏手書月計方成束福履時聞總勝前謀客肯忘林下老抱疴空憶㑹中仙桃花浪軟綿陂綠更儗春來好放船送謝掌教䕫之任同安通家情好比連枝猶憶宜陽話别時桃李賸霑春雨化松筠偏挺歲寒姿恩頒魏闕新銜潤路繞閩山疋馬遲髙士軒今無恙否便風須遣故人知壽蕭鴻臚七十天上歸來二十秋海中仙屋又添籌筵開煖應黄鍾律酒進香凝碧玉甌扶老妙方資夜氣傳家深意属書樓司空閥閱渾無忝耆舊誰當作伴遊賀竹港建小宗祠聯科坊嶺號延羅兆有開幾從營構見多才祠堂得地靈龜恊綽楔凌雲過鳥猜衮衮科名光譜諜綿綿香火續雲來霜清旦氣虹梁舉六偉聲髙鼓似雷和陳靜齋都憲歸休志喜之作二首久勞暫逸恩私在誰信中年便得休疏廣畫圖能赫赫展禽心事故由由華堂燕雀爭迎主别館松筠總耐秋有客問竒千里至不應終日對羊求亦知動久還思靜應悟其間至妙歟寒谷春生吹律罷暮山雲返作霖餘籬邊賸采陶翁菊床上兼攤老氏書二十年前尊酒㑹秖今吾是老狂夫秦鳳山寄示歸休志感之作依韻答之向來頻試活人丹此日懸車靜入鑾黄鳥多情仍送酒青山無恙獨憑闌身强底用千金藥境勝應添百畝蘭海内耆英渾有數幾人東向祝加餐用鳳山韻自述久矣衰顔變渥丹夢魂無復到金鑾風髙徑竹秋偏爽露浥庭莎夜未闌筆研廢來聊學圃珩璜抱後穩紉蘭老饕不管傍人笑官粟猶能滿意餐次韻劉煥吾州守見寄行藏隨分了無疑秪許平生鮑叔知荒徑旋開那用買深杯難强故應辭猶期向晩粗聞道頗悔從前浪作詩汗簡功名君自省龔黄千載合追隨謁初祖主簿府君墓太𤣥觀主蕭雲漢候于途因過觀中少憩而歸四首雙壠亭亭四百秋府君嗣子附葬其側總知龜卜契人謀山形盡向龍門合王氣長依宰樹浮蘋藻薦誠趨後裔詩書垂裕仰先猷獨憐宦轍驅馳久今日重來已白頭山勢遥瞻百丈雄佳城盤處却冲融清溪世逺碑相亞白屋人淳姓偶同府君墓右前去十數武有清溪楊氏祖墳文貞公立石表馬山下居民十數家為攻木之工皆羅姓也藏劍有光應射斗出雲何意也從龍諸孫滿眼來能數若報當年種徳功髯翁疑是地行仙手把熏爐導我前溪上路窮琳館出屋頭山合錦屏連古碑有字渾能辨殿中有碑題云牛僧孺撰鴻寶非人可浪傳追省舊遊還一笑苦寒曾訝酒無權廿年前送司空張公之葬寒甚殆不可支歸途略憩于此座客皆相先引滿累觴而散崢嶸臺殿俯清流瀟洒仙翁足應酬福酒旋温聊共酌靈砂雖近不須求風前客裌長林晩雲際鐘聲古洞秋先壠隔山纔咫尺一回瞻拜一來遊壽正郎尹南山八十頂中仙骨自成峰未數丹砂玉屑功袍笏滿門官獨顯篇章行世字尤工幾人大耋童顔在百里耆英賀席同何物更能醒醉眼鳳毛羣繞碧梧桐次韻小雷洲靈芝水釣巖棲道亦光懶將毛骨試仙方禎祥特地呈三秀孝友原來萃一堂白首聚觀喧笑語綵毫描寫富篇章門閭自此須髙大俯瞰黄茆百仞岡次韻答曾蠡海京洛風塵暗九衢巖松翠飽歲寒餘晩從故里開新宅時對青山讀舊書恬養㑹教春夢少靜觀應覺此心虛南轅北轍成何事細數平生愧不如次曾蠡海賀進階韻碧山眞隔紫宸朝石瀬濺濺逺市囂衰鈍已慚金作礪光華那稱玉圍腰誤煩詔旨來空谷復枉詩筒過野橋一寸丹衷何所似華封三祝大哉堯次韻王蓉江對雪效禁體之作清光寒氣坐來兼野逈風微勢轉添山路葢深時誤馬竹枝擎重半欹簷竒思丙夜軍麾急靜覺澄潭釣艇淹白首並耕渾有幸多收麰麥未傷廉承示禁體雪詩韻險而句工誠傑作也敬服敬服碧谿頓和十三首何其富哉往年嘗得碧谿雪中髙作一韻叠至數十首僕自知非敵勉和一章以荅其意末有吾衰已甚應藏拙之句荷其見諒遂斷來章僕自此亦不復作詩矣今來盛意不可虛辱輒復强凑五十六字奉答意淺詞澁足見開荒之費力也惟覽而正之幸幸送繆州守之任夷陵愛國情眞聖主憐嵗中官職看頻遷北來製錦蠻烟斷西去行春郢樹連嘉績儘教光汗簡老懷偏是惜離筵丁寧至喜亭前柳淺繫東吳萬里船繆先世丹徒人慶曾石壁僉憲八十壽二首浴沂剛值暮春天又闢華堂展壽筵一道笙歌麟趾並兩階冠屨豸袍先心清自得延年術官久曽無負郭田鄉里秖今須表正願公長作地行仙未及稀年勇退藏年躋大耋更康强旌旄到處賢聲在杖屨便時野趣長觀物分明惟道眼傳家珍重是書香平生最切髙山仰獻壽深漸藥裏妨己丑元宵西野弟見遺閩燈一架約同賞而未果今年節屇兒輩出而張之固請一觀因奉巵酒為壽余感念存没俛仰惻然竟不能成歡而罷爰賦二律以識余悲漫説良宵抵萬金閩燈髙照畫堂深精窮物相誇能事細析秋毫覺苦心五彩特宜紅燭映雙眸剛免黒花侵早期對賞人何在巵酒停來痛不禁魂遊今夕定何鄉忍對華燈獨舉觴壁上龍蛇神未死春帖多西野手書座間風雨夜偏長寒林漫託孤棲翼古匣深蟠百鍊鋼平日讀書渾恨少五車剛費一杯藏慶歐陽碧谿六十二首深巷閒門取自怡屢煩當道駐旌旗才如太白名偏著賦埒揚雄字總竒花甲薦更新歲月柏臺猶仰舊威儀諸郎繼武渾能事此去恩波未有涯君作行人奉使初贈言盈巻我偏迂那堪歲月推遷速且喜山林燕息俱報國餘忠森令子養生眞訣陋隂符從來畫手多傳信合寫人間壽豈圖慶蕭有容親家開六二首八月十日老人星見塞鴻來萬里澄明壽域開望闕禮成天正曉通家情重句還裁清香近起團團樹晩福眞宜灧灧杯心逺地偏今是在要知陶令是仙才百年簮紱幾英豪肥遯邱園也自髙𤓰地雨餘延蔓逺橘林秋半著枝牢佳辰快覩羣賢集令徳何慚大手褒勉續南山歌萬壽仰髙長得慰兒曹次韻答郭本寛大尹名題鄉榜憶同年愧以潢汚邇檻泉宦海每憐稀聚首恩波都幸早歸田君逾大耋知猶健我有深杯儗共傳藉草春山如見許乗槎應不羨張騫送金司訓致仕還鎭江經閣新成坐有氊講餘歸興忽飄然笑看桃李春風在貪取烟霞樂事偏鷗鳥慣來遵渚近鰣魚初上入庖鮮林深地僻新聞少免得閒愁撓夜眠送張司訓任汧陽令十載清風苜蓿盤時來今喜拜郎官尊崇亦自民間起得失饒經局外觀酒盡江亭催去棹秋生秦樹解征鞍朱絃只為知音贈攜到琴堂子細彈次韻答歐陽主素掌教草堂客到聞新句花塢春來見小車閱世頭顱渾盡白向人肝膽未曾疏窓涵逺岫堪晨夕天縱浮雲任巻舒幾度揮毫還念我賸分珠玉照林居慶廖晴山太守八十壽二首三紀賢勞鬢有霜懇辭符竹便還鄉晝遊轉覺朱轓貴林臥偏憐白日長老圃寒花隨意采南山晴色捲簾當從知鼓缶歌能壯春酒如泉客滿堂鄉榜題名一笑同白頭林下兩枝笻多君坦蕩朝朝樂顧我疎頑事事慵載酒便應娛大耋抱疴猶阻挹清風曾聞三壽如陵句借我成章思不窮慶三從叔父宏菴翁八十壽百尺樓成兩鬢霜老來仍喜濟時康延年藥省惟餐菊賀壽杯深更鼓簧徳肖雲山先叔祖號也人共仰齒先嘉㑹堂名累世同居祀能將願言百歲從天錫看取孤笻行力剛燕落文光為楊抑之憲副題贈楊太守螺川門第鬱相望忠節家聲逺更揚髙棟妥靈來孝感輕雲含雨避文光表章頻重邦君筆酬酢殷厪憲伯觴嘉㑹百年曽有幾詩人端合詠無荒贈引禮舍人曽民悦最是曾家好弟兄相親相愛自平生家庭舊業尊黄巻臺榭春風茂紫荆部檄逺厪専使捧王門爭覩曳裾榮人間淺薄何須論千載椿津有令名答歐陽碧谿次韻二首老憑杯酒傲氷霜驚喜詩筒入醉鄉象管力兼周鼎重龍泉光射楚天長調停律吕心偏苦鞭駕風霆勢莫當千載蘇黄門戸在幾人攜手共升堂雪月風花引興同日來何處倚吟笻明珠乍捧增新眩醇酎分霑起宿慵考徳欲尋耆舊傳論交欣見古人風厚來薄往君休訝學未成章力已窮七言排律和楊䆳菴韻送林見素都憲巡視江西長風吹浪錦帆遥又向江湖荅聖朝斬馬劍存心獨苦活人丹熟手親燒春回赤管謳歌動霜壓黄茅瘴癘消罔兩絶愁逢霹靂攙搶端合避招揺香先黍稷崇周訓信炳丹青肅漢條簿領豈煩諸葛校辛甘須藉易牙調十年仰斗誠偏積一片離魂黯欲消盃泛蒲萄期盡醉帳依楊柳未全雕詩成好為知音寄義重無勞舊隱招鼎軸只今公論在故應疎拙伴漁樵賀姊夫楊顯正滿五旬百歲平分鬢未絲臨風玉樹記當時東方玩世多詼達端木標科擅說辭遺簡尚懷庭訓在芳名贏取旦評推滿堂佳客深更宴繞屋良田幾曲陂黄菊晩香心共逺紫荆春茂樂偏宜巖棲有味甘肥遯天運無情任宻移華旦新年仍受賀昨非今是早能知長生祝罷無他語仙果終看結子垂次韻荅王宜安好篤金蘭自昔年風標真象抑菴賢甲庚未論誰為長糠粃應慚我在前繞郭雲山多種玉滿池春水獨栽蓮興觀日誦詩三百施濟庭餘祿二千夢說事賒便築野希顔心苦耐鑚堅名洲久著龍頭䜟蓬島仍棲鶴背仙㑹展謀猷資世用肯將通介逐時遷髙才定有髙人識大器端從大化甄白髮慈闈憑養志青雲難弟况隨肩中書太傅千年譜武姥澄江萬里天共學斯文空老大巧逢新格謾顚連借巢恰似鳴鳩拙攬鏡羞爭玉女妍勇盡敵場疑再賈灰寒丹竈訝重然時當易轍聊憑軾座有知音敢絶絃珍重交情憐鮑叔尊嚴師道愧伊川雖存立雪尋常地終欠吟風一二聯肥遁向懷追漢綺中興今喜際周宣長歌寵贈能無和報國微軀擬並捐送鄭端典親家還鄉十年兩度清溪曲細說家懷及鄉俗前輩凋零足嘆嗟後生滿眼多翻覆逢場思戲酒思沽有田不耕書不讀行止模糊里閈嗤門戸支離祖先辱豈知貧賤亦天生不驕不惰有時亨析薪能荷自堪樂縕袍雖敝誰敢輕千言往復兩無忤愛君瀟洒更老成鬢毛略見數莖白心地先涵一寸明山水可遊無過此兹來却奉邦君使貢金三十鋌鋌良結伴八九人人喜午榻棋聲數著髙夜筵杯酌三巡止豫指歸裝只要詩熟知宦况清於水西齋褊淺難久留短歌何以寫綢繆兩家兒女粗解事與君垂老應忘憂百年風月未為少兩段平分後段優我亦行藏無固必㑹當解組共遨遊整菴存稿巻十九
