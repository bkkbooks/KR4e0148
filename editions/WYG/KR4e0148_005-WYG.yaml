body:
  text: 整菴存稿巻五明羅欽順撰序一十五首送順天府尹月湖楊先生序君子固不難知然其不求知扵人人或有不之知者既知之矣而可徒哉在前必相與挽之在後必相與推之俾其道以時行施以位普而功以事成凡以為斯世斯人初非有所私扵君子也如知之而不能推挽則如弗知推挽之而不能力與夫弗推弗挽者其間亦不能以寸耳然則斯世尚何賴哉吾江右近時人物月湖楊先生其表表者先生起家進士改翰林庶吉士為給事中兩京葢久之而後遷厯南京光禄太僕兩少卿通政使司右通政又十餘年扵兹矣範其驅不計其獲韞其櫝不急其沽是豈求知扵人者哉然中外士夫莫不知先生之為君子近時知者適多在言路乃相與列薦于朝時則先生已為當道所推遂膺簡命尹正京府此推彼挽不謀而自合無乃亦天意耶然議者有謂先生之清徳正學宜在臺省陪大議翼大政斯足以慰滿人望京尹地雖崇重顧其簿書之冗瑣應接之紛拏實則一大有司似非所以處先生者欽順思之其言不為無理抑安知當道之意不有在乎昔横渠張先生仕于朝當使眀州程純公獨言以儒者按獄扵朝廷尊賢之體不為無失王文定初相首薦朱文公為浙東提舉公以民饑為念遂不辭已而州縣一清民被實恵然則議者所見殆與純公意合而當道所處無亦有合扵文定耶道固並行而不悖也先生平日為張朱之學甚篤葢天下之書無不讀而所尊信者經五經無不明習而所尤盡心者周易欽順不敏年來粗辨爻象觀先生今日之變動竊以為直乾之九三矣夫三與上應然彼此皆九殆非其正體之以夕惕之誠而審乎進退存亡之在彼者非先生其孰能之先生行同鄉卿大夫士㑹餞于一堂既醉且别謂不可無一言之贈以欽順嘗載筆俾序于簡禮也其可辭送宫諭倫先生還朝序右春坊右諭徳兼翰林院侍講南海倫先生文叙欽承上命來考應天府鄉試事竣當還朝府尹歐陽君旦丞尹君梅益謹權輿之承謂禮有贈言乃以属之欽順顧惟不敏然向者在史館嘗辱先生教益今二君又以禮見属其可辭夫士之負大名扵天下者必將有天下之責責任隆重必將與天下之士圗之然則知之何可無其方求之何可無其素公選之精慎私訪之周詳此其所以求之也知言之學日新而不已此其所以知之也書曰迪知忱恂于九徳之行又曰旁招俊乂凡以共圗天下之治焉耳善斯道者將不有茂烈以副其大名也哉我朝進士髙科類厎于大用其功烈之所成就則固有公論矣或汲汲扵求士而所得者不皆純與名為知人而所収者不甚廣有以大相逺耶先生以狀元及第遂入翰林為修撰累遷至今官昔人所謂榮進素定者嘗司考禮部㑹試者再兹則首司應天文柄一時名士収攬殆無所遺固其盡心以求之而平日知言之學扵是乎亦屢騐矣自茲以往其属當公選未容以一二計至扵㳺従應接參稽博訪以極乎顯㣲之際其所得將不加多乎哉惟多且純相與為一體吾知先生之當大任勝大責也優優矣欽順無似嘗竊觀近時士習大抵後心性而先辭藻徇物過重而自任則輕葢不能不私念之先生所収固其良者安得使天下之士皆務實學皆有九徳之行以資源源不窮之用乎以先生之髙明其必有道矣願因以請教焉送大司成甌濱王先生序留務素稱繁者太學與焉凡學之條章皆聖祖所親定師生循用惟恐弗至其何敢略之有欽順初備員司業時方乏正葢攝篆者踰年每寅入酉出以為常猶病扵不給至扵人事類多疎失雖竊以為愧而莫能免焉後再以起廢來則甌濱王先生已為之長往時同在史館固已推服先生文學及是相處益久得其行事益詳大抵操得其綱扵其目若不甚屑屑焉而終亦不漏六館之士用此親愛之如一先生為教既善而其間接納賔客應酬文字條答箋牘舉優優然送迎問勞之禮無弗周宴㑹逰談之樂無弗與卿大夫士率忻慕其為人欽順雖勉强效之竟莫能及乃知人才相逺果如昔人之所嘆也然則當大任建大業非先生其誰属哉扵是北太學缺祭酒輿議属先生者十且六七及命下果然仰惟皇上秉徳至明用人至精欽順雖至愚猶知所激厲以圗無忝扵他日而况天下之士素抱負才能者聞先生之進有不彈冠以相慶乎昔人有言正臣進者治之表吾方扵世道觀之抑先生之莅南雍亦既厎厥績茲改轅而北車輕路熟扵収功乎何有吾知濟濟衿佩一為春風之所披拂孰不争先奮發日改月化以成其可用之才乎昔人有詩云先収先生作棟梁以次收拾桷與榱又將扵先生見之矣欽順不佞毎獲聞先生緒論扵天下事若無不可為者棟廟梁宫宜有餘裕往年流賊南嚮葢嘗持守淮防江之説為當事諸公言之甚勤且有方諸公雖不果従而未嘗不偉其才壯其氣也由是觀之何功業之不可建哉南雍僚属沐先生之愛惟深扵其行也欲挽留而不得以欽順嘗有協恭之雅來請贈言以致其情茲固不容以無言也先生行矣亦將有以處我輩乎贈侍御周君清戎兩廣序兩廣之守固倚重扵官軍所以張大其形充實其氣者亦惟民間之丁壯爾清戎之政舉按文以責實鮮不惟丁壯是求以之應中朝之簡書實他軍之部伍者葢多多益善而兩廣軍伍有闕則方取丁壯扵中州彼其人一聞瘴雲毒霧蟲蛇蠱魅之形容往往心寒膽掉遷延規避必窮其術而後已故廣中之軍伍常虚軍伍内虚丁健外徙將何以為緩急之備而保地方之常靖哉故其清戎之政或舉或停一停或五七年葢未始無謂而其舉也必以付之識時宜通政務之君子乃能外無失乎足兵之本意而内有以深達乎制變之㣲權視清戎扵他藩者其操縦固未必同也乃今孰為識時宜通政務非吾周君汝和也耶君之為御史南臺也遇事輒言而言之必當有委輒任而任之必諧憲紀聿張風聲以樹非明達而能之乎茲以内臺首推光膺簡命出清戎扵兩廣其可為一時之妙選矣以其明達之識而斟酌扵操縦之間其縦其操不惟其常惟其時若勢其求之而獲也惟其實不惟其多簡書之效成地方之受賜有不兼盡其美者乎君世家江右之寜州先嘗迎致其尊人封御史君及太孺人偕就養于官邸今其將使指也道由江右以出得躬侍二親榮歸其鄉舸艦相承送迎属路又可為一時之盛事矣恩加扵俯仰光被扵州閭臣子所遭孰此為異則君之所以圗惟報稱豈徒曰地方受賜簡書效成而已哉書不云乎雖爾身在外乃心罔不在王室余扵君契好惟深葢不能無厚望重以其同寅詹君之請胡君誨之之請輒書此以相其行送太守馬君之任安慶序永興馬君質夫由南京户部郎中擢守安慶其僚友胡君用經輩來請余文以贈其行君在郎署有年其修職之勤持身之謹志向之正才識之優雅為士大夫所稱而其為主事時嘗以督理通租至吾郡民皆頌其明白而不擾又余所親見者况扵余往還惟舊重以諸君禮請其可辭曩余為童子時嘗随侍家君扵安慶郡學其山川形勢之壯人情土俗之美固所槩知于時太守之賢亦尚能計其一二若修武王公璠之寛厚崇徳潘公蕃之嚴明皆號為成章而其士夫之談有謂使二公合為一人則尤為盡善葢其責備如此自余之去安慶至于今日不知更㡬守矣又不知孰為能合二公于一數窮理極毋乃當見扵吾馬君乎夫四時之行未嘗不以其漸至于温涼寒暑之大分則常自截然此萬物之所以生嵗功之所以成也故君子之為政寛可尚矣要必有截然之體政然後立嚴可尚矣要必有優柔之用政然後和二者勢常相須葢無可偏用之理茍不明乎斯義而弛張闔闢一由其性之所安則雖或厎扵成章猶不能滿乎君子之論况其他乎君固有稱扵士夫至欲名其為寛為嚴而不得其庶乎兼有之者持此以往弗縦弗苛將俾安慶之人以前日之愛王者而愛君以前日之畏潘者而畏君治化之沛然可想已夫安慶據湖江之㑹實南畿之咽㗋表裏江山地形險要誠使治化行而人和以得一有意外屹然足以為上流之防其所繫尤為不小余輩嘗有感扵近事尤不能不以此望君君茲往哉尚惟逺且大者是究是圗以克厎豐功用兼休扵前政送太守程君之任衢州序昔陽道州自署其考云撫字心勞催科政拙余嘗以為拙之一字當為巧者發耳不然未為得也夫巧固傷民矣而拙將無瘠其國乎國誠瘠未必有肥民矣何以騐之往年賊瑾用事有司率承望風㫖累年租調之違負者舉之如不及縁此横取民財一郡多者奚啻十數萬名為勸借而實則威之以嚴刑徵諸前聞是謂白著吾民皆不堪命而卒無所扵告也巧之為禍其烈如此不可畏哉然推尋事端則凡違負之多未始不由累政之拙在平時或可牽補一旦事變百出國用且窘元載之策勢將必行斯民安得不重傷乎是知巧與拙皆不可也嘗聞漢宣帝論及良二千石首以政平為言要之催科之政惟平乃善夫所謂平者豪強不得以茍免貧弱不至扵見侵惟正之供取必以其時其非時之調發必不得已則審其輕重緩急而通融之有術如是而已矣夫有地數百里民小大以數十萬計政事之當平者誠不少乃若闗扵利害之大者宜莫過扵催科催科之政平則實恵及民而國用常足上下之情兩得為郡者庶無負矣今之君子可以此言告者程君汝南非其人乎君初以家學登𢎞治壬戌進士第授南京户部主事厯陞員外郎郎中詳敏寅恭聲稱籍甚當道兼采其資望爰請于上俾知衢州夫以君存心之良得名郡而理之其致勞扵撫字也必矣而况在户部日久中間屢奉堂劄有事扵外服其扵民情之舒慘國計之盈縮緩急之際可恃與否夫孰非其所諳則夫催科之必平不傷扵巧不失扵拙又當扵君見之矣且為郡之贈豈無安養教化可言而顧扵催科是講則以大學之教固嘗深致意扵理財也理財之道得然後安養可遂教化可行不然心雖勞竟何益哉用敢以此告之君以附忠告之義以復其寮友楊君景竒朱君廷輝輩之請送太守楊君之任寜國序寜國直𨽻京師凡直𨽻京師之郡惟巡撫巡按為之監太守之尊視方面㡬等而寜國在江南為奥葢終嵗無一過客太守日端坐黄堂視事騶御常稀出士民有經時閱月不得窺見其嚬笑者故其望尤尊其山川深秀泓渟土田肥美物産蕃碩故其民多給足少偷盜雖頗尚氣好争訟然亦不至紛如故自昔名為易治凡為其守者皆號優遷不數年輒以成功被超擢而去葢厯厯可數也然則雖以中才處此宜亦可無􅇅事而天官重其為輔郡也往往属之髙才才髙則其用宜有餘夫使才有餘用亦可惜也然吾聞古之君子善扵自用其才者不徒取目前之事整辦而止必將為斯民久逺利益之計誠為斯民利益久逺之計則惟恐其才之不多經營顧慮之不周也而何有餘之云有如楊君文眀今之所謂髙才葢其選也天官究知其履厯遂奏為寜國太守非優遷歟君夙領其尊人中舍先生庭訓𢎞治丙辰舉進士得第厯知西華冠沛涇四縣政聲茂著入為南京淛江道監察御史其所巡厯自京城以至東北邉江數郡皆肅清監試秋闈明察而詳恕時有按劾多稱上㫖所得命詞甚寵聞且見者莫不為君榮之以為殊常此今日之優遷所以克諧扵物議也君行有日余宗兄子文侍御與之同年復同道遂倡臺中諸寮友張筵以餞而以贈言來属曰必無辭夫以君之才昔嘗優扵治涇涇固寜國之属邑也乃今合數邑而并治之誠善推其所為其致整辦扵目前垂利益扵久逺必將兩得之矣余非能言者第宗兄之見屬也固夫安得不有言扵君而言又安得有所茍㢤送太守龍君之任瓊州序瓊州在南海之中去京師萬有餘里然其民風士習勤生而率教崇雅而尚文舉無異扵中州其秀質良材生際明時往往出而擢髙科躋膴仕而其尤傑然者遂以文章事業名天下可謂盛哉夫其人既多近天子之光則朝廷之視之抑又何逺牧守之選其慎也可知然其四履所經千里不啻髙山長谷之深阻有所謂黎人者實蟠據乎其間雖其人有熟有生大抵皆無常性葢雖一郡之域又自有華夷之别也為之守者自非才足以有為行足以有率加之厯練之久深達乎剛柔緩急之宜亦豈易厎厥績也哉求其能厎績于瓊若吾友龍君徳宣葢君子之所與也君世廬陵人以家學登癸丑進士出知同安安吉兩邑入為京府通判遷經厯于南臺踐厯諳練可謂久矣其為人守正持重有忠信之存茍利扵民為之必盡其力在同安僅踰年耳既去而民思之不已相與碑其政蹟樹之通衢安吉號岩邑而君為之令者七年惟其宜于民是以能若是淹也而淹之者實由扵守守雖不君悅然部使者往往嘉之因卒為當道所知以登扵臺府此其才每不有過人者耶乃今拜瓊州太守之命吾知君之往也心不徒用法不徒守扵其習俗之既美者必將齊之以禮而益致其厚扵其向背之無常者必將撫之以恩而馴致其來若夫茍且以度時穿鑿以生事殆君之所不屑為也誠如是則瓊雖限鯨波凌蜃穴而君之聲實且洋洋乎盈耳果何逺之不近哉夫交深而愛厚宜必以無窮事業為期此固區區之誠亦臺中諸君子相屬贈言之意也送周懐慶序比當諸司述職之後明陟幽黜郡多乏守吏部慎選其人以補之南京六部郎中預其選者凡十人奏上同日報可扵是郯城周君尚賓自户部出守懐慶行有日其同寮嚴君宗孚張君濟寛等來請贈言扵余余以不敏固辭而二君請逾力且曰尚賓為人孝為官能少時居父喪三年至不能讀父之書將力耕以養母其母不可乃復従事扵學母嘗遘疾又欲棄進士舉以終養于家然例不可得竟克登進士厯官郎署用追顯其二親今將便道過家舉焚黄之禮自以為秪承嚴訓庶乎其可復也其在户部垂九載厯湖廣四川廣西三司惟慎惟勤職修而事治古之君子樂道人之善樂成人之美先生獨能無意于尚賔乎予聞而悚然尤不敢當然于言遂有不容已者初邸報既至譚者率相與較量地望曰某郡善地也某郡非善地某得某郡為稱某得某郡為優某得某郡為失所余以為是則有之然當置而勿論亦姑觀扵其政何如耳地雖不善政誠善何辱政茍不善地雖善何榮善政日新則所謂優者未始不為稱也善政蔑聞則所謂失所者未始不為優也不此之論而徒泥于其迹亦何益扵其人之聴聞也哉有如大行之陽河濟之交地之最善者也談者多以周君為稱則户部之政可知其所以克稱于將來亦惟善政日新焉耳且君之為官能其初安有不能于其後其為人也孝于親有不能推之以仁其民也耶夫政必有以仁其民使䝉安居樂業之休而歎息愁恨之聲不作然後為善積累擴充而不已然後謂之日新此固君之寮友所望扵君者然也乃其惓惓之意必欲假余辭以達余雖欲已扵言也得乎送歐陽誠之出守肇慶序君子之為政凡其卓然有可稱者或出扵天資或出扵學力固不容以槩觀也出扵天資者寛厚嚴明往往成章而或少深長之味出扵學力者簡淡平易初未嘗取快人之耳目而自有悠然篤實之光此其所以不同也易大傳曰仁者見之謂之仁知者見之謂之知論語曰知及之仁不能守之雖得之必失之葢以學力言則仁知相為始終以天資言則仁知各為體用夫始之以知終之以仁其徳可謂成矣然而臨民之際動之不以禮則猶為未善况乎各隨其所見以為仁為知以見扵行事求其深長之味夫安得而不少哉吾是以知為政者不可無學也今之君子亦何嘗不學其扵仁知之道有能相為始終者耶未可知也夫仁知之相為始終是誠不易然非従事扵此則平日之所謂學者果何學耶欽順早有願學之志而用力不敏空空焉未之有得所賴一二仁友之助而誠之又當出守肇慶相去將日逺夫何能無介然于懐也誠之既以文學擢髙科居官十有餘年又未嘗一日廢學其是非取舍之眀確容貌詞氣之雍容學之有得扵身心槩可見矣異時列郡之政有悠然篤實之光煥發扵嶺海之間者其必自誠之出哉誠之世家安成與宋楚國文忠公同祖尊君封吏部主事慈而能教淵源既逺而濬導尤夙則其徳業之所成就固宜與古之君子相為後先此誠之所以日孜孜而不懈也今其行矣肇慶士民實惟有幸顧余坐失輔仁之益將若之何哉念此悵然不可無辭以達而同鄉諸君子乃欲得余言以贈誠之贈則吾不能尚幸誠之有以處我也送江西僉憲王君之任序崇陽王君叙之由南京大理寺正擢僉江西提刑按察司事行有日吾江西士夫之在南京者相與張筵以餞之因念數年以來湖山千里之間反覆多事吏失其理民失其安皆欲有言扵叙之復慮衆言之煩多聴者之難盡也以余知叙之為久而叙之亦頗余信則相率推余以言嗟夫余豈能言者哉然常為父母之邦切安危之慮雖欲無言奚可夫提刑布政其職固異使副僉事其位固不同至扵一方之安危則未有不均任其責者故必以同心一徳為貴其徳之所以一亦惟克己以従善爾已私之未克従善之未能自用之為好則其徳且二三矣二三之徳聚扵上趨走之吏相與觀望扵其下葢茫然不知勸戒之所在其政惡得而不厖而民惡有不䝉其害者哉嗚呼吾江西之所以事變紛拏劻勷杌陧至扵今日而形氣猶未和者其原葢出扵此也夫人之所見不必皆同就不同之中而精擇之必有至當歸一之論是為天下之公理理之所在即善之所在雖在芻蕘之賤趨走之吏且當従之而况扵同列乎夫善固自我作有所未至而人焉是従其善豈不在我作之不已而従之不貳則吾之善有不可勝用者矣扵以正人之不善雖小人其有不革面者乎吾所望扵叙之尚克與諸公率由此道以咸有一徳將見政事無不舉刑罰無不中和氣流通扵上下而民之受其賜也無不周矣叙之儀觀偉然表裏相副學足以知道而才足以救時是誠可與之言輒為之傾倒如此不知諸公之見之也亦將有取乎否耶贈侍御羅君考績序侍御羅君子文與余同姓且同出泰和同官南都亦有年矣每公事粗辦時時徃還相晤語葢相好如兄弟然然自君上世以來占籍金陵君生長都㑹之區資稟不羣聞見亦多扵時務皆所通曉其才具之優贍葢隨用隨濟非余淺陋所能及也君為南臺御史初莅廣西道俄以外艱去起復改浙江道間嘗兼綰他道之章道無留事時有論列必采之輿論之公凡南都之錢穀甲兵門禁邏卒營騎工作散掌扵中外諸司者屢承臺檄巡視督察姦弊㡬無所容而日力有餘輒以之讀書賦詩久而益工以博葢士林之翹楚而南臺之出色者也茲以給賞事竟當復命于廷計其年適當考績臺中故事當以言贈陳君秀卿不知余之不敏乃來徵余言夫以姓氏邑里之同且相好之篤而諸君之舉也又以禮雖不敏其復何說之辭憶𢎞治庚申君以丙辰進士授興化推官余嘗贈之詩其卒章云珍重案頭三尺法功名何止百年期葢期之者逺矣及觀其所厯在興化則有聲在南臺則又有聲非其用法之公守法之慎抑何以得此哉自此以往超遷累擢以陟乎卿相固皆其分之所宜得乃其終身所當奉以周旋者法而已矣自古名臣碩輔功髙當代名著青史類多以守法稱夫法雖人為莫非天理守法無愆則天下之理得孰有天下之理得而功名之盛後世有間然者哉余之以言贈君茲惟再出雖其大㫖無以異扵前日而辭說之詳盡則所以深致意焉庶㡬大有以為同姓同邑之光也贈侍御張君考績序凡今之有官守者言責固無預焉惟御史以言為責又兼有官守葢自王朝以至扵方岳列郡文武庶政鮮不以御史參之其廢其興其損其益必求其當而後已一有不合御史輙裁之以法甚則舉以上聞而黜罰其人夫既責之以言又埤益之以事吾固知御史之職未易舉也求其能舉之者有不以正身為第一義乎夫惟其身克正則言出而人信事行而人服是以上下胥協而庶政以和茍不能正其身而徒倚勢作威倚法以削令固有所不行矣則雖譊譊焉強聒不置當誰為之信用以成天下之治哉此善為御史者所以求之扵其身者必詳其必有所見矣餘干張君仲敬早承其尊君大方伯先生家學與其兄孟簡同領江西鄉薦及連上禮部仲敬則先登進士科遂選為南京河南道監察御史奉若庭訓無敢失墜兢兢焉務置其身扵禮法之中有所不言言必度其可行有所不行行必思其可繼故今茲考三載之績而其臺之長及天官卿皆以最書葢公論然也視彼惰威儀善依倚者人不堪其削而事或由以僨其為賢不肖何如哉仲敬考既書最其同官賀懋教復以諸君之意屬余申贈一言雖臺中故事則然顧余之不敏將何言以為仲敬贈天官職有大小責任有重輕厯年有久近是固不能同也要其道之本扵身也則無不同士君子以其一身立扵天地間以俟事物之變扵無窮葢不容一日不正則余之言扵仲敬又安得別為新竒可喜之説為諸君勉修故事而不計其有益與否乎哉以仲敬之賢吾固知其必不以老生常談易吾言必將常如其始以益顯其世也送督府都事董君考績序上海董君文潔任南京右軍都督府都事滿三載當以其績入奏其寅友廖君孔服等以文潔扵余有舊來請余文以送其行葢文潔初以郡學生升南雍實居家君館下其相好自此始家君時為太學正方嚴少許可然獨竒愛文潔以為可進時進而䇿勵之祭酒嘗通試諸生文潔名占前列僉以為一第可以指取而文潔志亦鋭甚必欲自場屋成名踰選期至累年猶不屑就其先人晩翠翁敦迫之乃往及部試又入優等爰有都事之擢平居雅自修飭禆賛府事條理井井尤以平恕得軍士之心讀書吟詩往往至夜分乃寐且性不飲酒清茶一啜常若有餘味也若吾夫子嘗稱公綽之不欲又稱其為趙魏老則優夫以為老扵大家猶有取扵不欲之公綽况今之督府與六部對峙所領軍衛以數十計而經厯都事並為府之紀綱其責任固不甚繁而地望之尊何啻百倍扵趙魏老使居之者非有亷静之操抑何能當衆望而服羣心也哉有如文潔為人殆聞公綽之風而興起焉者紀綱督府厥惟克稱故茲三載之績當道者皆以最書葢公論也然人才之在天下亷者不必能能者不必亷故滕薛之大夫亦非公綽之所能任而文潔自茲以往積之以嵗月雖古諸侯之位且將得之觀其才猷宜亦無忝第不知所以終之者果何如夫宦業之有終不繫扵才而繫扵志志茍不怠才雖短尚能擴充以有為况乎才之未必短邪茍其志一怠則素守必渝其所謂才未始不為戕虐人之具茲所以卒歸扵敗也文潔今則有初矣惟是圗終之道尚克加之意哉吾聞董氏為上海衣纓家至文潔従父兄益顯繼續而光大之衆皆扵文潔有望扵其行也余因以為贈云贈督府都事貢君考績序南京文武諸司其職務多簡凡有官君子每朝視事或不過數刻即罷居常既多暇日則往往相與為詩酒之㑹山澤之逰暢然皆有以自樂者積日累月以至于三載則其事業之所成就亦皆可書華秩崇階由此而進視彼慘慘畏咎不已扵行者其所得不既優乎雖然君子扵此將必有所用其心茍無所用其心則逺大之業因而遂荒扵嬉者吾恐其或不能免也江隂貢君朝用以鄉進士擢南京左軍都督府都事與其長廖君孔服道同而氣合協心修職靡有愆忘及今三載告盈府以稱職署其考臺察覆之吏部又覆之舉如初君偉姿儀雅負綜理之才而性尤樂易晩而好吟七字句偶對匀整善飲酒雖多不亂家畜數童子皆習歌舞毎燕客輒以之佐歡人欲與之逰未嘗不往其取樂既善而職業亦以時修可謂樂而不荒者歟令子監察御史安甫往在南京與余相好近又辱愛扵君君嘗讀余文而喜數為廖君言之扵是廖君遂來請余文以為君贈然不知君何取扵余言也古人有言滿堂飲酒有一人嚮隅而悲泣則一堂皆為之不樂君子用心之至惟欲人人皆有其樂耳今左軍所領為衛以數十計合數十衛之人心扵一府亦猶一堂之聚也其休其戚君固與有其責前此之心思誠竭則自今以往宜必有以繼之使夫欣欣喜色者滿堂茲固逺大之業之所由基也初君當得御史封辭不就竟就選調固欲一試其所學其所志有不在扵逺大者乎吾嘗慮吾黨之或荒而樂為有志者相也庸贈君以君子之道整菴存稿卷五
