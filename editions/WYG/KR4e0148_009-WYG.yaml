body:
  text: 整菴存九稿卷明羅欽順撰序一十五首雲津書院集序雲津書院集兩大卷為文若詩凡若干首首宋嘉定進士曽歴記以次皆我朝卿大夫士之作題跋詩賦銘賛箴詞諸體畧備吾泰和有數書院雲津則劉逢原氏所建於記可考今其堂構無復存者而劉之後人乃興如合浦令叔正賔州守中和皆能自振於時受知於士夫君子是以空名陳迹經數百載重獲所託以垂示無窮葢亦非偶然者矣中和既編輯鋟梓嘗以求余序比其屬疾垂盡猶顧囑其二子充魁俾申請焉余重悲中和之志且舊諾其忍違也自宋室南遷朱張二三大儒相與講明理學以為天下倡近本周程之緒論上以接乎堯舜精一執中之傳四方聞風而興者實繁有徒而書院之建亦由此日盛然而因人以立門户也易由已以躋堂奥也難是非道之難明善學者之難得爾葢或以利禄分其志或以言語文字膠其見或以虛無寂滅之説亂其真競枝葉而遺本根尚空談而畧事實皆未必其有以自得其於聖人經世之大用又安得而輕議也然則吾儒之學求之其可以不一講之其可以不精哉書院容有興廢此學則無時而可輟諸君子一聞雲津之故皆従而稱述之名實之辨宜亦審矣庶㡬有善學者卓然出乎其間以為斯道斯世幸孰非其所望邪然則斯集也豈徒為劉氏觀美乎哉魁字煥吾早領鄉書方需時用其學行無忝賔州且嘗従陽明王先生遊可謂有志余嘗患此學之不講因序斯集輒相與一言之葢書院者非一家之私是以余之為言亦欲公之天下也義田賙族詩序義田賙族詩一巻凡若干首士大夫為友竹陳公作也公以廣信太守進參政致仕歸諗其族人得貧而不能自給者凡二十室遂呼其子邑庠生謐問曰吾居官受禄嘗歸其餘於汝汝皆以置田邪今吾祖之子孫其貧有如此者吾忍獨温飽欲割田賙之汝其謂何謐對曰謹受教乃度其貧之緩急以為多寡之差割凡三百餘畆授之券俾為永業惟不得售於人於是二十室者俯仰皆粗給事既傳播聞者莫不稱曰公仁人也稱之不足又従而歌咏之長篇短章渢渢乎碩碩乎各極其趣豈非仁心義聞所感而皆有不能自已者歟公之弟廷璣卒業成均得而装潢成巻謂其事當傳久逺具以來告請序其端夫田者民之所恃以為命者也王政惟此為重井畫而區授實為太平之基自付授之權不屬於公而田之在民者有無多寡往往懸絶民之不幸而不得其養者何可勝數也世有仁人者出安得不為之慨然太息顧其勢既不能大有所為則姑度其力之所能為以濟其勢之所可及而義田遂為盛舉葢其事始於宋之文正范公至於今累有繼焉友竹陳公其一人也夫以文正之賢使仁宗克究其用雖井田未易遽復至於裒多益寡以恵困窮使咸遂其生意其固優為之矣乃其用之不究豈天固欲困窮斯民也哉推公之志惟兼濟斯民之為慊義田之舉未足為公多也然後之效而為者益多則民之賴其恵者益衆是為不幸中之幸而公之遺愛葢亦未有涯也有如友竹公父子能繼公義舉樹之風聲以聳動四方將俾䝉幸者不但陳氏二十室而止是豈不可歌乎夫以人心之所同然而偶有見於天下無不傳也況諸作皆膾炙人口則其事之必傳也無疑廷璣猶有徵於余言亦其孝友之至情也愧予言不文不足以為公重或者因附兹舉而行逺則未可知公名廷璉字宗器友竹其别號廷璣學行俱優稱為其弟云曲山蕭氏族譜序廬陵蕭君一道以國子生需選都下間奉其族譜求序於余余舊聞曲山蕭氏為廬陵故家然未及見其譜及今乃獲究觀其源流詳考其文獻而知其久且盛也葢其先有曰文昌者當五季時來自長沙定居曲山之下迄今垂六百年昭禪穆承傳世凡二十支分𣲖别計指凡數千而衣纓科第後先相望葢文昌之後六世則有仁化縣尹顯於宋後仁化七世則有翰林修撰又一世則有兵部尚書繼顯於國朝其間領鄉薦升太學者固累累有人而其處者亦多能惇修行檢守詩書之業不廢故曲山之族表然望於廬陵一道近擢桃源縣丞其於文昌葢十七世孫也族故有譜創修於仁化尹繼修於修撰尊府贈左都御史樂存先生而修撰公暨其従子尚書公又相與補其未備欲鋟梓以頒示族人未及也一道嘗慨然有志於是乃謀於其族祖國子生養恵族父國子生敬諫相與考按成法増書世次凡譜之舊不敢毫髮加損惟於譜後别為仕蹟志具載族之顯者本末及所得累朝誥勅至於祠宇祭田有闗於蕭氏世徳者皆附録焉將梓其成編用卒前人之志俾族之人皆得而觀之以惇夫水木本源之思其用心可謂仁且孝矣嗟夫仁孝之徳人心所同保族亢宗必此為務茍能推一念之仁達於其所未至則所以視祖宗之遺𦙍自不容於不親有和睦而無乖争矣推一念之孝達於其所未至則所以行父母之遺體自不容於不謹有善美而無邪辟矣夫如是雖隠顯殊途豐約異致而所以光揚其先啟大其後者固無往而不得也敢因序譜而以是望於蕭氏後人幸不迂視吾言務相與敬修其實其盛且久奚啻今日而已哉是為序南安林氏重修族譜序閩中自唐宋來多衣冠之族若林氏則其尤著者也林氏在閩中非一族而祖晉晉安太守禄者為多若莆田福唐南安諸林皆是也夫以諸林之盛盤據數邑其初乃出於晉安一人然而昭穆之叙親疎之分有弗能詳究而通知葢以歴年久逺譜牒弗傳故耳是故世有仁人孝子則其於修譜也必汲汲焉以不忘其先而惇叙其族其敢後乎葢南安之後有諱十公者始分居政和之邵屯村其十世孫孝従又自邵屯遷居邑之東北隅而譜逸於兵燹之餘自十公以上世次不復可考孝従之孫懐興乃據先世所遺宗𣲖圖稍加編輯畧如歐蘇譜法而林氏之在政和者於是乎始有譜焉顧其源委弗詳體制未備懐興従子今南京國子學正一寧嘗慨然有重修之志自筮仕即櫝以隨參互考訂旁搜博采越三十載始克成編首姓原次世系圖又次世傳以及衣冠圖恩命録之類凡十類為一卷卷如其類之數焉於是乎流𣲖所自如水之有深源義例所該如人之備衆體傳之永久文獻足徵而譜題猶係之南安以明著其本始其尊祖之孝睦族之仁有足嘉尚者矣間奉以詣余請序其端余惟王化必自睦族始而睦之之道情以恩親分以義正自宗法廢而族無所統猶賴世之仁人君子作為譜諜以聨屬之然使恩義有弗加則亦徒為文具而已由此言之余安能無望於林氏之族哉抑張子有言子孫才族將大夫所謂才者必其有以周天下之用也然非學問以達之理義以培之亦何以充夫天之所降也哉天之降才固無靳於林氏之族有以充之則其族之大也可必矣此又余所望於林氏之後人者而亦學正君所以請序兹譜惓惓之意也泰和楊氏重修族譜序楊氏之居泰和世久而族益蕃遭元季兵亂譜牒無復存者國初亂定其族有隠君子曰與芳嘗追憶舊聞旁咨故老輯為譜圖一帙及太師文貞公出乃據以作譜用聨屬其族人其後叙州太守徳敷君因而續之皆有板本行於其族迄今正徳丁卯又六十餘年後生繩繩已多斑白之老而名字猶未有登載其承傳序次將久而或淆焉譜其可無續乎於是義官光序君慨然以為己任顧族人散處不一逺或百數十里或占籍他郡乃馳書徧訪盡得其詳既克成編將復鋟諸梓而屬序於予君從子平予女兄之夫也屢以君意來速夫君子之作譜也其心誠厚於仁非以為觀美也萬支一本萬𣲖一源視萬猶一者君子之本心而譜者所以㑹萬於一也凡族之有譜將俾觀者皆知其本源之同而辨於支𣲖之異雖異而同則恩不可以不篤雖同而異則分不可以不明其相愛也有恩而相接也有禮則宗法雖廢而其族之所以睦亦將無異於先王之時葢譜之所繫其重如此而可以無作乎有作於前有續於後斯其族為有人矣世之名宗大族承休席寵豈無才且智者傑出乎其間然所致美以誇耀一時不過服食輿馬宫室玩好而已至凡倫誼所繫如譜牒之類求其有能究心焉者指其可多屈乎君素以貲雄乃能上體文貞與叙州之所用心而惓惓以譜牒為重此其志識殆有過人者矣楊氏世徳諸先正序之已詳其在宋朝有所謂三登仕者尤號一時之盛而君則率齋登仕之八世孫也自君祖父以來皆以尚義著稱於鄉至君式克承之以無忝其世徳族譜之續宜有賴焉於戲楊氏之世徳盛矣凡為其後人者皆當圖惟無忝使孝友之行藹然於家庭之間清白之風穆然於富貴之外則所以増光斯譜也其有窮乎其有窮乎書院羅氏族譜序羅以國氏其先曰妘子國於宜城之墟後徙於枝江春秋時為楚所滅及周之季子孫又徙而南居於長沙而蔓延於豫章豫章之族既蕃遂為其郡之望然歴年久逺末流益分其世系雖或有傳殆難保其無謬也今吾泰和羅氏凡十餘族其稱或著或不著雖其著者亦各自為譜而莫能相通葢亦有無譜者然以事理考之疑皆豫章之支流而妘子之苗裔也其譜之有無稱之著不著要之繫乎其人若書院之羅則其著稱也久矣葢其初祖洞晦五代時由邑之中團里來居迄今五百餘年昭穆相承二十餘世其人之衆殆數千指往往惇朴質直力本而知學雖富不驕所與婚媾交游多時之名宗宦族兹其所以著稱於吾邑也其族有譜作於洞晦五世孫𢎞後嘗累累増修入國朝又百餘年而譜益大備則處士爾輔君及其子仁初諸孫淑欽輩之力也處士葢惓惓以譜牒為重嘗求内翰東里楊公永豐曽公二三名賢序之以授仁初仁初志欲鋟梓以頒示族人未果而卒淑欽其中子也乃言於族人曰予小子其敢不勉族人皆喜賛使必成以予同宗遂來求為之序嗚呼吾宗之族於書院也可不謂有人矣乎事實不可以偽為名稱不可以倖得有如爾輔君祖孫三世皆卓立不羣用能協心以成兹譜諸父兄弟又皆有以相之此其忠厚雍睦之風可想見已薫蒸浸灌殆非一朝一夕之故固宜其族愈蕃而其稱彌著也哉余又聞爾輔君嘗置祭田學田及役田皆所以為維持宗族子孫久逺之計後之人尚克謹承其志惇孝友服詩書益圖其逺且大者用以光大其族則兹譜之傳雖百世未有已也余辭不腆然於序宗家之譜安得不深致其意哉中塘張氏重修族譜序中塘張氏重修族譜既成遂謀鋟梓以傳信於後今是其族之彦一和與其族子循讓循愛族孫徳大因余族祖熈翁來請余文以引其端族姑夫曽君主善復申致其意二翁皆連姻張氏余不得辭也余素聞張氏居中塘者為萬安舊家然未始見其譜及今觀之始知其先葢出唐曲江公曲江之後有來家吾吉豐之恩江鎮者一分而為坳上之族再分而為吉水田心之族三分而為中塘之族曰遐年號顔齋者中山之初祖也由初徙至今垂四百年自顔齋以至於徳大凡若干世其顯者在宋則有大理評事仲才在國朝則有龍陽主簿鵬逺其他率隠居不仕而以行義見稱於君子者往往有之考其近世若濟逺永髙之父子士洪士魁士敏士昂士淵之兄弟或以長厚稱或以豪邁尚義稱見於諸先正之序不誣也其在於今若一和之秀朗循讓之詳練循愛之篤實徳大之静顓又皆克稱其家葢中塘之族其可稱者宜不止此然即此以觀可不謂世有人乎其族故有譜遭元季兵燹而逸濟逺據所聞知始復作之間與諸子若孫躬訪田心坳上之族求其舊譜之存者參互考訂而本源益明迄今再加修輯而支流益備凡其生卒之嵗月娶某氏塟某地子男女㡬人各詳註於名字之下而闕其所不知可謂慎矣夫君子之作譜葢本於尊祖睦族之心而以為維持久逺無窮之計然而猶虛器焉族之所以睦者人也今中塘張氏譜成板本且行於其族其直以為美觀乎抑將由此務相與致其親睦之實乎誠使相親相睦有加無已其氣薰為太和將必有竒材異質出乎其間而以其族丕顯葢積之厚而發之宏固天道然也余既不辭為張氏序兹譜惟其族人於吾斯言尚亦加之意哉是為序鄧塘張氏重修族譜序鄧塘張君九瑞以其家所重修族譜託余族叔用龍表侄王詔來請余序張氏族居鄧塘久矣其譜在國朝洪武宣徳中兩經修訂迄今又百餘年而子姪益繁名字之登不容無續因而鋟梓以傳示族人所以為無窮計也是宜九瑞與其諸弟某諸姪某特究心焉夫序序所以作者之意故家大族誠不可以無譜然其義則王文端公東白張公為張氏言之已詳族有顯者所宜表見矧張氏先世顯者尤多然亦已備見於翰講余公之文則余之序兹譜也又奚容贅竊惟文物之興墜雖係乎人然其機未始不由於世道之升降當元氏之亂上下分崩史多缺文族無完譜比國初平定雖有賢者拾殘補缺惓惓焉不遺餘力然亦安能遽厎於明備乎迨兹累世隆平文教洋溢不惟朝廷之上遺文墜典一皆討論修飭以成煥乎之治至凡民間所有族譜家乗可以昭先徳垂後規者或開其源而未竟其流或但為一人之私蔵而未為一族之公器亦往往旁搜博采燦然成編鋟之於梓而公之於其族矣若兹譜亦其一也夫以張氏之族固久且盛而其譜遭天下反覆竟亦散亡至於今乃明備如此謂文物之興墜不係於世道之升降可乎世當彌文而其族之彦又有尊祖敬宗知所先務如九瑞兄弟者則兹譜之重修良亦非偶然也雖然族之大貴乎保之有道時之盛貴乎出而有為保大乗時之具非詩書禮義何以哉惟張氏之後人尚惟禮義是惇詩書是恱以日進於髙明庶㡬無遏佚前人光而重有以増光兹譜也因序以致規永新甘氏重修通譜序永新逢橋甘氏始自宋吉州簽判廷珪老長相傳其先本丹陽人在南唐有曰従矩為豐城鈐轄因家其邑之黎塘其曽孫令堯徙建昌簽判令堯之子也以行縣至永新而卒子泰川遂留家焉至今南京刑部員外郎公亮凡二十世矣族故有譜宋亂為兵燹所焚員外曽大父時濟府君夙有志編輯㑹膺貢入太學得従文穆胡公學士解公遊因以譜事質之二公曰虛無傳疑實無忘逺可矣乃編自簽判始毎五世為圖一如歐陽氏譜法然猶泝及鈐轄列書其世以識其所自來至十六世而别為六堂子孫益重則堂各為圖以便考覽或徙居他處贅入他姓皆謹書之名之曰通譜譜成告廟人授一帙而府君尋卒於今又百年矣枝分蔓衍户益竈増員外尊先生封主事君乃率族人因舊重増至二十二世稿將脱以書命員外請序於余余惟甘氏之居永新可謂久矣考其世徳固多鬱而未揚然更宋歴元陵谷之變遷卿皁之升降何可勝數乃能保其家族以不墜遂盛於我國朝則其世有人焉豈不従可知乎方國朝之興也永新有周安者嘗據邑以附偽漢甘氏之傑廷瑛兄弟六人不義其所為拒之甚力湯東甌王提兵至嘉其識畧欲舉以聞廷瑛固不願仕乃酌之酒而勞之曰而後其昌今逢橋一門累千數百指皆六人者之後率能務本實敦詩禮時濟府君雖出而未試至員外而遂顯開敏端詳足為逺器而其兄國子生公恵亦以文學起聲價將聨翩嚮用於時東甌之言良有徵矣是知發揚之盛未始不由於鬱積之久豈與夫行險徼倖者較工拙於一時哉凡是譜之重修義固主於收族抑亦以前人種徳致有今日必其引之而勿替然後於是譜有光此封君之意也余辭不腆何足為甘氏重第與員外交厚不可辭庸述所聞及封君之所為惓惓者以為之序金田符氏族譜序新喻之舊族有金田符氏其初祖曰守静當宋宣和間來自南昌至於今四百年矣族故有譜國朝永樂初巴陵訓導彦芳所作嵗久僅存殘帙所著金田之祖系出宛丘於周太師彦卿為五世孫云其裔孫衍觀以山東布政司右參議致仕而歸乃大㑹族人徧加蒐輯因殘以求備推故而為新既成編録寄其族弟今南京刑部郎中同和俾詳定焉於是郎中以求余序余受而閱之則夫世系之源流作譜之義例參議君所自作序引三首葢已盡之且於首序終篇特舉其宗先舜功所得於朱陸二夫子切要之言以為訓其所望於族人者至矣顧惟不敏無容復置其不腆之辭辭且再三而郎中君竟不余釋乃従而申之曰符氏之族於今凡數千指窮通約泰固有不齊然自其初祖之心推之有不願其子孫皆為君子者乎又自作譜者求序者之心推之有不願其族人奕世皆為君子者乎欲為君子無他由於義而已矣夫出義則入利義利消長之際乃君子小人之所由分也二夫子之所以告舜功者辨之欲其明行之欲其力參議君特表而出之豈不為有見哉余敢以此申告其族之人以卒承郎中君之意庶㡬讀之者皆將有所感動興起無窮通無約泰無往而不惟義之是由則所以増光兹譜者端有在矣二君皆發身進士歴官中外勤敏而端慎表然皆以君子見稱於當時用能亢符氏之宗以為兹譜之重以引以續夫安得不惓惓焉有望於後來者尚相與深念之哉龍陂謝氏族譜序世久而族蕃譜不可無作也譜作則源委明昭穆辨戚疏之分著顯晦之迹彰一展閱間必將愓然有動乎其中者仁讓之行詩書之業相與惇其所未厚廓其所未宏則於前為有光於後為可大此譜之所繫未可以輕視也故凡有志於尊祖厚族以大其家者未嘗不以譜牒為重吾邑龍陂謝氏距吾家僅十里許其先子發甫當宋之季自安成之辛里遷於龍陂之上肇建厥家於今八九世矣其子姓日益蕃衍而故址頗隘則又析居九城若梅塘若墨湖若橋西若下篠若西岸若楊村其人大抵惇本務實而勇於自振由科貢而起者累有見焉葢駸駸於光大者也其譜之舊自其初祖𢎞至子發甫凡五十四世子發四世孫仲武乃作龍陂之譜始自子發而下别為世次以垂諸後而舊所傳録者猶僅存之不敢遺君子以為知禮其従子仕讓従孫某某襄府長史公之従弟顯朝従子世髙世祺世鈞與其孫某某益府典膳教悉心搜訪疏逺畢載而譜遂以克完其鋟梓有日矣適余得告歸省乃相率來謁請序其端惟家嚴封君與長史公實同領鄉書教父叔於余皆嘗以文㑹可謂世契諸君又禮請其何説之辭夫前人之用心後之人所當深體而篤念之以求無負焉斯可矣凡諸君之完是譜所望族人子弟者豈淺淺哉心其心以事其事使將來之光大視今日有加無已此固其族人子弟之責余既不辭而序兹譜亦不容無厚望也尚相與朂諸雷岡康氏族譜序子張子有云子孫才族將大夫所謂才者必其智足以知所當務其志又能汲汲焉為之君子之所先莫大於文行誠能汲汲焉用力於此有行以為本有文以為華將所以大其族者不亦有餘地乎莫非文也而譜牒亦其一事凡族之譜牒非有才子孫出葢亦莫能脩之譜牒不脩則本源弗明昭穆弗辨仁孝之道雍睦之風鮮不㣲矣前代雖有顯者其風聲事迹亦不復接於耳目又安知踐修之責之在於我求其能免於卑陋而聿進於髙明豈不難哉故善觀人之家族者即其譜牒之廢舉而其昌大與否亦自可見雷岡康氏在吾邑千秋鄉去邑城僅一舍許譜稱其先世當五代之際有能甫者自金陵來官泰和遂選勝於雷岡之下家焉更宋歴元以至我朝葢數百年矣在宋累有中鄉科者而未大顯國朝永樂初始顯於梧州貳守仲恭梧州嘗奉其先人宗瑞翁遺言據家傳垂系圖創作族譜譜成而自為之序所以期望其後人者甚至然未及鋟梓而卒今其子姪日益繁衍而譜之續編以成則梧州諸孫某某與其族之文學士某某輩之力也葢自能甫而下通舊譜凡若干世㑹余䝉恩歸省諸君乃介余姻表歐陽君宗之牧之來請余序以傳余聞康氏之於歐陽猶古朱陳之好而其惇孝友崇信讓詩書之業日廣為二君所稱道者亦皆合乎鄉評有以見其子孫之多才宜其惓惓於譜牒之修以上繼梧州之志余固樂道人之善又重二君之請於序遂不復固辭而先之以子張子之言則因見聞所及以深致其意也桃林羅氏重修族譜序族之有譜所以著本原詳支𣲖别昭穆辨親疎人倫之明風俗之厚實惟有繫於此故自昔知禮之君子莫不以譜牒為重前有作矣後必従而續之凡以為久逺無窮計耳吾羅氏之在吾吉聚族而居者良不為少其世或逺或近而著聞於天下者往往有之若吉水桃林之族其一也余嘗聞國初有𢎞文館學士復仁宣徳間有工部侍郎汝敬其才猷風烈雄竒磊落皆桃林之傑出者數十年來則有若貴藩大參璞督府經歴瑋靖江長史其祥余皆嘗獲交焉大參之闓疏敏達督經之深宻有謀長史之左規右矩士夫莫不推重葢桃林人物後先相望如此其著聞於天下也宜哉大參致政家居垂二十年今年八十有三矣一旦攜諸孫棹扁舟泝流二百餘里特來訪余以其所重修族譜屬為之序余多病筆研疎且久顧惟大參年徳之重意氣復勤勤懇懇又可辭乎敬受而閱之乃知其先葢出唐吉州刺史崱崱卒於官子孫遂留家廬陵後數傳有三十三承事者始分居吉水是為今樟樹下白竹溪桃林之共祖又後七世曰忠文始分居桃林由承事沿至大參凡十有八世泝而至於刺史崱葢二十六世矣世有仕宦具列於圖在宋嘉定間有竹谷老人茂良者實始作譜其後若竹林居士自昭耕樂翁以明温教汝寛皆嘗致修續之功諸先正序文存焉大參乃竹林七世孫而工侍之諸孫也其所重修尤為詳慎且捐己資鋟諸梓而傳之族人嗟夫大參以踰八望九之年而於修譜一事惓惓焉不遺餘力其尊祖之孝收族之仁可謂老而彌篤也已凡其族人子弟盍相與勉修其徳以増光斯譜也哉葢其徳誠修則或出或處必皆能有以自立為孝子為弟弟為良吏為名臣為幽貞之士而九族之睦有不待言者矣夫如是則於大參之用心斯為無負而桃林之盛詎可涯哉庸書此以為序其従大參來者邑庠生體昂道同有慶也義城黄氏重修族譜序凡故家大族逾久而逾盛非偶然也必其作於前者功徳有可稱足以為敷遺之本承其後者又能惇詩書飭行檢勤生務實得所以引之之道固宜歴世綿長而蕃衍昌大有加無已也歟觀於吾吉之廬陵義城黄氏其亦可徵也已黄之先有諱國琛者當五季之亂能倡義保障其鄉鄉人賴之以安其生以完其室家皆相與歸徳焉因以義城名其所居之里及宋興而亂定事乃上聞太祖命賞以官封竟辭不受然其後嗣遂多顯者在宋則有若宣教郎致中秘書公符少監子充工部郎官饒守炳鄉貢士輔嗣入國朝則有若金華知縣經監察御史國用繩繩不乏今合族之衆不下數千指良材美質清文篤行見推於鄉邑者往往有之於戲可謂盛矣非其植本之深而引之者率由其道抑安能致此哉其族故有譜遭元季兵亂而逸僅存貢士遺筆所書世次自國琛大父髙仲始以上闕焉成化間金華君遂據以譜其族始自髙仲公下及其子凡二十世且自為之序著其世徳甚詳迄今垂五十年子姓日益繁夥而譜未之續御史尊翁潔菴封君乃謀於族衆重加編輯合凡二十㡬世而其凡例一遵金華之舊稿既脱将刻梓以傳適御史以㣲累謫嶺南因俾謁余請序諸首簡余與御史嘗同朝雅相善誼不得辭也葢聞人道莫大於尊祖尊祖故敬宗敬宗故收族宗法既廢而收族之要惟賴譜牒而已封君與諸君子乃能惓惓於是非其心之厚於仁乎是宜特書以著其美御史發身進士端亮忠鯁賜環且有日當益推其素藴以大發於事功後來之秀又當接踵而出所以為兹譜重良有在矣并書以俟之上模曾氏重修族譜序語世族之盛大率有三源流深長枝葉蕃衍一也簪組蟬聨牆屋華潤二也才賢輩出猷為克敏三也三者之中才賢為之本茍有其人則所以維持之者有其方光大之者有其實其為江鄉之所推重豈直蕃衍富貴云乎哉上模曾氏吾泰和之盛族也其先有諱慶者為唐光州團練使始自金陵來家邑之文溪六傳而至璋遷邑南中寧岡尾再遷上模遂定居焉又五傳而至喜喜生三子曰仲機仲美仲介仲機之後分居萬安之汶溪仲美之後分居贛之楊梅其仍居上模者皆仲介之後也植本固歴年多庶則累千富或冠邑而上模一派在國朝尤顯始自洪武迄今嘉靖中鄉科登進士第者累累有人其他或以貢升或以明經及才行舉或起䕃叙踵相接於仕途若故刑部左侍郎省軒先生徳業並茂風節殊偉則其族之泰山北斗也族故有譜續於梧岡病叟従省軒公因而重修以刻於梓然獨詳於居上模者凡他徙者第存其系於今七十年矣僉議修續逺近翕然於是上模推峻光民譽惟器主直汶溪推順緒國堅楊梅推昇洪顯泰同司其事更數月方脱稿書法一遵舊譜而合離収放事迹加詳諸君之用心也可謂勤矣梓既具遂相率過余請序其端曾羅居同里世有連余先曾祖妣孺人先妣太淑人故嬪淑人皆其族出外舅恩例冠帶西磐先生今年八十有四葢舊譜中之晨星也尤惓惓於譜事顧雖衰鈍可無一言以相兹盛舉哉夫族之盛也以人即是譜而觀之維持之方光大之實曾氏世有人焉槩可見矣然余之望之也豈不欲其人人皆為才且賢乎夫富與貴身外物也得之不得有命人人有貴於己者求則得之誠於所不當為者赧然而不為所當為者奮然為之如弗及所謂猷為之克敏者孰加於此隠亦此道顯亦此道身安而用利倫叙而家肥職修而業廣將其族之盛也庸有既乎余不佞嘗聞與人為善之説矣况乃綢繆之好義均骨肉逺期厚望宜不容已凡列名於是譜者尚其念哉整菴存稿卷九
