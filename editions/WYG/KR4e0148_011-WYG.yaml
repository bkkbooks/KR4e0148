body:
  text: 整菴存稿巻十一明羅欽順撰題跋四首銘三首贊十八首傳二首題宋元祐幸學詩巻後宋元祐幸學詩作者皆當時宰執侍從文學之臣凡七十二人人一首試國子祭酒豐清敏公豫焉遂屬袐書李格非序之而以鐫諸石迄今正德辛未垂四百四十年矣余始獲觀寫本于清敏十三世孫封春坊諭德西園君所蓋封君之先人方伯公初得板本於葉文莊公襲藏惟謹封君因別為寫本圖刻梓以傳今其嗣子原學以宫諭莅南京翰林院奉迎以至因出視余詩後有文莊及諸名公題䟦二十餘首皆取諸葉氏封君所得則自方石謝公始蓋因其時以稽其事而慨元祐之不終因其時以求其人而幸君子之有後諸公健筆可謂盡之然余攷之七十二人中講讀之員凡六而清敏亦兼侍講先是程叔子嘗有言曰君德成就責經筵元祐未幾變為紹聖姦言之易入良由君德之未明耳豈其時經筵講說徒應故事雖賢如清敏曾不得専且久以致其功邪嗚呼其可爲永鑒矣封君梓行是詩固欲以奉揚先烈然有子如宫諭將必於清敏有光余竊嘉之敬書於其後書珠林劉氏遡源録後珠林劉氏爲吾邑右族其先在後唐時來自金陵逮宋而人才輩出衣冠宦業他族莫或先焉入國朝則有槎翁東原兩先生俱負重名槎翁受知高皇累官至權吏部尚書終國子司業東原晩歳乃起爲豐城教諭竟卒於官詩禮之傳至于今不乏也東原五世孫經美服膺世德曰篤不忘嘗輯爲遡源錄一書六世孫栝繕寫成帙而經美卒矣栝之父經助君以余嘗表章槎翁遺文宜若爲知言者特來請序夫懿德之好人情之所同也余何知敬受而閲之上下數百年間劉氏文獻之盛粲然畢具前輝後映可敬可仰錄中有先德錄序數首余三復焉固此錄之所本乎經美賢哉其可謂善述也已錄凡十有八巻字皆端楷首尾無一筆少縱非用心之精專者不能經助隱居授徒學行淳篤寳藏此錄及東原遺文比之天球河圖然非其人未嘗輕出劉氏子孫之多賢於此亦可見矣夫爲人後嗣者誠篤念其先世之美所以圖惟紹述必將無所不用其至傳曰公侯子孫必復其始將不於劉氏見之乎余魯且病弗能序其詳庸書此於末簡以俟跋王宜右所藏蘭亭序刻本右蘭亭序石刻一通元襄城楊伯謙先生以貽吾邑王竹亭先生者竹亭自誌所得年月于巻首凡十九字其字細如蠅頭㸃畫僅可分而一筆不茍前輩畜德之厚於此見之二先生以文字道義交聞其當時徃還書尺甚富今獨存此竹亭六世孫宜右好古嗜學服膺先德奉藏惟謹蓋自至正甲申迄今已百六十餘年又可以見君子之澤矣欽順竊喜獲寓目焉敬書于其後題王改齋手翰故翰林編修改齋王宜學平生磊落大節雖逺方俗子莫不知之若夫庸言細行率求無愧於聖賢之學吾黨或未必盡知也此巻乃其手筆凡十有三帖皆與其倩張律景陽者所致朂者惟道義始終無一私昵語凡世俗營營功利事未嘗輒汙簡牘非其志之素定養之素密其能然乎夫願學聖賢者無隱顯無鉅細無久暫惟誠惟一而後能有所致改齋其有見於此矣吾黨之士得此巻而閲之則知其庸言細行一無所茍不但其大節之磊落而已景仰當何如哉景陽學敏行端夙有佳譽蓋誠知所取法以余為改齋知己特奉此巻請識一言余初識改齋於文字間契闊久之始獲一㑹輒忻然叩其所得因謂近時講學者其說不一只爲心性二字難明改齋深以爲然顧行役匆匆未及究竟又兩年而改齋逝矣使其尚在余得與之下上其議論未必不歸於一也今其手筆亦有及余講學之說者開合數四感嘆無已景陽其亦有以識余意也夫劉文懿公享堂鐘銘并序正德十一年秋七月庚子詔贈故南京工部尚書安成劉公宣資政大夫配淑人王氏爲夫人十三年二月甲子復賜公諡文懿贈以公季子刑部署員外郎秉鑒考績恩諡從公嗣子南京工部員外郎秉常請也命下中外之論翕然公初繼其父補伍盧龍景泰庚午發解京闈第一明年登進士第改庶吉士于翰林擢編修遂削戎籍累官至尚書以卒勅葬廬陵縣南塘之原今二十八年矣墳前既循例建享堂至是始備鐘鼓罏缾以嚴晨夕之奉範金有日秉常與其弟秉鑒謀曰贈諡重典也鐘重器也宜有銘遂以幣來請欽順嘉其合禮敬諾爲銘時則秉常已進郎中矣銘曰天挺英姿孰艱其始自我軒騰於千萬里蔚著詞華深含德美用罔不宜媚于天子勞殫若工望虛宅揆多士如林永懐遺軌營葬南塘特廑勅㫖夫人來祔並從先妣霜栢霜松倐踰二紀恩典載頒公則有子惟子克孝克感宸衷惟皇仁聖惟舊德是崇穹階以贈節惠惟公光昭簡冊於穆清風享堂作矣式配其封惟數之備而器始充冶金入範莫重非鐘對揚休命以震于無窮忠惟世篤聲以實洪於戲文懿百世之宗思齋銘有小序友人張君主貴名其燕息之齋曰思余不敏蓋嘗從事于斯而略知其說矣為之銘曰有貴於已人人所同物或能蔽思無不通茍惟勿思狥欲忘返上智下愚於焉始逺嘉我良友忠信為基反觀内省以類而推視聽貌言喜怒哀樂當幾必研有動斯獲膏粱非㫖文繡非華寳兹天爵其貴曷加箕範軻書訓詞炳若要匪徒聞斯為善學一心既立萬善畢陳敢銘齋壁以贊日新畱福堂銘爲都御史張公大經作於惟令族累葉濳藏蓄久而發式宏以光大參挺出玉質金相學優則仕力敏才長及民有惠敷政有方存心制行罔敢不臧豈伊身計求福皇皇冀留于後爰以名堂賢孫繼起一鶚高翔三紀在服勤厲自强官長御史望尊巖廊歸承優詔樂且無殃矧多才子克紹書香雲霄健翮千里頡頏宣水瀰瀰宣山蒼蒼兹堂信美名以實彰有蕃來裔惟德之行祗循祖訓永永其昌上模曾氏五世圖贊有序此上模曾氏新㕔一房五世圖也一世諱以浩號浩谿二世諱楚芳號芳林芳林實新㕔祖而圖始浩溪者本其所自出也芳林三子季良季高季倫良號良心二子士通士鑑高號高峰一子士斆倫號倫忩三子士賔士舉士珍六士之行惟士斆甫最後餘如所書之次焉第五世頗衆圖不能盡載載者僅三人首曰之儀良心孫也次曰之相倫忩孫也又次曰之雅高峰孫也於戲可謂盛矣蓋觀于此而其世德可徴焉欽順忝士舉翁孫壻拜瞻有素景仰無已謹序其世而系以詞詞曰洵美芳林新㕔之祖允淑浩溪芳林之父新㕔之盛實始二公三季六士益介昭融比于𤣥孫克承克似赫赫家聲光延五世非仁曷守非義曷為雲仍千億爾祖爾思秀溪張氏五世圖贊於惟華胄望我西昌百年五世世美重光翼翼徴君抱才弗試比于曾𤣥多有名位一經啟後雙桂題坊儒師宫教太守侍郎貴或以孫九卿是贈仕或以醫訓科是稱紆青曳紫騰茂蜚英近而益信死者猶生乃眷兹圖孝孫所作凡十四人貌皆儼若徵君有子亦謝徴書孝孫有父亦安隱居隱顯雖殊休明有自行誼藝能文章政事隆隆家棟實實國楨惟善之積而慶以宏彼積弗恒驟榮遄落曾是朽株可施丹雘休哉張氏源逺流長遺容濟濟生氣洋洋張氏休哉其傳無已朂爾後賢式遵前軌自贊有小序余近得良工爲寫家慶圖并寫此像日月逾邁不覺四十年矣傳稱四十君子道明德立之時竊有愧乎斯言因書數語以自勵時為南京國子司業已得請將奉老父還鄉期以晨昏之暇温習舊聞庶幾乎少有進爾𢎞治甲子十二月朔旦整菴識入官一紀惟是隨羣行年四十爰始有聞厥聞伊何聖人可學昔豈不聞汎焉靡覺今其覺矣洞矚聖心川流山峙日照月臨人有古今心無彼此何以存之曰惟敬耳敬非有物要在不忘存久斯熟而外以方顔安屢空曾事三省立志宜堅用工宜敏前途修短何慮何猜此生難得尚勿虛哉再從叔父舉庭先生像贊學足以爲童子師而持身亦謹才可以為百夫特而見義必趨足跡江湖惟致勤父母之養襟懐風月曾不忘詩酒之娛繼承有子克廣令圖方怡顔於松菊遽畢景於桑榆噫彼其懸諸天者吾莫如之何已然考其平生之靡㥾豈不可以占其餘慶之有孚也耶族叔粹然先生遺像贊氣質凝重德性沈潛君子之友後生所瞻孝友篤于家庭而每懐靡及學問通乎今古而常若未厭其衿􅺒之及門者類若江皋之植其文章之得意者自比水中之鹽器堪大受才亦旁兼謂千里其非逺曾一命之弗霑然而華屋永存乎遺像架書靡墜於殘籖其子孫之有立如此區區之窮通夀夭於先生豈足爲嫌戸科都給事中張君經載遺像贊雄姿山立雅度春融氣剛而志正學富而才充歌鹿鳴而發迹標虎榜而登庸肅衣冠於青瑣司獻納於九重侃侃乎匡時之論優優乎補過之功凜凜乎忘身之節惓惓乎致主之恭萊綵姜衾素有聞乎至性黯肝徵膽宜全具乎天衷然慮及千年而浮生爲已促官雖七品而流聞則無窮其浩然之在天地間者茍非益江湖之潤澤寧不助鼓舞於雷風也邪南京刑部郎中鄧君廷器像贊貌肅而氣和言徐而行篤聰明出流輩之先孝友集家庭之福學之博尤致力於本原文之工早蜚聲於塲屋甲第高登虎符分屬僉曰吉人允宜華轂夙興夜寐政無怠於浚明植弱鋤強民以遂其生育既敭歴於兩州屢光華於薦牘河有巨防畆蕃嘉穀秋曹遷秩凜直道於祥刑錦誥推恩慰深悲於風木暫謁告以來歸胡遺榮之太速偉諸子之克承奉遺書而肯讀碭山司訓梅軒龍先生像贊道孔門之問學而文不偶於主司挺漢相之風儀而官僅止於司訓每致嚴於行之修初不計其屋之潤循循善誘作人遂破乎天荒翼翼小心裕後式資於理順故園虛窈窕之尋遺刻富清新之韻榮光之烜諒有在於箕裘聲譽之流將何分於逺近也繁昌司訓松磵李先生像贊其貌清癯其中則腴有才有識有詩有書篤家庭之孝友端後學之範模既守經而不妄亦變通而非迂三世儒官允擅承傳之美八旬眉夀猶兼揮灑之娛兹所以鄉評歸重清譽孔都而出入遊從之密蓋莫非君子之徒也潛江大尹二休蕭先生像贊德性端方天姿穎異文學夙成科名晩遂式膺一命之榮昭受百里之寄時當多事政尤謹於廢興歳且薦飢心克殫於撫字亶受直之無慚顧宜休之有二蓋明哲固足以保身矧賢郎復優於繼志仰令聞之猶新眷遺容之孔晬爰槩述其平生用永垂於後嗣南平大尹本寛郭君像贊和厚之氣望之可親篤實之光近而彌著夙窮家學之源雅擅文塲之譽科名甲乙曾無怨於所司宦轍東西乃一安於所遇妙甄陶於芹泮教以有成勤撫字於花封政惟多恕年未及而遄歸身既閑而日豫廣庭危榭栽培可意之芝蘭白石清泉時撰探竒之杖屨方夀域之高躋總塵襟而畢濾雖述贊之非工亦見聞之有據也潮州别駕咸表劉君像贊貌魁梧而心則小文閎放而行則恭本自賢父兄涵濡之素加之明師友切磋之功多見多聞顧高科之不偶有民有社寧俗吏之爲同服勤茹潔行簡持公嘉績連收于兩邑賢名遂達于九重監州是擢恩奬斯隆雅望方諧於展驥遐心俄附於冥鴻松菊秋高已覺清風之可遡山林歳晩尚觀諸福之來崇劉咸彦行樂像贊高樹凝丹秋江如練寄蕭散於扁舟挾童奴以為伴有酒有魚有琴有劍或泝或沿從吾所便逺而望之疑若晉宋間人即而觀之始知爲劉氏子咸彦也惟乃克家之敏既經營以致其豐是宜幹蠱之餘暫遊衍以忘其倦睇彼芳洲雲移物變幸清流之可枕復何有於他羨臨清翁像贊有小序翁曾姓字民譽予妻兄也嘗瀕溪作堂以居扁曰臨清鄉人因以號翁而予實爲之記今其子曰淳曰濟復以翁像求贊于予追尋作記時忽忽十一二年而翁之夀七十有六矣記中所述于翁性行已詳無庸復出直舉其夀之美而推本以贊之其辭曰猗人之夀惟德之徵翁德良茂夀宜愈増有汎愛之心有兼容之量事有斷而不愆言有稽而不妄怡然睦五世之宗卓矣爲一鄉之望此余所以嘗爲之記其堂又欣然樂題其像也鄉貢進士蕭君時堅像贊貌不踰於中人而英風逺激學有見乎大意而細行亦矜其論辨之雄殆瀾翻而海湧其文詞之健乃鳯起而蛟騰茂天倫之篤叙靄和氣之薰蒸安葛廬之偃仰謝偃室之趨承向令見用於當時得以發舒其素藴心志既光明而不疚事功宜磊落而可稱豈意天年之早盡空期甲第之高登載瞻遺像邈矣良朋贊揚惟允永世足徵恩例冠帶西磐曾公像贊良璞未剖幽蘭自芳言有稽於古昔行無戾於綱常廣㑹羣居春風和氣族規家範烈日秋霜出入邁兩京之迹猷爲增奕葉之光古䫉巉巗心田則坦恩波浩蕩象服斯皇既踰八而望九况子肖而孫良賔席每虛於鄉飲旦評尤重於邑庠磐松挺翠籬菊滋黄天之所佑樂且無殃宛儀刑之在望慚述贊之非長庶少申於頌禱詎能盡其鋪張也耶旌孝蓉江王先生像贊貌偉氣昌而色惟康陋脫綺紈之習清含蘭桂之芳寤寐前聞惟志之卓步趨周道惟行之莊既旁通乎載籍爰大發於篇章諒逢時之有命肆懐寳而深藏孝感克周於大變友恭仍萃夫多祥譽本家庭而鄉評允協榮膺鞶帶而令德彌彰至若襟懐之灑落談吐之鏗鏘接人之易置處事之周詳亦可謂兼有衆長矣兹怡怡於暮景惟懇懇於義方其收功而食報又豈淺近之可量耶貞節楊母梁孺人像贊盛年寡處執志惟堅令有旌門曾弗少延持其完節以報所天相從地下無愧生前乃若勤以代終載廣其家之業慈而能教夙成其子之賢奉尊章而誠心曲盡遇婣族而禮節無愆凡鄉評之未冺皆懿行之可傳者也竊取春秋之義式昭風化之先大卿徐公傳公名貢字廣賢姓徐氏泰和水南大原里人也其先自萬安皁口來遷曾祖諱應麟祖諱以忠父諱孟朗先兩世繼爲區賦長至其父始得代乃別築車谿之上篤教諸子公與伯兄川季弟威俱有異質相與共學交相切磨學成相次領鄉書成化甲辰公遂登進士第明年例與告寧親俄遭内艱𢎞治戊申服闋還朝授南京兵部職方司主事甲寅署車駕員外郎丁已陞郎中還莅職方㑹詔舉賢才南大司馬張公恱少司馬張公敷華同以公名上遂陞福建布政司左參議公為人端厚謙約而嚴於自守遇事務參酌情法之中弗苛弗縱在兵部時嘗建言職掌五事俱得㫖報可其處置公差船隻撫存犯罪夫役人尤便之初至福建有豪民冒種海田招致徒黨以數千計鎮巡疑所處檄三司集議莫敢堅決公曰吾嘗察之稼事十六七成矣急之必致變宜俟其穫懲其人而申嚴其禁自可無虞衆遂以其事屬公事卒賴公而定閩之鄉士累建請鬻僧田部符下藩司查處公時兼管四道既考見其都數察諸議者意皆主於奉行公獨以爲田之在僧糧差無幸免者今欲變賣則其間虛糧萬數無所於征且賣入勢家則優免者必多差將誰任况諸大寺僧徒佃客各不下千人一旦奪其所資以生者其能安坐以待斃乎此其不可明甚以報戸部雖駁令再處竟亦不果行也建寧大水壊及城門公董工修築城中舊有流泉一道久堙弗通屬頻歳火災且科目乏繼談者皆謂泉堙致然求通屢矣而泉之入出干涉城垣用此率難其事至是公慨然曰事機之㑹其在今日乎遂疏導之以其方已而士果興災頓息建人皆曰徐公之賜也漳浦之南韶地鄰廣東流賊嘗入犯公嘗建議展築其城置一守禦千戸所實以漳州衛官軍四百於䇿為長議未行而賊復入至以巡捕官去公即時督厲兵士擒獲其首惡及黨與二百餘人遂舉行其初議城既展公廨營房以次就緒居人始有寧宇其地嘗封閉銀坑一所即令守禦官軍以時巡邏而罷遣其客兵歳省口粮幾二百石福清縣庫被刦盜不時獲邏者計誘二人許以自首免罪乃妄引平民八十餘人公廉知非真緩其獄而竟得真盜八十人者皆賴以免惠安丙洲兩鹽塲鹽苦而黒商中殊少例許折納銀米塲丁仍晒鹽貨賣時泉州一衛以犯禁當戍邊逺者二十人公不謂然一日以問臬司犯鹽禁者何處或答曰有例二千斤以上邊逺充軍公曰例首不有越境二字乎在坐皆黙然有慙色自此問逺戍者鮮矣福清舊額魚粮七千石此年所入纔及四千公究知魚戸舊則船八百料者納糧八石六百料者六石其餘以是為差歴年多舊戸日消而新戸日長弗登于籍乃一一覈實新戸止各徴其半以補舊額舊額頓復而其民一無怨言佐閩藩垂十年政績甚懋屢爲巡按御史所旌正德己巳春陞河南右參政事有干藩府者據理平處人皆愜服其年冬陞遼東苑馬寺卿㑹公久病未痊先已馳疏乞休致辭甚懇遂得請而歸公平生謹於事親居喪有禮既仕獲再贈其父南京兵部員外郎母歐陽氏由安人進宜人及休老于家歳時輒躬詣先塋展省増壤屏翳祠堂敝則重建之待子姪及宗族婣黨皆有恩意然隨事警飭亦不以姑息爲愛也去縣城止隔一水非公事未嘗入士君子尤高仰之公生正統戊辰卒嘉靖丙戌年七十有九矣深惟始終常理乃相地於天柱岡尖峰之下築夀藏焉既成以銘見屬余嘗執筆史館粗聞書法有如公爲人爲政皆卓然有可稱述謂宜立傳以傳久逺乃據曾桂陽所錄事狀參以平日所知爲次第書之如此蓋善善之公也公元配劉氏繼周氏贈封皆宜人四子郜援例冠帶邰郡郈俱邑庠生而邰前卒論曰先吏侍公方嚴少許可徃官南雍最與公厚善余以此獲從公遊公嘗與余談經理致精確粲然如指諸掌余心服焉其學之所得者深宜乎施諸政理類非俗吏所能及也然則君子其可以不學乎太常典簿楊伯川傳伯川諱增常州武進人其先相傳出漢太尉震居武進者六世矣由錢垜再徙前黄至今同居其諸父宗範宗謙宗源諸兄伯和相繼登科為仕族父浦號蒲軒母胡氏太保忠安公姪女伯川自幼機警言動皆有畛域稍長治毛詩補郡庠生俄以例升太學累試鄉科不偶久之始拜龍虎衛經歴三載考最賜勅有幹濟操持之褒而贈其父以其官贈其母爲孺人妻陸氏封亦孺人無何擢南京太常典簿伯川累世豐富其居官毫髮無所取事無大小一裁之以法以故其同事及其下人多嚴憚之初逆瑾嘗併龍虎衛衙以廣其居及伯川得官龍虎遂能節縮俸資創造如式太常之擢蓋與能也在太常河東張公芮爲卿余爲少卿皆才伯川事常倚之以集伯川亦欲伸其志於知已持論常侃侃一日爭事過激忤張公余力解之退復與伯川言所以處之之宜伯川亦悟事良已然頗藉藉外傳㑹考察例行言者因以此疵伯川吏部擬從外調時伯川滿考去過家聞而嘆曰吾不能復仕矣即上疏乞休詔許以本官致仕知者皆惜其用之未竟也伯川性孝友待其異母弟伯温素有恩意凡先世遺産及身所充拓者皆與之均已而弱不自持扶持之尤力待賔親有禮于鄉人及徃來道路間者亦能有所利濟雅嗜音樂然絶不飲酒其用度有制雖富而不奢也家居僅四年年五十有一正德戊寅七月三十日疾卒前卒之數日以家事付其子鑨纎息無遺其配封孺人者贈禮部侍郎龍皋陸先生之女男子惟鑨一人太學生淳篤知向學女子五人長適陳大尹之子太學生道生次適徐符卿之子坦次許嫁成國公叔子鳯餘尚幼伯川既卒其表兄周時鳴嘗過余道其平生而悲之且曰先生知伯川者忍不爲之一言俾克有聞於身後乎已而復具事狀以鑨來見拜請益堅余不忍辭也乃摭其實爲之傳授其子俾傳焉論曰凡人性稟不出剛柔兩端隨其所長而有以濟之固君子之道也是故剛以濟柔則不至於失已柔以濟剛則不至於失人伯川起諸生更二官皆能卓然有以自立良由天資剛果其氣壯其志銳然爾長途方騁而忽焉中躓豈於所以濟之之道講之有未詳邪然視夫世之便辟側媚脂韋淟涊甘於汙穢之處以求尺寸之伸懵不知亷恥二字爲何物者其爲賢不肖要不可同年而語矣余是以有取於伯川云整菴存稿巻十一
