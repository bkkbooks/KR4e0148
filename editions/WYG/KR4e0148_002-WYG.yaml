body:
  text: 整菴存稿卷二明羅欽順撰記一十六首迎曦樓記自余家西岡之下北行二十餘里里名曰大瑞有山來自西北巍然雄峙狀若駝象然左右之山如趨如附谿流映帶風氣完深凡依山髙下以居者皆宋端明學士忠穆鄭公之裔也其族屬既衆屋之為㕔為堂為樓者凡數十所有樓名曰迎曦則處士宗傚君所建葢正寢南向是樓在其左而面東其下為房宗傚君夜則休焉鷄鳴而起登樓而坐以思夫晝之所當為者既得其理則開忩而迎望而蒼蒼焉而耿耿焉日出而大明焉扵是乃出而従事習以為常故樓以迎曦名也其従子端典扵余姻家間屬為之記嗟夫日月代明而為晝夜然夜者人之所息凡應事接物以供其職分葢莫不在扵旦晝也自夫玩愒者言之彼扵朝曦暮景之升沈固漠然不以介意夫豈知寅賔之義所係甚重而坐以待旦又聖人之所以為天下後世法者歟即名樓之意以推宗傚君之為人其立身治家克勤無怠有足槩見者矣視世之玩時愒日者可同日語邪抑君之所見或未止此在易之晉貞坤而悔離其大象云君子以自昭明徳夫明出地上雖愚夫愚婦莫不覩其象也惟君子觀之則能反求諸身而知所用力焉故夫視聴言動無敢不由扵禮誠懼夫明徳之或昏也宗傚君行義稱扵鄉方慎修而未已殆有得扵觀象名樓之表者乎是可書也故不辭而為之記若樓之規制與夫創造之費則在所可略云師稷軒記泰和澄江之南數里直周道之右其地名小棠州嚴氏世居之環嚴氏之居皆沃壤嵗収常特厚嚴氏之彦有名稼字景暢者隠居西岡之下西岡距故居良邇景暢嵗時督僮奴耕種希復外慕以給仰事俯育之需祭祀賔客之奉有餘積焉嘗軒西岡以為㳺息之所扁曰師稷用表其志且實其名也余従叔用昂與之有連景暢因以求記余惟后稷之故見扵經傳者可考矣葢其自能食時已有種殖之志及長當唐虞之際實為農師書紀帝舜申命之辭曰棄黎民阻飢汝后稷播時百穀此其職也至其後世子孫則従而追頌之曰思文后稷克配彼天立我烝民莫匪爾極由是觀之其功徳豈不盛哉景暢之志似矣然不得位無以見其及人之功顧名其軒曰師稷意豈以深耕易耨致穰穰之獲為師稷之實邪葢余聞之善學古人者當觀其所用心孟子曰稷思天下有飢者由已飢之也雖其居位任責義所當然而用心之厚葢可想見誠以稷為師將必推其有餘以補隣里鄉黨之乏惟力所及無務自肥則雖不必有稷之功而所存固無愧矣景暢積而能散其殆庶幾乎抑余又聞之古之善學者舉一隅則以三隅反詩云誕后稷之穡有相之道茀厥豐艸種之黄茂今夫人欲之私吾身之豐艸也天理之公吾身之嘉穀也師稷之茀豐艸反而得克已之善焉師稷之種黄茂反而得復禮之義焉扵以和身睦室有餘師矣稼穡云乎哉景暢勉旃夫天理不有諸身而已私紛見扵事則夫耕耨雖勤穀粟雖多殆難免乎齊景公吾得而食諸之慮矣景暢生衣冠之族閑詩禮之訓有孝弟之美其必能勉扵是哉軒之規制與夫向背之宜觀覽之勝吾不能悉亦有不必書者始因従叔之命申其義以復景暢俾置之壁間以自考焉聴松軒記松因風而有聲其為聲也或霏㣲清逺如暖蜂之喧寒泉之鳴或圓瑩舂容如金石之相宣咏歌之並作或洶湧震盪如山崩海倒猝難止遏又如鐡騎百萬相與交争扵原野而勝負未分其為狀也多端非善聴者莫能領其妙也世容有聰察之君子而往往牽扵多事則固無暇以聴其有暇以聴矣而物我或不相通入扵耳者雖頻感乎心者殊淺與夫未嘗聴者一而已矣我能山先生王公嘗以聴松名其㳺息之軒非有其暇而善聴焉者乎公世家餘姚城中龍泉山之隂屋後萬松成林朝暮四時風隨交而聲隨作小大異狀每變益竒是固有足聴者然公早嵗方従事扵問學求其所以自立者將以立乎斯人其扵聴松固末暇也既而擢廷魁入翰林累官至學士為天子近臣時則有論思諷議之責俄以侍郎佐禮部以太宰莅南都為天子大臣時則有賛襄寅亮之責去松逾逺又暇聴乎㑹賊瑾用事嗛公簡已公知而不顧竟致其事而歸乃作軒扵萬松之間而一寄其聴扵此自始致仕至今垂十年而聴之曽不厭也公果何取扵松也哉令子大鴻臚守仁嘗與欽順言公之聴松或怡然以適或悄然以憂或憮然而嘆門人弟子未有能窺識其意者願得一言以發之顧惟不敏其何能及此然素辱公愛粗知公平生出處大節請試忖度以言其適也毋乃霏㣲清逺之聲入焉而有助扵優㳺之休邪其憂也毋乃洶湧震盪之聲入焉而有激扵翻覆之變邪其嘆也毋乃圓瑩舂容之聲入焉而有憶扵明良之㑹邪是知聴松而一扵樂未為善聴松者公之所以異乎人者不在扵樂而在扵憂然而傾否之方致泰之䇿固公之所素有而大鴻臚得之扵面授者豈徒憂焉嘆焉而已哉公今夀臻七十詩云如松栢之茂無不爾或承惟軒外之松自有無窮之聲惟軒中主人亦必有無疆之夀以永無窮之聴此則欽順所為大鴻臚申祝者也遂書以為記節孝堂記成化丙午之秋吾鄉大疫死者或一家數人姻丈曾君汝厚有二子瑛璥數日間相繼死惟一孫曰旦方孱然君慟哭殆不可生曰吾老矣而天降茲酷罰吾將疇依壯者且不保是孱然者其又可恃邪時曰旦之母蕭氏年方二十有三乃乗間従容寛慰君曰瑛與叔大不幸至此然有新婦在翁幸無憂養老字孤新婦之責也新婦所不能終事而敢有二志者神明殛之君慨然雪涕而興曰新婦能然吾有望矣蕭自是屏絶膏沐避逺嫌疑恒獨處深閨勤紡績以助甘㫖日謹視其遺孤而隨事訓飭之孤稍長則遣従師學問葢于今二十年矣扵是曰旦既已成立娶婦生子君亦安蕭之養年踰七袠而精健不衰鄉人之賢者皆云蕭孺人秉節堅貞卒成其子又能孝養舅姑使忘其無子之戚以享有夀康雖旌典未可猝干然有善弗彰殆非鄉閭之義也㑹曰旦作堂數楹以奉孺人乃相與落其成而扁其楣曰節孝曰旦遂介其姻家余族兄欽師求記扵余余讀孟子書至人之所以異扵禽獸者㡬希未嘗不深思而永嘆也曰嗟乎天理之在人心者㣲矣一得失之間而為人為獸為君子為小人貴賤之相懸榮辱之相去奚啻千里世衰俗薄雖名為讀書之士往往陷溺其良心而不自知今孺人以一婦人女子乃能盡節扵其夫致孝扵其舅姑壼彛克修本心不失是豈獨賢扵憂之子之無裳者而已哉古昔盛時閨門之内必有師傅之教况乃刑于之化流自王宫是以女徳多貞風俗醇粹今去古益逺内教不修人欲横流莫能自制而深山長谷之中猶有知禮守義如孺人者人心天理固自有不可泯滅者歟我國家著令婦有守節不移年踰五十者有司以聞輒賜旌門之典孺人節甚著而年未及少需嵗月賢有司當在不遺今者掲扁髙堂葢諸君善善之誠惟恐不不速道固並行而不悖也余也非才猥以風教為職事有闗扵風化者采録表章固其分也矧曰旦之請圗所以光昭其母氏之大徳者甚惓惓乎故不辭而為之記孺人出吾邑寜溪名族近世徙居永源云慈節堂記慈節堂者族叔父用元奉母曾孺人之堂也堂以慈節名者何昭母氏之大徳以示其後人俾不忘也初元生踰月而其尊人秉厚府君棄背孺人年方二十有六即以育孤完節之死無他哭矢扵柩前葢于今三十有五年而孺人年六十矣元自呱呱而長以至扵成人至扵有室有子其學之所就又足以為章句師孺人所以保抱攜持匡娛誨誘匪朝伊夕實既厥心施及諸孫有隆無替茲其所以為慈方孺人之寡居也姻族間固難其守而孺人厲志特堅或以再醮諷之輒唾罵以絶竟全貞白以至扵今皎乎氷雪之明確乎金石之不渝也茲其所以為節夫母之慈其子妻之盡節扵其夫是皆天理之當然人心之所不容已而孺人獨能無愧焉者何哉生不皆厚教靡素閑情欲之感易流姑息之恩難割傷慈失節固其所也惟孺人性質淳懿志操之正固得扵天而又出自名宗以淄陽少尹宗翺公為之祖庠生時謹公為之父少司寇省軒公為之伯父所以薫漸扵禮教者復有素焉宜乎慈節之兼全既潔其身又成其子表表乎足以為閨門之楷範也夫以孺人之節如此考之國朝著令有司者宜以上請當得旌表門閭以為風俗勸顧政非其人不舉而元之力亦未足以遂其所欲為則姑即其實以名其堂庶幾奉揚休徳扵萬一而百世之下為子孫者仰而思之將莫不知夫一脈之傳綿綿不絶皆孺人之為賴也其為感慕庸有已乎元之用心扵是乎可謂孝矣肆凡族之老長咸嘉其舉而余亦樂為之記異時操史筆者其或有取焉記成扵正徳己巳十有一月八日葢孺人初度之辰也元三子欽封欽榜欽㑹臨清堂記吾邑澄江之南石牛山之北為上模里里中著姓惟曽與羅曽所居有上下村吾家居西岡下相去各半里許勢若鼎足石牛山為里之鎮比立多秀峰其南則岡巒重疊不可勝計谷中流泉數十道宛轉相㑹合為一谿遶山而出昔人扵其稍平處鑿渠引水西行以溉田其西有流泉一道來㑹遂别為一溪同為雙龍之水西溪又分為二其一縈帶兩村間再折而出扵下村之背以合乎東谿其一出上村之背直趨扵西岡小徑之水過之同流里許以與雙龍之水合又曲折北行四五里入扵馮嶺之江葢上模之山川形勝如此秀鍾靈萃故兩姓世不乏人若余内兄曽君民譽則下村之傑也君為故丹稜掌教敬所公季子早承家學學垂成而得貞疾遂不果出然其為人闓爽重倫理篤交際遇事能斷而務持大體宗族鄉黨莫不敬而愛之其所居舊廬嵗久而敝且隘乃益市旁近地命其子曰淳曰濟作室南向前堂後寢規制適宜而撤其舊廬更為重屋仍東向㑹余起廢復出過辭外舅西磐翁及君因達觀扵新構谿流繞砌清趣滿堂為之灑然樂而忘返也君遂出酒觴余雅歌投壺樂飲無算日且暮復導余循東廊轉而入一小閣閣乃跨溪之半俄明月東出水光益瑩聲益清景尤勝扵是洗盞更酌子姪輩吹笙鼔琴以侑之至夜分大醉乃已明旦且别余為君名其堂曰臨清已而君求得善書者大書以掲扵楣間人遂以為君號余一出不覺數載扵時無寸補旦夕俛仰風塵間殊不自慊每憶茲堂之勝未嘗不慨然思拂衣而往以數従君逰也兹辱君垂訪間謂余曰吾堂子名之甚善盍為我記之乎余惟江南固多山水臨流構室何所無之觀其氣潤軒忩光浮几席室則近乎清矣然而塵容俗狀奔走弗暇其人未必清也表襮可觀文雅為尚人則近乎清矣然而隂謀詭計展轉相尋其心未可清也君固未能無欲也而嚴扵自制則有以清其心亦未能遂無事也而善於自省則有以清其行夫如是而為茲堂之主時與嘉賔遺老従容觴咏觀山玩水以享其清樂不亦有足尚哉是可書也余安得不為之記惟其後人之嗣守茲堂者尚以清心寡欲為本或出或處必有稱焉以無負君之貽謀則亦無負扵山川之靈秀矣光樂堂記南京兵部郎中陳君達嘗與其弟進暹作堂四楹以奉二親起居㑹國慶覃恩用貤封例錫其父䝉菴先生烓誥命仍浙江按察司僉事致仕階朝列大夫母葉氏封宜人命詞有云益増門閥之光安享桑榆之樂識者因摘取光樂二字以名其堂縉紳大夫遂相與咏歌其事以為先生與宜人夀郎中得之甚喜重惟堂宜有記乃介其同官歐陽相周來屬筆扵余余聞陳氏世居閩之大義鄉家傳宦學入國朝則有若翰林侍讀叔剛湖廣按察副使叔紹皆先生伯父浙江左布政使煒其伯兄也先生登戊戌進士厯潮州推官南京貴州道監察御史廣東浙江僉事従子墀與達同登乙丑進士今同為郎中南京門閥之光有自來矣先生所厯官皆有治行其為御史嘗條陳八事為敬皇初政之助多見施行後因病乞休年方五十有二當道固留之不得益相與嗟嘆其賢歸則以行誼率鄉人以詩書教子姪以文字㑹諸名流而絶跡城府清風完節髙出一時亦惟宜人之賢式克相承其志爰及晩年而其子又顯所以増光門閥享樂桑榆信有如命詞所褒者宴息有堂落成伊始而楣間之扁遂得有所憑藉以定豈非陳氏一時之盛事也哉惟先生諸父兄作之扵前則既光矣然皆以賢勞卒扵其位未嘗有山林一日優㳺之樂諸子姪承之扵後則又光矣而鴻漸之翼勢將及扵萬里方憂勤職業之不暇尚何逸樂之敢言乎夫樂有未遂固不害其人之賢要自夫兼得者觀之則其為福也備而夫人皆有不可及之嘆此先生所以重為縉紳所尊仰而斯堂亦因以有聞扵世也歟先生今年夀六十有七宜人僅少其二詩云樂只君子遐不眉夀樂只君子徳音是茂所以對揚天子之休命以永斯堂之聞者其不在茲乎其不在兹乎永徳堂記堂在吾邑鳯岡里蕭天聰氏之所作也鳯岡之蕭為吾邑鉅族其先當宋南渡之際來自金陵迄今凡若干世其人之衆殆逾萬指自天聰髙曾而上雖未有顯者而率以詩書為業以行誼相惇表然鄉邑之望觀扵楊文貞公所為其族譜序槩可見矣序中所稱太學生信立是為天聰髙祖後官交趾中衛經厯以卒經衛之子孟震繼起徵辟厯教當塗武康掲陽三學掲陽之子仁育復起鄉科擢知江浦者九年治行尤著扵是蕭氏連三世以顯而此三君子者不惟飭躬修行無忝其先而已又皆有及人之徳焉天聰為江浦冢孫其父曰貴仁孝友克家而享年不永慶鍾其子妙齡秀發綽有猷為以羣従之繁而舊居之隘也乃増市旁近地别築室一區以居既成而名其中堂曰承徳其志良有在矣間來請文為記余家扵蕭氏累世契好吾兒琰復與天聰聫姻非余記之其誰宜夫人之所以生必有得乎帝降之衷不徒然也具之扵心則謂之徳性行之扵身則謂之徳行行有萬不同性則一而已矣自吾身而上以至吾之髙曾又上至扵厥初生民之祖由吾身而下以至吾之曾𤣥又下至扵不可勝窮之世孰不有此徳性已乎皆有此徳性固宜皆有此徳行而反道敗徳以詒父祖羞辱者不幸每有見焉此其故何也思則得之不思則不得也前有髙明之祖父令徳著聞雖在他人猶知所仰而為之子孫者或乃弗思弗率以流扵汚下之歸不亦可哀也哉聰乎吾知其免此矣觀其名堂之意其扵持身接物居常䖏變有不思率乃祖攸行者乎夫義重則利輕公勝則私滅所宜致思而力行者其要無出扵此誠使惟公是秉惟義是由則徳性無虧徳行以美而扵前人之徳信乎其能承矣天聰朂諸今既有以承乎前後寜不思所以承乎今者斯堂之作庶乎可以永存而不壊也堂之規制前㕔後寢皆備髙廣堅壯落成扵正徳已夘八月晦日後三年壬午六月朔日記成世徳堂記記曰先祖有善而弗知不明也知而弗傳不仁也夫所貴乎知而傳之者豈徒然哉必將惕然有所深思勉勉焉惟祗承之是務俾前人雖逺而其志趣之正扵我乎常存事為之美扵我乎常新聲以實延有隆無替斯其可以為明矣斯其可以為仁矣為人子孫之責斯無負矣茍其行之弗力而徒以為談美用誇詡扵人人人雖羨之亦或疵之曰而祖而父信乎有是善矣而何為獨不然夫如是與夫弗知弗傳者有以異乎否也豈惟無異將不反為之玷乎余姻家鄭君宗堯嘗作堂以居名以世徳而請記扵余君之所以為明且仁者其有在矣鄭氏世居吾邑之大瑞里系出宋端明學士忠穆公㲄在國朝有中進士舉官省郎者衣纓門第蔚為鄉邑之望吾家既與之世好而凡出入城府必經其門余葢嘗屢造焉因以多識其父兄子弟觀其重倫理循矩矱惇本而務實心之好之自不容已而通經學古者亦累累有人氣習之薫漸風聲之流衍殆非一朝一夕之故其世徳之可徵者不有在扵是乎余又聞君八世祖叔文嘗以凶年設羮飯扵通衢往來饑餓者皆取足而去髙祖英可嘗割田若干畆與殊山院僧協建里之雲津橋人免厲掲復立一亭扵橋左風雨倉卒獲所庇焉久之江漲橋毁君之先子廷器復倡率羣従買田造舟以嗣其功仁厚之存有徵扵行事者後先相望其他善葢不止此而鄉人所頌必此為先宜乎君之不能忘也君早克自樹内修孝友之行外適應酬之宜潤屋之餘尤喜兼濟纓冠束帶身以義榮可謂無忝其世者矣顧茲華扁寜不為君子之所取乎令子賢孫耳濡目染誠率由其訓法而靡或怠斯堂之著聞扵時將必有永矣余長男琰壻扵鄭辱君之愛為多乗間輒以記請知君之惓惓扵所重也扵是乎書斯菴記斯菴者處士郭君本川之別號也君季弟善化尹本寛與故鄖西學諭徐君廣威及余皆同年領鄉薦余二人者嘗因善化以識君其號葢學諭所為君標者近余家居侍飬君復因其女兄之夫余族祖勲翁求余一言以繹其義余謂君字川而號曰斯菴殆取夫子川上語也夫子川上之語其義至精至大至為難言程子嘗云自漢以來儒者皆不識此義顧余之淺陋其敢輕置喙乎謹辭扵翁辭至再至三卒不獲命乃試為之言曰人之見止扵目之所及目所不及固一無所見也見其所見而遺其所不見欲驟語夫逝者如斯之妙何以異扵兒童之觀指邪自有天地以來至扵今不知幾千萬年矣其間氣運之盛衰人物之消息不知其㡬千萬變矣然自今觀之固無異扵古也自後來者觀之寜有異扵今邪今無異扵古後來者無異扵今是萬古同一川也萬古同一川稍有識者或知之矣亦有知其所以然者乎故曰萬物並育而不相害道並行而不相悖小徳川流大徳敦化此天地之所以為大也雖然天地之大吾心盡之矣隠㣲之間一或不謹此滔滔者必為之壅遏而不得遂其自然之勢有不横潰四出以極扵滔天者哉夫子川上之語大要如是窮深極㣲雖終日言之不能盡也惟君二難競爽其所友又多時賢談論之優柔切磋之縝宻殆將了然扵斯義而無疑矣余言如此不知亦有合乎否邪族祖為余言君晩年踐履益篤表儀家庭為鄉人所信重僉曰郭氏前聞人有徴士子益寜晉尹士昭大行人興文光明卓越今如斯菴善化兄弟可謂無忝噫君其果有得扵川上之語而知所従事者歟果然則余言之有合也可必幸置諸壁間而時覽觀以自輔斯斯菴也將有聞矣介菴記菴以介名示堅所守也人必堅所守然後能有所立不然則將隨風而靡逐波而流此小人之所甘心而非君子之所以自待者也君子義之與比不茍比乎人是故人皆然而已獨不然義不得而然也人皆不然而已獨然義不得不然也超然孤騫挺然特立夫豈求異乎人云哉堅吾所守而已矣易曰介于石不如石其能自立扵天地間哉余姻家劉君述倫嘗名其宴息之所曰介菴君子莫不嘉其志夷考其行知其可以進扵此無疑也葢君性剛而辭厲奉身約取予明事孀母鄒能順適其心意守先業以不墜積勤久之且𢎞于厥初家累衣纓有聲勢可凴居如無有而維綱所繫振飭必先所與交㳺必賢扵已者與同扵已者扵流俗未嘗有所茍合也其為人如此可不謂之介乎顧其所以名菴之意則固非曰能之也葢將益堅其所守而勉乎其所未至以卒同乎君子之歸焉然古之君子其介可及也介而未始不通通而未始不介是則不可及也此其精義之至夫豈一朝一夕之功哉推君之志則其所以自勉者宜乎日有孳孳而不知夫老之將至也君兹夀登六袠年髙而行益尊往尊其名者今則倂尊其字不敢舉因即菴名以為君號君季子邑庠生宏余子壻也與其伯氏彦仲氏能來請余文以記之余聞孔子之稱子賤魯無君子者斯焉取斯劉君萬安横街為大族百十年來若大司寇公與其子方伯公相繼以功業顯其始終大節可仰可敬若今光禄少卿咸卓監察御史咸栗則余幸皆獲従之㳺少卿之慎宻察御之清苦余毎愧扵不能齊也而其隠者若君與其従兄述傳又皆以孤子奮立卓然能為鄉族有無葢其累世之間君子之澤漸涵浸漬逺且深矣由是推之將君之子若孫必皆慎守家法以圗無忝所以貽介菴之令名扵無已者其不又有在乎遂不辭而為之記如此以復宏兄弟之請且以為君夀彦能皆克肖宏方讀書求志余固以逺大期云潜菴記潜菴者里姻楊君顯猷之别號也其嗣子榮進以余雅知君嘗請文以為記余諾焉而未暇為比謁告家居余甥榮蕃又屢為之申請因念親交之厚始終如一有如君者鮮矣雖倦扵述作然心之所好亦何愛扵言乎夫潜之為言以退藏静宻為義易著潜龍之象人之所處有然者矣書列沈潜之目人之所性有然者矣傳示潜心之訓人之所習又有當然者矣君承世業之腴無兄弟之助公私之責萃扵一身勢不容有他慕其所居之地名為髙隴負山而帶水陂潭深廣竹樹森蔚應酬多暇可釣可逰亦無俟扵外求而自有可樂者潜菴之所以號其不以此也夫然余觀君之為人収斂之意多而進趨之意少迫之而後應擬之而後言其受性扵天不謂之沈潜不可事父母色愉容婉處宗族每怡怡然隆禮意以親賢割腴田以追逺損利入以恵貧義所當為曽無難色其又能潜心扵君子之道矣乎不然何其行之美也然則潜菴之號其誰曰不宜匪惟親戚交舊宜之邑大夫蘭谿陸汝享號為嚴明具知閭里人品髙下嘗稱之扵衆曰若楊顯猷可謂善人已其里族或有争訟輒以付之俾司其平君能得此于賢大夫非所謂在家必聞者乎夫善善者天下之公余是以樂為之書葢與夫阿其所好者異矣雖然凡人之沈静者多夀君今茲年甫六十將來所至何可量也誠使心徳彌固光輝日新則潜菴之名殆將有聞扵永逺雖㣲余記夫疇得而掩之哉君之先君子巖築公徳器雍容甚為家父封君所重君之賢要為有本榮進讀書知律積勞公府拜官有日又將發君之所藴矣因併書之閑齋記齋以閑名志希聖也聖誠而已矣吾之得扵天者未嘗不與聖人同也反之身而顧有未誠焉非以邪之為累邪然則安可不致夫閑之之功邪既閑誠斯存矣是故喜怒哀樂有心則有之視聴言動有身則有之方其受命扵天之初固已皆有當然不易之則渾然實理之充足無假扵外求也奈何百體既具衆欲滋生心有蔽而常偏行無檢而日繆由是離真而即妄以人而滅天而其違聖人也或㡬扵霄壤矣葢邪之為累如此不有以閑之可乎夫閑闌也所以止物之出入者也是故私意萌扵内必嚴以防之使其無間可出可欲之物引扵外必嚴以禦之使其無間可入毖其大無忽其小慎扵始無懈扵終主宰日益精明則羣邪自當逺退渾然實理之在我者斯無失乎受命之初而凡視聴言動之形喜怒哀樂之發其有弗當焉者鮮矣其視聖人不待閑之而自無不閑不待存之而自無不存雖非所可驟及要其為道豈有二哉雖然言之非艱而閑之惟艱也在昔孔門諸賢孰不以聖人為的而學之得其道者顔氏子之外不多見焉觀其四勿之語奉以終身以至扵怒之不遷過之不貳此則閑邪存誠之明騐也然非其燭㡬之明決㡬之健何以及此故欲従事扵閑邪者窮理必精而制行必果庶㡬明與健之兼至以克充其志哉余友弋陽汪君器之天分甚髙求道尤敏其智既足以及之矣方日思所以守之乃以閑名其讀書之齋以識其所有事以余嘗共講乎斯學也屬為記之惟君學識才猷著聞天下今官為宗伯之貳葢已蔚然負經綸康濟之望矣齋名甚美誠朝夕顧諟而每加之意焉將其徳業所就庸可量乎余與君同起鄉科又與君叔兄石潭少宰同登進士兩京聚處猶兄弟然晩以論學之同相與彌厚斯齋之記竊不勝其愛助之誠君其必有取也胡氏重建祀先堂記𢎞治甲子春三月吾邑西平胡氏重建祀先堂成堂四楹間其廣三尋有半深僅三尋崇頗殺之堂後為寢室二楹以奠神主其廣二尋深則倍之堂之前有廊東西有廡東廡之南庖厨在焉西廡之南為庫以藏祭器其良材堅甓之用梓匠塗塈之工費凡二百餘金宏偉髙明加扵舊數倍先是其族之顯者鎮江通判學固君患舊堂之敝且隘上無以妥祖考之神靈下無以容子孫之拜起謀欲改作首輟俸金五十倡焉顧其役良大莫適為主乃有賢者曰端威君慨然身任厥成遂簡閱族人均其力之厚薄自勝冠以上各以率出金合之又百五十端威君乃與一二子弟能者従事區畫程督莫不有方夙夜惟勤殆忘寢食役雖大而成之若易易然協心故也余忝胡氏甥壻聞之良喜葢素仰其先徳之美扵是益徵其慶澤之長比年侍親里居端威君乃與通判之弟學榮偕來請記厥成以垂示久逺余不得辭也竊惟古禮之幸存扵今纔百十之一二其涉扵形器者雖可槩舉至扵精㣲之深意知之明而處之當為難姑以祭禮言之如伊川程先生所行則嵗周扵逺祖如晦菴朱先生所定惟時舉扵近代二先生皆命世之才禮學之宗而其所處乃不同如此有志扵禮者可不審乎今吾鄉大族往往皆有祠堂祭禮之行各有所受葢周及扵逺祖者近代之祭頗略而不専致隆扵近代者逺祖之祭或廢而不舉揆諸人情皆未安也夫合族以居昭穆素辨生同出扵一本心同萃扵一堂則自始祖而下嵗事之修宜有不容缺者其自禰而上以至髙祖則當各隨所繼而扵時祭每致謹焉庶㡬逺近有倫恩義兼盡雖不能盡合扵古亦當無大謬已然區區之見未嘗就正扵有道今通判君方致鎮江之事進階奉訓大夫以歸其族人又多讀書知禮幸相與參酌余言而審處其當使禮之行而鄉人頌焉曰胡氏祀先不茍如此則豈不有以增斯堂輪奐之美而垂永世之規哉是為記清塘陸氏始遷祖祠堂記髙要陸先生汝為既謝靈璧教事而歸率其族人創建祠堂以祠其始遷之祖文鎮府君葢以義起者也陸氏世居其邑之大路里宋季之亂府君始避地來清塘依其外家鄧氏闢土作室以居有子三人子有子美子平亂甫定孟季各徙居他所已而皆乏後居清塘者惟仲氏厯年久而族益蕃府君之墓在大路里之蛇洲岡其存時嘗籍腴田二百四十餘畆屬諸墓俾嵗収其租入以供祭掃其子孫相與世守之至今嵗一修墓祭以為常初未有議及祠堂者先生謂禮嚴報本有如府君功徳子孫葢百世賴之祭之其可不以禮家無祠而祭扵墓如禮何私謀扵族議以克合而祠堂乃扵是乎建焉實𢎞治辛酉冬也堂六楹間有門有序其制髙敞宏深既成復相與定議嵗以清明前一日當執祠事者夙往謁墓剪荆棘祠后土而歸明日乃奉牲醴就堂中行事族有大事則亦扵此而祭告焉昭穆有倫賔賛有位獻酬有度登降有容補前人之所未及為貽後人之所不敢廢斯祠之建誠可謂合扵義矣先生欲記其本末以示久逺以欽順嘗有科場之舊乃逺致書幣俾其従弟太學生制來屬筆焉顧雖不文而誼弗獲辭也惟府君當流離屯厄之時乃能開子孫百世之業其功徳之所被者逺則其永享子孫之祭也禮亦宜之然祭必扵祠堂乃為得禮之正自非先生以明識為之倡族人以順徳賛其成又何以及此此其所以為可書也詩云無念爾祖聿修厥徳凡為府君之後𦙍者尚亦加之意焉誠有以薦其馨香必將昭受夫明賜其感應流通之妙葢不出乎日用之間豈必祭之日而後受其福哉先生儻以斯言為然請刻諸石而立之祠下以為記泰和山東王氏祠堂記禮之行扵家者惟祭為重所以報本而追逺也此人道之大端孝子慈孫之至情也去古雖逺遺經尚存制度儀文猶有可考而因陋就簡其來已非一日雖貴極卿相有家廟者亦云鮮矣知禮之君子葢深病之扵是乎祠堂之制起焉其為制也葢參酌古今之宜而通乎上下者也是故家有祠堂則神主有所藏人心有所繫昭穆有序尊親並隆仁讓之興未必不由乎此其有禆扵風化豈小哉吾邑故家稱山東王氏其先世居仁善鄉之鯉湖巷鯉湖則遷自吉水帶原譜牒可徵也至益齋先生當宋淳祐中以明經辟為邑學司訓嘗經由山東樂其風土始命其季子季可卜里之下洲徙而居之季可四子和甫信甫文甫末甫信甫文甫乂分居上洲相去僅里許迄今年垂三百生齒之蕃衍資産之豐碩文物之敷賁談者尚之下洲舊有祠堂厯年滋久親盡服窮而祠益廢扵是其族之彦履文履邠履邼秉鍛秉衍秉順聚族謀曰木有本水有源惟益齋府君吾闔族數千百指所従出也其可忽忘必祠而事之報本之義庶乎其少盡耳衆皆響應乃市良材鳩善工卜嘉靖戊子仲冬之吉即遺址作前堂四楹後堂二楹外為大門表以綽楔深廣悉仍其舊後堂以藏主前堂以陳爼豆嵗以清明日有事扵益齋府君季子及四孫配焉禮也其四代之祭日皆更卜去祠堂逺者則扵正寢禮制既協而情意亦周若諸君者謂非王氏之孝子慈孫可乎履邼秉順俱邑庠生而余知履邼最久茲館授余家因與履文輩來請祠記余既嘉其所舉合義又嘉其羣従温雅端厚有足徵其世徳者遂不辭而為之書然嘗聞之詩有永言孝思之訓凡為王氏之後人者尚相與飭躬砥行篤志問學益圗所以光大之道斯為孝之至也記成因是以申勸焉整菴存稿卷二
