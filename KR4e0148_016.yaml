body:
  text: 整菴存稿卷十六明羅欽順撰五言古詩三十一首七言古詩一十二首五言律詩五十一首分題得含春亭送李惟誠大參之陜西終南不改色清渭仍東流春花幾開落亭址餘荒丘城頭北斗低明月滿高樓金蓮無消息長夜風颼颼憶昔貞觀初廟堂多俊遊從容奉清問高步登瀛洲王道何坦蕩致理侔殷周嗟嗟令狐子得君無與儔云胡延英奏背汗沾重裘形迹一以拘肝膽何由投大夫中朝彥攬轡澄西州勝迹應遍覽兹亭無久留永懷明艮會夙夕𢎞嘉猷休聲諒自致允矣垂千秋送大宗伯王公入朝束髮事明主久矣勤疏附息偃且南都雍容奉王度功成期月間四曹靡留務持此贊熙哉皇心副傾注午棹龍江津昏鐘廣陵渡望望春明門靡靡朝天路旭日繞龍鱗仙班簉鵷鷺乃眷世臣良三接隆恩遇庶𢎞造膝規允慰儒紳慕送太宰林公入朝暄陽舒萬彚花葉光薿薿燕餞屬芳辰衣冠紛萃止初筵顒有孚既醉胥燕喜瀟灑瀛洲仙雍容尚書履萬里逺朝天初發龍江涘簫鼓喧中流鳬鷖滿新水仳離誰不懷余心特殊此自古經濟資清光恆密邇為謝以中題山水扇面花柳塞川谷不知山淺深茅亭面流水蘭若依喬林上有白雲飛迢迢巖壑隂下有清泉鳴泠泠鐘磬音扁舟來何許漁父遙追尋握手一長嘯悠然千古心此中有真樂安得投華簪願從賢公子高步閬風岑自勵昔聞爨下桐乃充伯喈琴知音茍不作山水徒高深平生守章句中嵗勤溫尋新知能幾何淘沙初見金聖賢諒非逺萬里行自今精誠神所相無虞力難任以兹恆夙夜聊欲忘華簪其二峩峩數仞牆百官紛濟濟眇兹牆外軀所見諒無幾高門日夜闢欲入誰余柅奈何迷不思竄身荆棘裏其三紫陽基下學象山明自然支離與徑捷彼此嘗交鐫百年公論定畢竟誰為偏昔聞昌黎語軻死失其傳皇極久不建西教擅吾權投人劇妖冶落網無愚賢孰辨真頑空拘肆成癡顛良心一以溺作聖何由緣二程開興運勠力掃腥羶涵養須用敬致知學攸先神功合內外彞訓肅昭宣誰哉樂易簡徑欲遺陳編自然豈不貴無乃流於禪孤風邈難嗣缺月淡寒川近來白沙老應執九原鞭緬思原泉句今昔幾尼淵寧知下學功是水可澄鮮為歐陽牧之題竹二首深根便東引挺出懸崕畔東風翼新梢勢欲凌霄漢惟應具眼人不作尋常看此君吾所愛一見心神融由來律吕聲出自空洞中嵗寒凜無恙葉葉皆清風東窗為曽如周賦栽竹已滿林滋蘭欲盈畹愛此東窗幽不換金門顯明月透輕紗高枕便息偃遙山上紅日四壁晴光烜庭間燕雀馴境靜輪蹄逺春風和且柔芳草齊如剪舉世慕登仙金丹期九轉却恐金丹成蓬萊水清淺何似窗中人世纍漸消遣瑤琴時一弄尊酒自洗腆我居枕西岡有軒亦東展雖勤待旦心夢見周公鮮北望多浮雲南觀疊層巘嘯傲得此生兹言庶同踐愼軒為蕭蒙紳賦開軒面南山山光浮几褥高人時往來幽花晚芬馥雖餘潤屋資不作守錢俗理學二三編自抄還自讀因思兩大賢皆云愼其獨爰以愼名軒大書常在目從知一念微終若秋陽暴毫髮分公私天淵異榮辱兢兢如捧盈洞洞如執玉敢萌機變心況舉橫行足芳譽藹當年清風振喬木允副交遊期亦萃家庭福柱史明知人其言固可覆何時一樽酒為子歌淇澳次韻同年鄭憲長舟行書事藥裹正關心凝塵滿瑤瑟忽枉故人書頓愈無妄疾長篇屢沈吟首得防尾失風波固云惡髙天自行日那知洶湧時不有龜龍出吾命乃在天顛頓亦奚恤侃侃開笑談底柱屹中立雖然西江水未容一日吸顧此濟川舟何方不可適終風徒爾為行雲靡留迹大哉天壤間自生還自息此意當誰知吾目為君拭君吾榜中英常情詎能測激揚肅官針鑽仰希聖域變化隂且陽居然守無極應悲行險徒終年長戚戚挽興化陸子賢舉人平生春秋學字字經推尋躍如果何物昭哉素王心興賢詔屢下叢棘圍冠襟文章豈不美誰辨沙中金俯首充嵗賦逺韻無悲吟瑤京日華紫璧水春流深仰止瓊臺翁一旦逢知音驊騮鳴向樂萬馬立皆瘖價增終有合天定詎難諶光華京兆榜魁名動儒林庶幾日千里如何中陸沈凄涼淮海畔風物莽蕭森浮生孰為久大節人所欽庭闈懷婉婉襟度想愔愔遺勞析薪在負荷諸孤任顯揚會有日鼎薦宜居歆旻天多雨露楸梧鬱繁隂懷賢良自苦悵望空遙岑豐生坊初冠皎皎珊瑚枝凝輝玉堂戺一見已知竒再見益堪喜少小攻文章明窗無虛晷兹辰突而辨居然異童子古禮不多存存者何常已三加威儀備所重成人爾成人必有德忠信以為址簣簣靡停功峩峩見崇峙家聲四百年鵬程九萬里尋常得失間何足挂唇齒昔賢懷一飯况乃言之旨祝子非他人甌濵天下士悼亡女東風射窗急窗紙摵摵鳴疇昔窗中居一去不聞聲展轉夜過半攬衣步前楹寧知治縷夕正此月華明耳目不堪觸更堪憶平生十年一夢短傷哉父子情周身舊裙布猶如新製成奈何修潔姿大命偏早傾花綴故枝紅草回隔年青婉孌無復見痛恨何時平古軒為程處士賦末世爭外鶩彌巧彌喪真孰知深山中乃有葛天民含淳而抱朴沈晦以自珍奉身一裘葛養母兼鼎茵連枝無異爨比屋有分囷百金能一擲趨義勇過人高亭既還舊小軒亦開新山凝太古色水泛桃花春紅塵何由到鷗鳥長相親春秋鄉飲酒雍容見嘉賔彭郡博先生蒲萄為王斯逺冬官題二首彭師樗散日余及升其堂堂前蒲萄架架下筆滿牀乘興一揮灑枝葉互低昻明珠來照眼宛若中心藏誰能寶此幅瀟灑冬官郎馬乳西北來分甘到吳越畫圖不根著妙在三兩折修蔓引清風逺影含初月倣佛驪龍騰頷下光明滅釀酒縱盈缸涼州吾不屑送少宗伯楊先生考滿赴京堂堂建安公四朝藹嘉績公姓何振振振振豈天錫淵源良有開才華況無敵一舉凌天衢未脫劬書癖藻鑒清秋懸全牛片時析幾微慎周防中外屢揚厯留都禮樂存遺文賴參繹聲色初不煩神人乃胥懌兹當述職期涼風滿襟掖離亭一杯酒永懷自今夕臺省須仁賢如聞有虛席文斾倘重來慰我長親炙守拙為丹陽賀環賦飢餐高原粟渴飲下泉水菽粟水火如時時散鄰里公家别有輸為義良亦偉峩峩烏紗帽見者胥仰止三徑以藏身一經以教子有子復何憂萬事渠能理遊心濂溪賦真可沒吾齒袖手公輸傍無由血吾指名途多疾足利路罕徐軌獨倚一株看勞勞竟誰使九日陪吳白樓陳葦川王陽明汪雙溪登蔣山得依字佳辰不可負文會何當稀聊攜一壺酒相與登翠微園陵鬱佳氣古廟豁重扉隂雲坐來斂草露亦已晞遊目極千里涼風正吹衣翩翩南來鴈遠避風霜威南土人尚餒何由爾皆肥長林移晚席澄湖凝夕暉同為醉鄉客各詠新篇歸天運靡留處人事多乖違真樂在三益所願長相依封淑人卞氏挽章樛木隂正繁采蘋人已逺空餘桃李花不辨春深淺憶昔菟裘成君子懸輿返久勞欣共逸相對日三飯雜佩出房清朱絃送聲緩每憐尊酒深未覺年華晚兒女情所鍾垂老尤繾綣死喪忽相繼肝腸成寸斷一疾遂不支百年何曽滿皓首失同心老淚盈雙眼翩翩丹旐揚望望牛眠坂慘淡悲風生凄涼蒿里挽玄堂閟周翣貞石蟠秦篆冠帔不俱藏春秋時一展貞母詠朝讀貞母傳夕吟貞母詩母壽今八旬芳名千載垂昔歸君子室心德兩相宜執手奉承説黃髮以為期烹鳬酌美酒從容理朱絲清音正盈耳桃華猶滿枝溘乘埃風去棄我真若遺哀來無晝夜晝哭聲轉悲逝將從君往重結深長思有身嗟未判辛苦安得辭繼體心所切懸弧事竟竒深閨寒復暑長養實勤斯聰明自天錫教誨亦不遲居然富文學下筆驚主司名題黃金榜班簉白玉墀爵位既頻陟恩封遂屢貤尊榮傾邑里光彩煥門楣盛德固有報始望那及兹彼哉鬚眉具長佩紛陸離當幾靡定力王業何由熙人間有貞母豈得無男兒貞母宜萬壽非獨閨門師持節瞻雲圖為符臺劉克柔賦馬首太行北孤雲渺江東忡忡劉子心炯炯如狄公大江日夜流雲舒還復卷王事有程期遊子安得返何時拜家慶春酒碧於油坐令回首處變作綵雲浮歸裝不自由圖畫先春就稽首附征鴻封君千萬壽悼內四首牆頭桃李花牆下多芳草忽忽又逢春春光空復好食案頓蕭條塵衣日顛倒嗟我同心人云胡不偕老其二春深風已和入户但凄凄逝水無復返德音終不迷去年雙飛燕又入梁間棲我心非金石能不增慘悽其三五十不為天勤勞嗟未償我官已臺省君猶布衣裳平生薄自奉所願名節芳相我僅三紀茍得非所臧百年庶無悔庶幾同樂康俯仰忽不見此恨何時忘其四養老非無人鸞刀手親把教子亦有師辭色無少假吾父壽而康惜爾得年寡吾兒儻能立庶以慰泉下次兒珝祇投赴京作五言古詩一篇送之以致丁寧告戒之意嚴親頃辭世仰蒙恩典優榮光懸日月感激無時休寸忱思亟展祇謝當龍樓奈此多病撓彌增曠禮憂服勞吾兒事欣然買扁舟束裝戒明發春江正瀏瀏勇往誠足慰離緒紛難收夜堂明燭短教戒胡能周呼童展長卷為汝書紳謀直詞無潤色情致加綢繆敬身第一義三益資交遊亦既辨菽麥寧當昧薰蕕出門路如砥非義將安由茶肆與酒市一迹不可投神明扶正直人道惡輕浮參倚必有見洪閘皆安流薰風御堤柳鶯聲滿皇州金門僂傴入進止宜詳諏故人多臺省往見亦奚求所貴親德範庶或聆嘉猷旬浹事當竟有闕勤增修白雲試回首歸興誰能留蓬窗多暇日還肯惜之不知新在溫故中弸外乃彪阿蒙三日别議論驚同儔兹行將驗汝刮目期清秋季弟允恕家居十有五年幾若與世相忘者兹再被召命長銀臺無復可辭之意於其行也賦得五言古詩一篇送之山林閴人迹抱此幽獨姿幸有同氣良出入相攜持春風花下酌秋巘雲間欙論文或竟夕次第分醇疵外物復何有真樂良在兹悠然天壤間百嵗以為期今也志尤偉間居亦孜孜積書早充棟博覽仍精思上下數千載厯厯如見之庶幾經濟業豈曰華藻為憶昔嘗在服頗受先皇知金門敷奏下退食每委蛇歸省得寬告養疴竟棲遲手栽西墅梅結實已纍纍大來新萬象求舊靡遐遺圭璋敢自擬特達蒙恩私趨命理宜急圖報今其時畫船雙桂棹宛在澄江湄君當别我去我老將安資相送不能逺夢寐還相追微霜清逺驛到處堪題詩殷勤寄魚鴈以慰長渴飢同諸士大夫議鄉約于龍福寺約成賦詩分韻得君字禪扃豁清晝深虛隔塵氛雨餘山翠入林靜鳥聲聞嘉賔何濟濟跋涉良已勤非貪涅槃趣思整時俗棼此意誠懇懇誰謂徒云云坐中三大耋郭東山八十三尹南山八十二曽石壁八十一笑語芝蘭薰羣英亦駢列意氣凌青雲道同聲自應彼此曾何分揮毫已具草命酌還論文長年懷契濶兹會餘清芬清芬諒無已即事期收勳庶幾萬分一持以報吾君七言古詩送張黃門經載使雲貴峥嶸雙闕中霄起諫垣近在紅雲裏元氣潛隨北斗移龍司出內虞廷理地分清切須英豪遐想虞廷夢亦勞簪纓於我誠何有却恐言髙位不髙同年磊落張經載封事頻投心欲憊𢎞恭惻目憚更生潞公斂袵欽唐介世道明須我輩扶當機緣底太模糊輕裘駿馬長安道合有人間大丈夫如君夙夜宜青瑣春風忽泛湖南舸黯薄淮陽計不疏褒求金馬謀全左也知今日重安邊邊務惟應足食先要令萬竈貔貅飽須杜千倉雀鼠穿青袍拂曙辭金殿出門步步頻留戀已料先聲動五溪即看行色搖芳甸日暖官河柳絮飛清尊欲盡思依依往來萬里多聞見奏草能令在外稀味梅為無錫錢世節題寒風吹開白玉瓣暖風吹出黃金彈入羮味美萬口知伊誰得味初花時錫山居士腴能稿前身莫是西湖老已愛撑簷獨樹竒還欣照水斜枝好嵗嵗花開雪滿天美人綽約當瓊筵仙姿共出塵埃表素質相忘太古前此中真味人稀會花間不惜朝朝醉劉毅空稱一代豪等間鵝炙為心纍慶楊光祿尊君太守公八十壽隨車兩足懸車早間中閲世渾難老見説人歌召伯棠還聞食有安期棗瑞星一點弧南明高堂簫鼓慶長生嵗律又更新甲子神仙何必定蓬瀛黃梅雨歇薰風度緑槐隂裏華筵鋪珍饌兼炮玉面貍角觥滿挹金莖露燕子飛飛清晝長沈煙靄靄笑談香座擁賔朋盡沾醉舞回綵繡紛成行二郎久曳朝天履承恩暫許供􅎵瀡百年盛福陳省華一代清名楊伯起心事優優身轉輕世間寵辱那能驚未嫌白髮三千丈應看黃河幾度清送少司徒鄭公進尚書致仕還閩分韻得水字早年獻䇿明天子筆底珠璣爛盈紙便隨羣彥集瀛洲還以三長參國史綵鳳聊依垣竹鳴白駒不為場苗止坐慙薄技奉周旋歸把遺經究終始甕牖前頭翠色多棹歌聲外清流駛李渤方懷少室居謝安又向東山起三秋憲節凜氷霜六館春風散桃李已覺憂勤髮漸疏未論冷熱官頻徙分務功髙計省堂賜歸恩重尚書履出處孤蹤自不羣卷舒妙道誰能揆巢父真成一段竒仲翁寧擅西都美請看龍江出祖時送行車馬如流水梧岡三瑞圖為曽主善姑夫題三鳳來何處飛止梧岡樹岡上梧桐幾百年老枝新葉含春煙煙消日出天萬里三鳳和鳴清俗耳虞廷文彩何爛然岐山遺響傳周史靈物由來瑞太平絶似曽家三弟兄亞卿邁種臯陶德兩教都傳伏氏經就中國教才尤敏七步成章思無窘百鳥喧啾徒爾為豈知靈物殊凡蠢梧桐依舊凌霄髙枝上來來多鳯毛養成羽翮拚飛去隨時隱見疇能嘲望廬山千里廬山一片石元氣為根倚天立月色霄澄白鹿寒露華曉霽香爐濕左瞰長江右枕湖近分衆皺逺模糊未容絶頂通人迹長向晴空展畫圖誰能共我尋瑶草幽泉怪石窮探討儻遇仙翁跨鶴來長生祕訣應傾倒凡骨支離無奈何徒勞翹首望嵯峨此行儻遂區區志須借蒼崕百丈磨學古樓歌屈指今年四十五一事無成心獨苦北斗那得挹酒漿東風正好親農圃家住西岡地頗幽門前屋後多平疇一溪流水去無路四面青山來入樓樓名學古浪標榜古人實學今誰講旦旦趨庭奉起居時時靜坐聊存養此心存久還自靈中和無物如有形幾微極處通天地呼吸之間具典刑平生謾抱區區志途長力薄愁難致荏苒如今作棄材悠悠宇宙非吾事學成假使遂行之要見黎民飽暖時可能學古樓中坐妻子啼號付不知以兹農圃端須學黃牯價平添一腳且種山田且讀書菜羮滿釡渾家樂梅鶴舊圖敬賦長歌為大人封君萬壽之獻羅浮山畔娟娟月照見寒梅一株發老鶴長年此託棲氣骨風神兩超越生綃半幅誰寫真兒今把玩偏能頻眼前猶自有竒物天下豈得無仙人仙人人道吾翁是未論服食論標致清白孤高壽且康秖應梅鶴差堪譬久大堂中春酒深醉酲坡夢與逋吟直將甲子循環數那許塵埃半點侵此去羅浮幾千里望望白雲猶尺咫浮暗之香喜達天鳴隂之和慚為子兹圖絶宜張壽筵拜授使者籤軸全宜羮三實憑長養南飛一曲永流傳芙蓉書舍為大司成甌濵先生賦甌濵先生讀書處先秋曽見芙蓉花時來早作青雲客舊遊回首天之涯天之涯海之角書舍新成制純朴扁揭芙蓉貴有徴芙蓉幾度開還落嵗嵗開花直待秋紅霞百丈媚寒流向來底事開偏早王氣呈祥不自由鄉闈一舉膺高薦臚傳及第人人羡花有知無未可知至今盛事傳鄉縣先生自是讀書人微言次第歸經綸功成合有還鄉日好持杯酒酹花神花神得酒應增王書香繼繼誰能量但遇先秋一朵開門前凖備車千輛為楊顯祖題畫送尹别駕實大之嘉興澄江夜來秋水生畫船擊鼓喧朝晴百壺欲盡千峰午壯懷秋色兩崢嶸相門舊壓逢原里至今書屋臨江水千載香名滿縉紳讀書有用真能子歸來遍掃松楸隂飯嘗新稻羮香簟故園風物豈不美簡書王事悲人心故人自昔深相慕别意殷勤托毫素楚水吳山路幾千渚蘋岸蓼花無數東南名郡數嘉禾城郭光涵震澤波官好常陪五馬貴政通應得萬人和浮雲富貴終何有汗簡功名渾不朽贈乏千金謾一言論心何日重攜手楊氏姊七十壽歌春來無處無芳草何處春光應更好喬木啼鶯日正暄華堂戲綵人難老早向深閨足苦心蠶繅布縷又金針夭桃已協周南咏慈竹仍涵晚嵗隂澗蘋采得還親芼天岡幾為思親到長子提孫孝不衰壽康宜獲天之報即今七帙顔猶童香風坐滿芝蘭叢白頭老弟逢生日長歌徑過東山東五人同産三人在誰能不念平生愛有分歡娛合共追無情嵗月從渠邁舊路重尋了不差入門絃管競嘔啞殷勤一酌長生酒看取蟠桃幾度花晴山摉書舍為廖太守賦蔣生徑裏足清隂陶翁籬落皆黃金晴山先生書滿屋亦有花竹清人心棟雲飛盡日杲杲玉華峩峩插晴昊境靜應無俗客來詩成自把芳樽倒有時尋壑復經丘厯厯平生舊釣遊春風高樹啼黃鳥秋水方塘泛白鷗真樂由來無內外觀物摉書兩無礙説向傍人會者稀高談空自超三界五言律詩次峽江庚戌春赴南雍省侍秋半乃還頗有賦詠而亡其稿追憶僅得此下十章眼界俄開闊悠然獨倚蓬暝煙藏逺樹殘照掠孤峰合市人初散鄰船話不同兩年頻過此碌碌愧英雄相傳此地舊有周瑜廟過白沙過盡白沙洲千峰躍未休青餘原上麥紅失驛中樓客子程途逺長江日夜流不緣君父重奔走亦何求過市汊人家依岸淺驛岸俯江斜密雨遮龍霧洲名奔流走象牙潭名金陵何處是白下望中賒明到南昌郡徐亭掃落花過吳城舟過吳城驛蒼茫暮景斜古祠淹日月生計半魚茶碧草眠黃犢青山印白沙風光長似此何處不為家望小孤小酌初成醉扁舟已出湖乾坤雙眼闊江漢一峰孤龍窟深通海茅封半屬吳北流平似砥無復向時虞過李陽河圍棋決勝苦回首李陽河一鳥過江沒片雲遮日多荻苗風裏淨漁艇浪中俄囊槖今垂罄蹉跎可奈何過清溪山水池州好風波客子愁可憐趙昴發深愧宋齊丘忠義名長在姦諛死即休致君時未晚弔古淚還流過蕪湖佳麗蕪湖縣千年拱帝京樹連淮浦碧江逐海潮平天地容疏拙風波托死生不將詩句覓對景若為情次烏江慷慨虞歌闋峥嶸漢業成烏江元入海亭長謾多情義帝今安在韓生已就烹拔山如可恃無處著天明回途過大孤萬頃秋波裏擎天一柱孤仙姬不可見元氣自相扶往返隨陽鳥平安憶鯉魚顧瞻江漢水極目倍躊躇送許儀賔還南昌野色開晴望榴花照别筵交情詩卷裏帆影暮雲邊天錫恩波闊人誇戚里賢論文殊草草分手思茫然何孝子廬墓聞而有作風雨青山夜苦寒病骨􅋯精誠驅魍魎嚴衛伏於菟報德心何極旌門詔有孚孝經餘斷簡長此奉訏謨挽封君秦先生同年國聲之父志節居貧見聲光與世延青襟原有造玉樹晚爭妍已拜雙龍敕何須二頃田向來勤仰止聞訃重凄然其二逺業開庭訓新封領户曹養分天祿厚吟對碧山髙晨省歡初洽仙遊事總拋楸梧深馬鬛風雨暮蕭騷次韻答余宗周侍御余時按治遼東驄馬遼陽路霜清草樹稀直知臨事勇端慰逺人依過客傳新藁行年損昔非夜堂孤酌處南極正騰輝余生日之夜獨酌於察院中因賦詩見寄拙宦終何補深知轉覺稀來書仍欵欵離思重依依虎豹精神别蟲魚事業非何時燒短燭杯酒共清輝哭同年張經載黃門高步驅流俗峩冠領爭臣物情端有望天道詎無親筆絶中宵草山頽百嵗身魂遊何處在華月滿楓宸朔風吹訃至寒夜不成眠邦國斯人淚煙波寡婦船故山春寂寂丹旐晚翩翩自古誰無死脂韋浪百年戊辰五月西歸寫懷寄會中諸君子竊祿渾無補歸耕似有名海鷗迎客下風葦冒江平道在貧堪老身間夢亦清金陵千載地回首獨含情其二五月還鄉客飄然一布衣耕耘真子職消息是天機江水兼潮漲風帆帶雨飛心知蓬島近自合寄書稀舟中偶作次韻江立風前水山眠雨後霞舊堤浮半柳新市聚圓沙去國蛇添足防身弩失牙月華今夕減愁聽隔船笳賦玉泉境勝隂陽會泉甘草樹芳清池凝玉液翠壁瀉虹光澤潤京師闊流交渤海長山前亭子在遊豫憶宣皇送張虞咨都事考績赴京兼過華亭省墓黃鳥正嚶鳴垂楊拂曙晴幕間都督府舟發石頭城宦業孚臺論離筵悵友生向來觀國眼今去轉分明其二莊簡編年就參軍奏績時學因庭訓篤忠自孝思移雨露心兼悚風塵髮未絲不妨聞鶴唳休遣滯行期送李司徒致仕春城車馬動相送滿江干風定塵猶起潮平酒未闌急流推勇退當局羡旁觀珍重尚書履惟應踏翠巒其二溫詔從天下辭榮也自榮進曽居要地退始見平生霄漢冥鴻逺河山晝錦明遙知行樂處詩比沁源清送茆大卿致仕還溧水往日湖西道風霜我最知才高終作士髮短欲成絲優老恩偏重還山路轉夷不妨琴鶴外添取送行詩其二徑竹蕭蕭在歸來菊正花青山迎晝錦醇酒送年華間散漁樵狎尊榮邑里誇尺書時往復相去未為遐次韻奉答守菴叔父清酒嘉禾别黃花兩度秋喜聞心轉逸羞與俗同流步穩風生袂詩成月滿樓竹林無限好強半夢中遊送劉司寇致仕還蘇州今日姑蘇郡耆英似洛中公為劉伯壽誰擬席君從白首功名遂黃麻禮數崇樊籠真自取能不羡冥鴻送大理胡伯珩遷少卿北上酒尊深幾許離思浩紛紛城日遲烘柳江風暖送雲近郊行色盡雙闕曙光分想見臯陶作嘉謨一正君送徐監生亘歸臨川遊子促歸裝官橋柳乍黃姓名銓部籍蒲笋故人觴風正雙帆駛天高一劍長家庭多暇日舊學好商量次韻答周德孚員外並泛長河逺同朝紫禁尊語傳晨纜解談欵夜燈存柳幄籠村店湍雷殷閘門陟明堪豫賀公道謝攀援其二父書曽遍讀師道詎能尊竊祿年華逺趨朝職分存一函終盛禮五柳憶間門相彼溝中瘠須煩健者援示允迪允恕二弟再疊三疊非引勿登樓樓居嫌間雜人來往以此五字榜于梯邊二弟以避嫌遂少見過也樓高近斗牛俗人那得溷同氣合相求至樂存書卷餘歡付酒甌此心渾不妄溪上有羣鷗其二非引勿登樓襟裾或馬牛百年清自足千古靜堪求風動青紗帳茶香白玉甌憑髙時一望春水正浮鷗其三非引勿登樓遙青愛石牛靜觀渾有得高坐更無求日暖琴三弄霜嚴酒一甌只愁江海上無處著眠鷗同允恕弟遊金魚别業次韻夜榻幾論心村莊更一臨作樓偏得景栽竹漸成隂帆駛風初正尊殘日未沈坐聞哦五字憂思覺同深其二猶存樂水心軒檻喜平臨髙樹鳴天籟輕雲結午隂地偏幽事足江迥逺書沉疏拙終何補滄洲興轉深大司馬彭幸菴先生賀席上作銀燭然初夜寒鴉徙别枝衣冠成雅會肝膽託新知把盞欣逢聖哦詩聽出竒潞公今再起不似洛中時送賈南塢先生奉使安陸恭題興獻帝神主宫錦製袍新承恩出紫宸暫成千里别聊勸一杯醇霧廓淮山曉花明郢樹春想當揮筆處光彩動神人大司寇林見素先生朝見之日余適出京承見示謁武夷精舍宿武夷自壽詩凡四首依韻奉答髙人何適莫消息與時行岫暖雲還出溪春水自生棹歌經夕逺驛路到燕平無忝師門處心如九曲清其二巖崕矜險絶筋力副攀緣自作從龍起難忘枕石眠道南尊嫡派經古惜殘篇想見賡歌處薰風滿舜絃其三愁極逢興運根深有大年曉峰精舍上春水壽觴前穩曳尚書履光陪閬苑仙功名卑馬援矍鑠自堪憐其四一酌金陵酒分飛二十年誰教宫漏底相見燭光前海宇公宜壽塵埃我未仙春明回首隔猶荷故人憐金陵官舍四首次郭價夫司業韻官舍余所創建也十載經營處能忘别後情棟梁天與立竹樹手栽成再到逢賢主相看是老生要知人地稱詩句已全清其二師席髙南斗西齋類隱居窗虛蕉旋展庭淨草新除廟鼓時驚夢山雲每潤書此中多樂事誰擬問朝車其三賸有論文樂兼存玩物娛萬形皆至理一貫乃真儒習習傳天籟亭亭聳德隅嵗寒吾與汝那肯向炎趨此咏舊所栽檜其四璧水傳新製瀛洲又一時為憐居第好須遣故人知細竹連深巷疏花映短籬便應攜酒去醉倒亦吾宜贈鄉舊張克謀三十年來往鄉情久更親家和渾是福屋潤豈為貧每愛清尊滿何妨白髮新出門時矯首鍾阜正嶙峋毅軒弟六十不受賀以小詩致意憲府歸來早林居十五秋心誠辭寵利疏果動宸旒深户涼初入前山翠欲流壽觴宜數舉花甲况榮周整菴存稿卷十六
